services:
  neo4j:
    image: neo4j:5.26.0-community
    container_name: ideate-test-neo4j
    ports:
      - "127.0.0.1:7475:7474"   # Neo4j Browser (test port)
      - "127.0.0.1:7688:7687"   # Bolt protocol (test port)
    environment:
      NEO4J_AUTH: neo4j/testpassword
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_pagecache_size: 256M
      NEO4J_dbms_memory_heap_initial__size: 256M
      NEO4J_dbms_memory_heap_max__size: 512M
    tmpfs:
      - /data
      - /logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "testpassword", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - test-net

  server:
    image: node:22-slim
    container_name: ideate-test-server
    working_dir: /app
    volumes:
      - ${IDEATE_SERVER_PATH:-../../../ideate-server}:/app
      - ideate_test_node_modules:/app/node_modules
    command: >
      sh -c "npm install && npx tsx src/index.ts"
    ports:
      - "127.0.0.1:4001:4001"   # GraphQL endpoint (test port)
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: testpassword
      PORT: 4001
      NODE_ENV: development
      IDEATE_DEV_MODE: "true"
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4001/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - test-net

networks:
  test-net:

volumes:
  ideate_test_node_modules:
