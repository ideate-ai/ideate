  """Maximum PPR iterations. Default from server config."""
  maxIterations: Int

  """PPR convergence threshold. Default from server config."""
  convergenceThreshold: Float

  """Per-edge-type weight overrides for PPR score propagation."""
  edgeTypeWeights: JSON

  """Maximum token budget for context assembly."""
  tokenBudget: Int

  """Node types to always include regardless of PPR score."""
  alwaysIncludeTypes: [NodeType!]
}

input MetricFilterInput {
  cycle: Int
  workItem: String
  agentType: String
  phase: String
}

