}

type TraversalResult {
  """Nodes ranked by PPR relevance score, highest first."""
  rankedNodes: [RankedNode!]!

  """Total tokens consumed by included nodes."""
  totalTokens: Int!

  """Top-N PPR scores for metadata and debugging."""
  pprScores: [PPRScore!]!
}

