# =============================================================================
# Ideate Server — GraphQL Schema Definition
# =============================================================================
#
# External API contract for ideate-server. Aligns with but is not identical to
# the StorageAdapter interface (adapter-interface.md). GraphQL adds auth context,
# pagination, error handling, and multi-tenant isolation that the adapter does not.
#
# Produced as WI-545 during Phase 0 (PH-018) of the Platform Strategy project.
# =============================================================================

# ---------------------------------------------------------------------------
# Scalars
# ---------------------------------------------------------------------------

scalar DateTime
scalar JSON

