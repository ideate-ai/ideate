# ---------------------------------------------------------------------------
# Queries
# ---------------------------------------------------------------------------

type Query {
  # --- Node Lookup ---

  """
  Retrieve a single artifact node by its artifact ID.
  Automatically scoped to the authenticated org.
  Maps to StorageAdapter.getNode().
  """
  artifact(id: ID!, codebaseId: ID): ArtifactNode

  """
  Retrieve multiple artifact nodes by their artifact IDs in a single call.
  Missing IDs are omitted from the result.
  Maps to StorageAdapter.getNodes().
  """
  artifacts(ids: [ID!]!, codebaseId: ID): [ArtifactNode!]!

  # --- Filtered Queries ---

  """
  Query artifacts by type and filters with cursor-based pagination.
  Maps to StorageAdapter.queryNodes().
  Mirrors ideate_artifact_query (filter mode).
  """
  artifactQuery(
    filter: NodeFilterInput
    first: Int = 50
    after: String
  ): ArtifactConnection!

  """
  Graph traversal from an origin node with filters and pagination.
  Maps to StorageAdapter.queryGraph().
  Mirrors ideate_artifact_query (related_to mode).
  """
  graphQuery(
    query: GraphQueryInput!
    first: Int = 50
    after: String
  ): QueryResult!

  # --- Context Assembly ---

  """
  Full context package for an artifact: metadata, dependencies, related artifacts.
  Mirrors ideate_get_artifact_context.
  """
  artifactContext(id: ID!): ArtifactNode

  """
  PPR-ranked context assembly within a token budget.
  Mirrors ideate_assemble_context.
  Maps to StorageAdapter.traverse().
  """
  assembleContext(input: TraversalInput!): TraversalResult!

  """
  Full project context package: principles, constraints, architecture, policies.
  Mirrors ideate_get_context_package.
  """
  contextPackage(codebaseId: ID): JSON!

  # --- Domain State ---

  """
  Domain knowledge state: active policies, decisions, and open questions.
  Mirrors ideate_get_domain_state.
  Maps to StorageAdapter.getDomainState().
  """
  domainState(domains: [String!]): [DomainState!]!

  # --- Aggregation / Status ---

  """
  Workspace status: current cycle, work item counts, findings, open questions.
  Mirrors ideate_get_workspace_status.
  """
  workspaceStatus(codebaseId: ID): WorkspaceStatus!

  """
  Project status: phases, work item completion, horizon.
  Mirrors ideate_get_workspace_status (project view).
  """
  projectStatus(projectId: ID!): ProjectStatus

  """
  Execution status: work item counts by status, ready-to-start items.
  Mirrors ideate_get_execution_status.
  """
  executionStatus(phaseId: ID): ExecutionStatus!

  """
  Convergence status for a cycle: findings by severity, summary.
  Mirrors ideate_get_convergence_status.
  Maps to StorageAdapter.getConvergenceData().
  """
  convergenceStatus(cycleNumber: Int!): ConvergenceData!

  """
  Count nodes grouped by a dimension.
  Maps to StorageAdapter.countNodes().
  """
  nodeCounts(filter: NodeFilterInput, groupBy: GroupByDimension!): [GroupCount!]!

  """
  Review manifest for a cycle.
  Mirrors ideate_get_review_manifest.
  """
  reviewManifest(cycleNumber: Int): JSON

  """
  Aggregated metrics by scope.
  Mirrors ideate_get_metrics.
  """
  metrics(scope: MetricScope, filter: MetricFilterInput): MetricsResult!

  """
  Generate the next available ID for a given node type.
  Maps to StorageAdapter.nextId().
  Mirrors ideate_get_next_id.
  """
  nextId(type: NodeType!, cycle: Int): String!

  """
  Project configuration (agent budgets, model overrides, PPR settings).
  Mirrors ideate_get_config.
  """
  config(codebaseId: ID): JSON!

  # --- Tenant Queries ---

  """Current organization for the authenticated user."""
  organization: Organization

  """List codebases in the current organization."""
  codebases: [Codebase!]!

  """List projects in the current organization."""
  projects(status: String): [Project!]!
}

# ---------------------------------------------------------------------------
# Mutations
# ---------------------------------------------------------------------------

type Mutation {
  # --- Node CRUD ---

  """
  Create or replace an artifact node.
  Maps to StorageAdapter.putNode().
  Mirrors ideate_write_artifact.
  """
  putNode(input: MutateNodeInput!): MutateNodeResult!

  """
  Partially update an existing node's properties.
  Maps to StorageAdapter.patchNode().
  """
  patchNode(input: UpdateNodeInput!): UpdateNodeResult!

  """
  Delete a node and its associated edges.
  Maps to StorageAdapter.deleteNode().
  """
  deleteNode(id: ID!): DeleteNodeResult!

  # --- Batch Operations ---

  """
  Atomically create/update multiple nodes and edges.
  Validates DAG cycles and scope collisions before persisting.
  Maps to StorageAdapter.batchMutate().
  """
  batchMutate(input: BatchMutateInput!): BatchMutateResult!

  # --- Work Item Operations ---

  """
  Write or update work items atomically.
  Mirrors ideate_write_work_items.
  """
  writeWorkItems(items: [WriteWorkItemInput!]!): BatchMutateResult!

  """
  Partially update work item fields without full overwrite.
  Mirrors ideate_update_work_items.
  """
  updateWorkItems(updates: [UpdateWorkItemInput!]!): [UpdateNodeResult!]!

  # --- Edge Management ---

  """
  Create an edge between two nodes. Idempotent.
  Maps to StorageAdapter.putEdge().
  """
  putEdge(input: EdgeInput!): Boolean!

  """
  Remove all edges from a source node with the specified types.
  Maps to StorageAdapter.removeEdges().
  """
  removeEdges(sourceId: ID!, edgeTypes: [EdgeType!]!): Boolean!

  # --- Journal ---

  """
  Append an entry to the project journal.
  Mirrors ideate_append_journal.
  """
  appendJournal(input: JournalEntryInput!): MutateNodeResult!

  # --- Lifecycle ---

  """
  Archive a completed review cycle.
  Mirrors ideate_archive_cycle.
  """
  archiveCycle(cycleNumber: Int!): Boolean!

  # --- Events / Metrics ---

  """
  Fire registered hooks for an event.
  Mirrors ideate_emit_event.
  """
  emitEvent(input: EmitEventInput!): EventResult!

  """
  Record a metric event.
  Mirrors ideate_emit_metric.
  """
  emitMetric(input: EmitMetricInput!): MutateNodeResult!

  # --- Config ---

  """
  Update project configuration settings (partial patch, deep-merged).
  Mirrors ideate_update_config.
  """
  updateConfig(patch: JSON!): JSON!

  # --- Autopilot State ---

  """
  Get or update autopilot state.
  Mirrors ideate_manage_autopilot_state.
  """
  manageAutopilotState(action: String!, state: JSON): JSON!

  # --- Bootstrap ---

  """
  Initialize workspace artifacts.
  Mirrors ideate_bootstrap_workspace.
  """
  bootstrapWorkspace(projectName: String): Boolean!
}

# ---------------------------------------------------------------------------
# Subscriptions
# ---------------------------------------------------------------------------

type Subscription {
  """
  Emitted when any work item's status changes within the authenticated org.
  Useful for dashboard real-time updates.
  """
  workItemStatusChanged(
    projectId: ID
    phaseId: ID
  ): WorkItemStatusEvent!

  """
  Emitted when a new finding is created during a review cycle.
  """
  newFinding(
    projectId: ID
    cycleNumber: Int
    minSeverity: FindingSeverity
  ): Finding!

  """
  Emitted when an Andon event is triggered, requiring human intervention.
  Critical for real-time decision support.
  """
  andonTriggered(
    projectId: ID
  ): AndonEvent!

  """
  Emitted when a cycle reaches convergence or when a new cycle starts.
  """
  cycleLifecycle(
    projectId: ID
  ): CycleLifecycleEvent!

  """
  Emitted on any artifact mutation within the org.
  Useful for cache invalidation and live collaboration.
  """
  artifactChanged(
    codebaseId: ID
    types: [NodeType!]
  ): ArtifactChangeEvent!
}

# ---------------------------------------------------------------------------
# Subscription Event Types
# ---------------------------------------------------------------------------

type WorkItemStatusEvent {
  workItem: WorkItem!
  previousStatus: String
  newStatus: String!
  changedAt: DateTime!
  changedBy: String
}

type AndonEvent {
  id: ID!
  trigger: ProxyHumanTrigger!
  workItem: WorkItem
  finding: Finding
  description: String!
  createdAt: DateTime!
  """Whether this Andon event has been resolved."""
  resolved: Boolean!
}

type CycleLifecycleEvent {
  cycleNumber: Int!
  event: String!
  projectId: ID
  timestamp: DateTime!
  convergenceData: ConvergenceData
}

type ArtifactChangeEvent {
  artifactId: ID!
  type: NodeType!
  action: MutationStatus!
  codebaseId: ID!
  timestamp: DateTime!
}
