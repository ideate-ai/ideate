# ---------------------------------------------------------------------------
# Auth Context (injected via middleware, not queried)
# ---------------------------------------------------------------------------

"""
Authentication context shape. Populated from the Auth0 JWT by server middleware
and injected into every resolver via the GraphQL context. Not a queryable type —
documented here for schema completeness.

Pluggable: current implementation reads from Auth0 JWT claims.
Future providers (Clerk, Cognito) supply the same shape.
"""
type AuthContext {
  """Auth0 user ID (sub claim). Globally unique."""
  userId: ID!

  """Organization ID from the JWT namespace claim. Scopes all queries."""
  orgId: ID!

  """User roles within the organization."""
  roles: [UserRole!]!

  """
  Codebase IDs the user has access to within the org.
  Null means access to all codebases (OWNER/ADMIN).
  """
  codebaseAccess: [ID!]
}

