"""Metadata common to every artifact node."""
interface ArtifactNode {
  id: ID!
  artifactId: String!
  type: NodeType!
  orgId: ID!
  codebaseId: ID!
  status: String
  cycleCreated: Int
  cycleModified: Int
  contentHash: String!
  tokenCount: Int
  createdAt: DateTime!
  updatedAt: DateTime!

  """Full serialized content of the artifact."""
  content: String

  """Edges originating from or targeting this node."""
  edges(direction: EdgeDirection = BOTH, types: [EdgeType!]): [Edge!]!
}

type WorkItem implements ArtifactNode {
  id: ID!
