  tokenCount: Int
  createdAt: DateTime!
  updatedAt: DateTime!
  content: String
  edges(direction: EdgeDirection = BOTH, types: [EdgeType!]): [Edge!]!

  # WorkItem-specific fields
  title: String!
  complexity: WorkItemComplexity
  scope: JSON
  criteria: [String!]
  notes: String
  workItemType: WorkItemType
  phase: Phase
  domain: String

  """Work items this item depends on."""
  dependsOn: [WorkItem!]!

  """Work items this item blocks."""
  blocks: [WorkItem!]!

  """Findings related to this work item."""
  findings: [Finding!]!

  """Module this work item belongs to."""
