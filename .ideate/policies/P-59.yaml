id: P-59
type: domain_policy
domain: artifact-structure
title: NodeType union and ALL_NODE_TYPES array must be kept in sync by a structural test
body: |-
  When a type definition contains a union (e.g., `NodeType`), and there is a corresponding array constant (e.g., `ALL_NODE_TYPES`), the array must be kept in sync with the union. A CI check or unit test must verify this.

  The required test must use a structural comparison between the array and the union — not a hardcoded list of expected values. A hardcoded-list test does not satisfy this policy: if the union and the array both gain a new member, a hardcoded test passes even if neither was actually updated. The structural form (e.g., a mapped type exhaustiveness assertion, or set equality derived from the union via TypeScript type inspection) catches divergence regardless of which side is edited.

  TypeScript-specific guidance: The array constant must not carry an explicit type annotation that widens the element type to the full union (e.g., `readonly NodeType[]`). Such an annotation defeats `as const` literal inference, causing `typeof ARRAY[number]` to resolve to the full union and making any `Exclude`-based exhaustiveness check tautologically always-true. The array must rely on `as const` alone for its type, so the compiler infers a literal tuple type from the actual array contents.

  File placement guidance: The exhaustiveness sentinel (e.g., the `_ExhaustiveNodeTypeCheck` compile-time assertion) must reside in a file that falls within the tsconfig include glob evaluated by `tsc --noEmit` in CI (typically `src/**/*`). Placing the sentinel in a `tests/` directory that is excluded from the primary tsconfig renders it inoperative as a policy enforcement check — it will only be evaluated during test compilation, not on the canonical type-checking pass.

  Rationale: WI-613 added types to the NodeType union but did not update ALL_NODE_TYPES. Full-audit 2026-04-09 found the existing test uses a hardcoded expectedTypes list. Cycle 20 found the replacement compile-time check (WI-739) was tautological due to a widening type annotation and that the sentinel was in a tsconfig-excluded directory.
