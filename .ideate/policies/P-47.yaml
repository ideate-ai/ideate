id: P-47
type: domain_policy
domain: artifact-structure
title: Write handlers must store absolute file_path in SQLite node rows
description: All MCP write handlers must store absolute file paths in the SQLite nodes table file_path column. Paths must be resolved against ideateDir (e.g., path.join(ideateDir, subdir, filename)), never stored as relative paths. readArtifactContent and PPR context assembly depend on file_path being directly usable with fs.readFileSync without CWD assumptions.
