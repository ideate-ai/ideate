id: P-63
type: domain_policy
domain: artifact-structure
title: Specification documents defining storage-agnostic interfaces must not reference concrete storage formats
rule: Specification documents that define storage-agnostic interfaces (adapter contracts, interface specs, API schemas) must not reference concrete storage formats such as YAML files, SQLite tables, two-phase write sequences, or filesystem paths. This extends P-53, which originally covered MCP tool descriptions. Cycle 19 found adapter-contract.md violated the same principle by referencing 'YAML files' and 'SQLite' in its Architecture Principles and Implementation Notes sections.
status: active
established: cycle-19
