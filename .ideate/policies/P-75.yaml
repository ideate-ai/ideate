id: P-75
type: domain_policy
domain: artifact-structure
cycle: 22
title: Schema test assertions must query the live database
description: Test assertions that verify schema completeness, table structure, or component counts must query the live system under test (e.g., SELECT from the database, PRAGMA table_info) rather than asserting the length of a locally-defined fixture array or constant. A fixture-length assertion is vacuously true — it passes whenever the local array is correct regardless of whether the system under test matches.
rationale: "Cycle 22 found three independent instances: (1) extensionTables.length asserted a hardcoded array length (16) in schema.test.ts, meaning a new schema table added without updating the array silently passes; (2) journal_entries assertion was vacuously true because Phase 3 never runs when Phase 2 throws (removed during WI-752 rework); (3) proxy_human_decisions column structure untested — only existence verified (gap-analyst M1). All three share the same flaw: the assertion is satisfied by the local fixture, not by observing the database."
source: cycle 22 code-reviewer S1, gap-analyst M1, journal-keeper CR1
supplements:
