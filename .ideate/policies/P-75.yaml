token_count: 732
rule: Test assertions that verify schema completeness, table structure, or component counts must query the live system under test (e.g., SELECT from the database, PRAGMA table_info) rather than asserting the length of a local fixture array.
sub_rules:
  - rule: SQLite system tables (those matching the sqlite_* prefix, such as sqlite_sequence) are excluded from table-count and coverage assertions. These tables are auto-created by SQLite for AUTOINCREMENT columns and are not part of the application schema. Exclusion must be explicit in the filter and should be commented to explain why.
    derived_from: WI-754 implementation, cycle 22 review (S1 + gap EC findings)
    established: cycle-022
  - rule: Every FK constraint defined with ON DELETE CASCADE must have a cascade-behavior test verifying that deleting the parent row removes the corresponding child row. Column-presence assertions alone do not cover CASCADE semantics.
    derived_from: gap-analyst finding EC1, cycle 22 review
    established: cycle-022
  - rule: Every column in a table must have an explicit assertion in that table's schema describe block. When a column is added to an existing table, the corresponding describe block must be updated in the same work item.
    derived_from: gap-analyst findings EC2/EC3, cycle 22 review
    established: cycle-022
derived_from: cycle-021 spec-adherence review
established: cycle-021
status: active
