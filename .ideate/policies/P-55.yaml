id: P-55
type: domain_policy
amends: null
domain: project-boundaries
established: 2026-04-04
rationale: Hardcoded Neo4j password fallback found in ideate-server creates a security vulnerability. Credentials in source code are exposed to anyone with repository access and cannot be rotated without code changes.
text: Production code must not contain hardcoded credentials, passwords, API keys, or secrets. All credentials must be sourced from environment variables, configuration files outside version control, or secure secret management systems. This applies to database connections, external service authentication, and any security-sensitive configuration.
