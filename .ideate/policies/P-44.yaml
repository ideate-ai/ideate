cycle_modified: 20
body: "All MCP write handlers must use atomic write patterns: Phase 1 writes YAML files to disk (source of truth); Phase 2 wraps all SQLite index upserts or deletes in a single exclusive transaction (ctx.db.transaction(...).exclusive()). The YAML write must complete before the SQLite transaction opens. This applies to every handler that modifies YAML then upserts or deletes SQLite rows, including but not limited to handleEmitMetric, handleAppendJournal, handleWriteWorkItems, handleWriteArtifact, handleUpdateWorkItems, and handleArchiveCycle. Sequence-number generation that requires serialization must allocate the number via a first exclusive transaction (with a placeholder row insert to reserve the slot), write YAML outside any transaction, then finalize in a second exclusive transaction."
