id: P-44
type: domain_policy
domain: artifact-structure
title: MCP write handlers must use atomic write patterns
status: active
description: "All MCP write handlers must use atomic write patterns. Default: Two-phase pattern — Phase 1 writes YAML files to disk (source of truth); Phase 2 wraps all SQLite index upserts or deletes in a single exclusive transaction (ctx.db.transaction(...).exclusive()). This applies when the YAML write and SQLite upsert are logically independent. Variant: Single-transaction pattern — when the handler requires serialization between a read and write (e.g., COUNT-based sequence number generation that must not race), both the YAML write and SQLite upsert may be placed inside a single .exclusive() transaction. This prevents concurrent handlers from producing duplicate sequence numbers or other race-dependent artifacts. Both patterns apply to every handler that modifies YAML then upserts or deletes SQLite rows, including but not limited to handleEmitMetric, handleAppendJournal, handleWriteWorkItems, handleWriteArtifact, handleUpdateWorkItems, and handleArchiveCycle."
established: cycle 1
