id: P-44
type: domain_policy
domain: artifact-structure
title: Two-phase YAML-first write pattern for MCP handlers
description: "All MCP write handlers must use a two-phase pattern: Phase 1 writes YAML files to disk; Phase 2 wraps all SQLite index upserts or deletes in a single exclusive transaction (ctx.db.transaction(...).exclusive()). This applies to every handler that modifies YAML then upserts or deletes SQLite rows, including but not limited to handleEmitMetric, handleAppendJournal, handleWriteWorkItems, handleWriteArtifact, handleUpdateWorkItems, and handleArchiveCycle."
derived_from: D-135, D-145, D-147, D-154, GP-08
established: cycle 1
status: active
amendment_history:
  - cycle: 1
    change: "Added exclusive transaction requirement: Phase 2 must use .exclusive() mode to prevent concurrent handlers from interleaving YAML+SQLite phases."
  - cycle: 2
    change: "Clarified scope: enumerated write.ts handlers (handleWriteWorkItems, handleWriteArtifact, handleUpdateWorkItems) alongside handleEmitMetric and handleAppendJournal."
  - cycle: 4
    change: "Deviation identified: handleAppendJournal wraps both YAML write and SQLite upsert inside a single .exclusive() transaction. Review passed the implementation. Q-119 filed for resolution."
  - cycle: 5
    change: "Scope extended to cover destructive operations: handleArchiveCycle DELETE loop must also run inside an exclusive transaction. Policy description changed from 'upserts SQLite' to 'upserts or deletes SQLite rows', and handleArchiveCycle added to the explicit handler list. See D-154."
