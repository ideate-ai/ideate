conflict_note: "Conflict identified in full audit 2026-04-10: putNodeForJournal in mcp/artifact-server/src/adapters/local/writer.ts:1583-1607 writes YAML inside the SQLite transaction body, inverting the YAML-first mandate. Cleanup on transaction failure (lines 1636-1651) is best-effort. The module header at line 8 incorrectly claims the two-phase pattern is preserved. No exception is documented. See D-189 and Q-144 for the contradicting finding and resolution request."
