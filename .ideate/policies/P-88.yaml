id: P-88
type: domain_policy
domain: artifact-structure
title: Resolved-finding exclusion is a semantic contract of findings queries
description: "Any aggregation query that produces a cycle-scoped count of findings (severity counts, convergence counts, workspace-status counts) must exclude findings whose addressed_by field is non-null and non-empty. This exclusion is part of the adapter contract, not an implementation detail. SQL filters and client-side filters across adapter implementations must be logically equivalent: both must treat findings with any non-null, non-empty addressed_by value as resolved and exclude them from counts. Adapter contract documentation (adapter-contract.md, adapter-interface.md, adapter.ts interface JSDoc) must codify this semantic so future adapter implementations do not drift."
