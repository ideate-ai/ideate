title: Every edge type must be registered in EDGE_TYPES, EDGE_TYPE_REGISTRY, and adapter-contract.md
description: "Any edge type produced by the indexer or any writer path must be registered in all three locations before it can be emitted: the EDGE_TYPES constant, the EDGE_TYPE_REGISTRY (with allowed source/target node types), and the public adapter-contract.md schema reference. Indexer-level edge creation through insertEdge() must not rely on plain-string passthrough to smuggle unregistered edge types into the graph."
