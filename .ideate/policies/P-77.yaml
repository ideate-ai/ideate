id: P-77
type: domain_policy
title: MCP server logging must use structured logger, not console methods
domain: agent-system
rule: In the MCP artifact-server, all logging must go through the structured logger (src/logger.ts) which writes to stderr and a log file. Direct use of console.log, console.warn, or console.error is prohibited because stdout is the MCP JSON-RPC transport channel and any non-protocol output on stdout corrupts client communication.
