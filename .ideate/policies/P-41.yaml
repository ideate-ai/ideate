id: P-41
type: domain_policy
derived_from:
  - GP-08 (Durable Knowledge Capture)
  - S2 (code-quality cycle 1)
description: |
  Update operations on autopilot state must validate that keys are in the whitelist
  of known state properties. Arbitrary key injection creates unexpected state
  properties that cause subtle bugs.

  Static state properties (exact match):
  - cycles_completed
  - convergence_achieved
  - started_at
  - last_phase
  - last_cycle
  - deferred
  - deferred_reason
  - last_full_review_cycle
  - last_cycle_findings
  - total_items_executed
  - full_review_interval
  - workspace_label
  - phases_completed
  - current_project

  Dynamic cycle commit properties (pattern): cycle_NNN_start_commit, cycle_NNN_end_commit
  where NNN is one or more digits (matches regex /^cycle_\d+_(start|end)_commit$/).

  The implementation validates via isValidStateKey() which checks against
  STATIC_STATE_PROPERTIES set and CYCLE_COMMIT_PROPERTY_PATTERN regex.
  Invalid keys throw an error with the list of valid keys.
domain: workflow
established: 1
status: active
