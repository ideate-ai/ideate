id: P-53
type: domain_policy
domain: artifact-structure
title: Interface specifications must not reference concrete storage formats
description: Specification documents defining storage-agnostic interfaces (adapter contracts, API schemas, interface types) must not reference concrete storage formats (YAML, JSON files, SQLite, specific file extensions). Interface specs describe the logical data model and behavioral contract. Storage format details belong in implementation specs, not interface specs. This extends GP-14 from MCP tool surfaces to specification documents.
