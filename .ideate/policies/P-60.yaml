id: P-60
type: domain_policy
cycle_created: 17
domain: adapter-equivalence
established: 2026-04-04
rationale: SR-001 identified that RemoteAdapter.getNextId returns { id } while LocalAdapter returns just id. This interface inconsistency breaks the storage abstraction boundary (P-14, P-56) and requires callers to know which adapter they're using. The issue is systemic - adapter methods must have consistent return shapes to be interchangeable.
references:
  - SR-001
  - P-56
status: active
text: All StorageAdapter implementations must expose identical interface contracts. Methods with the same name must accept the same parameters and return the same shaped results. Return type variations (e.g., scalar vs object) between adapter implementations are not permitted. Equivalence tests must verify both behavior AND interface shape.
