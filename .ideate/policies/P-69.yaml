id: P-69
type: domain_policy
domain: artifact-structure
title: Rework that introduces a replacement must remove the superseded code in the same change
description: "When a work item, spec, or merge resolution calls for replacing one construct with another (a guard, a function call, a variable, a code block), the superseded construct must be removed in the same change that introduces the replacement. Adding the new construct alongside the old one is not 'replacement' — it leaves both active and produces double execution, double stat counting, or double triggering even when correctness is preserved by idempotency. This applies to: (a) merge conflict resolutions where stash and incoming versions both define the same operation, (b) guard renames where the old guard is left in place after a new guard is added, (c) function-call moves where bare calls remain alongside transactional wrappers. Reviewers must verify that any change described as 'replace X with Y' results in zero remaining references to X in the affected scope."
