id: P-91
type: domain_policy
title: Parser test assertions must cover provenance/source fields, not just primary value
domain: agent-system
rule: Tests for multi-step parsers must assert on the source/provenance field (which step produced the value, which heading matched, what raw snippet was captured) in addition to the final primary value. Asserting only the primary value hides cases where the right answer is produced by the wrong pipeline branch.
rationale: Multi-step parsers have fallback branches. A test that asserts only the final verdict cannot distinguish 'step 1 matched correctly' from 'step 1 missed and step 2 recovered.' When the fallback path is buggy, the lack of provenance assertions lets the bug ride until real input hits the fallback.
derived_from:
  - cycle: 28
    finding: Code-S2, Gap-EC3, Gap-EC4 — parsePrincipleVerdict tests checked principle_verdict but never asserted principle_verdict_source. A silent step1↔step2 swap during refactor would pass all tests.
established_cycle: 28
status: active
applies_to:
  - src/__tests__/tools.test.ts parsePrincipleVerdict tests
  - any multi-step parser with documented provenance
