id: P-67
type: domain_policy
domain: artifact-structure
title: Post-upsert derivation phases must delete-before-insert to prevent stale edges
description: Every derivation phase that computes edges from upstream artifacts must first delete the prior edges it owns for the affected scope, then insert the newly derived edges. Incremental upserts without a prior delete step leave stale edges whenever an upstream artifact's references change or shrink.
