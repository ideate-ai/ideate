id: P-61
type: domain_policy
cycle_created: 17
domain: workflow
established: 2026-04-04
rationale: CR-001 and CR-002 revealed that the PPR algorithm had an off-by-one error causing zeroed scores when totalNodes=1, and empty results propagated downstream breaking context assembly. These are edge cases (single node, empty arrays) that algorithmic code must handle explicitly. The policy prevents similar regressions in numerical algorithms.
references:
  - CR-001
  - CR-002
  - GA-001
status: active
text: Numerical algorithms must include explicit handling for edge cases including single-element inputs, empty arrays, zero values, and boundary conditions. Edge case behavior must be defined, implemented, and covered by regression tests. Algorithms returning scores or rankings must define behavior when the input set has fewer than 2 elements.
