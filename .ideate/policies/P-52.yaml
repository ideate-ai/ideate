description: "When an MCP tool call fails during skill execution, the skill must report the failure and stop processing. Skills must NOT fall back to reading, writing, grepping, or globbing .ideate/ files directly. A tool failure signals a defect in the tool layer (to be fixed via refinement), not a permission to bypass the MCP abstraction boundary (GP-14). Triggered by: PH-013 context retrieval incident where ideate_assemble_context failure led to direct .ideate/ file reads."
