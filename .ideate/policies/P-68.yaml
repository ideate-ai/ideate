id: P-68
type: domain_policy
domain: artifact-structure
title: Incremental indexer triggers must fire derivation for every upstream file type a derivation depends on
description: When the incremental watcher decides whether to run a derivation pass, the trigger guard must include every upstream artifact type that pass depends on. A guard based on a single artifact type (e.g. journal entries) is incorrect if the derivation also reads cycle_summary, work_item, or any other artifact type.
