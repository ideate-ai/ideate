id: P-93
type: domain_policy
title: Reviewer verdict parsers must enumerate all documented format variants
domain: agent-system
rule: "Verdict-extraction parsers must enumerate every documented output format that producing agents are permitted to emit, and tests must cover each variant. The 'all-bold verdict' format (entire `**Principle Adherence Verdict: Pass**` span including verdict keyword inside one bold span) is one such variant and must be matched by step 1."
rationale: Parsers and their upstream producers drift independently. When producers add a format variant, parsers must be updated deliberately with explicit test coverage; leaving variants to fall through to a heuristic fallback hides format drift behind a fragile path.
derived_from:
  - cycle: 28
    finding: "Gap-EC2 — all-bold verdict format (**Principle Adherence Verdict: Pass**) is not matched by any step 1 pattern. Cycle 003 uses this format. Combined with the step 2 prefix-match defect, produces false fail on historical artifacts."
established_cycle: 28
status: active
applies_to:
  - src/tools/analysis.ts parsePrincipleVerdict step 1 regex patterns
  - any verdict/disposition parser
