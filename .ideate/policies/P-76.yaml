id: P-76
type: domain_policy
domain: workflow
cycle: 22
title: Update acceptance criteria when implementation diverges from spec during execution
description: When execution corrects the implementation approach from what the spec described — due to technical constraints, incremental review feedback, or rework — the work item's acceptance criteria must be updated to match the actual implementation before the work item is marked complete.
rationale: Cycle 22 found all three work items (WI-751, WI-752, WI-753) had at least one acceptance criterion that did not match the final implementation. In each case the implementation was corrected during execution (journal_entries→nodes table, no-registry-entry→already-at-target, propagates error→records in result.errors) but the AC text was left stale. Stale ACs cause false spec-adherence failures in capstone review and erode the work item as a source of truth for future readers.
source: cycle 22 spec-reviewer S1/S2/S3, journal-keeper CR2
