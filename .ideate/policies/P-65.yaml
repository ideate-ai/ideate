id: P-65
type: domain_policy
domain: adapter-equivalence
title: Module-level vi.mock must not be introduced into Vitest files that contain pre-existing tests
rule: Do not add a module-level vi.mock() call to a Vitest test file that already contains tests relying on the real module. Vitest hoists vi.mock() to the top of the module, which replaces the real implementation for all tests in the file and can silently regress previously-passing tests. New mock scopes must go in a dedicated test file, or use vi.doMock() inside the relevant describe or it block.
status: active
established: cycle-19
source: "cycle-19 code-quality finding S1: WI-656 vi.mock hoisting broke pre-existing initialize() test in remote-adapter.test.ts"
