id: P-64
type: domain_policy
domain: adapter-equivalence
title: ValidationError second argument must be a recognized error code string, not a field name
rule: "When constructing ValidationError, the second argument must match one of the constructor's recognized prefixes: INVALID_, MISSING_, EMPTY_, a suffix of _ERROR, or the literal TRANSACTION_FAILED. Passing a raw field name (e.g., 'seed_ids', 'cycle', 'always_include_types') silently produces .code = 'VALIDATION_ERROR', defeating downstream code-based error handling. Reviewers must flag ValidationError calls whose second argument does not match a recognized prefix."
status: active
established: cycle-19
source: "cycle-19 code-quality finding S2: systematic ValidationError misuse across WI-653/654/655 validation call sites in both adapters"
