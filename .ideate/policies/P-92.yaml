id: P-92
type: domain_policy
title: P-33 test fixtures must use realistic content, not synthetic strings
domain: agent-system
rule: Test fixtures that validate P-33 (no absolute paths in MCP output) must contain realistic reviewer output strings including the kinds of path-shaped tokens that appear in real findings (absolute .ideate/ paths, file-scope references, stack traces, snippet quotations). Synthetic 'unclear — no structured format present' style fixtures do not exercise the detector meaningfully.
rationale: A detector is only as good as its fixtures. Synthetic fixtures confirm the regex runs; realistic fixtures confirm the regex catches what it needs to catch. P-33 is a load-bearing privacy/portability constraint and must be validated against the shape of data it will actually see in production.
derived_from:
  - cycle: 28
    finding: Gap-EC5 — rawSnippet P-33 test at tools.test.ts:4198 uses synthetic content with no path references. Real spec-adherence YAML can contain absolute paths in the first 200 chars, which would leak via principle_verdict_warning.
established_cycle: 28
status: active
applies_to:
  - tests validating P-33 compliance
  - any content-sanitization detector
