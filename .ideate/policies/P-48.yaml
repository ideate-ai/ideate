title: Bootstrap tests must assert all IDEATE_SUBDIRS entries dynamically
description: The createIdeateDir test must iterate IDEATE_SUBDIRS to assert subdirectory creation rather than maintaining a hardcoded expected-directories list. This ensures that extending IDEATE_SUBDIRS with new entries is automatically covered by the test without manual synchronization.
