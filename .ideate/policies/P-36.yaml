description: New MCP tools must include unit tests covering primary code paths, error handling, and edge cases. Critical infrastructure tools (events, metrics, bootstrap, index) require test coverage before merge. Test files are co-located with source in `__tests__/` directories. Minimum coverage: happy path, error paths for required parameters, and integration with dependent systems.
