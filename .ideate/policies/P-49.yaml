id: P-49
type: domain_policy
domain: artifact-structure
title: Forward-only fixes must include backfill assessment
description: When a code change alters how artifacts are written or indexed, the implementation must include an explicit assessment of existing artifacts affected by the prior behavior. If existing artifacts will be inconsistent after the fix (e.g., missing fields on index rebuild), the work item must either (a) include a backfill step, or (b) document the inconsistency and create a follow-up work item for remediation. Silent forward-only fixes that leave existing data in a broken state are prohibited.
