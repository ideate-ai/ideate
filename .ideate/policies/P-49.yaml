id: P-49
type: domain_policy
domain: artifact-structure
title: Forward-only fixes must include explicit backfill assessment
description: When a code change alters how artifacts are written or indexed, the implementation must include an explicit assessment of existing artifacts affected by the prior behavior. The assessment must be stated explicitly in the work item resolution or notes — even when the conclusion is 'no backfill needed' (e.g., for runtime-derived data, ephemeral state, or fields that regenerate on next index). If existing artifacts will be inconsistent after the fix, the work item must either (a) include a backfill step, or (b) document the inconsistency and create a follow-up work item for remediation. Silent forward-only fixes that leave existing data in a broken state are prohibited, and silent no-backfill conclusions that leave a future reviewer unable to confirm the assessment was performed are also prohibited.
