id: P-54
type: domain_policy
domain: workflow
title: Spec summary tables must have corresponding detail sections
description: When a specification document includes a summary table, mapping table, or index listing operations, types, or components, every entry in that table must have a corresponding detail section in the same document or an explicit cross-reference to the detail in another document. A table entry without a detail section signals an incomplete spec.
