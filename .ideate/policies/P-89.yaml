id: P-89
type: domain_policy
domain: workflow
title: Specs must be re-verified at execute time against current code state
description: Before a worker begins implementation, the spec's reproducer or stated root cause must be re-verified against the current codebase. If the reproducer no longer reproduces, or the described root cause has been superseded by a prior work item's fix, the work item must be returned to refinement rather than silently redirected to a different fix. Silent scope changes at execute time erode the spec-as-contract property (P-01, P-02) and make downstream review unable to distinguish legitimate fixes from scope creep. P-76 covers updating ACs after execution drift; this policy covers preventing drift by verifying spec validity before execution.
derived_from: cycle 030 spec-adherence C2 (WI-860 spec described a root cause already fixed by WI-824); C1 (WI-867 cited D-210 but D-211 is correct); S1 (WI-860 AC used condition_b where condition_a is meant) — three spec/reality drift instances in one cycle
