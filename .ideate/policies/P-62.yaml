id: P-62
type: domain_policy
cycle_created: 18
domain: adapter-equivalence
established: 2026-04-05
rationale: D-131 established status exclusion for LocalAdapter.queryNodes, but RemoteAdapter.queryNodes does not implement equivalent filtering. This breaks adapter equivalence per P-56. The exclusion of terminal statuses (done, obsolete) from work_item queries must be consistent across both adapters.
references:
  - D-131
  - S1-cycle-18-code-quality
  - P-56
status: provisional — under review
text: Both LocalAdapter and RemoteAdapter must implement identical status exclusion logic for work_item queries. When no explicit status filter is provided, both adapters must exclude work_items with status 'done' or 'obsolete' from queryNodes results. Adapter equivalence requires behavioral parity in implicit filtering, not just explicit filter support.
