id: P-74
type: domain_policy
domain: artifact-structure
title: Schema version constants must be bumped atomically
rule: When introducing a schema migration in mcp/artifact-server, both CURRENT_SCHEMA_VERSION (the Drizzle schema's target version in schema.ts) and CONFIG_SCHEMA_VERSION (the migration gate's target version in src/config.ts) must be bumped to the new version in the same commit that adds the migration. A migration whose target version is not reflected in CONFIG_SCHEMA_VERSION will never run on existing installations because the migration runner returns early when currentVersion >= CONFIG_SCHEMA_VERSION.
derived_from:
  - Full audit 2026-04-10 critical finding
  - Full audit 2026-04-10 significant finding S1
established: 2026-04-10
status: active
notes: This is the mechanical invariant backing GP-16 (Frictionless Install). GP-16 states the intent (automatic migration); P-74 states the code-level rule that makes the intent enforceable. The v4->v5 migration shipped without bumping CONFIG_SCHEMA_VERSION from 4 to 5, causing every installation with schema_version:4 to silently skip the migration and crash on rebuildIndex with 'table findings has no column named title'.
