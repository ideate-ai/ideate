id: P-90
type: domain_policy
title: Parser heading matching uses exact-heading (not prefix) semantics
domain: agent-system
rule: When a parser locates a heading within reviewer output, it must match the full heading text exactly (case- and whitespace-normalized) rather than using prefix matching. Prefix matching is only permitted when the prefix behavior is explicitly documented in the parser spec AND covered by a dedicated test for both matching and non-matching prefixes.
rationale: "Prefix matching on headings is silently permissive: a longer heading that starts with the expected prefix will match even when it is semantically different. Exact-match semantics force the parser author to acknowledge every heading variant explicitly, which the test suite can then pin."
derived_from:
  - cycle: 28
    finding: Code-S1 / Gap-EC1 — parsePrincipleVerdict step-2 used heading.startsWith('principle adherence'), matching 'Principle Adherence Evidence' (a standard section in spec-reviewer output) whose bullet body triggered the violation regex and returned false-fail.
established_cycle: 28
