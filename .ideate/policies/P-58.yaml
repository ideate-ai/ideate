id: P-58
type: domain_policy
cycle_created: 16
description: |
  Any code that touches security-relevant surfaces (authentication, authorization, input validation, hook command execution) must have automated test coverage. The test must verify both the "happy path" and the failure modes. Rationale: WI-612's security fix for hook command injection was implemented but tests were deferred. This creates a regression risk. The policy ensures security fixes are durable.
rationale: Prevents regression of security fixes; aligns with findings from WI-612
references:
  - C-12
  - finding-612-security-tests
  - WI-612
status: active
title: Security-critical code paths must have automated test coverage
