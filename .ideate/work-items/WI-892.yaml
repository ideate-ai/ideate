notes: |
  # WI-892 Implementation Notes

  ## Context

  Full-audit finding [spec C2]: migrations.ts:46-94 has entries for 3 to 4 and 4 to 5 only. CURRENT_SCHEMA_VERSION is 7 but nothing handles 5 to 6 or 6 to 7 — the fallback at lines 169-174 silently bumps the version number without running any transforms.

  Investigate what, if anything, changed between v5-v6 and v6-v7. Check git log on schema.ts for version-bump commits. If the bumps were purely additive schema additions (new columns/tables that better-sqlite3 tolerates on open), no data transform is needed and the stub is a no-op with a comment. If a real transform was missed, implement it.

  ## Fix shape

  Add two entries to the MIGRATIONS array, matching the existing entry shape:

  ```ts
  {
    fromVersion: 5,
    toVersion: 6,
    description: 'No data transform required. v6 added the X column which is additive.',
    apply: (_db) => { /* no-op */ }
  }
  ```

  Add a log.warn in the fallback path so operators know when the registry-is-ahead-of-code case occurs.

  ## Constraints

  - Migrations are idempotent and forward-only (per existing policy in migrations.ts).
  - Do NOT modify the schema itself in this WI — this is purely about completing the migration history.
  - If investigation reveals a real missed transform, DO implement it, but also note it in the resolution so the risk is visible.
resolution: "Investigation: commit 5a21db2 (metrics refactor) bumped CURRENT_SCHEMA_VERSION and CONFIG_SCHEMA_VERSION from 5 to 7 in one step. Changes are purely additive (removed metrics_events table — leaves harmless dead data; added tool_usage table via CREATE IF NOT EXISTS; updated relates_to source list TypeScript-only). No data transforms needed. Added v5→6 and v6→7 no-op stub entries with documented rationale in migrations.ts. log.warn added to fallback path at line 169-174. 5 new tests cover stub invocation, idempotency, and fallback warn; 2 existing tests updated from v5 to v7 as final version."
