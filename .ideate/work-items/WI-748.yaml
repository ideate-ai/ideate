criteria:
  - putNodeForJournal writes the YAML file to disk outside any db.transaction() callback
  - Concurrent calls cannot collide on the same sequence number (the exclusive lock in tx1 prevents double-allocation)
  - "Rollback on Phase 2 failure (YAML write fails): tx1 placeholder is deleted from SQLite before the error is thrown"
  - "Rollback on Phase 3 failure (SQLite finalize fails): YAML file is unlinked; tx1 placeholder is deleted; error is a ValidationError with code TRANSACTION_FAILED"
  - All existing tests in src/__tests__/write-transaction.test.ts still pass (handleAppendJournal rollback tests at lines 410-444)
  - adapter-contract.test.ts appendJournalEntry suite (lines 1285-1336) still passes
  - npm test passes with zero TypeScript errors
domain: artifact-structure
phase: PH-040
work_item_type: bug
notes: |-
  Current violation (writer.ts:1565-1651): fs.writeFileSync is called at line 1607 inside the db.transaction().exclusive() callback opened at line 1583. This violates P-44 which requires Phase 1 (YAML) to complete before Phase 2 (SQLite transaction) begins.

  Why the original design put YAML inside the transaction: the sequence number comes from MAX(id)+1 query inside the same exclusive lock. Writing YAML before the lock is released ensures no two concurrent callers pick the same sequence number.

  Restructured pattern (three phases):

  Phase 1 — Allocate and reserve (exclusive SQLite tx):
    - SELECT MAX(seq) for this cycle's journal entries
    - Compute id = J-{cycle}-{seq+1}
    - INSERT a placeholder node row (minimal fields: id, type='journal_entry', file_path, content_hash='' or sentinel)
    - The exclusive lock + placeholder row prevents concurrent callers from allocating the same id
    - Return the allocated id
    - Release the exclusive lock

  Phase 2 — Write YAML (outside any transaction):
    - Serialize entryObj to YAML with the allocated id
    - fs.writeFileSync(yamlPath, yamlContent)
    - If this throws: DELETE the placeholder from SQLite (cleanup tx), then throw

  Phase 3 — Finalize (exclusive SQLite tx):
    - UPDATE the placeholder node row with real content (hash, token_count, etc.)
    - upsertJournalEntry() for the extension table row
    - If this throws: fs.unlinkSync(yamlPath) + DELETE placeholder (best-effort cleanup), throw ValidationError(TRANSACTION_FAILED)

  Note on db.ts schema: the placeholder insert in Phase 1 may require nullable fields or a sentinel value for fields that are computed later (content_hash, token_count). Check the nodes table DDL and use empty string / 0 as placeholders where NOT NULL constraints exist.

  Also update writer.ts module header comment (lines 8-10) to accurately describe putNodeForJournal's three-phase pattern, replacing the current claim that 'Two-phase write pattern (YAML first, SQLite second) is preserved here'.

  The write-transaction.test.ts rollback tests (lines 410-444) test the tool handler (handleAppendJournal) via an injected failing Drizzle ctx. After restructuring, these tests may need updating to match the new rollback sequence — verify and update as needed.
resolution: "Restructured putNodeForJournal in writer.ts to three-phase P-44-compliant pattern: Phase 1 exclusive tx (allocate seq# + INSERT placeholder), Phase 2 fs.writeFileSync outside tx with cleanup on failure, Phase 3 exclusive tx (UPDATE placeholder + upsertJournalEntry) with rollback on failure. Module header updated."
