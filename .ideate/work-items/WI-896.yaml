notes: |
  # WI-896 Implementation Notes

  ## Context

  Carry-forward from PR-004 PH-053 cycle 78 capstone (gap-analyst Significant). Same anti-pattern as WI-890/895 closed in writer.ts. Indexer has this in 2 places:
  - indexer.ts:750 indexFiles() wraps indexSingleFile (which calls fs.readFileSync at :627) in a SQLite transaction
  - indexer.ts:932 rebuildIndex() does the same in its upsert phase

  For a full rebuild over a large workspace, this holds the SQLite write lock across all file reads — blocks all writers for the rebuild duration.

  ## Fix shape

  1. Refactor indexSingleFile into two steps: (a) readAndPrepare — fs.readFileSync + parseYaml + computeArtifactHash, returns a PreparedNode object; (b) upsert — pure SQL.
  2. In indexFiles, collect all prepared nodes via readAndPrepare before opening the transaction. Transaction callback iterates the prepared array calling upsert.
  3. Same treatment in rebuildIndex.

  ## Sequencing

  This WI is filed against PH-056 (Scale + observability) since the impact is scale/latency rather than integrity. If user prefers to close it as part of PH-053 retrospective, can be reassigned.

  ## Constraints
  - Node 22 + vitest only. No bun.
  - GP-14: no direct .ideate/ writes.
  - Preserve public indexFiles / rebuildIndex signatures.

  ## Self-check
  Walk each of the 5 criteria with satisfied/unsatisfied status.
