criteria:
  - "Import format defined: reads .ideate/ directory, parses all YAML artifacts using existing parsing logic"
  - "Node mapping: artifact type to Neo4j node label, artifact fields to node properties"
  - "Edge mapping: extracted edges (from EDGE_TYPE_REGISTRY) to Neo4j relationships with type and weight properties"
  - "Merge semantics defined: how multiple .ideate/ directories combine into one graph — conflict resolution for duplicate artifact IDs, codebase scoping of imported nodes"
  - "Org/codebase/project assignment during import: user provides org ID, tool creates Codebase node for the repo and scopes all imported artifacts under it"
  - "Idempotency: re-importing the same .ideate/ does not create duplicates (content hash-based dedup)"
  - "CLI interface design: command arguments, config file format, dry-run mode, progress reporting"
domain: artifact-structure
phase: PH-018
work_item_type: spike
notes: |-
  Critical path item for dogfooding. The migration tool must work before the remote backend can be validated with real data.

  The tool will live in the ideate-server repo as a CLI command. It reads .ideate/ directories (the same structure the local MCP server uses) and writes to Neo4j via the same service layer the GraphQL API uses.

  Merge scenario for dogfooding: import ideate/.ideate/ and ideate-server/.ideate/ into a single Neo4j graph. Each import creates a Codebase node and scopes its artifacts under it. Both belong to the same Organization. The merged graph should allow PPR traversal across both codebases.

  Conflict resolution: artifact IDs (WI-001, GP-01) are only unique within a codebase. In the merged graph, the compound key is (org_id, codebase_id, artifact_id). No renumbering needed.
