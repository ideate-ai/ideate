criteria:
  - The work_item redirect in handleWriteArtifact uses { ...content, id } (id last) so the caller-supplied id always wins over content.id
  - A test verifies that calling handleWriteArtifact with type work_item, id WI-001, and content containing id WI-999 writes WI-001 not WI-999
  - Existing tests pass without regression
domain: artifact-structure
phase: null
notes: |-
  ## What to change

  ### write.ts (line 752)
  Currently:
  ```typescript
  return handleWriteWorkItems(ctx, { items: [{ id, ...content }] });
  ```

  Change to:
  ```typescript
  return handleWriteWorkItems(ctx, { items: [{ ...content, id }] });
  ```

  Placing `id` last in the spread ensures it overwrites any `id` in `content`.

  ### tools.test.ts
  Add a test that calls handleWriteArtifact with type 'work_item', id 'WI-001', and content containing id: 'WI-999'. Assert the written work item has id 'WI-001'.

  ## Why
  Code-reviewer S2: { id, ...content } lets content.id silently overwrite the caller-supplied id.
