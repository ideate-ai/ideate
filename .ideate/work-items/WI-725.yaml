  ## P-49 assessment

  No on-disk backfill needed. belongs_to_cycle edges are runtime-derived — they are computed from journal entry filename patterns (J-{cycle}-{seq}) and cross-referenced against cycle_summary nodes at index time. No belongs_to_cycle edge is stored in any YAML file; they exist only in the SQLite runtime index. Every rebuildIndex regenerates them from scratch via deriveJournalEntryCycleEdges. Existing artifacts are unaffected.
