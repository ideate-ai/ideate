criteria:
  - "In extractEdges() in indexer.ts, add a derivation rule for findings: when type='finding', verdict matches /^pass/i (case-insensitive), and work_item field is a non-null non-empty string, emit an addressed_by edge from the finding ID to the work_item ID"
  - The derivation rule must only fire when the work_item value matches the WI-NNN pattern (prevent dangling edges from free-text values)
  - "After the change, rebuilding the index from the existing YAML corpus produces addressed_by edges for all passing findings with a valid work_item reference — verify count is approximately 165 using: sqlite3 .ideate/index.db \"SELECT COUNT(*) FROM edges WHERE edge_type='addressed_by'\""
  - "Existing test suite passes: npm test in mcp/artifact-server/"
  - The derivation rule is additive — it does not remove or modify any existing addressed_by edges created via the yaml_field path in EDGE_TYPE_REGISTRY
domain: artifact-structure
phase: null
notes: |-
  Source: WI-715 spike findings (research-graph-edge-coverage), Rank 1 extraction rule.

  Currently addressed_by has only 6 edges for 266 findings (0.4% coverage). Root cause: the yaml_field path in EDGE_TYPE_REGISTRY fires when an artifact's own YAML has an `addressed_by` field populated — but agents never populate this field on findings. Instead, the relationship can be derived: if a finding has a passing verdict and a non-null work_item field, it was addressed by that work item.

  The extraction rule lives in extractEdges() in indexer.ts. Add a conditional block after the existing EDGE_TYPE_REGISTRY loop, specifically for type='finding'. Use the same edge-emission pattern as the rest of the function.

  Expected impact: ~165 new addressed_by edges. Coverage goes from 0.4% to ~62.4%.

  Important: the work_item field on some domain questions contains free-text (not WI-NNN format). Guard with a regex check before emitting.
resolution: Added addressed_by derivation rule in extractEdges() for findings with passing verdict and WI-NNN work_item. Includes guard to skip when yaml_field path already emitted same edge. Added 5 tests (4 derivation cases + 1 double-fire dedup test). 1137 tests pass.
