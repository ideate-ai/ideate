notes: |
  # WI-893 Implementation Notes

  ## Context

  Full-audit finding [spec C1]: ppr.ts:69-72 and reader.ts:381-383, reader.ts:572 hardcode CONTAINMENT_EDGE_TYPES referencing 6 edge types that do NOT exist in EDGE_TYPES. The two file-level sets have DIVERGENT membership (they differ by owns_knowledge and references_codebase). This is an ontology integrity breach and a concrete drift hazard.

  Also closes code S2 and gap SG4 (the constant-duplication theme overlaps).

  ## Fix shape

  1. In schema.ts, add:
     ```ts
     export const CONTAINMENT_EDGE_TYPES: ReadonlySet<EdgeType> = new Set([
       // only edge types that are genuine containment relationships AND present in EDGE_TYPES
       // Based on EDGE_TYPE_REGISTRY: belongs_to_module, belongs_to_domain, belongs_to_phase, belongs_to_project, belongs_to_cycle may qualify
       // Audit each candidate in light of the containment semantic (structural parent-child)
     ]);
     ```

  2. Decide which currently-registered edge types belong in the set. Likely candidates from the registry: belongs_to_* edges. Do NOT include semantic/derivation edges (derived_from, amends, addresses).

  3. In ppr.ts: replace the inline `const CONTAINMENT_EDGE_TYPES = new Set([...phantom types...])` with `import { CONTAINMENT_EDGE_TYPES } from './schema.js'`.

  4. In reader.ts: the two inline arrays at lines 381 and 572 also reference phantom types with DIFFERENT membership. Replace both with the shared set. Audit the PPR + traversal tests for any behavior that depended on the phantom-type filtering (there shouldn't be any because those edge types can never appear in the graph, but verify).

  5. Add a schema.test.ts assertion that EVERY member of CONTAINMENT_EDGE_TYPES is a registered EdgeType. This is the compile-time safety that prevents future drift.

  ## Investigation first

  Before picking set membership, grep for callers of CONTAINMENT_EDGE_TYPES and understand what it's excluding PPR/traversal from. Document the semantic in a comment on the exported set.

  ## Constraints

  - No behavioral change to PPR or traverse() for real (currently-appearing) edge types.
  - Type-safe: set members must be of type EdgeType; the compiler rejects misspellings.
resolution: "CONTAINMENT_EDGE_TYPES now exported from schema.ts as `ReadonlySet<EdgeType>` at lines 155-161 with semantic comment. Members: belongs_to_module, belongs_to_project, belongs_to_phase, belongs_to_cycle. Deviation from spec: belongs_to_domain EXCLUDED because existing reader.test.ts tests explicitly require belongs_to_domain edges to flow through getEdges (12 tests would have broken); deviation documented in the schema comment and regression test. Inline Sets removed from ppr.ts and from both sites in reader.ts (lines 383, 572). 9 regression tests in schema.test.ts + 3 in ppr.test.ts lock in the schema-driven membership and semantic equivalence."
