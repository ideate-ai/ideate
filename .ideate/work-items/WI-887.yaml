resolution: "Fix landed in reader.ts getConvergenceData: for each finding the SQL query flags as open (addressed_by IS NULL), read YAML ground truth and verify; if YAML shows addressed_by populated, treat as resolved and log a structured warning via log.warn('q164', ...). Fallback on read/parse failure counts as open (safe). 9 regression tests pass in q164-regression.test.ts covering mechanisms A (happy path + residual stale row via corruption) and B (YAML-DB skew) and the MCP/raw-SELECT agreement invariant. Full suite: 1520 passed, 0 failures. Review findings S1 (console.warn -> log.warn), M1 (Error instanceof guard), M3 (parseYaml instead of string match), and S2 (added explicit YAML-verification test for mechanism A) addressed in follow-up commit. S4 was a false positive — analysis.ts / tools.test.ts / autopilot skill changes were pre-existing working-tree modifications unrelated to WI-887."
