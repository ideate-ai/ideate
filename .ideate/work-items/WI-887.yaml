  Depends on WI-886 diagnosis. Implementation scope is deliberately not prescribed until WI-886 identifies the mechanism.

  Constraint: the fix must not regress write throughput for the common autopilot path (many finding upserts per cycle). If the fix is a WAL checkpoint on every write, benchmark it first and consider a bounded lazy-checkpoint strategy if overhead is material.

