criteria:
  - traverse() with a single seed node returns ranked results from both adapters
  - PPR scores are compared with a tolerance of 1e-4
  - Ranked node lists are compared after sorting by score descending then by ID ascending for tie-breaking
  - traverse() with multiple seed nodes returns equivalent results within tolerance
  - traverse() with a token_budget constraint returns results within the budget from both adapters
  - traverse() with always_include_types includes the specified types from both adapters
  - If PPR scores diverge beyond tolerance, the test reports the divergence details (node ID, local score, remote score)
domain: agent-system
phase: PH-024
work_item_type: feature
notes: PPR is inherently non-deterministic across implementations due to iteration order and floating-point accumulation. Tolerance of 1e-4 is a starting point. Relative ranking matters more than absolute scores — consider comparing rank order in addition to score values. For a small fixture graph (~20 nodes), PPR should converge quickly and tolerance should be tight.
