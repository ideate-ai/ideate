criteria:
  - "RemoteAdapter.traverse({alpha: 0}) throws ValidationError with the same code as WI-697's LocalContextAdapter fix. Verified by test."
  - "RemoteAdapter.traverse({max_iterations: 0}) throws ValidationError with the same code. Verified by test."
  - RemoteAdapter.getNode('') throws ValidationError with code INVALID_NODE_ID. Verified by test.
  - RemoteAdapter.getNode(null) throws ValidationError with code INVALID_NODE_ID. Verified by test.
  - "_countNodesWithoutStatus errors are no longer silently swallowed — at minimum logged to stderr via console.error before returning 0. Preferred: rethrow unless the caller is documented to be best-effort."
  - fetchCurrentCycle network/infrastructure failures do not surface as VALIDATION_ERROR — use plain Error or a distinct error code that does not imply the input was invalid.
  - Error codes for traverse and getNode match the LocalAdapter equivalents so adapter-equivalence tests pass.
  - Test suite passes with zero regressions.
