notes: |-
  S2 remote fix: in remote/index.ts traverse() validation block (lines 867-911), change alpha and max_iterations guards to match context.ts after WI-697: `alpha <= 0` and `max_iterations <= 0`. Use identical error codes to LocalContextAdapter.

  SG2 remote fix: add guard at the top of getNode (line 509): `if (!id || typeof id !== 'string') throw new ValidationError('INVALID_NODE_ID', 'Node ID must be a non-empty string')`.

  M1 fix: _countNodesWithoutStatus (lines 1438-1443) currently catches all errors and returns 0. Add `console.error('_countNodesWithoutStatus failed:', err)` in the catch block. If this method is internal/best-effort, returning 0 on error is acceptable but the error must not be invisible.

  M2 fix: fetchCurrentCycle (lines 463-468) catch block wraps errors as ValidationError. Change to throw a plain Error (or a typed infrastructure error) so callers know this is not a validation failure: e.g., `throw new Error('Failed to fetch current cycle: ' + String(err))`.

  Add tests to remote-adapter-validation.test.ts following the existing skipIf(!remoteAvailable) pattern per D-177.
