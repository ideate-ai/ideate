notes: |-
  # WI-526: Proportional review routing

  Implements amended GP-05 (proportional review) in execute and review skills.

  ## Execute skill changes (skills/execute/SKILL.md)

  In the work item context assembly phase, after loading the work item spec:
  1. Read work_item_type from the work item artifact
  2. Adjust context loading:
     - feature, spike: full context (architecture, principles, module spec, dependencies)
     - bug: focused context (related findings, affected file history, reproduction info)
     - chore, maintenance: minimal context (just the work item spec and direct dependencies)

  ## Review skill changes (skills/review/SKILL.md)

  In the reviewer spawning phase:
  1. For each completed work item, assess severity × priority
  2. Default: spawn all reviewers (code-reviewer, spec-reviewer, gap-analyst)
  3. If BOTH severity and priority are low (e.g., low-priority chore):
     a. Propose reduced review: 'Work item WI-NNN is low severity/low priority ({type}). Proposing code-reviewer only. Proceed?'
     b. Log decision in journal: ideate_append_journal with reasoning
     c. If confirmed: spawn code-reviewer only
     d. If rejected: spawn full reviewer set
  4. Capstone review always uses all reviewers regardless of per-item decisions

  ## Autopilot mirroring (P-18)

  Mirror the same logic in:
  - skills/autopilot/phases/execute.md (context loading)
  - skills/autopilot/phases/review.md (reviewer selection)

  In autopilot mode, the confirmation step for reduced review is handled by proxy-human if present, or defaults to full review if no proxy-human is available.

  ## Severity/priority assessment
  The executor reads severity and priority from work item metadata if present. If not present, default to medium/medium (full review). Work items created by triage (WI-524) may include priority; severity is typically assessed during refinement.
