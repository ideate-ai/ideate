notes: |-
  This combines three review findings into one WI because they share file scope:

  1. Project interface types: Change scope_boundary to { in: string[]; out: string[] } and horizon to { current: string | null; next: string[]; later: string[] }. Update ProjectRow accordingly. The JSON serialization in write.ts and indexer.ts already uses JSON.stringify so no change needed there — just the TypeScript types.

  2. Appetite indexer: Change indexer.ts line ~322 from toStrOrNull(doc.appetite) to toNumOrNull(doc.appetite). Check if toNumOrNull exists — if not, add it following the toStrOrNull pattern but using Number() with NaN check. Update context.ts local ProjectRow.appetite to number|null. Fix tests to use numeric appetite.

  3. Phase field on WorkItem: Add phase?: string | null to WorkItem interface. In handleWriteWorkItems, add phase: item.phase ?? null to yamlObj. In handleUpdateWorkItems, add phase to the updatable fields. In tools/index.ts, add phase to ideate_update_work_items inputSchema. This enables belongs_to_phase edge creation via the existing edge registry.
