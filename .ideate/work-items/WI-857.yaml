notes: |-
  Return shape (aggregate view):
  ```json
  {
    "filters": { "cycle": 48 },
    "aggregate": [
      { "tool_name": "ideate_get_artifact_context", "count": 12, "request_tokens_total": 450, "response_tokens_total": 8300, "request_bytes_total": 1800, "response_bytes_total": 33200 }
    ]
  }
  ```

  Return shape (detail view): `{ rows: ToolUsageRow[], total_count: n, truncated: boolean }`.

  Return shape (both): combined object with `aggregate` and `rows`.

  Use `ctx.adapter.getToolUsage(filter)` — do not reach into SQLite directly from the handler (per GP-14 / P-33: tools go through adapter).
