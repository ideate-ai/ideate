criteria:
  - "File src/tools/tool-usage.ts exports `handleGetToolUsage(ctx, args)` that accepts filters { tool_name?, session_id?, cycle?, phase?, from?, to?, view?: 'aggregate' | 'detail' | 'both' } and returns JSON"
  - "Aggregate view returns per-tool_name totals: count, sum(request_tokens), sum(response_tokens), sum(request_bytes), sum(response_bytes)"
  - Detail view returns the raw rows (capped at a sensible limit — default 1000, max 10000, configurable via an optional limit arg)
  - TOOLS array in tools/index.ts contains a new entry `ideate_get_tool_usage` with inputSchema describing all filter fields, readOnlyHint:true, idempotentHint:true
  - Dispatch switch has a `case 'ideate_get_tool_usage':` returning handleGetToolUsage (wrapped via instrumentToolDispatch like every other tool — so calls to this tool themselves record a tool_usage row)
  - MCP surface returns no raw SQLite details (GP-14 / P-33) — response is JSON aggregates / rows, not DB internals
  - "Unit test: src/__tests__/tool-usage-tool.test.ts seeds tool_usage rows, invokes the handler with each filter combination and each view mode, asserts result shapes"
  - TypeScript compile succeeds; all tests pass
