notes: |-
  MN2 fix: open equivalence-traverse.test.ts and add a test after the existing error-case tests. Create a node, then call traverse({seed_ids: [node.id], max_depth: 1}) on both adapters. Assert the result has .nodes (array) and .edges (array). This verifies the shape, not specific content.

  MN3 fix: create equivalence-journal.test.ts. Import createDualAdapters and isTestServerAvailable from equivalence-helpers.ts. Write two tests:
  1. appendJournalEntry success: create adapters, call appendJournalEntry with a valid entry, assert no error thrown.
  2. appendJournalEntry failure: this is harder to force without mocking. Either mock the underlying write or just document this as an error-code test that requires additional infrastructure. At minimum, add the success-path test.

  For TRANSACTION_FAILED: since forcing a transaction failure requires mocking internal state, the equivalence test should verify the error code exists in the adapter contract (adapter.ts) rather than triggering it. Add a comment noting this is a contract test, not an integration test for the failure path.
