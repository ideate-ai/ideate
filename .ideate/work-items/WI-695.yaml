depends: []
blocks:
  - WI-700
criteria:
  - "In putNode, when called for an existing node: original YAML content is read and saved at method scope before overwriting; if the SQLite transaction fails, the catch block writes the saved content back to disk instead of calling fs.unlinkSync. Verified by unit test: write a node, mock the SQLite transaction to fail, assert the YAML file still exists with the original content."
  - In deleteNode, the YAML file is removed before the SQLite DELETE (YAML-first per P-44). Verified by unit test asserting file is absent after deleteNode completes.
  - "In nextId, an unsupported node type throws ValidationError with code INVALID_NODE_TYPE (not plain Error). Verified by unit test: call nextId with an unsupported type string, assert error.code === 'INVALID_NODE_TYPE'."
  - All existing writer tests continue to pass. Test suite passes with zero regressions.
domain: adapter-equivalence
phase: null
work_item_type: bug
notes: |-
  S1 fix: in writer.ts putNode, find the block that checks whether an existing node is being updated (roughly line 600). Add `const originalContent = fs.readFileSync(absoluteFilePath, 'utf8')` before the overwrite. In the catch block, replace `fs.unlinkSync(absoluteFilePath)` with `fs.writeFileSync(absoluteFilePath, originalContent, 'utf8')`. patchNode at line 718 already does this correctly — use it as the reference pattern.

  M4 fix: deleteNode currently deletes from SQLite before removing YAML (lines 887-908). Swap the order: fs.unlinkSync first, then the SQLite DELETE within a transaction.

  M3 fix: nextId at line 520 throws `new Error(...)` for unsupported types. Change to `throw new ValidationError('INVALID_NODE_TYPE', ...)` matching the pattern used elsewhere in the file.
