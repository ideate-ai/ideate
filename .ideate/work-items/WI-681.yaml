notes: |-
  Addresses SG3 and SG4 from Cycle 21 gap analysis.

  SG3: ppr.ts lines 112, 121, 130, 139 — all four ValidationError calls pass a bare number as third argument:
    throw new ValidationError('alpha must be...', 'INVALID_ALPHA', alpha)
  Should be:
    throw new ValidationError('alpha must be...', 'INVALID_ALPHA', { value: alpha })
  This pattern is consistent with how every other ValidationError call in the codebase uses the details object.

  SG4: ppr.test.ts validation tests (around line 1539-1658) only assert error message text. None assert .code. WI-678 fixed the codes but the tests don't verify them — reverting codes would still pass all tests. P-002 requires tests that verify the actual validation behavior.

  For SG4: find the test blocks that test invalid alpha, maxIterations, convergenceThreshold, maxNodes. In each, add a .code assertion:
    expect((err as ValidationError).code).toBe('INVALID_ALPHA')  // etc.
  Or restructure the catch-based test at line ~1646 to also check .code.

  ValidationError is imported from the errors module. The test file should already have the import or it can be added.
resolution: "ppr.ts ValidationError details fixed to {value: scalar}; .code assertions added to ppr.test.ts. Autopilot cycle 2."
