notes: |-
  ## Context

  `putNodeForJournal` in `writer.ts` uses a three-phase write pattern (per P-44 / policy domain):
  - Phase 1 (~line 1584): exclusive SQLite tx reserves a seq# via placeholder INSERT
  - Phase 2 (~line 1620): `fs.writeFileSync(filePath, yamlContent)` outside any tx. On throw: cleanup tx DELETEs placeholder (lines ~1639-1648), re-throws
  - Phase 3 (~line 1652): exclusive SQLite tx finalizes the row + upserts journal entry. On throw: `fs.unlinkSync` + DELETE placeholder + throws `ValidationError("TRANSACTION_FAILED")`

  Phase 3 failure is already tested. Phase 2 failure (lines 1639-1648) has zero coverage.

  The existing `makeFailingDrizzleCtx()` Proxy technique only intercepts `drizzleDb.insert` calls. Phase 1 uses raw `db.prepare().run()` and Phase 2 uses `fs.writeFileSync` — neither is intercepted by that Proxy.

  ## How to write the test

  Use `vi.spyOn` on the `fs` module (or `vi.mock('fs')`) to make `writeFileSync` throw on a specific call.

  Pattern:
  ```typescript
  import * as fs from 'fs';

  it('putNodeForJournal Phase 2 failure cleans up placeholder row', async () => {
    // Arrange: spy on writeFileSync to throw
    const spy = vi.spyOn(fs, 'writeFileSync').mockImplementationOnce(() => {
      throw new Error('disk full');
    });

    // Act: call the handler (or adapter method) that invokes putNodeForJournal
    // Use the existing ctx/adapter setup pattern from this test file
    await expect(/* call that triggers putNodeForJournal */).rejects.toThrow('disk full');

    // Assert: no placeholder row remains
    const rows = db.prepare('SELECT COUNT(*) as cnt FROM journal_entries').get() as { cnt: number };
    expect(rows.cnt).toBe(0);

    // Assert: no YAML file on disk
    // Derive the expected file path from the journal entry ID that would have been allocated
    // (check what filePath would have been constructed in putNodeForJournal Phase 2)
    expect(fs.existsSync(expectedFilePath)).toBe(false);

    spy.mockRestore();
  });
  ```

  Look at how the existing `handleAppendJournal` test in this file sets up its context to determine the correct invocation pattern. The journal_entries table starts empty for each test (setup clears it).

  If `writeFileSync` is called multiple times during setup (e.g., for directory creation), use `mockImplementation` with a counter or target the specific call rather than `mockImplementationOnce`.

  ## Where to add the test

  Add it to the existing `describe('handleAppendJournal')` block (or a new `describe('putNodeForJournal Phase 2 failure')` sub-block). The existing test in that describe block covers Phase 3. This test covers Phase 2.
resolution: Added Phase 2 failure test using chmod 444 on journal directory to trigger EACCES from fs.writeFileSync. vi.spyOn not viable in ESM mode. Vacuous journal_entries assertion removed during review.
