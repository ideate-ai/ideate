notes: |-
  # WI-876 — Convergence parser resilience

  ## Real bug (not the originally-filed index staleness)

  Original WI-876 reproducer ("addressed_by updates not reflected in convergence counts") turned out to be a stale MCP process issue, not an index staleness bug. The SQLite index is correct. Spike 2026-04-16 confirmed: sqlite3 CLI returns accurate counts; the MCP process had old code loaded in require.cache.

  The actual recurring defect revealed by that same spike is in `parsePrincipleVerdict` (tools/analysis.ts). It returns `unknown` with vague or missing diagnostics in two cases:

  1. **Missing cycle_summary**: warning = 'no cycle_summary found for cycle N'. No indication of WHICH paths were checked or why none was picked up.
  2. **Unexpected format**: warning = 'unexpected format'. Zero content from the summary itself.

  Both produce silent `condition_b:false`, which blocks autopilot convergence without telling the user what's wrong. This causes phases to appear non-converging even when reviewers all pass.

  ## Scope

  - `tools/analysis.ts`: parsePrincipleVerdict + handleGetConvergenceStatus
  - `__tests__/tools.test.ts`: new unit tests covering missing summary, malformed summary, each accepted regex variant, rejected variants

  ## Out of scope

  - Autopilot-level retry or circuit-breaker tweaks (handled elsewhere)
  - SQLite/indexer changes (confirmed working correctly)
  - MCP server reload behavior (WI-877)

  ## Related

  - WI-874 (closed): legacy-artifact collision — fix option c already shipped, no further action.
  - WI-877: MCP auto-reload on dist rebuild — separate deployment hygiene concern.
