criteria:
  - "In extractEdges(), add a derivation rule for journal_entry nodes: scan the title field using the combined pattern /(?:WI-(\\d+)|[Ww]ork\\s+item\\s+(\\d+))/g — for each match, extract the numeric part from group 1 or group 2, zero-pad to 3 digits, construct WI-NNN, and emit a relates_to edge from the journal entry to the work item"
  - Only emit the edge if the target WI-NNN node exists in the index (do not create dangling edges to non-existent work items)
  - "After index rebuild, the relates_to edge count increases by approximately 200 or more — verify with: sqlite3 .ideate/index.db \"SELECT COUNT(*) FROM edges WHERE edge_type='relates_to' AND source_id LIKE 'J-%'\""
  - "Existing test suite passes: npm test in mcp/artifact-server/"
domain: artifact-structure
phase: null
notes: |-
  Source: WI-715 spike findings, Rank 2 extraction rule.

  Journal entries are a 636-node disconnected island — zero edges. The dominant title format is 'Work item NNN: ...' (163+ entries). A secondary format is 'WI-NNN: ...' or 'WI-NNN — ...'.

  The combined regex /(?:WI-(\d+)|[Ww]ork\s+item\s+(\d+))/g handles both. Match group 1 (WI prefix) or group 2 (Work item prefix) gives the numeric part.

  Note: 'Work item 117' → WI-117 (zero-pad to 3 digits). 'WI-683' → WI-683 (already has prefix).

  Existence check: query the nodes table for the constructed WI-NNN before emitting. This prevents ghost edges if journal entries reference retired or never-created work items.
resolution: Added deriveJournalEntryEdges() post-upsert pass in rebuildIndex(). Handles both 'WI-NNN' and 'Work item NNN' title formats. Re-inserts yaml_field relates_to edge (work_item field) after delete to prevent S1 data loss. Watcher path (indexFiles) calls derive pass when journal entries are updated. 7 new tests (5 original + 2 rework). 1144 tests pass.
