depends: []
blocks: []
criteria:
  - "vitest.config.ts has forceExit: true in the test config block"
  - npm test exits within 5 seconds of the last test completing
  - watcher.test.ts has afterAll cleanup for any ArtifactWatcher instances created in tests
  - All 1015+ existing tests still pass with no regressions
domain: artifact-structure
phase: PH-035
work_item_type: chore
notes: |-
  Root cause: chokidar (ArtifactWatcher) file watchers are not closed after tests complete, keeping the Node.js event loop alive.

  Fix 1 — vitest.config.ts: Add forceExit: true to the test config block:
  ```ts
  test: {
    testTimeout: 10_000,
    forceExit: true,
    include: ['src/__tests__/**/*.test.ts', 'tests/**/*.test.ts'],
  }
  ```

  Fix 2 — watcher.test.ts: Add afterAll cleanup. The file creates ArtifactWatcher instances. Add afterAll(() => watcher.close()) in any describe blocks that create watchers. ArtifactWatcher.close() calls chokidar's watcher.close() which removes the FSEvent listener.

  The forceExit fix alone stops the hang; the watcher cleanup is the proper underlying fix.
resolution: "forceExit: true added to vitest.config.ts; afterAll watcher.close() added to watcher.test.ts. Autopilot cycle 1."
