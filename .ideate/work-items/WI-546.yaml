notes: |-
  This is a human-in-the-loop work item. The deliverable is the checklist document. The user executes the checklist outside of ideate.

  Key considerations:
  - LLC state selection: Delaware (common for startups) vs home state (simpler)
  - Domain: check ideate.* availability across TLDs. Consider ideate.ai, ideate.dev, useideate.com, etc.
  - AWS: use the business entity for the account to keep costs and liability separate from personal
  - GitHub org: needed for the private repos (ideate-server, ideate-portal, ideate-corporate, ideate-infra)
  - Budget sensitivity: identify which steps have upfront costs vs recurring costs
