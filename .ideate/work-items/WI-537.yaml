notes: |-
  # WI-537: Fix MCP query/view bugs

  Addresses: EC1/II1 (phase filter), S1 (project scoping), S2 (description), M1 (intent), MI1 (test)

  ## EC1: Phase filter for work_items
  In query.ts, the hasColumn/phaseTypes logic around line 310/656 only includes 'journal_entry' for phase filtering. Add 'work_item' to the set of types that support the phase filter. The work_items table already has a `phase` column.

  The fix: in the hasColumn function or filter branch, add work_item alongside journal_entry for the phase filter path.

  ## S1: Project-scoped phase in buildProjectView
  In analysis.ts buildProjectView, change the active phase query from:
    WHERE n.status = 'active' ORDER BY n.id LIMIT 1
  To:
    WHERE n.status = 'active' AND p.project = ? ORDER BY n.id LIMIT 1
  Bind activeProject.id as parameter. Import or use the existing project column from the phases table.

  ## S2: Tool description
  In index.ts, change ideate_get_workspace_status description from:
    'Workspace status: current cycle, work item counts, journal entries, open questions.'
  To:
    'Workspace status: current cycle, work item counts, findings, open questions, active project/phase.'

  ## M1: Phase view intent
  In analysis.ts buildPhaseView, add p.intent to the SELECT and include **Intent**: line in output.

  ## MI1: Test
  Add test in tools.test.ts: create 2 work items with different phase values, query with phase filter, verify only matching items returned.
