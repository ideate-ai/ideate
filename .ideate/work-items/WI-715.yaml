notes: |-
  ## Context

  The artifact graph has 2,487 nodes and 1,751 edges. Edge distribution is heavily skewed: `belongs_to_domain` (736) and `relates_to` (359) dominate, while `addressed_by` has only 6 edges for 266 findings. This spike investigates where edge coverage is weak and what extraction rules would most improve PPR graph quality.

  ## Data Sources

  - **SQLite index**: `/Users/dan/code/ideate/.ideate/index.db` — primary data source, query directly
  - **Edge registry**: `mcp/artifact-server/src/schema.ts` — `EDGE_TYPE_REGISTRY` defines all edge types with `yaml_field`, `source_types`, `target_types`
  - **Indexer**: `mcp/artifact-server/src/indexer.ts` — `extractEdges()` is where extraction happens; review existing rules and gaps
  - **Sample YAML files**: `.ideate/` directory — spot-check artifact files to confirm which yaml_field values are actually populated

  ## Key SQL Queries

  ```sql
  -- Full edge type distribution
  SELECT edge_type, COUNT(*) FROM edges GROUP BY edge_type ORDER BY 2 DESC;

  -- Addressed_by coverage for findings
  SELECT
    (SELECT COUNT(*) FROM nodes WHERE type='finding') AS total_findings,
    (SELECT COUNT(DISTINCT source_id) FROM edges WHERE edge_type='addressed_by') AS linked;

  -- Journal entries with zero edges
  SELECT COUNT(*) FROM nodes n WHERE type='journal_entry'
    AND NOT EXISTS (SELECT 1 FROM edges WHERE source_id=n.id OR target_id=n.id);

  -- (source_type, edge_type, target_type) triple counts
  SELECT e.edge_type, ns.type src, nt.type tgt, COUNT(*) cnt
  FROM edges e
  JOIN nodes ns ON e.source_id=ns.id
  JOIN nodes nt ON e.target_id=nt.id
  GROUP BY 1,2,3 ORDER BY 1,4 DESC;
  ```

  ## Output

  Call `ideate_write_artifact({type: 'research', id: 'research-graph-edge-coverage', content: {...}})` with:
  1. Edge coverage matrix (edge type × source/target type pairs, actual vs expected)
  2. Coverage gaps ranked by estimated PPR impact
  3. Specific extraction rule recommendations (yaml_field, source types, target types, derivation logic)
  4. Journal entry edge analysis
  5. addressed_by gap root cause
resolution: "Research artifact research-graph-edge-coverage written to .ideate/steering/research/. Key findings: addressed_by 0.4% coverage (structural gap — agent never writes field), 636 journal entries fully disconnected, top extraction rule additions identified with specific yaml_field/derivation logic."
