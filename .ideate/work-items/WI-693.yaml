notes: |-
  G1, G2, G3 from cycle 26 gap analysis.

  G1: The batchMutate section in adapter-equivalence.test.ts only tests EMPTY_BATCH. Both adapter unit files (local-adapter-validation.test.ts AC-4, remote-adapter-validation.test.ts) cover all 8 other codes but there are no cross-adapter equivalence tests for them.

  G2: adapter-equivalence.test.ts has no queryGraph validation section at all. Both unit files cover INVALID_LIMIT and INVALID_OFFSET for queryGraph.

  G3: The existing queryNodes equivalence test covers INVALID_LIMIT but not INVALID_OFFSET.

  ## How to implement

  Look at the existing batchMutate equivalence section (search for 'EMPTY_BATCH' in adapter-equivalence.test.ts) and add pairs alongside it following the established D-177 Local+Remote pattern. For each code:
  - Input that triggers the code (e.g., batch with a node missing `id` for MISSING_NODE_ID)
  - Local: assert rejects with the error code
  - Remote: it.skipIf(!remoteAvailable), assert same

  For queryGraph, look at the queryNodes validation test for the pattern and add an equivalent block for queryGraph.

  For batchMutate node codes, the batch item format is: `{ type: 'node', operation: 'put', data: { id: '', type: 'guiding_principle', properties: {} } }` etc.
  For batchMutate edge codes, look at how MISSING_EDGE_SOURCE is tested in local-adapter-validation.test.ts AC-4 or remote-adapter-validation.test.ts batchMutate section.

  ## D-177 pattern reminder
  ```ts
  it('batchMutate: MISSING_NODE_ID throws from LocalAdapter', async () => {
    const { localAdapter } = setup;
    const err = await localAdapter.batchMutate([{ type: 'node', operation: 'put', data: { id: '', type: 'guiding_principle', properties: {} } }]).catch(e => e);
    expect(err.code).toBe('MISSING_NODE_ID');
  });
  it.skipIf(!remoteAvailable)('batchMutate: MISSING_NODE_ID throws from RemoteAdapter', async () => {
    if (!remoteAdapter) return;
    const err = await remoteAdapter.batchMutate([{ type: 'node', operation: 'put', data: { id: '', type: 'guiding_principle', properties: {} } }]).catch(e => e);
    expect(err.code).toBe('MISSING_NODE_ID');
  });
  ```

  Note: CYCLE_DETECTED and SCOPE_COLLISION are server-side only (LocalAdapter doesn't implement them) — do NOT add tests for these.
