notes: |-
  ## What to change

  Update WI-725 via the `ideate_update_work_items` MCP tool. Add the following text to the `notes` field (append, do not replace existing content):

  ```
  ## P-49 assessment

  No on-disk backfill needed. belongs_to_cycle edges are runtime-derived — they are computed from journal entry filename patterns (J-{cycle}-{seq}) and cross-referenced against cycle_summary nodes at index time. No belongs_to_cycle edge is stored in any YAML file; they exist only in the SQLite runtime index. Every rebuildIndex regenerates them from scratch via deriveJournalEntryCycleEdges. Existing artifacts are unaffected.
  ```

  ## Why

  P-49 requires that work items changing how artifacts are indexed include an explicit backfill assessment, even when the conclusion is 'no backfill needed'. WI-725 registered a new edge type (belongs_to_cycle) and added the derivation function but did not document the P-49 assessment. Gap-analysis MF2 (cycle 20) identified this omission. The assessment is correct — runtime-derived edges need no YAML backfill — but it must be stated explicitly.

  ## How to do this

  Call `ideate_update_work_items` with:
  - id: WI-725
  - field to update: notes (append the P-49 assessment section)

  Do not change the status, title, or criteria of WI-725 — it remains 'done'.
