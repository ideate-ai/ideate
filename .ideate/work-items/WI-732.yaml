criteria:
  - "WI-725 notes or resolution field contains an explicit P-49 statement: that no on-disk backfill is needed, that belongs_to_cycle edges are runtime-derived from journal entry filename patterns, and that they regenerate on every rebuildIndex"
  - The statement names P-49 explicitly so a future reviewer can confirm compliance was assessed
