criteria:
  - "WI-860 acceptance criteria: replace 'condition_b' with 'condition_a' in all occurrences (AC text, notes, and reproducer). condition_a is the significant-findings count check; condition_b is the principle verdict check. The WI-860 fix targets condition_a."
  - "WI-860 notes: replace the 'legacy YAML file naming' root-cause description with the actual mechanism. Root cause: getConvergenceData counts all findings for a cycle including those already resolved (addressed_by set). Fix: AND addressed_by IS NULL in the SQL query; equivalent client-side filter in the remote adapter."
  - "WI-860 notes: add an explicit P-49 backfill assessment. Statement: 'Existing findings with addressed_by set will become invisible to convergence checks immediately. No data migration required; this is the intended behavior — resolved findings should not count toward convergence. Pre-existing findings without addressed_by are unaffected.'"
  - "WI-860 reproducer: replace the 'seed .ideate/cycles/002/ with SA-002.yaml' reproducer with one that matches the actual fix: 'Seed a finding F-X with cycle=N, severity=significant, and addressed_by=WI-Y. Call ideate_get_convergence_status(N). Before the fix: returns significant≥1, condition_a=false. After the fix: returns significant=0, condition_a=true.'"
  - "WI-867 acceptance criterion: replace 'decision D-210 (tool_usage standalone)' with 'decision D-211 (metrics emission soft-deprecated; handleGetMetrics remains functional for backward-compatible reads)'. D-210 is about max_nodes (a PPR computation cap) and is unrelated to telemetry."
  - "WI-867 notes: ensure the existing correct citation of D-211 in the notes section is consistent with the corrected acceptance criterion."
  - All artifact writes through MCP (ideate_update_work_items). No direct .ideate/ file edits per P-37.
