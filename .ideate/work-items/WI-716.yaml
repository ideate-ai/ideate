notes: |-
  ## Context

  The node type count revealed several anomalies in the current index:
  - `constraints` (1): plural legacy type; canonical is `constraint`
  - `guiding_principles` (1): plural legacy type; canonical is `guiding_principle`
  - `domain_index` (1): likely `.ideate/domains/index.yaml` indexed as a node; possibly spurious
  - `research_finding` (18): legacy type alongside canonical `research` (25)
  - `review_output` (1): not in ALL_NODE_TYPES in adapter.ts
  - Work items: 11 with status 'completed' (non-canonical) found in execution status

  ## Data Sources

  - **SQLite index**: `/Users/dan/code/ideate/.ideate/index.db` — primary source
  - **ALL_NODE_TYPES**: `mcp/artifact-server/src/adapter.ts` lines ~36-66 — canonical type list
  - **File system**: verify actual file existence for sampled file_path values
  - **YAML artifacts**: `.ideate/` directory — inspect legacy-type artifacts for content

  ## Key SQL Queries

  ```sql
  -- Non-canonical node types (compare against ALL_NODE_TYPES in adapter.ts)
  SELECT type, COUNT(*) FROM nodes
  WHERE type NOT IN ('work_item','finding','domain_policy','domain_decision',
    'domain_question','guiding_principle','constraint','interview',
    'interview_question','research','phase','project','overview','architecture',
    'execution_strategy','cycle_summary','decision_log','review_manifest',
    'journal_entry','metrics_event','proxy_human_decision','domain_index')
  GROUP BY type;

  -- Orphaned nodes by type
  SELECT type, COUNT(*) orphan_count FROM nodes n
  WHERE NOT EXISTS (SELECT 1 FROM edges WHERE source_id=n.id)
    AND NOT EXISTS (SELECT 1 FROM edges WHERE target_id=n.id)
  GROUP BY type ORDER BY 2 DESC;

  -- Work item status audit
  SELECT status, COUNT(*) FROM nodes WHERE type='work_item' GROUP BY status;

  -- Stale file paths (sample, not exhaustive)
  SELECT id, type, file_path FROM nodes LIMIT 100;
  -- Then verify each file_path exists on disk
  ```

  ## Output

  Call `ideate_write_artifact({type: 'research', id: 'research-node-inventory', content: {...}})` with:
  1. Non-canonical type inventory
  2. Orphan analysis
  3. File path validity sample
  4. Status value audit
  5. Cycle reference validity
  6. Prioritized remediation list
