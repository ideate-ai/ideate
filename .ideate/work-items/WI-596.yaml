notes: "This item specifically targets T-13 from the triage report (null-to-default coercion). The SQLite indexer uses ?? '' in several places which coerces null to empty string. The Neo4j backend stores null as-is. If these diverge, the test should document it as a known difference and either: (a) fix the SQLite indexer to preserve null, or (b) normalize in the comparison helper. Goal: zero undocumented divergences."
