  ## Context
  WI-460 addressed config.ts only. The cross-cutting pattern remains: some handlers throw, others return 'Error: ...' strings for true failures. MCP clients can't distinguish success-with-error-text from actual errors.

  ## Implementation
  1. Audit query.ts and analysis.ts for return-string errors that represent true failures
  2. Convert to throws
  3. Add convention comment in tools/index.ts
