notes: |-
  Re-scoped 2026-04-17 during /ideate:refine. WI-824 already implemented Q-160 option (c) for the cycle_summary_content path (reader.ts:969-974 — canonical-filename-only selector). That branch is complete. The remaining collision surface is the findings table: its rows are keyed by the `cycle` column derived from the finding YAML body's `cycle:` field, not by a canonical filename. So if a workspace cycle slot (e.g. cycles/002/findings/) contains legacy finding files from a prior workspace era (with cycle: 2, addressed_by: null), they are indexed and counted by ideate_get_convergence_status(2).

  Note: current autopilot already uses workspace cycle numbers (28, 29 were observed in PH-050), so option (c) slot-mapping may already be achieved by autopilot. Verify before assuming a code change is needed on the autopilot side — the code change may be solely at the reader.ts findings query level, or at ideate_archive_cycle.

  Sequenced after WI-887 to avoid file-scope collision on reader.ts — different regions of the file, but serialized out of caution.

  Related but distinct: Q-164 (stale SQLite reads) — covered by WI-886/WI-887 in this same phase.
resolution: "Resolved via Q-160 option (c): skill-level cycle-number resolution in skills/autopilot/SKILL.md. Added 'Resolve Cycle Number (Q-160 / D-option-c)' section in Phase 6 Loop that sets cycle_number = max(domain.current_cycle, cycles_completed) + 1 at the start of each iteration, with a monotonic-advance guard. Domain decision D-217 records the option-(c) rationale and rejects (a)/(b). Q-160 marked resolved with dual-path resolution note (WI-824 for cycle_summary_content path, WI-885 for findings-table path). Regression test mcp/artifact-server/src/__tests__/q160-regression.test.ts (7 tests) verifies: (1) the pre-fix collision is real (legacy cycle:1 findings inflate getConvergenceData(1)), (2) resolveCycleNumber yields collision-free slots across several input combinations, (3) new findings under the resolved cycle are counted separately from legacy slots, (4) monotonic advance on cycles_completed increment. Scope re-scoped per WI-885 implementation notes: reader.ts/analysis.ts code changes were not needed because the upstream skill fix prevents the collision entirely — no downstream filter complexity added. Full test suite 1528 pass / 0 fail."
