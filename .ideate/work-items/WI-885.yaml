criteria:
  - ideate_get_convergence_status findings_by_severity counts only findings authored for the current-era cycle N, not legacy findings rows indexed for the same cycle number from a prior workspace era
  - "A domain decision is recorded among: (a) add session-id provenance to findings rows and filter by session; (b) have ideate_archive_cycle purge stale findings rows during slot reuse; (c) autopilot always uses the next-available cycle slot (maps internal cycle numbers to max(current_cycle)+1)"
  - "Regression test: a finding with cycle=N, addressed_by IS NULL left over from a prior workspace era does not inflate condition_a when the current cycle N's findings are all addressed"
  - Q-160 status updated to 'resolved' with references to this WI (findings-table half) and to WI-824 (cycle_summary_content half, already resolved)
