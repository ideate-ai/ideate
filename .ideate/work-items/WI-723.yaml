criteria:
  - Audit .ideate/policies/ for domain_policy YAML files where derived_from is a comma-separated string (e.g., 'D-161, GP-14') rather than a YAML array — report count found
  - "Update each such file: replace the comma-string value with a proper YAML array (e.g., derived_from: [D-161, GP-14]). The MCP ideate_write_artifact tool must be used for any .ideate/ artifact modifications (P-37)."
  - "In indexer.ts extractEdges(), add normalization: when processing a derived_from value that is a string containing commas, split on ', ' or ',' and trim each element, then emit individual edges for each ID — this handles any future comma-strings that are not yet normalized"
  - "After YAML normalization and index rebuild, derived_from edges exist for each individual referenced ID (not the concatenated string). Verify: sqlite3 .ideate/index.db \"SELECT DISTINCT target_id FROM edges WHERE edge_type='derived_from'\" — no target_id should contain a comma"
  - "Existing test suite passes: npm test in mcp/artifact-server/"
domain: artifact-structure
phase: null
notes: |-
  Source: WI-717 spike findings, M3 finding + WI-715 implicit.

  Some domain policies store derived_from as a comma-separated string (e.g., 'D-161, GP-14') instead of a YAML array. The indexer treats the whole string as a single edge target, creating a dangling edge to the literal string 'D-161, GP-14' which matches no node.

  Two-part fix:
  1. Patch existing YAML files in .ideate/policies/ — use ideate_write_artifact for each (P-37 compliance)
  2. Add indexer normalization as a safety net for future occurrences

  The YAML fix is the primary remediation. The indexer fix is a defensive guard.

  Use MCP ideate_write_artifact to update the policy YAML files. Do not edit them directly with the Write tool.
