criteria:
  - RemoteAdapter.putEdge wraps its GraphQL call in try/catch; network/transport errors are caught and re-thrown as ValidationError with code TRANSACTION_FAILED
  - RemoteAdapter.removeEdges wraps its GraphQL call in try/catch; network/transport errors are caught and re-thrown as ValidationError with code TRANSACTION_FAILED
  - Errors that are already StorageAdapterError or ValidationError instances are re-thrown as-is (not double-wrapped)
  - adapter-contract.md putEdge and removeEdges Error Codes sections already document TRANSACTION_FAILED — no doc changes needed
  - npm test passes with 0 failures
domain: adapter-system
phase: null
work_item_type: bug
notes: |-
  S2 from cycle 23 spec-adherence / MG2 from gap analysis. LocalAdapter putEdge/removeEdges produce TRANSACTION_FAILED on db failures. RemoteAdapter has no try/catch on these two methods so transport failures surface as unhandled ConnectionError.

  Look at how other RemoteAdapter write methods (putNode, patchNode, deleteNode) wrap their GraphQL calls — they use a try/catch that re-throws StorageAdapterError/ValidationError unchanged and wraps generic errors as ValidationError(TRANSACTION_FAILED). Apply the same pattern to putEdge and removeEdges.

  Do NOT add tests to remote-adapter-validation.test.ts for this — that file uses offline mocks for validation logic only. TRANSACTION_FAILED transport wrapping would require a different test approach and is out of scope for this item.
