notes: |-
  Library choice: `js-tiktoken` (pure JS, no native binary) is preferred for portability. If the decision is contentious, file a decision artifact; do not block on a spike — pick one and move forward, re-evaluation is cheap since the wrapper is the only consumer.

  Fail-soft implementation:
  ```ts
  export async function instrumentToolDispatch(
    ctx: ToolContext,
    toolName: string,
    args: unknown,
    handler: () => Promise<unknown>
  ): Promise<unknown> {
    const requestJson = JSON.stringify(args ?? {});
    const startedAt = new Date().toISOString();
    let responseJson = '';
    let handlerError: unknown;
    let result: unknown;
    try {
      result = await handler();
      responseJson = JSON.stringify(result ?? {});
    } catch (e) {
      handlerError = e;
      responseJson = JSON.stringify({ error: (e as Error).message });
    }
    try {
      insertToolUsage(ctx.drizzleDb, {
        tool_name: toolName,
        request_tokens: countTokens(requestJson),
        response_tokens: countTokens(responseJson),
        request_bytes: Buffer.byteLength(requestJson, 'utf8'),
        response_bytes: Buffer.byteLength(responseJson, 'utf8'),
        session_id: ctx.session_id ?? null,
        cycle: ctx.cycle ?? null,
        phase: ctx.phase ?? null,
        timestamp: startedAt,
      });
    } catch (telemetryErr) {
      log.warn('tool_usage insert failed', { toolName, err: String(telemetryErr) });
    }
    if (handlerError !== undefined) throw handlerError;
    return result;
  }
  ```

  Session/cycle/phase sourcing: if ToolContext does not already carry these, add them as optional fields in src/types.ts and populate from the server wiring in a minimal follow-up. Document in implementation notes whichever source is chosen — do not leave ambiguous.

  NO latency/duration fields — consistent with phase scope.
