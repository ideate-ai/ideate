notes: |-
  ## Context
  Three documentation gaps from Cycle 1:
  1. Code-reviewer M1: FILESYSTEM_ERROR thrown by deleteNode (writer.ts:907) is not in the deleteNode Error Codes section or the consolidated codes table.
  2. Code-reviewer M2: INVALID_TOKEN_BUDGET and INVALID_MAX_NODES are documented as 'not a positive integer' but implementations use `< 0` (0 is valid). Should say 'is negative' with range '0 to Infinity'.
  3. Gap-analyst MN2: fetchCurrentCycle throws plain Error for network failures. Any RemoteAdapter method calling it internally can throw plain Error. The Error Types section implies only StorageAdapterError subclasses exist — callers need to know to catch plain Error too.

  ## Note on FILESYSTEM_ERROR
  WI-702 will implement the deleteNode rollback. After that fix, FILESYSTEM_ERROR can only be thrown if both the YAML restore AND the SQLite transaction fail (double failure). Document this accurately.
