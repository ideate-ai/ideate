notes: |-
  ## Context

  Phase 4 (`deriveJournalEntryCycleEdges`, `indexer.ts` lines 521-561) is called during incremental re-index whenever journal files change. It iterates all journal entries and inserts `belongs_to_cycle` edges. Without a prior delete step, every call accumulates duplicate edges for existing entries (P-67 violation).

  Phase 3 (`deriveJournalEntryEdges`, lines 431-507) uses the correct pattern: targeted delete by source_id + edge_type before re-inserting.

  ## Change

  In `deriveJournalEntryCycleEdges` (lines 521-561), add a targeted delete inside the outer loop, before the summaries query. Follow the same pattern used in `deriveJournalEntryEdges`:

  ```typescript
  for (const entry of entries) {
    const m = JOURNAL_ID_CYCLE.exec(entry.id);
    if (!m) continue;
    const cycleNum = parseInt(m[1], 10);

    // Delete stale belongs_to_cycle edges before re-deriving (P-67).
    drizzleDb
      .delete(dbSchema.edges)
      .where(
        and(
          eq(dbSchema.edges.source_id, entry.id),
          eq(dbSchema.edges.edge_type, "belongs_to_cycle")
        )
      )
      .run();

    // Find all cycle_summary nodes for this cycle number
    const summaries = drizzleDb
      .select({ id: dbSchema.documentArtifacts.id })
      ...
    for (const summary of summaries) {
      insertEdge(drizzleDb, { ... });
      edgesCreated++;
    }
  }
  ```

  Note: use `eq(dbSchema.edges.edge_type, "belongs_to_cycle")` for the targeted delete. Do NOT use `deleteEdgesBySourceId` â€” that deletes all edges from the source, which would wipe relates_to edges inserted by Phase 3 for the same journal entry.

  Imports: `dbSchema.edges` is already imported (used elsewhere in the file). `eq` and `and` from drizzle-orm are already imported.

  ## Tests

  Add tests near the existing `deriveJournalEntryCycleEdges` test area in `indexer.test.ts`. Follow the patterns of the WI-721 tests for re-derivation.

  **Idempotency test**: Create a journal entry + matching cycle_summary, call `rebuildIndex` (which calls Phase 4), then call `deriveJournalEntryCycleEdges` a second time directly on the drizzle instance, and assert the `belongs_to_cycle` edge count is exactly 1 (not 2).

  **Stale removal test**: Index a journal entry J-001-001 (cycle 1). No cycle_summary for cycle 1 exists yet (0 edges). Then index a cycle_summary with cycle=1. Call `deriveJournalEntryCycleEdges` and assert exactly 1 `belongs_to_cycle` edge exists. Then remove the cycle_summary and call `deriveJournalEntryCycleEdges` again â€” assert 0 edges remain.
