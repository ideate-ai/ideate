  Active phase: SELECT p.id, p.phase_type, p.intent, p.status FROM phases p JOIN nodes n ON n.id = p.id WHERE p.status = 'active' ORDER BY n.id LIMIT 1

  Render as markdown sections. Update tool description in index.ts to mention project/phase output (keep under 50 words per P-34).
