  # WI-110: architecture.md — fix domain-curator MaxTurns (30 → 25)
  
  ## Context
  
  WI-108 added a `### domain-curator` definition block to `specs/plan/architecture.md`. The block specifies `MaxTurns: 30`. However:
  - `agents/domain-curator.md` frontmatter: `maxTurns: 25`
  - `skills/brrr/phases/review.md` spawn: `MaxTurns: 25`
  
  The architecture.md value was estimated rather than confirmed from the agent file. This creates a documentation inconsistency.
  
  Cycle 001 review found this as D1 (spec-adherence.md architecture deviation).
  
  ---
  
  ## Fix: `specs/plan/architecture.md` — update domain-curator MaxTurns
  
  In the `### domain-curator` definition block in Section 4, find:
  
  ```
  - **MaxTurns**: 30
  ```
  
  Change to:
  
  ```
  - **MaxTurns**: 25
  ```
  
  ---
  
  ## Acceptance Criteria
  
  1. `specs/plan/architecture.md` domain-curator definition block specifies `MaxTurns: 25`
  2. This matches `agents/domain-curator.md` `maxTurns: 25` and `skills/brrr/phases/review.md` spawn `MaxTurns: 25`
