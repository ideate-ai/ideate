notes: |-
  # WI-903 Implementation Notes

  ## Context

  Cycle 79 capstone found WI-897 and WI-899 were incomplete. The workers reported migration but left behind:
  - Local tokenCount functions in indexer.ts:55-60 and writer.ts:85-90 (both duplicates of the canonical shared utility)
  - Local estimateTokens in context.ts:80-83 (uses Math.ceil, diverges from canonical Math.floor)
  - TYPE_TO_EXTENSION_TABLE still exported from db.ts and consumed by indexer.ts, writer.ts, tools/write.ts — parallel to NODE_TYPE_REGISTRY.extensionTable

  This WI closes those gaps.

  ## Fix shape

  1. Delete the 3 local token helpers. Replace their usages with `import { estimateTokens } from '../../token-utils.js'` (or correct relative path).

  2. For db.ts TYPE_TO_EXTENSION_TABLE: the cleanest refactor is to keep db.ts table definitions and rebuild TYPE_TO_EXTENSION_TABLE as a derived constant in node-type-registry.ts (e.g., `export const TYPE_TO_EXTENSION_TABLE = Object.fromEntries(Object.entries(NODE_TYPE_REGISTRY).filter(([, spec]) => spec.extensionTable !== null).map(([type, spec]) => [type, spec.extensionTable]))`). Update the 3 consumer files to import from there. OR: delete TYPE_TO_EXTENSION_TABLE entirely and have consumers read `NODE_TYPE_REGISTRY[type].extensionTable` directly.

  3. upsertExtensionTableRow 390-line if/else in writer.ts: if time permits, refactor to `NODE_TYPE_REGISTRY[type].buildRow?.(props)` pattern. If not, document as explicit out-of-scope for this WI and file a follow-up (e.g., in PH-055 or PH-057).

  4. mock-remote-server.ts estimateTokens: prefer importing from token-utils (clean); if there's a genuine test-fixture isolation reason, add a comment and leave it.

  ## Constraints

  - Node 22 + vitest only. No bun.
  - No behavioral change beyond the Math.ceil → Math.floor harmonization in context.ts (which WI-897 spec already authorized).
  - tsc --noEmit must remain clean.
  - Any fix must preserve the contract between NODE_TYPE_REGISTRY.extensionTable (AnyTable or null) and Drizzle table operations.

  ## Self-check

  Walk each of the 6 acceptance criteria with satisfied/unsatisfied status.
resolution: "Closed the leftovers from WI-897 and WI-899. Local tokenCount deleted from indexer.ts:57-60 and writer.ts:88-90; local estimateTokens deleted from context.ts:80-83 (Math.ceil harmonized to Math.floor). TYPE_TO_EXTENSION_TABLE definition moved to node-type-registry.ts:395 as a derived constant; db.ts retains redirect comment; 3 consumers (indexer.ts, tools/write.ts) + 2 tests migrated. mock-remote-server.ts local estimateTokens kept with test-fixture isolation rationale comment. Verified via grep: only 1 production estimateTokens (token-utils.ts), only 1 inline Math.floor(len/4) (token-utils.ts), only 1 TYPE_TO_EXTENSION_TABLE definition. 1822 tests pass, tsc clean. upsertExtensionTableRow 390-line if/else NOT refactored — filed as carry-forward."
