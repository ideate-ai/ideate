notes: |-
  ## Root Cause

  The ValidationError constructor heuristic treats anything not matching INVALID_, MISSING_, EMPTY_, _ERROR, TRANSACTION_FAILED as a field name and forces code='VALIDATION_ERROR'. All WI-653/654/655 call sites pass field names as the second argument.

  ## Fix

  Replace field name with code string at every call site:

  ```typescript
  // BEFORE:
  throw new ValidationError('seed_ids must be an array', 'seed_ids', { code: 'INVALID_SEED_IDS', value: seedNodeIds });
  // AFTER:
  throw new ValidationError('seed_ids must be an array', 'INVALID_SEED_IDS', { value: seedNodeIds });
  ```

  Affected files:
  - local/context.ts: seed_ids (3 sites), always_include_types (1 site), PPR params (5 sites)
  - local/index.ts: cycle validation (1-2 sites)
  - local/reader.ts: limit/offset (verify already correct)
  - remote/index.ts: seed_ids (3 sites), always_include_types (1 site), PPR params (5 sites), cycle validation (1-2 sites)

  Update tests: local-adapter-validation.test.ts, seed-ids-validation.test.ts, always-include-types-validation.test.ts — change assertions from VALIDATION_ERROR to specific codes.
resolution: "Fixed 9 ValidationError call sites in context.ts, 2 in reader.ts, and 11 in remote/index.ts to use code strings (INVALID_SEED_IDS, EMPTY_SEED_IDS, etc.). Updated test assertions in local-adapter-validation.test.ts and adapter-contract.test.ts. Rework: added EMPTY_SEED_IDS code assertion to adapter-contract.test.ts:669; added Array.isArray guard for always_include_types in context.ts; removed dead ConnectionError import from remote-adapter-fetchcycle.test.ts. 972 tests passing."
