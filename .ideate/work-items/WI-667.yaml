  - Every ValidationError thrown with an intended specific code (INVALID_SEED_IDS, EMPTY_SEED_IDS, INVALID_SEED_ID, INVALID_LIMIT, INVALID_OFFSET, INVALID_ALWAYS_INCLUDE_TYPE, INVALID_CYCLE, and all PPR parameter codes) has that code as the second constructor argument, not a field name string
