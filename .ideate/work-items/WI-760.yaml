notes: |-
  Add a new it() test inside the existing describe('createSchema — proxy_human_decisions table', ...) block in schema.test.ts (currently at ~lines 756-786).

  Follow the exact pattern used by the projects and phases cascade tests:
  ```typescript
  it('ON DELETE CASCADE removes proxy_human_decisions row when parent node is deleted', () => {
    const db = freshDb();
    db.pragma('foreign_keys = ON');
    db.prepare('INSERT INTO nodes (id, type, content_hash, file_path) VALUES (?, ?, ?, ?)')
      .run('PHD-CASCADE-TEST', 'proxy_human_decision', 'hash', 'test.yaml');
    db.prepare('INSERT INTO proxy_human_decisions (id, cycle, trigger, decision, timestamp, status) VALUES (?, ?, ?, ?, ?, ?)')
      .run('PHD-CASCADE-TEST', 1, 'test-trigger', 'test-decision', '2026-04-12', 'deferred');
    db.prepare('DELETE FROM nodes WHERE id = ?').run('PHD-CASCADE-TEST');
    const row = db.prepare('SELECT * FROM proxy_human_decisions WHERE id = ?').get('PHD-CASCADE-TEST');
    expect(row).toBeUndefined();
  });
  ```

  Column order in proxy_human_decisions DDL (schema.ts ~lines 613-624): id, cycle, trigger, triggered_by, decision, rationale, timestamp, status. triggered_by and rationale are nullable so can be omitted from named-parameter INSERT.

  Verify the INSERT parameters by checking the actual DDL before writing.
