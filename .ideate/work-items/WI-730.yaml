notes: |-
  ## What to change

  In `mcp/artifact-server/src/indexer.ts`, inside `indexFiles`, remove the block at lines 798–803 (approximately, may shift slightly after WI-729):

  ```typescript
  // Re-derive journal entry edges if any updated files are journal entries.
  const hasJournalUpdate = yamlPaths.some(p => /\/cycles\/\d+\/journal\//.test(p));
  if (hasJournalUpdate) {
    db.transaction(() => { deriveJournalEntryEdges(drizzleDb); })();
    db.transaction(() => { deriveJournalEntryCycleEdges(drizzleDb); })();
  }
  ```

  This block is inside the `try` block of `indexFiles`, before the `} finally {` at approximately line 804. The `hasDerivedEdgeUpdate` block that follows (outside the try-finally) is the correct replacement — it already covers journal files via the regex `/\/cycles\/\d+\/journal\/`.

  Do NOT remove or modify the `hasDerivedEdgeUpdate` block.

  ## Why

  WI-727 spec said 'replace hasJournalUpdate with hasDerivedEdgeUpdate'. The implementation added the new guard but did not remove the old one. For any journal file change, both guards fire, running each derivation function twice. P-69 requires removing superseded code in the same change that introduces the replacement. That was not done in WI-727; this work item corrects the omission.

  ## P-49 assessment

  No on-disk YAML backfill needed. The stale guard caused extra derivation passes (double work), not incorrect stored data. P-67 delete-before-insert ensured idempotency. Removing the guard restores single-pass behavior immediately with no artifact remediation.

  ## Verification

  After the change, grep for `hasJournalUpdate` in indexer.ts — must return zero matches. Count derivation calls triggered by a single journal file change in a test — must be 1.
