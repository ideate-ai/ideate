notes: |-
  ## Context

  WI-658 created local-adapter-validation.test.ts but no RemoteAdapter equivalent. WI-658 AC 'coverage matches RemoteAdapter' is unmet. P-58 requires automated test coverage for security-relevant validation. The established pattern (seed-ids-validation.test.ts, always-include-types-validation.test.ts) tests both adapters.

  ## Structure

  Create tests/adapters/remote-adapter-validation.test.ts:

  ```typescript
  import { describe, it, expect, beforeAll, afterAll, vi } from 'vitest';
  import { ValidationError } from '../../src/adapter.js';
  import { RemoteAdapter } from '../../src/adapters/remote/index.js';

  // Mock GraphQLClient for offline tests
  vi.mock('../../src/adapters/remote/client.js', () => ({ ... }));

  // limit/offset validation
  describe('RemoteAdapter — queryNodes limit/offset validation', () => { ... });
  describe('RemoteAdapter — queryGraph limit/offset validation', () => { ... });

  // batchMutate input validation
  describe('RemoteAdapter — batchMutate validation', () => { ... });
  ```

  All these validations run before any GraphQL call is issued, so they can be tested with a mocked client that never actually connects.

  ## Placeholder Fix

  In local-adapter-validation.test.ts AC-1 section (lines ~113-123), replace:
  ```typescript
  it('documents TRANSACTION_FAILED coverage', () => {
    expect('TRANSACTION_FAILED').toBe('TRANSACTION_FAILED'); // always passes
  });
  ```
  With either a real test or a descriptive comment (no assertion) explaining delegation to write-transaction.test.ts. The current implementation creates false confidence in test coverage.
