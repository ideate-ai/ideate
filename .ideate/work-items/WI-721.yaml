criteria:
  - Locate the loop in indexer.ts that processes interview artifacts and their nested interview_question entries — confirm that extractEdges() is called for the interview document but NOT called for each interview_question sub-document
  - Add the missing extractEdges(db, questionDoc, questionId, 'interview_question') call inside the interview_question loop so belongs_to_domain edges (and any other edge types applicable to interview_question) are extracted
  - "After index rebuild, interview_question nodes gain belongs_to_domain edges where the domain field is populated — verify with: sqlite3 .ideate/index.db \"SELECT COUNT(*) FROM edges WHERE edge_type='belongs_to_domain' AND source_id LIKE 'IQ-%'\" (expect non-zero)"
  - "Existing test suite passes: npm test in mcp/artifact-server/"
domain: artifact-structure
phase: null
notes: |-
  Source: WI-715 spike findings, Rank 3 extraction rule.

  The indexer processes interview files and iterates over nested interview_question entries to index them as nodes. However, extractEdges() is only called for the parent interview document, not for each question. This means interview_question nodes never get belongs_to_domain edges even when their domain field is populated.

  The fix is a single line: call extractEdges(db, questionDoc, questionId, 'interview_question') inside the loop that indexes each question. The questionDoc is the individual question YAML object; questionId is the IQ-NNN identifier.
