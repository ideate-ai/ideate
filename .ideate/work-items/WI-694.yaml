notes: |-
  G4 from cycle 26 gap analysis + unmet spec note from WI-692.

  G4: remote-adapter-validation.test.ts has a patchNode section (IMMUTABLE_FIELD added by WI-692) but no test for INVALID_NODE_ID on patchNode. The remote adapter validates this (same as LocalAdapter) at the top of patchNode before any GraphQL call. The local-adapter-validation.test.ts AC-8 section tests it. The remote equivalent is missing.

  Add to the existing patchNode describe block in remote-adapter-validation.test.ts:
  ```ts
  it('rejects empty node id with INVALID_NODE_ID', async () => {
    const err = await adapter.patchNode({ id: '', properties: { name: 'test' } }).catch(e => e);
    expect(err).toBeInstanceOf(ValidationError);
    expect(err.code).toBe('INVALID_NODE_ID');
  });
  ```

  For the header comment fix: local-adapter-validation.test.ts lines 1-16 describe the file's coverage. Add a note that AC-8 covers patchNode validation (INVALID_NODE_ID + IMMUTABLE_FIELD) added by WI-692.
