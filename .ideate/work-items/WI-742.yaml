notes: |-
  ## Trigger
  Cycle 20 code-review S1 and gap-analysis S1: the compile-time exhaustiveness check added by WI-739 is tautologically always-true because `ALL_NODE_TYPES` carries a `: readonly NodeType[]` annotation that widens `typeof ALL_NODE_TYPES[number]` to the full `NodeType` union. Also addresses code-review M1 (import ordering).

  ## What to change

  ### Fix 1 — Remove widening annotation (S1)

  In `mcp/artifact-server/src/adapter.ts`, find the declaration:
  ```typescript
  export const ALL_NODE_TYPES: readonly NodeType[] = [
    "work_item",
    ... (27 members)
  ] as const;
  ```

  Change to:
  ```typescript
  export const ALL_NODE_TYPES = [
    "work_item",
    ... (27 members)
  ] as const;
  ```

  The `: readonly NodeType[]` annotation is removed. The `as const` suffix remains. With the annotation gone, TypeScript infers a narrow literal tuple type rather than widening to `readonly NodeType[]`. This makes `typeof ALL_NODE_TYPES[number]` equal to the actual literal union of array contents, so `Exclude<NodeType, typeof ALL_NODE_TYPES[number]>` will be non-`never` if any `NodeType` member is missing.

  Verify no callers depend on the widened `readonly NodeType[]` type by running `tsc --noEmit`. If callers have type errors, they can be fixed with `satisfies readonly NodeType[]` or explicit cast at the call site, but the declaration itself must not carry the widening annotation.

  ### Fix 2 — Import ordering (M1)

  In `mcp/artifact-server/src/adapter.ts`, the current ordering is:
  ```typescript
  // line 96
  export type { EdgeType } from "./schema.js";
  // line 97
  export { EDGE_TYPES } from "./schema.js";
  // line 98 (blank)
  // line 99
  import type { EdgeType } from "./schema.js";
  ```

  Move the `import type { EdgeType }` line to be grouped with the other imports at the top of the file (before the re-export block). Keep the `export type { EdgeType }` and `export { EDGE_TYPES }` re-exports in place with the backwards-compatibility comment. The result should have all `import` declarations before any `export ... from` re-exports for the same module.
resolution: "Removed `: readonly NodeType[]` annotation from ALL_NODE_TYPES in adapter.ts, preserving `as const` for literal type inference. Added exhaustiveness sentinel (_ExhaustiveNodeTypeCheck) directly in adapter.ts so tsc --noEmit evaluates it. Fixed import ordering for EdgeType/EDGE_TYPES. All 1168 tests pass, tsc clean."
