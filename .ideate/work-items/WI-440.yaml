notes: |-
  New autopilot loop:
  1. Load active project and current phase
  2. Execute current phase work items
  3. Review current phase
  4. If phase converged: check project success criteria → if complete, mark project completed → stop. If appetite exhausted → Andon. Otherwise → promote next horizon → refine → loop
  5. If not converged: refine (fix issues) → loop

  Extend autopilot state to track phases_completed and current_project.
