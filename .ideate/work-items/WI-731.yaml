notes: |-
  ## What to add

  Add a test in `mcp/artifact-server/src/__tests__/indexer.test.ts` in the `rebuildIndex` describe block. The test must:

  1. Create a minimal fixture: at least one journal entry YAML (in `cycles/NNN/journal/`) and one cycle_summary YAML (in `cycles/NNN/`). The journal entry ID should follow the `J-{cycle}-{seq}` pattern so `deriveJournalEntryCycleEdges` can match it.
  2. Call `rebuildIndex(db, drizzleDb, fixtureDir)` and capture the returned stats.
  3. Query the SQLite index for the total number of edges with type `'relates_to'` (from `deriveJournalEntryEdges`) and `'belongs_to_cycle'` (from `deriveJournalEntryCycleEdges`) in the fixture.
  4. Assert that `stats.edges_created` equals exactly the sum of those derived edges (not 2x).

  ## Why this catches the bug

  Pre-WI-729, both bare calls and transactional wrappers ran, so each derivation function executed twice. `stats.edges_created` counted each derived edge twice. After WI-729, each function runs once. A test asserting the exact count will fail if the double-count is re-introduced.

  ## Reference pattern

  Look at the existing `deriveJournalEntryEdges` and `deriveJournalEntryCycleEdges` tests in this file for fixture setup patterns. The test should be self-contained — create its own temp directory, write fixture YAMLs, and clean up after.

  ## Note on Q-138

  Q-138 tracks the absence of this test. Include a comment in the test: `// Regression test for Q-138 — verifies stats.edges_created is not double-counted after WI-729 fix`.
