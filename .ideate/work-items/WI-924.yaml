notes: "# WI-924: Diagnose and fix test suite handle leaks causing post-test OOM"
resolution: "Root cause: watcher.ts close()/unwatch() were synchronous — did not await chokidar's Promise-based close. Callers (dormant.test.ts, remote-backend-init.test.ts, telemetry-wiring.test.ts, LocalAdapter.shutdown()) fire-and-forgot the close, leaving chokidar watchers running past test boundaries. Fix: made unwatch() + close() async in watcher.ts (Promise.all parallel close across dirs); added await to all callers; added hookTimeout + teardownTimeout: 5_000 in vitest.config.ts to surface slow cleanup instead of hiding it. 3-run verification: 1 baseline Node process, 1 after each run — no monotonic growth. Each run ~7.5s. 1896 tests pass. 7 files modified including watcher.ts and 4 test files."
