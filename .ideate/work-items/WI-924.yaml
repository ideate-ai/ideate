criteria:
  - "Identify which test file(s) leak handles after the suite finishes (candidates: HTTP servers in mock-remote-server, chokidar watchers, SQLite connections, timers)"
  - All identified leaks explicitly closed in afterEach or afterAll hooks; fixture cleanup verified by reading the test file
  - "`npm test` run back-to-back 3 times shows stable memory — no Node process accumulation between runs; no OOM under repeated execution"
  - Suite exits cleanly with no lingering Node processes after completion (verify via `ps aux | grep vitest | grep -v grep` returns empty after test run)
  - "vitest.config.ts has appropriate timeouts / isolation settings to detect (not hide) any remaining leak — e.g., consider enabling `pool: 'threads'` with per-worker isolation, or `hookTimeout` to catch hung beforeEach/afterAll"
