criteria:
  - The Phase 2 failure test (`putNodeForJournal — Phase 2 failure (writeFileSync throws)`) uses `it.skipIf(process.platform === 'win32')` so the test is skipped on Windows (chmod has no effect there)
  - The `.rejects.toThrow()` assertion is changed to `.rejects.toThrow(/EACCES/i)` so the test verifies the specific error type produced by the permission-denied path — not just any thrown value
  - All other assertions in the Phase 2 describe block (nodes count = 0, existsSync = false) remain unchanged
  - All existing tests in `write-transaction.test.ts` continue to pass
domain: artifact-structure
