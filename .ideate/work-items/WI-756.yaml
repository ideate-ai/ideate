notes: |-
  ## Implementation

  Locate the `describe('putNodeForJournal — Phase 2 failure (writeFileSync throws)')` block in `src/__tests__/write-transaction.test.ts`.

  ### Change 1: Platform guard
  Replace the `it(...)` call with `it.skipIf(process.platform === 'win32')(...)`. On Windows, `chmod` has no effect so the test would pass for the wrong reason or fail unexpectedly.

  ```typescript
  // Before:
  it("throws and cleans up placeholder when writeFileSync fails (EACCES)", async () => {

  // After:
  it.skipIf(process.platform === 'win32')("throws and cleans up placeholder when writeFileSync fails (EACCES)", async () => {
  ```

  ### Change 2: Error type assertion
  The `await expect(...).rejects.toThrow()` with no argument does not verify the error type. Node.js `fs.writeFileSync` on a permission-denied directory throws a `SystemError` with `.code === 'EACCES'` and a message containing 'EACCES'. Use a regex:

  ```typescript
  // Before:
  await expect(handleAppendJournal(...)).rejects.toThrow();

  // After:
  await expect(handleAppendJournal(...)).rejects.toThrow(/EACCES/i);
  ```

  No other changes to the file.
resolution: Changed `it(...)` to `it.skipIf(process.platform === 'win32')(...)` and `.rejects.toThrow()` to `.rejects.toThrow(/EACCES/i)`. All 23 write-transaction.test.ts tests pass.
