notes: |-
  ## Trigger
  Q-142 (opened cycle 20): getDomainState null-status boundary untested for domain_decisions and domain_questions. WI-743 added the analogous test for domain_policy; this work item covers the remaining two types.

  ## What to change

  ### Step 1 — Verify adapter-contract.md intent

  Before writing tests, read `mcp/artifact-server/docs/adapter-contract.md` to find the specification for `getDomainState`. Specifically:
  - Does the contract say questions are filtered by `status = 'open'`? If so, null-status questions being excluded is correct and the test should assert exclusion.
  - Is there any specification for how decision status affects inclusion?

  Also read `mcp/artifact-server/src/adapters/local/reader.ts` around lines 854-875 to see the exact SQL for all three arrays (policies, decisions, questions).

  If the contract and SQL agree → write tests that match.
  If the contract is silent on null-status behavior → the SQL behavior is the de facto contract; write tests that document the actual SQL behavior (do NOT change adapter-contract.md unless you find a genuine contradiction).
  If the contract and SQL contradict → that is a defect; fix the SQL to match the contract (or flag as an Andon event if the correct behavior is unclear and cannot be determined from context).

  ### Step 2 — Add test: domain_decision null-status inclusion

  The decisions SQL (reader.ts:859-866) has no status filter, meaning all decisions regardless of status (including null) are returned. Add a test:

  ```ts
  it('includes domain_decisions with null/absent status in getDomainState results', async () => {
    await adapter.putNode({
      id: 'D-null-status',
      type: 'domain_decision',
      domain: 'null-status-decision-test',
      title: 'Null status decision',
      body: 'Should appear in results',
      // No status field — defaults to null
    });
    const result = await adapter.getDomainState(['null-status-decision-test']);
    const entry = result.get('null-status-decision-test');
    expect(entry).toBeDefined();
    const decisionIds = entry!.decisions.map((d: any) => d.id);
    expect(decisionIds).toContain('D-null-status');
  });
  ```

  ### Step 3 — Add test: domain_question status filtering

  Based on what you found in Step 1, add a test that verifies the correct behavior for null-status questions. Examples:

  **If contract says only 'open' questions are returned** (expected given SQL uses `WHERE n.status = 'open'`):
  ```ts
  it('excludes domain_questions with null/absent status from getDomainState results', async () => {
    await adapter.putNode({
      id: 'Q-null-status',
      type: 'domain_question',
      domain: 'null-status-question-test',
      title: 'Null status question',
      body: 'Should not appear in results',
      // No status field — defaults to null
    });
    const result = await adapter.getDomainState(['null-status-question-test']);
    const entry = result.get('null-status-question-test');
    // entry may be undefined (no results for domain) or have empty questions array
    if (entry) {
      const questionIds = entry.questions.map((q: any) => q.id);
      expect(questionIds).not.toContain('Q-null-status');
    } else {
      // No entry means domain had no included artifacts — also correct
      expect(entry).toBeUndefined();
    }
  });
  ```

  Adjust the test based on what adapter-contract.md says. The test must accurately reflect the contract, not merely document the current SQL.

  ### Placement

  Add both new tests after the existing null-status policy test at line ~1195 in the getDomainState describe block.

  ## Backfill assessment
  No YAML artifacts are touched. No SQLite indexing is affected. No backfill needed.
resolution: "Added two tests to adapter-contract.test.ts getDomainState describe block: (1) domain_decision null-status inclusion — decisions SQL has no status filter so null-status decisions appear; (2) domain_question null-status exclusion — questions SQL uses WHERE n.status = 'open' so null-status questions are excluded. Question test required rework: initial version was tautological (domain never entered result map); fixed by anchoring domain with a decision node. Contract and SQL are aligned. 79/79 tests pass, tsc clean."
