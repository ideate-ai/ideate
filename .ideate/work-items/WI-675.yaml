notes: |-
  ## nextId() INVALID_CYCLE fix (C1, P-64 violation)
  Lines ~474 and ~481 in writer.ts. Current:
  ```ts
  throw new ValidationError('cycle must be a positive integer', 'cycle', { value: cycle });
  ```
  Change second arg from 'cycle' to 'INVALID_CYCLE'. The ValidationError constructor heuristic: second arg is a code string if it starts with INVALID_, MISSING_, EMPTY_, ends with _ERROR, or equals TRANSACTION_FAILED. 'cycle' doesn't match — that's why it produces VALIDATION_ERROR.

  ## deleteNode validation (G1) — line ~874
  ```ts
  if (typeof id !== 'string' || id.trim() === '') {
    throw new ValidationError('Node id must be a non-empty string', 'INVALID_NODE_ID', { value: id });
  }
  ```

  ## putEdge validation (G2) — line ~913
  ```ts
  if (!input.source_id || input.source_id.trim() === '') throw new ValidationError('Edge source_id required', 'MISSING_EDGE_SOURCE', {});
  if (!input.target_id || input.target_id.trim() === '') throw new ValidationError('Edge target_id required', 'MISSING_EDGE_TARGET', {});
  if (!input.type) throw new ValidationError('Edge type required', 'MISSING_EDGE_TYPE', {});
  if (!ALL_EDGE_TYPES.includes(input.type as EdgeType)) throw new ValidationError(`Invalid EdgeType: ${input.type}`, 'INVALID_EDGE_TYPE', { value: input.type });
  ```
  If ALL_EDGE_TYPES is not already exported from adapter.ts (check — ALL_NODE_TYPES exists there), derive it: `const ALL_EDGE_TYPES = Object.keys(EDGE_TYPE_REGISTRY) as EdgeType[]` from schema.ts, or import EdgeType values from the type union. Check schema.ts EDGE_TYPE_REGISTRY for the canonical source.

  ## removeEdges validation (G3)
  ```ts
  if (typeof input.source_id !== 'string' || input.source_id.trim() === '') {
    throw new ValidationError('source_id must be a non-empty string', 'INVALID_NODE_ID', { value: input.source_id });
  }
  if (input.edge_type !== undefined && !ALL_EDGE_TYPES.includes(input.edge_type as EdgeType)) {
    throw new ValidationError(`Invalid EdgeType: ${input.edge_type}`, 'INVALID_EDGE_TYPE', { value: input.edge_type });
  }
  ```

  ## Test updates
  nextid-cycle-validation.test.ts ~line 232: change `.code === 'VALIDATION_ERROR'` to `.code === 'INVALID_CYCLE'`. Remove any assertion on `details.field === 'cycle'` if present.

  local-adapter-validation.test.ts: add tests following the existing toMatchObject({ code: '...' }) pattern.
resolution: nextId() cycle validation fixed to INVALID_CYCLE; deleteNode/putEdge/removeEdges validation added to LocalAdapter. Autopilot cycle 1.
