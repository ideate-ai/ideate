criteria:
  - Query types map to StorageAdapter read operations (artifact lookup, filtered queries, graph traversal, context assembly)
  - Mutation types map to StorageAdapter write operations (artifact CRUD, edge management, batch writes)
  - Subscription types defined for real-time updates (work item status changes, new findings, Andon events)
  - "Auth context shape defined: user ID, org ID, roles — pluggable for future Auth0 integration"
  - PPR context assembly exposed as a query with seed IDs, token budget, and edge weight override parameters
  - Federation boundaries identified and documented for future multi-service split
  - SDL file (.graphql) provided alongside the design document
domain: artifact-structure
phase: PH-018
work_item_type: spike
notes: |-
  The GraphQL schema is the external API contract for ideate-server. It should align with but not be identical to the StorageAdapter interface — GraphQL has auth/permission concerns, pagination, and error handling that the adapter does not.

  Key queries to design:
  - artifactQuery(type, filters, limit, offset) — mirrors ideate_artifact_query
  - artifactContext(id) — mirrors ideate_get_artifact_context
  - assembleContext(seeds, tokenBudget, edgeWeights) — mirrors ideate_assemble_context with server-side PPR
  - domainState(domains) — mirrors ideate_get_domain_state
  - workspaceStatus — mirrors ideate_get_workspace_status

  Key mutations:
  - writeArtifact(type, id, content) — mirrors ideate_write_artifact
  - writeWorkItems(items) — mirrors ideate_write_work_items
  - updateWorkItems(updates) — mirrors ideate_update_work_items

  Consider batching patterns (DataLoader) for N+1 query prevention. Consider cursor-based pagination for large result sets.
