criteria:
  - "skills/init/SKILL.md exists with YAML frontmatter containing description, user-invocable: true, and argument-hint"
  - Phase 1 checks if .ideate/ directory exists in the current working directory
  - If .ideate/ exists, skill warns the user and asks to confirm overwrite or abort — does not silently overwrite
  - If user aborts, skill exits without modifying any files
  - "Phase 2 scaffolds .ideate/config.json with schema_version: 2 and the directory structure (work-items/, principles/, constraints/, policies/, decisions/, questions/, modules/, research/, interviews/, cycles/)"
  - "Phase 3 spawns architect agent in analyze mode to survey the existing codebase, with model: opus override"
  - "Phase 4 conducts a lightweight interview (3-5 questions max): what is this project, what are the guiding principles, what are the hard constraints, what domains exist"
  - Phase 4 does NOT interview for architecture decisions, module decomposition, or work item planning
  - "Phase 5 writes steering artifacts to .ideate/: principles/*.yaml, constraints/*.yaml from interview answers"
  - Phase 5 uses MCP write tools if available, falls back to Write tool for initial scaffolding (same bootstrapping pattern as plan Phase 1.1)
  - "Phase 6 bootstraps domain layer from architect analysis: creates domain directories with initial policies.md, decisions.md, questions.md"
  - Skill does NOT produce work items, execution strategy, or architecture doc
  - Skill does NOT produce plan/overview.md or plan/architecture.md
  - "Final output message tells user the project is ready for /ideate:refine to plan changes"
  - Metrics instrumentation section follows the same pattern as skills/refine/SKILL.md (agent-spawn JSON to metrics.jsonl)
