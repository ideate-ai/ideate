notes: |
  # WI-209: Init Skill Definition
  
  ## Purpose
  
  The init skill handles the case where a user has an existing codebase but no `.ideate/` directory. It is lighter than `/ideate:plan` — it does not produce work items, architecture docs, or execution strategies. It produces just enough structure to enable `/ideate:refine`.
  
