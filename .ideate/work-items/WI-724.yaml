id: WI-724
type: work_item
title: Fix non-canonical 'completed' status values in work item YAML files
status: done
complexity: small
scope: []
depends: []
blocks: []
criteria:
  - "Identify all work item YAML files under .ideate/work-items/ with status: completed (non-canonical; canonical done-state is 'done')"
  - "Update each such work item using ideate_update_work_items with status: 'done' — do not edit YAML files directly (P-37)"
  - After updates, sqlite3 .ideate/index.db "SELECT id, status FROM nodes WHERE type='work_item' AND status='completed'" returns 0 rows
  - The workspace status dashboard shows 0 in the 'completed' bucket
domain: artifact-structure
phase: null
notes: |-
  Source: WI-716 spike findings (research-node-inventory), Section 4.

  The node inventory found 8 work items with status='completed' in their YAML files. The canonical done-status for work items is 'done'. The 'completed' value appears to be a legacy artifact from an earlier workflow convention.

  Use ideate_update_work_items to patch status from 'completed' to 'done'. This is a pure data hygiene fix with no behavioral impact.

  The workspace status currently shows 'completed: 11' as a separate non-canonical bucket. After this fix that bucket should go to 0 (or near 0 if there are non-work-item artifacts with this status).
resolution: Updated 11 work items (WI-653–WI-660, WI-683, WI-684, WI-685) from status='completed' to 'done' via ideate_update_work_items. 0 rows with completed status remain.
