notes: |-
  ## Implementation Notes

  ### context.ts changes
  1. Rename `handleGetWorkItemContext` to `handleGetArtifactContext`
  2. Accept `artifact_id` parameter (string) instead of `work_item_id`
  3. Step 1: Query `nodes` table for the artifact: `SELECT id, type, status, file_path, token_count, cycle_created, cycle_modified FROM nodes WHERE id = ?`
  4. If not found, throw `Artifact not found: "{id}"`
  5. Based on `type`, dispatch:
     - `work_item`: existing logic (JOIN work_items, load deps, module, policies, source index)
     - `phase`: query the phase YAML content via file_path, parse it, load linked work items from nodes+work_items by their IDs listed in the phase's `work_items` array. Return phase metadata + work item summary table.
     - Default: read the YAML file content, query edges (both directions), return node metadata + content + related artifact IDs
  6. Remove the `normalizeWorkItemId` call for non-work-item types — only normalize when type is work_item

  ### index.ts changes
  1. Rename tool from `ideate_get_work_item_context` to `ideate_get_artifact_context`
  2. Update description: "Context package for any artifact by ID. Use before executing work items or reviewing phases. Returns markdown with metadata, dependencies, and related artifacts."
  3. Change inputSchema: `artifact_id` (string, required) replaces `work_item_id`
  4. Update dispatcher case statement
  5. Update `ideate_assemble_context` description's seed_ids example to: `"e.g. ['WI-275', 'PH-013', 'GP-01']"`

  ### Test changes
  - Rename existing work-item-context tests to use new tool name and parameter
  - Add test: create a phase YAML + work items, call ideate_get_artifact_context with phase ID, assert response includes phase metadata and work item summaries
  - Add test: create a guiding_principle, call with its ID, assert response includes YAML content and edges
