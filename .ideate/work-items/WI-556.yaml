notes: |-
  This is the config switch that enables the remote adapter in the future. For now, only 'local' is functional. 'remote' should fail gracefully with a clear error: 'Remote backend not yet implemented. Set backend to local or omit the field.'

  The server.ts initialization sequence: read config → select adapter → initialize adapter → pass to tool handlers via ToolContext.
