notes: |-
  # WI-524: Create /ideate:triage skill

  See research-multi-level-interaction Sections 4.2 and 5.2.

  ## Frontmatter
  ```yaml
  name: triage
  description: Quick work item intake — bug reports, feature requests, chores
  model: sonnet
  ```

  Note: NOT disable-model-invocation. Triage should be triggerable by Claude autonomously (e.g., during review when a finding warrants a new work item).

  ## Interaction flow

  ### Typed shortcut mode
  User provides: `/ideate:triage bug: login fails on Safari after OAuth redirect`
  1. Parse type prefix (bug:, feature:, spike:, chore:, maintenance:)
  2. If no prefix, infer type from description keywords
  3. Assess information sufficiency:
     - Clear: generate work item immediately, show to user for confirmation
     - Ambiguous: ask 1-2 targeted questions (for bugs: reproduction steps, browser/version, error message; for features: user story, acceptance criteria)
  4. Query active phase: ideate_artifact_query(type: 'phase', filters: {status: 'active'})
  5. Optionally check for duplicates: ideate_artifact_query(type: 'work_item') with title keyword search
  6. Write: ideate_write_work_items with work_item_type, title, criteria, scope (if determinable), phase assignment
  7. Confirm to user with item ID

  ### Interactive mode
  User provides: `/ideate:triage`
  1. Ask: What needs to be done?
  2. Follow same flow as above from the response

  ## Context loading
  Minimal. Do NOT call ideate_get_context_package or spawn architect. Only load:
  - Active phase (for assignment)
  - Similar items (for deduplication, optional)
  - Config (Phase 0, for agent budgets if needed)

  ## GP-01 compliance
  Triage creates items at intake quality. The item's status is 'pending' and may lack full acceptance criteria or file scope. The refinement cycle is responsible for elaborating the item to spec sufficiency before it enters execution.
