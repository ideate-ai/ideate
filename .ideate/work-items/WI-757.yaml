notes: |-
  ## Implementation

  Add a new `describe` block to `src/__tests__/schema.test.ts` following the pattern of existing extension table column tests.

  **Table DDL for reference** (`schema.ts` lines 613-622):
  ```sql
  CREATE TABLE IF NOT EXISTS proxy_human_decisions (
    id        TEXT PRIMARY KEY REFERENCES nodes(id) ON DELETE CASCADE,
    cycle     INTEGER NOT NULL,
    trigger   TEXT NOT NULL,
    triggered_by TEXT,
    decision  TEXT NOT NULL,
    rationale TEXT,
    timestamp TEXT NOT NULL,
    status   TEXT NOT NULL
  )
  ```
  **Index**: `idx_proxy_human_decisions_cycle ON proxy_human_decisions(cycle)`

  **Helpers available in schema.test.ts**:
  - `tableNames(db)` ŌĆö returns all table names from sqlite_master
  - `columnNames(db, tableName)` ŌĆö returns PRAGMA table_info rows (has `name`, `notnull` fields)
  - `indexNames(db, tableName)` ŌĆö returns index names for the table

  Write the test using `columnNames` to get actual DB column info and assert:
  1. Each of the 8 column names is present
  2. `notnull === 1` for required columns, `notnull === 0` for nullable columns
  3. `idx_proxy_human_decisions_cycle` is in `indexNames(db, 'proxy_human_decisions')`

  Do not assert a hardcoded count of columns ŌĆö per P-75, assert by querying the DB and verifying expected column names are present. Place the `describe` block after the existing extension table tests and before the edge/index sections.
