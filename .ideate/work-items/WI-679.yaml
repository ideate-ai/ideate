notes: |-
  ## Pattern (D-177: LocalAdapter unconditional, RemoteAdapter skipIf)
  ```ts
  it('deleteNode: empty id throws INVALID_NODE_ID from LocalAdapter', async () => {
    await expect(localSetup.adapter.deleteNode('')).rejects.toMatchObject({
      name: 'ValidationError', code: 'INVALID_NODE_ID',
    });
  });
  it.skipIf(!remoteAvailable)('deleteNode: empty id throws INVALID_NODE_ID from RemoteAdapter', async () => {
    await expect(remoteSetup.adapter.deleteNode('')).rejects.toMatchObject({
      name: 'ValidationError', code: 'INVALID_NODE_ID',
    });
  });
  ```

  Repeat for: putEdge (MISSING_EDGE_SOURCE), removeEdges (INVALID_NODE_ID), putNode (INVALID_NODE_ID), patchNode (INVALID_NODE_ID).

  patchNode INVALID_NODE_ID was added in WI-668 but never had an equivalence test — add it here.

  ## Setup
  Import setup helpers from tests/adapters/equivalence-helpers.ts. Follow the existing import and beforeAll/afterAll pattern already in adapter-equivalence.test.ts.
