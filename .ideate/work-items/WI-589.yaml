criteria:
  - docker-compose.test.yml defines Neo4j 2026 + ideate-server services with health checks
  - Neo4j container uses known credentials and is pre-configured for test org/codebase
  - ideate-server container connects to Neo4j and exposes GraphQL endpoint on a test port
  - A wait-for-healthy script (or testcontainers equivalent) blocks until both services report ready
  - npm script test:equivalence brings up containers, runs vitest, tears down on exit (including on failure)
  - Containers use named volumes or tmpfs so each test run starts from clean state
domain: agent-system
phase: PH-024
work_item_type: feature
notes: Consider testcontainers-node as an alternative to docker-compose CLI. Either approach is acceptable as long as the test runner can bring up and tear down the environment automatically. The server image can be built from ../ideate-server or pulled from a registry if available. Neo4j should use the same version as production (5.x/2026). Test port should not conflict with local dev (e.g., 4001 for GraphQL, 7688 for Neo4j bolt).
