notes: "Addresses cycle 28 finding II1. Currently the autopilot convergence check evaluates condition_b = (principle_verdict === 'pass'), which treats unknown the same as fail — hiding parse failures as convergence failures. The fix is behavioral (how autopilot reacts), not structural (the payload already carries the warning). The Andon event should route via the existing proxy-human mechanism so the user sees the diagnostic context rather than a bare condition_b: false."
resolution: "Closed 2026-04-17 during autopilot PH-050 rework cycle 1 (maps to capstone cycle 29). Scope: skills/autopilot/phases/review.md (primary) + skills/autopilot/SKILL.md (necessary delegation edit — SKILL.md contained inline two-way branch). Delivered: Phase 6c three-way branch (pass/fail/unknown); unknown routes to named Andon event carrying principle_verdict_warning, patterns_tried, and content_snippet as DISCRETE lines (derived in Phase 6c Step 1 from the warning string); 'Why three branches' paragraph documents the parse-failure ≠ principle-violation distinction; Branch A clarified re: converged = condition_a when condition_b is true. Incremental review F-WI-882-001: 2 significant (S1 discrete-fields, S2 Q-159 reference) both fixed during rework; 2 minor (M1 SKILL.md scope deviation acknowledged; M2 Branch A clarification fixed). Q-159 closed via ideate_write_artifact with status: resolved. Resolves cycle 28 finding II1."
