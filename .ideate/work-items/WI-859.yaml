notes: |-
  This WI fills the documentation gap created after WI-852 removed the old metrics docs. Must land in the same phase so the docs tree is consistent at phase close.

  Cover these topics in the ARCHITECTURE.md section:
  1. Purpose: operational telemetry at the MCP boundary, not domain knowledge.
  2. What is captured: tool_name, request/response tokens and bytes, session_id, cycle, phase, timestamp.
  3. What is NOT captured and why: latency (intentionally omitted), agent-side emission (removed per PH-048), exact Anthropic token counts (approximation via tiktoken is sufficient for relative trend analysis).
  4. Fail-soft guarantee: telemetry failures never break tool calls.
  5. Query surface: ideate_get_tool_usage with filters and views.
  6. Report script: scripts/report-tool-usage.sh.
