criteria:
  - Comma-split logic in extractEdges applies only when spec.yaml_field === "derived_from" (not for all string yaml_fields)
  - Existing comma-split test for derived_from (WI-723, around line 401-449 in indexer.test.ts) continues to pass
  - "A new test verifies: a string yaml_field other than derived_from (e.g., supersedes) whose value contains a comma is treated as a single target ID and produces exactly one edge, not two"
  - npm test passes
domain: artifact-structure
phase: null
notes: |-
  ## Context

  In `extractEdges` (indexer.ts lines 370-386), the comma-split guard is currently applied to ALL string yaml_fields:

  ```typescript
  } else if (typeof fieldValue === "string" && fieldValue.trim()) {
    if (fieldValue.includes(",")) {
      // split on comma...
    } else {
      insertEdge(...);
    }
  }
  ```

  This was introduced in WI-723 to handle legacy comma-separated `derived_from` values like `"D-142, GP-08"`. But applying it to every field is overbroad: any string field whose value happens to contain a comma (e.g., a supersedes value with a description, or future fields) would be silently split into multiple edges.

  The comma-split is a backwards-compatibility shim specific to `derived_from` only.

  ## Change

  In the scalar string branch of `extractEdges` (indexer.ts lines 370-386), gate the comma-split on `spec.yaml_field === "derived_from"`:

  ```typescript
  } else if (typeof fieldValue === "string" && fieldValue.trim()) {
    // Comma-split is a backwards-compatibility shim for legacy derived_from values
    // like "D-142, GP-08" (should be an array but stored as a comma string).
    // Only applies to derived_from — do not apply to other fields.
    if (spec.yaml_field === "derived_from" && fieldValue.includes(",")) {
      for (const part of fieldValue.split(",")) {
        const targetId = part.trim();
        if (targetId) {
          insertEdge(drizzleDb, { source_id: nodeId, target_id: targetId, edge_type: edgeType, props: null });
          edgesCreated++;
        }
      }
    } else {
      insertEdge(drizzleDb, { source_id: nodeId, target_id: fieldValue.trim(), edge_type: edgeType, props: null });
      edgesCreated++;
    }
  }
  ```

  This is a single-line condition change: add `spec.yaml_field === "derived_from" &&` before `fieldValue.includes(",")`.

  ## Tests

  Add a test near the WI-723 comma-split tests in indexer.test.ts.

  **Non-derived_from comma test**: Create a domain_decision artifact with `supersedes: "D-001,D-002"` (a comma-containing string). After `rebuildIndex`, assert exactly 1 `supersedes` edge exists (source = the decision, target = `"D-001,D-002"` as a literal ID, or alternatively assert that target is not split). The test verifies the comma-split guard does not fire for non-derived_from fields.
resolution: Comma-split normalization in extractEdges now guarded by spec.yaml_field === 'derived_from'. Only legacy derived_from values are split on commas; all other string fields are treated as literal target IDs.
