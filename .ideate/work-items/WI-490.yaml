  ## What to change

  ### indexer.ts
  Find where content_hash is computed during indexing. Change it to parse the YAML, remove content_hash/token_count/file_path keys, re-serialize and hash. Extract the exclusion logic into a shared helper (e.g., computeArtifactHash in db-helpers.ts) that both indexer and write handlers call.

  ### indexer.test.ts
  Add a test verifying hash consistency between write path and index path.

  ## Why
  Q-107: Hash mismatch between indexer and write handlers means integrity checks always fail for re-indexed artifacts.
