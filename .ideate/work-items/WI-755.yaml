  ## Implementation

  Two one-line edits in `src/__tests__/schema.test.ts`:

  **Line 607**: Change
  ```typescript
  it("returns true when user_version matches CURRENT_SCHEMA_VERSION (3)", () => {
  ```
  To:
  ```typescript
  it("returns true when user_version matches CURRENT_SCHEMA_VERSION (5)", () => {
  ```

  **Line 609**: Change
  ```typescript
      db.pragma(`user_version = ${CURRENT_SCHEMA_VERSION}`); // 3
  ```
  To:
  ```typescript
      db.pragma(`user_version = ${CURRENT_SCHEMA_VERSION}`); // 5
  ```

  `CURRENT_SCHEMA_VERSION` is currently 5 (imported from `../schema.js`). If it changes again in the future, the description will need updating again — this is a known limitation of embedding version numbers in descriptions.
