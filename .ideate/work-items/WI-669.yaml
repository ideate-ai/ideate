notes: |-
  ## Context

  fetchCurrentCycle() throws StorageAdapterError(PARSE_ERROR) for invalid domain_index JSON. mapGqlNodeToNode throws ValidationError(PARSE_ERROR) for invalid node content JSON. Same failure class, different error types.

  ## Fix in remote/index.ts (handled by WI-668 since that file is already in scope)

  Note: remote/index.ts is in WI-668's scope. The executor of WI-669 should make the following change to remote/index.ts as part of WI-668's execution, OR WI-668 should be amended to include this fix. Since WI-669 depends on WI-668, the executor of WI-669 only needs to update the test file (remote-json-parse.test.ts).

  **The actual remote/index.ts change should be included in WI-668**: In mapGqlNodeToNode catch block, change `new ValidationError(...)` to `new StorageAdapterError('Failed to parse content for node...', 'PARSE_ERROR', { nodeId, preview: truncated })`.

  WI-669 scope covers only the test file update.
resolution: Changed mapGqlNodeToNode catch block in remote/index.ts to throw StorageAdapterError('PARSE_ERROR') instead of ValidationError. Updated AC-5 tests in remote-json-parse.test.ts to assert StorageAdapterError with code PARSE_ERROR. Removed unused ValidationError import from test file. 984 tests passing.
