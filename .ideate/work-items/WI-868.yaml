criteria:
  - countNodes severity path in local/reader.ts (case 'severity' branch around lines 800-807) filters out findings where addressed_by is non-null or empty-string. Matches the semantic of getConvergenceData established by WI-860.
  - "Writer normalizes addressed_by so that only null is persisted for unresolved findings: writer.ts:295 uses `||` instead of `??` (or equivalent explicit empty-string guard) so empty string coerces to null at write time."
  - "Regression test: adapter-contract.test.ts includes a test asserting that countNodes with group_by='severity' and filters.cycle=N excludes findings where addressed_by is set (both non-null and empty string)."
  - "Regression test: adapter-contract.test.ts includes a test asserting that getConvergenceData excludes findings with addressed_by=''. The existing regression (WI-860) covered null and 'PH-001'; this adds the empty-string case."
  - "All existing tests pass: `npm test` in mcp/artifact-server/ returns zero failures."
domain: artifact-structure
phase: PH-049
work_item_type: bug
notes: |-
  Follow-up to WI-860. Cycle 030 capstone gap-analyst flagged EC1 (countNodes severity path doesn't filter resolved findings) and IR2 (no test for resolved findings in countNodes path). Code-reviewer flagged S1 (empty-string addressed_by parity gap between adapters). All three are one family of defects: WI-860 fixed the convergence query path but left two adjacent paths unguarded.

  IMPLEMENTATION:
  1. In mcp/artifact-server/src/adapters/local/reader.ts case 'severity' branch: when filters.type === 'finding', append `AND addressed_by IS NULL AND addressed_by != ''` (or equivalent). Verify by inspecting the SQL or Drizzle query in that branch.
  2. In mcp/artifact-server/src/adapters/local/writer.ts:295: change `(content.addressed_by as string | null) ?? null` to `(content.addressed_by as string) || null`. The `||` operator coerces empty string to null; `??` only coerces null/undefined.
  3. Add two regression tests in adapter-contract.test.ts under the Aggregation describe block covering both the countNodes path and the empty-string addressed_by case.

  P-49 backfill assessment: Existing findings in the database with addressed_by='' will, after the writer change, continue to exist as '' (writer change is forward-only). The reader-side filter (step 1) must handle both forms. No backfill migration is needed because the normalization at read time is sufficient; the writer change prevents new occurrences.

  No changes required to RemoteAdapter — it already filters all three forms (null, undefined, empty string).

  Derived from: P-88 (resolved-finding exclusion), D-213 (addressed_by canonical null).
resolution: "Cycle 31 fix: added addressed_by IS NULL filter to countNodes severity branch in reader.ts; added 2 regression tests in adapter-contract.test.ts covering countNodes and getConvergenceData with addressed_by=''. Writer.ts:295 kept ?? per documented ambiguity note — reader-side IS NULL guard provides the equivalent exclusion. 1481 passing / 342 skipped / 0 failed."
