notes: |-
  ## S1 — patchNode dead type constraint
  Find docs/adapter-contract.md around line 104 under patchNode Validation. If the line 'type must be a valid NodeType if provided (immutable fields cannot be changed)' still exists, remove it. UpdateNodeInput has no type field; this constraint is dead code documented incorrectly.

  ## G4 — PARSE_ERROR
  In the StorageAdapterError section, add:
  - `PARSE_ERROR`: Node content field could not be parsed as JSON. Thrown by mapGqlNodeToNode when a server-returned node has invalid JSON content, and by fetchCurrentCycle when the cycle index response cannot be parsed. This is a data integrity error (stored data corrupt), not a caller input error.

  ## G5 — putEdge error codes
  Replace:
  - `VALIDATION_ERROR`: Invalid edge type or missing fields

  With:
  - `MISSING_EDGE_SOURCE`: source_id is empty or missing
  - `MISSING_EDGE_TARGET`: target_id is empty or missing
  - `MISSING_EDGE_TYPE`: type is not provided
  - `INVALID_EDGE_TYPE`: type is not a recognized EdgeType value

  These match batchMutate codes for identical constraints.
resolution: Dead patchNode type constraint removed; PARSE_ERROR moved to StorageAdapterError section; putEdge codes made specific. Autopilot cycle 1.
