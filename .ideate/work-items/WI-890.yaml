notes: |
  # WI-890 Implementation Notes

  ## Context

  Full-audit finding [code C1]: archiveCycleLocal at writer.ts:1316-1328 calls fs.unlinkSync inside a better-sqlite3 transaction callback. If the SQLite transaction rolls back, the filesystem deletes are already committed and cannot be undone. The rollback handler attempts to remove the archive copies but the originals are already gone.

  ## Fix shape

  Restructure the function so the transaction writes only touch SQLite. After the transaction().exclusive() call returns (i.e., commit has succeeded), THEN perform fs.unlinkSync on the originals. This eliminates the data-loss window.

  ```ts
  // Pseudocode:
  // 1. Read originals into memory (already done for archive copy)
  // 2. Write archive copies to disk (fs-only, no DB)
  // 3. transaction.exclusive(() => {
  //      // upsert archive rows + delete original rows in SQLite only
  //    })
  // 4. After commit: fs.unlinkSync each original (log+surface failures)
  // 5. On catch from transaction: keep originals intact (filesystem unchanged)
  ```

  ## Testing

  Use the existing writer.test.ts patterns. For the commit-failure path, use vi.spyOn(db, 'transaction') or similar to force a throw.

  ## Constraints

  - Node 22 + vitest only.
  - GP-14: no direct .ideate/ YAML writes; use existing adapter plumbing.
  - Do not change the public archiveCycle contract; only the internal transaction ordering.
resolution: "archiveCycleLocal in writer.ts restructured: fs.unlinkSync now runs in Phase 4 (post-commit), not inside the transaction callback. Phase 3 contains only deleteStmt/updatePathStmt runs. Post-commit unlink failures are console.error'd and surfaced in the return string. 2 regression tests added to writer.test.ts (transaction-throw keeps originals; post-commit unlink failure surfaces error + archive copy survives)."
