notes: |-
  ## Implementation Notes

  ### Tool name rename
  Search-and-replace in each file:
  - `ideate_get_work_item_context` → `ideate_get_artifact_context`
  - `work_item_id` → `artifact_id` (only in MCP tool call contexts, not in general prose about work item IDs)

  ### GP-14 guardrail
  Add to each skill file that has a "What You Do Not Do" section or equivalent error handling section:

  ```
  **GP-14 enforcement**: If an MCP tool call fails, report the error and stop. Do NOT fall back to reading, grepping, or globbing .ideate/ files directly. The MCP abstraction boundary (GP-14) is inviolable — a tool failure is a signal to fix the tool, not to bypass it.
  ```

  For skills/execute/SKILL.md and skills/autopilot/phases/execute.md, place this near the existing MCP availability check text.
  For skills/review/SKILL.md and skills/refine/SKILL.md, place in the "What You Do Not Do" section.

  ### Files and locations
  - skills/execute/SKILL.md: references ideate_get_work_item_context in the worker spawn prompt
  - skills/review/SKILL.md: references it in Phase 3 context loading
  - skills/refine/SKILL.md: references it in Phase 3 PPR context note
  - skills/autopilot/SKILL.md: references it in the metrics instrumentation mcp_tools_called example
  - skills/autopilot/phases/execute.md: references it in the worker context assembly
  - skills/autopilot/phases/review.md: references ideate_assemble_context
