notes: Derived from cycle 28 code-reviewer finding M1. The tool_usage table defines session_id, cycle, and phase columns, but the writer path ignores them. The types.ts comment near line 11 explicitly acknowledges this gap. Wire the columns through the writer and remove the admission. Verify the both/detail views of getToolUsage can surface these fields in filters or grouping (contract coverage tracked separately in WI-863). P-33 (operational telemetry outside the artifact graph) remains the governing policy.
