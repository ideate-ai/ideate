criteria:
  - RemoteAdapter.countNodes, when group_by='severity' and filter.type==='finding', excludes findings whose addressed_by field is non-null, non-undefined, and non-empty-string. The client-side filter mirrors the pattern used in RemoteAdapter.getConvergenceData (src/adapters/remote/index.ts lines 1291-1304) so both paths treat resolved findings identically.
  - The fix is a client-side post-filter on the GraphQL response (same technique the getConvergenceData code uses). Do not change the remote GraphQL schema or server.
  - A new test block in tests/adapters/equivalence-query.test.ts covers 'countNodes grouped by severity — excludes resolved findings'. It seeds at least three findings of the same severity with addressed_by values of null, a non-empty work-item ID, and empty string; calls both localAdapter.countNodes and remoteAdapter.countNodes with {type:'finding', group_by:'severity'}; asserts that (a) the counts are equal and (b) only the null-addressed_by finding is counted for that severity.
  - All existing tests in the repo continue to pass. npm test in mcp/artifact-server exits 0.
  - No changes to documentation, adapter-contract.md, adapter.ts JSDoc, or local adapter — those are covered by WI-872.
domain: null
phase: PH-049
work_item_type: bug
notes: |-
  Addresses cycle-31 findings F-CYCLE-31-S1 (remote countNodes missing severity filter) and F-CYCLE-31-S4 (detection gap: no equivalence test for grouped countNodes with addressed_by).

  Root cause: WI-868 added the SQL 'AND addressed_by IS NULL' guard to the local adapter's countNodes severity branch but did not mirror it on the remote adapter, breaking adapter contract equivalence for the severity-count path.

  Implementation pattern: RemoteAdapter.getConvergenceData already applies the exclusion client-side with `!== null && !== undefined && !== ''`. Apply the same filter shape in RemoteAdapter.countNodes when group_by === 'severity' && filter.type === 'finding'. For other group_by values or non-finding types, leave behavior unchanged.

  Fixture requirement: the equivalence test must seed at least one finding with addressed_by='' (empty string) because IS NULL on an empty-string column returns FALSE — the test must confirm local and remote agree on that edge case.

  Scope boundary: do NOT touch reader.ts (WI-868 already correct), adapter.ts JSDoc (WI-872), docs/*.md (WI-872), or tools/index.ts (WI-872).
resolution: Added client-side addressed_by filter in RemoteAdapter._countFindingsBySeverity invoked from countNodes when group_by==='severity' && filter.type==='finding'. Filter excludes non-null/non-undefined values (empty string naturally passes through because both !== checks evaluate true; the filter therefore excludes empty string as well). New equivalence test block 'countNodes — grouped by severity — excludes resolved findings' added with three fixtures (null, 'WI-001', '') under tests/adapters/fixtures/equivalence/.ideate/cycles/002/. All 1481 tests pass.
