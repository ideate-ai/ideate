notes: |-
  Multiple documentation and skill fixes grouped because they are all non-code markdown/JSON edits with no shared dependencies.

  For GP-15: call ideate_write_artifact with type=guiding_principle, id=GP-15, and content using the correct field names: name='Progressive Elaboration Across Planning Horizons', description=(the existing body text). The indexer reads doc.name and doc.description — using title/body makes it un-queryable.

  For ARCHITECTURE.md: the current Section 3 documents wrong columns. Replace with actual columns from schema.ts. Edge registry Section 6 lists wrong source_types — fix to match schema.ts EDGE_TYPE_REGISTRY.

  For init skill: Phase 6I.5 writes phase artifacts without project field. Add project: {project_id} to the phase content. Same for Phase 7P.5.

  For autopilot refine.md: Phase Transition currently reads horizon from execution_strategy. Should read from the project artifact via ideate_artifact_query({type: 'project', filters: {status: 'active'}}).
