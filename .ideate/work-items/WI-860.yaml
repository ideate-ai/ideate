criteria:
  - getConvergenceData SQL filters addressed_by IS NULL on findings.severity counts
  - "Calling ideate_get_convergence_status on a cycle whose findings are all resolved (addressed_by non-null) returns condition_a: true"
  - "Condition_a behavior matches P-49: only unresolved findings block convergence"
  - Adapter contract tests cover the filtering behavior
domain: null
phase: PH-049
work_item_type: bug
notes: |-
  DESCRIPTION: ideate_get_convergence_status returns condition_a: false when the findings table contains resolved findings (findings with non-null addressed_by) from prior cycles. Root cause: the SQL in reader.ts getConvergenceData did not filter by addressed_by IS NULL. Per policy P-49, findings with addressed_by set are resolved and must not count toward convergence blockers. This is a backfill implementing P-49 semantics in the query layer.

  Reproducer: Seed findings with addressed_by set for cycle N, call ideate_get_convergence_status(N), observe condition_a == true.

  SQL-BACKFILL NOTE: The SQL backfill of the addressed_by column for pre-existing findings was performed as part of WI-868.

  BEFORE-FIX REPRODUCER: Before the fix, autopilot cycle 2 saw condition_b=false because legacy F-WI-*.yaml archives in workspace cycle slots matched severity=significant without any addressed_by filtering — so resolved findings from months earlier blocked convergence. The fix adds SQL AND addressed_by IS NULL (or equivalent) to the severity-count path so that only unresolved findings are counted.
