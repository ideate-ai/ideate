notes: |
  # WI-895 Implementation Notes

  ## Context

  Cycle 77 capstone found 4 Significants from WI-890 and WI-891's narrow scope:
  - EC1: patchNode has fs.readFileSync inside the db.transaction callback
  - EC2: batchMutate has fs.readFileSync inside the db.transaction callback for each node
  - II1: LocalWriterAdapter has no _isShutDown guard — asymmetric with RemoteAdapter
  - IR1: No tests for LocalAdapter post-shutdown behavior
  - Plus hygiene items in writer.ts (console.error, findingsDir, mock cast) bundled to avoid write contention.

  ## Sequencing

  Depends on WI-894 because both touch events.test.ts.

  ## Fix shape

  1. patchNode (writer.ts:~700-760): move hash/token_count computation BEFORE the transaction using the `merged` object directly. Transaction callback does only SQL upserts.

  2. batchMutate (writer.ts:~1100-1150): precompute hash/token_count for each resolvedNode before the transaction. Transaction callback is pure SQL.

  3. Shutdown guard:
     - Add `private _isShutDown = false;` and private `assertNotShutDown()` to LocalWriterAdapter.
     - Prepend `this.assertNotShutDown();` to every public mutating method.
     - In LocalAdapter.shutdown(): after stopping the watcher, set the writer's _isShutDown flag.

  4. Hygiene in writer.ts: import `log`, replace the 2 console.error calls (1355, 1365) with log.error, remove dead `findingsDir` (1197).

  5. Test cleanup: fix writer.test.ts:501 mock cast. Add patchNode + batchMutate regression tests for post-write-failure paths. Add post-shutdown ADAPTER_SHUT_DOWN tests to events.test.ts for LocalAdapter.

  ## Constraints
  - Node 22 + vitest only. No bun.
  - GP-14: no direct .ideate/ writes.
  - Do not change the public contracts of patchNode or batchMutate.
  - Verify npm test AND tsc --noEmit both pass.

  ## Self-check
  Walk each of the 9 criteria with satisfied/unsatisfied status.
resolution: "LocalWriterAdapter integrity completion. patchNode: hash/token_count precomputed from `merged` object BEFORE transaction; callback does only SQL. batchMutate: PrecomputedNodeData map populated in Phase 1 (YAML writes); transaction reads from map. Shutdown guard: protected _isShutDown field, private assertNotShutDown(), package-private _markShutDown() on LocalWriterAdapter; 8 public mutating methods (putNode, patchNode, deleteNode, batchMutate, archiveCycle, appendJournalEntry, putEdge, removeEdges) all guarded. LocalAdapter.shutdown() cascades via this._markShutDown(). Hygiene: console.error at lines 1355/1365 replaced with log.error; dead findingsDir removed. 4 new post-shutdown LocalAdapter tests + 2 new patchNode/batchMutate filesystem-failure regression tests. npm test: 1572 pass / 0 fail (+6 from this WI); tsc --noEmit clean."
