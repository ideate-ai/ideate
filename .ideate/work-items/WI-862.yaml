notes: "Derived from cycle 28 code-reviewer finding M2. Current script at lines 151-170 hardcodes LocalAdapter. Must branch on config.backend to honor the workspace configuration. Pattern: read config.json (jq), dispatch to the appropriate adapter initializer. Respects GP-14 (MCP abstraction) indirectly — the reporting script is a consumer of the configured backend, not a fallback around it."
resolution: report-tool-usage.sh reads config.json backend field; branches to LocalAdapter (local/absent) or RemoteAdapter (remote); fails fast on unknown/unreachable. Header output shows Backend value. Verified against local-config workspace (49 rows). Review Pass; 2 minor findings (dead undefined branch in inherited pattern, --top 0 edge-case) non-blocking.
