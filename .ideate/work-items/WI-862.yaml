criteria:
  - Script reads the `backend` field from .ideate/config.json and selects the matching adapter.
  - When backend=='remote', script uses the remote adapter; when backend=='local' or absent, uses the local adapter.
  - Behavior verified by running the script against a local-config and a remote-config workspace and observing the correct backend in action (manual verification acceptable if automated coverage is impractical).
  - Script produces a clear error if the configured backend is unreachable or misconfigured (does not silently fall back).
domain: null
