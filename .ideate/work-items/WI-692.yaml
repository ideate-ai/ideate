notes: |-
  SG1 (gap-analyst) and S1 (code-reviewer) from cycle 25. RemoteAdapter.patchNode now has IMMUTABLE_FIELD validation (added WI-691) but it is untested. Additionally, adapter-equivalence.test.ts has no patchNode IMMUTABLE_FIELD pairs, and local-adapter-validation.test.ts has no patchNode section at all.

  ## Equivalence tests (adapter-equivalence.test.ts)
  Find the existing patchNode section (around the INVALID_NODE_ID test). Add 3 pairs for IMMUTABLE_FIELD:
  ```ts
  it('patchNode: immutable field id throws IMMUTABLE_FIELD [Local]', async () => {
    const { localAdapter } = setup;
    await expect(localAdapter.patchNode({ id: 'GP-01', properties: { id: 'GP-99' } }))
      .rejects.toBeInstanceOf(ImmutableFieldError);
  });
  it.skipIf(!remoteAvailable)('patchNode: immutable field id throws IMMUTABLE_FIELD [Remote]', async () => {
    if (!remoteAdapter) return;
    await expect(remoteAdapter.patchNode({ id: 'GP-01', properties: { id: 'GP-99' } }))
      .rejects.toBeInstanceOf(ImmutableFieldError);
  });
  ```
  Repeat for 'type' and 'cycle_created'.

  Import ImmutableFieldError if not already imported. Check D-177 pattern: LocalAdapter tests run unconditionally, RemoteAdapter tests use it.skipIf(!remoteAvailable).

  ## Remote validation tests (remote-adapter-validation.test.ts)
  The file already has a patchNode section that tests INVALID_NODE_ID. Add within that section:
  ```ts
  it('rejects immutable field id with ImmutableFieldError', async () => {
    await expect(adapter.patchNode({ id: 'GP-01', properties: { id: 'GP-99' } }))
      .rejects.toBeInstanceOf(ImmutableFieldError);
    // or .rejects.toMatchObject({ code: 'IMMUTABLE_FIELD' })
  });
  ```
  For type and cycle_created similarly. The file uses a mock GraphQLClient so no network call is made — IMMUTABLE_FIELD validation fires before any client.mutate call.

  ## Local validation tests (local-adapter-validation.test.ts)
  Add a patchNode describe block (AC-8) covering:
  - patchNode with empty/invalid id → INVALID_NODE_ID
  - patchNode with id in properties → ImmutableFieldError
  - patchNode with type in properties → ImmutableFieldError
  - patchNode with cycle_created in properties → ImmutableFieldError
  Follow the file's existing describe structure. Update the file's header comment to include patchNode coverage.
