notes: |-
  # WI-525: Create /ideate:status skill

  ## Frontmatter
  ```yaml
  name: status
  description: Project status views — workspace, project, or phase perspective
  model: sonnet
  ```

  Note: NOT disable-model-invocation. Status should be triggerable by Claude (e.g., at start of a session to orient).

  ## Implementation

  This is intentionally thin. The MCP tool (WI-522) does the formatting.

  1. Parse argument for view mode:
     - No argument or `workspace` → view: 'workspace'
     - `--project` or `project` → view: 'project'
     - `--phase` or `phase` → view: 'phase'
  2. Call ideate_get_workspace_status(view: <parsed>)
  3. Display the response as-is
  4. Optionally: if the response indicates issues (blocked items, overdue phase), add a brief observation

  ## Context cost target
  Under 200 lines. No context package loading, no architect survey, no domain state. Just parse argument → call MCP → display.

  ## Reference
  WI-522 defines the MCP tool schema that this skill calls. The view parameter values must match: workspace, project, phase.
