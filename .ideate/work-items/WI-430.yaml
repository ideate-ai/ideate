notes: |-
  ## Context

  Addresses minor findings from CQ-006 and gap analysis GA-006:

  ### M1 (CQ-006): deletePhase two-statement form
  Change `write.ts` handleArchiveCycle to use the chained form consistent with all other transaction calls in the file:
  ```typescript
  // Before:
  const deletePhase = ctx.db.transaction(() => {
    for (const srcPath of incrementalFiles) {
      deleteStmt.run(srcPath);
    }
  });
  deletePhase.exclusive();

  // After:
  ctx.db.transaction(() => {
    for (const srcPath of incrementalFiles) {
      deleteStmt.run(srcPath);
    }
  }).exclusive();
  ```
  Functionality is identical. After changing src, rebuild dist/ with `npm run build`.

  ### G4 (GA-006): README.md Reporting Scripts section
  The README still presents the three report scripts as functional. Update the Reporting Scripts section to note they are deprecated and direct users to `ideate_get_metrics` MCP tool.

  ### IR1 (GA-006): report.sh silently produces empty output
  Add the same deprecation block as report-cycle.sh, report-cost.sh, and report-executive.sh:
  ```bash
  echo 'ERROR: This script is deprecated (see D-155).' >&2
  echo 'Use ideate_get_metrics MCP tool or .ideate/metrics/ directory instead.' >&2
  exit 1
  ```
  Place at the top of the script, after the shebang line, replacing any existing content (or before it if the script has a `false; then` guard like the other deprecated scripts).
