criteria:
  - CONFIG_SCHEMA_VERSION in src/config.ts equals 5
  - A test asserts CONFIG_SCHEMA_VERSION === CURRENT_SCHEMA_VERSION (import both constants; test fails if they ever diverge again)
  - "New src/__tests__/migrations.test.ts covers runPendingMigrations: (a) no-op when config schema_version already equals target; (b) runs v4→v5 migration on a config.json with schema_version 4 — verifies migrate() is called and config is updated to 5 afterward; (c) migration is idempotent — running on a DB that already has the v5 columns does not throw"
  - v4→v5 migration handles pre-existing columns by checking PRAGMA table_info before each ALTER TABLE ADD COLUMN, skipping columns that already exist
  - npm test passes with zero TypeScript errors
domain: artifact-structure
phase: PH-040
work_item_type: bug
notes: |-
  Root cause: CONFIG_SCHEMA_VERSION was 4 while the v4→v5 migration has toVersion=5. runPendingMigrations at migrations.ts:134-136 filters out any migration where toVersion > targetVersion (CONFIG_SCHEMA_VERSION). With targetVersion=4, the v4→v5 migration is permanently excluded. Additionally, config.json already has schema_version=4 which equals CONFIG_SCHEMA_VERSION=4, so the early-return at line 129-131 fires before the filter even runs.

  Fix steps:
  1. config.ts:4 — change CONFIG_SCHEMA_VERSION from 4 to 5.
  2. migrations.ts v4→v5 migration — make idempotent. SQLite does not support ALTER TABLE ADD COLUMN IF NOT EXISTS. Use `PRAGMA table_info(table_name)` to get existing columns, then only execute ALTER TABLE for columns not already present. Apply this guard to all six ALTER TABLE statements in the migration.
  3. src/__tests__/config.test.ts — add: `import { CURRENT_SCHEMA_VERSION } from '../schema.js'; ... it('CONFIG_SCHEMA_VERSION equals CURRENT_SCHEMA_VERSION', () => { expect(CONFIG_SCHEMA_VERSION).toBe(CURRENT_SCHEMA_VERSION); });`
  4. src/__tests__/migrations.test.ts — new file. Use a temp dir + temp SQLite file. Test runPendingMigrations with a mock/real config. For the idempotency test, run createSchema first (produces a fresh v5 DB), then call migration.migrate() — should not throw.

  Do NOT modify the fixture at tests/adapters/fixtures/equivalence/.ideate/config.json — it already has schema_version: 5 and should stay as-is.
resolution: Fixed CONFIG_SCHEMA_VERSION from 4 to 5 in src/config.ts. Added CONFIG_SCHEMA_VERSION/CURRENT_SCHEMA_VERSION equality test to config.test.ts. Created migrations.test.ts with v4→v5 migration coverage (no-op, migration run, idempotency). Fixed tools.test.ts to import CONFIG_SCHEMA_VERSION instead of hardcoded literal 4.
