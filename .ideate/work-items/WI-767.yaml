notes: |-
  The compile-time exhaustiveness check already exists in adapter.ts (lines 72-79) using a conditional type that emits a tsc error if ALL_NODE_TYPES misses a NodeType union member. The runtime test's hardcoded count adds no value beyond what tsc already enforces.

  Replace the count assertion with:
  1. A uniqueness check: `expect(new Set(ALL_NODE_TYPES).size).toBe(ALL_NODE_TYPES.length)` — no duplicates
  2. A non-empty check: `expect(ALL_NODE_TYPES.length).toBeGreaterThan(0)` — array is populated
  3. An element validity check: `for (const t of ALL_NODE_TYPES) { expect(typeof t).toBe('string'); expect(t.length).toBeGreaterThan(0); }`

  This removes the magic number while still validating array integrity at runtime. The compile-time check handles completeness.

  First: find the exact location of the assertion. Grep for `ALL_NODE_TYPES.length` in the test files.
