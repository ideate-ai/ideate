notes: |-
  ## Context

  This is a DESIGN-ONLY spike. No code will be written. The goal is a complete design document so that when implementation begins, all edge cases are known and a backup strategy is in place first.

  ## Problem Scope

  Merging two `.ideate/` directories into one requires:
  1. **ID deconfliction**: WI-001 from dir A and WI-001 from dir B are different artifacts with the same ID
  2. **Reference rewriting**: every YAML field containing an ID reference must be updated when an ID changes
  3. **Cycle number merging**: both dirs may have cycles/001/, cycles/002/, etc.
  4. **Domain knowledge merge**: overlapping policies, decisions, questions from separate projects
  5. **SQLite rebuild**: after YAML merge, index.db must be rebuilt from scratch

  ## Files to Read

  - `mcp/artifact-server/src/adapter.ts`: ALL_NODE_TYPES, ALL_EDGE_TYPES, all type definitions
  - `mcp/artifact-server/src/schema.ts`: EDGE_TYPE_REGISTRY — yaml_field entries map directly to YAML fields containing ID references
  - `mcp/artifact-server/src/indexer.ts`: extractEdges() — shows which YAML fields are parsed as ID references by the indexer
  - `mcp/artifact-server/src/config.ts`: IDEATE_SUBDIRS — canonical directory structure
  - Actual `.ideate/` YAML files: sample each artifact type to find ALL fields containing IDs (not just those in the edge registry — look for id-like values in notes_content, body text, etc.)

  ## Design Questions to Resolve

  1. Can every ID reference be found via static field name lookup, or are there embedded IDs in free-text fields?
  2. Is rewriting YAML files + SQLite rebuild sufficient, or does SQLite need direct UPDATE statements?
  3. What is the minimal metadata needed from each source to perform a deterministic merge?
  4. Should the merge produce a new third directory or mutate one source in-place?
  5. How should journal entry sequence numbers merge when both sources have J-001-001, J-001-002, etc.?
  6. Should domain policies from both sources be merged (potentially duplicates) or kept separate with a source annotation?

  ## Output

  Call `ideate_write_artifact({type: 'research', id: 'research-merge-design', content: {...}})` with:
  1. ID prefix inventory table (prefix, format, artifact types, example)
  2. Reference field map (artifact type → fields containing IDs, with field name and value format)
  3. Reindexing strategy comparison table
  4. Merge conflict taxonomy (auto-resolvable vs requires human decision)
  5. Required processing order
  6. Information loss analysis
  7. Recommended approach with rationale
  8. Open questions requiring human decision before implementation
resolution: "Research artifact research-merge-design written to .ideate/steering/research/. Design-only. Key findings: 4 reference fields outside edge registry, triggered_by uses registered yaml_field but extractor silently skips object-in-array shape, domain_policy.derived_from has pre-existing comma-string defect, Strategy C (new-destination copy) recommended. Includes processing order, information loss analysis, and open questions for human decision."
