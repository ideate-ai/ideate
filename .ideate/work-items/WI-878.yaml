notes: |
  ## Context

  Cycle 1 capstone review of WI-876 and WI-877 surfaced 6 significant + 2 minor findings. All are scoped to two files already touched by WI-876 and WI-877, plus the new restart.sh and deployment-notes.md. A single bundled bug fix is the minimum-churn path.

  ## Implementation order

  1. Tighten regex word boundaries in STEP1_PASS_RES and STEP1_FAIL_RES (S1).
  2. Either single-quote the YAML-emitted warning or strip/escape embedded double quotes before interpolation (S2).
  3. Replace absolute path in missing-summary warning with `summary artifact not found for cycle N` style message (S3).
  4. Add 2 Step 2 tests in tools.test.ts (S4).
  5. Add retroactive verification test loop or documented manual check (S5).
  6. Extend P-33 describe block to cover handleGetConvergenceStatus (S6).
  7. Restart.sh: escape pattern + SIGKILL escalation (M2).
  8. JSDoc + constant + warning message cleanup (M1).
  9. deployment-notes.md clarification (M2).

