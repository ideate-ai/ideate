notes: |-
  These tests define what it means to be a correct StorageAdapter implementation. When the RemoteAdapter is built (in the next phase), it must pass the same test suite.

  Use a test factory pattern: export a function that takes an adapter instance and runs the full contract suite against it. The LocalAdapter test file calls the factory with a LocalAdapter. The future RemoteAdapter test file calls it with a RemoteAdapter.
