notes: |-
  ## Trigger
  Cycle 20 minor findings M1 (code-reviewer) and M3 (gap-analyst):
  - M1: The exhaustiveness sentinel at lines 26-29 of this file duplicates the operative sentinel in `adapter.ts:77-84`. The test-file copy is never evaluated by `tsc --noEmit` (tests/ is excluded from tsconfig include glob). It is dead from a type-checking perspective and misleads readers.
  - M3: The runtime length assertion uses `toBeGreaterThan(0)` with a comment implying a precise count. The comment/assertion are contradictory.

  ## What to change

  ### Fix 1 — Remove dead sentinel (lines 23-29)

  In `mcp/artifact-server/tests/adapters/always-include-types-validation.test.ts`, remove:
  ```ts
  // Compile-time exhaustiveness: every NodeType must appear in ALL_NODE_TYPES.
  // If a new NodeType member is added without updating ALL_NODE_TYPES, this line
  // produces: "Type 'true' is not assignable to type 'false'"
  type _ExhaustiveCheck = Exclude<NodeType, typeof ALL_NODE_TYPES[number]> extends never
    ? true
    : false;
  const _nodeTypeExhaustive: _ExhaustiveCheck = true;
  ```

  The canonical sentinel is now at `src/adapter.ts:77-84` (within tsconfig include glob, evaluated by `tsc --noEmit`). The test-file copy is never type-checked and creates confusion about which check is authoritative. Remove it entirely.

  ### Fix 2 — Tighten runtime length assertion (line ~411)

  Change:
  ```ts
  // Runtime length sanity check — update this number when NodeType grows
  expect(ALL_NODE_TYPES.length).toBeGreaterThan(0);
  ```

  To:
  ```ts
  // Update this count when NodeType grows (currently 27)
  expect(ALL_NODE_TYPES.length).toBe(27);
  ```

  This pins the array to the known count so accidental removal of entries is caught at runtime (complementing the compile-time sentinel in adapter.ts). The current NodeType union has 27 members (verified at adapter.ts:13-41). Use `grep -c '"' src/adapter.ts` or count the union members to confirm the count before writing.

  ## Backfill assessment
  No YAML artifacts are touched. No SQLite indexing is affected. No backfill needed.
resolution: Removed dead compile-time sentinel (lines 23-29) from always-include-types-validation.test.ts — never evaluated by tsc because tests/ is excluded from tsconfig include glob. Tightened runtime length assertion from toBeGreaterThan(0) to toBe(27) with trailing comment. tsc clean, all tests pass.
