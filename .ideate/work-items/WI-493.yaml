notes: |-
  ## What to change

  ### metrics.ts
  1. Add import: `import { computeArtifactHash } from '../db-helpers.js';`
  2. Replace `const content_hash = sha256(yamlContent);` (line ~60) with `const content_hash = computeArtifactHash(yamlDoc);` where yamlDoc is the parsed YAML object before serialization.
  3. Remove the local `sha256` function (lines ~15-17) and its `crypto` import if no longer used.

  Note: `computeArtifactHash` expects a parsed object, not a string. It serializes with `{ lineWidth: 0 }` internally. The indexer uses the same function, so hashes will match.

  ## Why
  Code-reviewer S1: handleEmitMetric uses different serialization options than computeArtifactHash, causing hashes to diverge for long payloads and defeating the hash-skip optimization on rebuild.
