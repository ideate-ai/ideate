criteria:
  - On startup, MCP server compares config.json schema_version against CURRENT_SCHEMA_VERSION
  - If schema_version < CURRENT_SCHEMA_VERSION, migration functions run automatically before index rebuild
  - Migration is idempotent
  - After successful migration, config.json schema_version is updated
  - If migration fails, server logs error and starts in degraded mode
  - Integration test verifies migration runs on startup
domain: artifact-structure
phase: null
notes: |-
  ## Context
  GP-16 requires automatic migration. Currently schema version only checked for SQLite staleness.

  ## Implementation
  1. Add migration registry (migrations.ts) with ordered {fromVersion, toVersion, migrate(ideateDir)} functions
  2. In initServer: check config version vs CURRENT_SCHEMA_VERSION, run migrations in sequence
  3. Migrations must be idempotent
  4. On failure: log error, continue with best-effort startup
