notes: |-
  The RemoteAdapter is a GraphQL client that implements the same StorageAdapter interface as LocalAdapter. Every method translates to a GraphQL query or mutation against ideate-server.

  Key mappings (from adapter-interface.md and graphql-schema.md):
  - getNode -> query { artifact(id) }
  - getNodes -> query { artifacts(ids) }
  - readNodeContent -> query { artifact(id) { content } }
  - putNode -> mutation { putNode(input) }
  - patchNode -> mutation { patchNode(input) }
  - deleteNode -> mutation { deleteNode(id) }
  - putEdge -> mutation { putEdge(input) }
  - removeEdges -> mutation { removeEdges(input) }
  - getEdges -> query { graphQuery(input) } filtered to edges
  - traverse -> query { assembleContext(input) } — server-side PPR
  - queryNodes -> query { artifactQuery(input) }
  - batchMutate -> mutation { batchMutate(input) }
  - nextId -> query { nextId(type) }
  - countNodes -> query { nodeCounts(filter) }
  - getDomainState -> query { domainState(domains) }
  - getConvergenceData -> query { convergenceStatus(cycleNumber) }
  - appendJournalEntry -> mutation { appendJournal(input) }
  - archiveCycle -> mutation { archiveCycle(cycleNumber) }
  - initialize -> no-op (server is always running)
  - shutdown -> no-op

  Enum mapping: the server uses UPPER_CASE enums (SMALL, MEDIUM, LARGE, WORK_ITEM, etc.) while the adapter interface uses lowercase strings. The RemoteAdapter must convert in both directions.

  Use graphql-request as the GraphQL client — lightweight, TypeScript-native, supports custom headers.

  The server is running at localhost:4000 with dev-mode auth (no JWT needed).
