notes: |-
  # WI-522: Extend ideate_get_workspace_status with view parameter

  Modify handleGetWorkspaceStatus in analysis.ts to accept an optional `view` parameter.

  ## Current behavior
  handleGetWorkspaceStatus returns a single dashboard with cycle, work item counts, findings, questions, active project, and current phase. This becomes the `workspace` view (default).

  ## New views

  ### project view
  Query the active project (projects table where status='active'). Include:
  - Project name, intent, appetite
  - Current phase: name, type, work item progress (COUNT by status)
  - Horizon: list next phase names from project YAML horizon.next array
  - Use ideateDir to read project YAML for horizon data not in SQLite

  ### phase view
  Query the active phase. Include:
  - Phase name, type, status, started_date
  - Work items table: JOIN work_items on phase, show id, title, status, complexity, work_item_type
  - Dependencies: query edges table for depends_on edges between phase work items
  - Format as markdown table + dependency list

  ## Tool schema change
  In tools/index.ts TOOLS array, add to ideate_get_workspace_status inputSchema:
  ```
  view: { type: 'string', enum: ['workspace', 'project', 'phase'], description: 'View perspective. Default: workspace.' }
  ```

  ## P-33 compliance
  All views return artifact designations (PR-001, PH-016), not file paths. No storage implementation details in output.
