notes: |-
  ## Context

  In `indexFiles` (around line 841), a guard variable decides whether to run the two derivation phases:

  ```typescript
  const hasJournalUpdate = yamlPaths.some(p => /\/cycles\/\d+\/journal\//.test(p));
  if (hasJournalUpdate) {
    db.transaction(() => { deriveJournalEntryEdges(drizzleDb); })();
    db.transaction(() => { deriveJournalEntryCycleEdges(drizzleDb); })();
  }
  ```

  This only fires when journal entry files change. But:
  - `deriveJournalEntryEdges` creates `relates_to` edges from journal entry `work_item` fields and title-extracted WI references. If a new work_item is indexed (WI-001.yaml added), those relates_to edges won't be created until a journal file next changes.
  - `deriveJournalEntryCycleEdges` creates `belongs_to_cycle` edges from journal entries to cycle_summary nodes. If a new cycle_summary is indexed, the edge won't be created until a journal file next changes.

  This violates P-68: the trigger guard must include every upstream artifact type.

  ## Change

  Replace the guard at line 841 with an expanded version. Rename the variable to reflect the broader semantics:

  ```typescript
  // Re-derive journal entry edges when journal entries, cycle_summaries, or
  // work_items change — all three are upstream inputs to the derivation phases.
  // Journal entries: /cycles/{NNN}/journal/*.yaml
  // Cycle summaries: /cycles/{NNN}/*.yaml (excludes journal/ subdirectory)
  // Work items: /work-items/WI-{NNN}.yaml
  const hasDerivedEdgeUpdate = yamlPaths.some(
    p =>
      /\/cycles\/\d+\/journal\//.test(p) ||
      /\/cycles\/\d+\/(?!journal)[^/]+\.yaml$/.test(p) ||
      /\/work-items\/WI-\d+\.yaml$/.test(p)
  );
  if (hasDerivedEdgeUpdate) {
    db.transaction(() => { deriveJournalEntryEdges(drizzleDb); })();
    db.transaction(() => { deriveJournalEntryCycleEdges(drizzleDb); })();
  }
  ```

  The negative lookahead `(?!journal)` in the cycle_summary pattern ensures journal entry files (which are inside a `journal/` subdirectory) don't double-match. The first clause already handles them.

  ## Tests

  The tests call `indexFiles(db, drizzleDb, [filePath])` with a single non-journal path and assert that edge derivation ran. Use the `tmpdir`-based fixture pattern from existing indexer tests. Create the fixture .ideate directory structure; write a journal entry YAML file first via direct file write + full `rebuildIndex`; then call `indexFiles` with only a work_item or cycle_summary path and check edges.

  **Work_item trigger test**:
  1. Write J-001-001.yaml with `work_item: "WI-001"` to cycles/001/journal/
  2. Call `rebuildIndex` — WI-001 does not exist yet, so 0 relates_to edges
  3. Write WI-001.yaml and call `indexFiles(db, drizzleDb, ["/path/to/work-items/WI-001.yaml"])`
  4. Assert: 1 relates_to edge exists from J-001-001 to WI-001

  **Cycle_summary trigger test**:
  1. Write J-001-001.yaml with id J-001-001 (no matching cycle_summary yet)
  2. Call `rebuildIndex` — 0 belongs_to_cycle edges
  3. Write a cycle_summary YAML file (type: cycle_summary, cycle: 1) and call `indexFiles` with its path
  4. Assert: 1 belongs_to_cycle edge exists from J-001-001 to the new summary
resolution: hasDerivedEdgeUpdate replaces hasJournalUpdate; now triggers on work_item and cycle_summary file changes. deriveJournalEntryEdges exported and wired into rebuildIndex Phase 3. Duplicate function definition from merge resolved by keeping richer stash version.
