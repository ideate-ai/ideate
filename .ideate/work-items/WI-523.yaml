notes: |-
  # WI-523: Create /ideate:project skill

  See research-multi-level-interaction Section 4.2 for conceptual model.

  ## Skill structure

  Frontmatter:
  ```yaml
  name: project
  description: Manage projects and phases — create, view, switch, complete
  model: sonnet
  disable-model-invocation: true
  ```

  ## Phase 0: Config loading
  Same pattern as all other skills — call ideate_get_config(), hold agent_budgets and model_overrides.

  ## Command routing
  Parse the user's argument to determine subcommand. If no argument, default to `show`.

  Project commands:
  - `show` — call ideate_get_workspace_status(view: 'project'), display result
  - `create` — ask for name, intent, appetite. Write via ideate_write_artifact(type: 'project')
  - `list` — call ideate_artifact_query(type: 'project'), format as table
  - `view <id>` — call ideate_get_artifact_context(artifact_id: id)
  - `switch <id>` — update project status fields: set current active to paused, set target to active
  - `pause` — set active project status to paused
  - `complete` — set active project status to complete, record completed_date
  - `archive` — set project status to archived

  Phase commands (prefixed with `phase`):
  - `phase create` — ask for name, type, description. Suggest name from work item themes. Write via ideate_write_artifact(type: 'phase')
  - `phase list` — query phases for current project, format as table
  - `phase start <id>` — handle transition from current active phase. If current phase has incomplete work items, present carry-forward options. Set new phase to active.
  - `phase complete` — mark current phase complete, suggest next from horizon
  - `phase abandon <reason>` — mark phase abandoned, log reason
  - `phase reorder` — present current horizon, allow drag/reorder

  ## Phase transition protocol
  When starting a new phase while current has incomplete work:
  1. Query work items for current phase with status != done
  2. Present list to user
  3. Options: carry-forward all to new phase, carry-forward selected, cancel selected
  4. Update work item phase assignments and phase work_items arrays accordingly
  5. Log transition in journal via ideate_append_journal

  ## Context cost
  Per research-skill-context-cost: keep main file under 500 lines. If phase lifecycle detail pushes past this, extract to skills/project/phase-lifecycle.md as supporting file read on demand.
