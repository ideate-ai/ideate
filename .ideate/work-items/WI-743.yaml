notes: |-
  ## Trigger
  Cycle 20 code-review M2 (redundant `as NodeType` casts) and gap-analysis MI2 (getDomainState null-status inclusion unguarded).

  ## What to change

  ### Fix 1 — Remove redundant casts (M2)

  In `mcp/artifact-server/src/__tests__/adapter-contract.test.ts`, find the test added by WI-737: 'excludes deprecated and superseded policies from getDomainState results'. This test contains three `putNode` calls that look like:
  ```typescript
  await adapter.putNode({ id: 'P-filter-deprecated', type: 'domain_policy' as NodeType, status: 'deprecated', ... });
  ```

  Remove the `as NodeType` cast from the `type` field on all three calls. `'domain_policy'` is already a member of the `NodeType` union and no cast is needed. The corrected form:
  ```typescript
  await adapter.putNode({ id: 'P-filter-deprecated', type: 'domain_policy', status: 'deprecated', ... });
  ```

  ### Fix 2 — Add null-status inclusion test (MI2)

  In the same getDomainState describe block, after the deprecated/superseded exclusion test, add a new test:

  ```typescript
  it('includes policies with null/absent status in getDomainState results', async () => {
    // Policies with no status field (status is null/undefined) should appear in results
    // because the SQL filter is: status IS NULL OR (status != 'deprecated' AND status != 'superseded')
    await adapter.putNode({
      id: 'P-null-status',
      type: 'domain_policy',
      domain: 'null-status-test',
      title: 'Null status policy',
      body: 'Should appear in results',
      // No status field — defaults to null
    });
    const result = await adapter.getDomainState(['null-status-test']);
    const entry = result.get('null-status-test');
    expect(entry).toBeDefined();
    const policyIds = entry!.policies.map((p: any) => p.id);
    expect(policyIds).toContain('P-null-status');
  });
  ```

  The key assertion is that a policy with no explicit status field appears in getDomainState results. This guards the `n.status IS NULL` clause in reader.ts:854 (the getDomainState SQL query). If the clause were changed to `n.status = 'active'`, this test would fail.
resolution: Removed three redundant `as NodeType` casts from getDomainState deprecated/superseded filter test. Added null-status inclusion test guarding the `n.status IS NULL` clause in reader.ts getDomainState SQL. All tests pass.
