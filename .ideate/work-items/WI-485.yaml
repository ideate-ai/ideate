notes: |-
  ## What to change

  In README.md, the Configuration section starting at line 250:

  1. **Fix schema_version**: The example JSON at line 275 shows `"schema_version": 2` — update to `3`.

  2. **Add model_overrides subsection** after agent_budgets (around line 290):
     The `model_overrides` key maps agent names to model strings, overriding the default model tier. Set a key to `null` to remove an override. Skills read model_overrides at startup and pass the value as the `model` parameter when spawning agents.

  3. **Add default_appetite subsection**:
     `default_appetite` — maximum number of phases budgeted for a project. Default: 6. Used by `/ideate:init` when creating a new project.

  4. **Add circuit_breaker_threshold subsection**:
     `circuit_breaker_threshold` — maximum consecutive work item failures before the Andon cord is pulled automatically. Default: 5.

  5. **Add spawn_mode subsection**:
     `spawn_mode` — how agents are launched. Valid values: `"subagent"` (default) or `"teammate"`.

  6. **Present a complete config.json example** showing all keys together with their defaults.

  ## Reference
  - `mcp/artifact-server/src/config.ts` — `getConfigWithDefaults()` function defines all defaults
  - `mcp/artifact-server/src/tools/config.ts` — `handleUpdateConfig()` validation rules
