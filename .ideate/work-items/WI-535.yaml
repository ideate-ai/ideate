notes: |-
  # WI-535: Create GUIDE.md

  Comprehensive user guide for the ideate plugin. Structure suggestion:

  ## Outline
  1. **Getting Started** — Install, /ideate:init on existing codebase, what gets created
  2. **Projects and Phases** — /ideate:project commands, phase lifecycle (pending→active→complete→abandoned), horizons, appetite
  3. **Planning Work** — /ideate:init for new projects, /ideate:refine for changes, interview process
  4. **Quick Intake** — /ideate:triage for bugs, features, chores. Typed shortcuts.
  5. **Execution** — /ideate:execute, work item types and how they affect context/review, incremental review, Andon cord
  6. **Review** — /ideate:review, cycle vs domain vs full audit, proportional review depth, convergence
  7. **Autonomous Mode** — /ideate:autopilot, cycle loop, convergence conditions, circuit breaker
  8. **Status and Reporting** — /ideate:status views (workspace/project/phase), /ideate:report
  9. **Configuration** — /ideate:settings, agent budgets, model overrides, PPR weights
  10. **Concepts** — Domain knowledge layer, PPR context assembly, work item types, spec sufficiency

  ## Tone
  Practical, user-facing. Show commands and expected output. Avoid internal implementation details. Reference README for installation and QUICKSTART for the 5-minute walkthrough.

  ## Length target
  400-600 lines. Dense with examples, light on theory.
