notes: |-
  ## Context

  `src/__tests__/migrations.test.ts` currently has 4 tests, all focused on the v4→v5 happy path. Three scenarios are untested:

  1. **Error path**: A migration function throws. `migrateSchema` should propagate the error. The DB schema_version should remain at the pre-migration value (the migration was not committed).

  2. **Multi-step chain**: Start DB at v3 (or lower), call `migrateSchema` targeting v5. Verify both migration steps ran in order (v3→v4, v4→v5) and the final schema_version is 5.

  3. **No-registry-entry / already-at-target**: DB schema_version is already at the target. Call `migrateSchema`. Verify no migration functions are called and no error is thrown.

  ## How to write the tests

  Read the existing test file to understand the setup pattern — it likely creates an in-memory SQLite DB, sets schema_version, then calls `migrateSchema`. Follow the same pattern for each new scenario.

  For the error path, create a mock migration that throws and register it in a test-local migration registry (or temporarily override the registry). Verify the thrown error reaches the caller and schema_version in the DB is unchanged.

  For the multi-step chain, you may need to synthesize a v3→v4 migration step. Check whether the migration registry already has a v3 entry; if so, use it. If not, write a no-op v3→v4 migration for test purposes only.

  For the no-op path, start the DB at the current target version and call `migrateSchema`. No migrations should run.
