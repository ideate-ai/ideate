notes: |
  # Implementation Notes — WI-130
  
  ## What to change
  
  Replace every `claude-opus-4-6` model string with `opus` in skill files. These are spawn-time model overrides for agents that need the capable tier.
  
  ## Exact locations
  
  ### skills/plan/SKILL.md
  - Line 297: `model: claude-opus-4-6` → `model: opus` (architect spawn)
  - Line 368: `model: claude-opus-4-6` → `model: opus` (decomposer spawn)
  - Line 736: metrics schema example `"claude-opus-4-6"` → `"opus"`
  
  ### skills/refine/SKILL.md
  - Line 36: `model: claude-opus-4-6` → `model: opus` (architect analyze spawn)
  - Line 267: `model: claude-opus-4-6` → `model: opus` (architect design spawn)
  - Line 299: `model: claude-opus-4-6` → `model: opus` (decomposer spawn)
  - Line 379: metrics schema example `"claude-opus-4-6"` → `"opus"`
  
  ### skills/review/SKILL.md
  - Line 441: `model: claude-opus-4-6` → `model: opus` (domain-curator conflict spawn)
  - Line 651: metrics schema example `"claude-opus-4-6"` → `"opus"`
  
  ### skills/brrr/phases/execute.md
  - Line 174: `model: "claude-opus-4-6"` → `model: "opus"` (proxy-human spawn)
  
  ### specs/plan/architecture.md
  - Line 223: Update note about plan/refine overriding to `claude-opus-4-6` → `opus`
  - Line 234: Same update for decomposer entry
  
  ## Pattern
  
  Each replacement follows the same pattern: the phrase `claude-opus-4-6` becomes `opus`. The surrounding context (e.g., "This overrides the agent's default model for this task") remains unchanged.
  
  The metrics schema examples change from `"claude-opus-4-6"` to `"opus"` as an illustrative value.
  
  ## Rationale
  
  Policy P-11 states model overrides are applied at spawn time. Currently the overrides use a specific Anthropic model ID rather than the tier alias. This bypasses Claude Code's `ANTHROPIC_DEFAULT_OPUS_MODEL` env var, which remaps what `opus` resolves to. Using the tier alias makes the env var mechanism work correctly.
