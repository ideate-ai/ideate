notes: |-
  ## What to change

  ### write.ts (line 927)
  Currently:
  ```typescript
  content: JSON.stringify(content),
  ```

  Change to extract the raw content string:
  ```typescript
  content: typeof content.content === 'string' ? content.content : JSON.stringify(content),
  ```

  This preserves backward compatibility: if content.content is a string (the normal case for cycle_summary, review_output, etc.), use it directly. If not, JSON.stringify as before.

  ### write-transaction.test.ts
  Add a test case that:
  1. Writes a cycle_summary artifact via handleWriteArtifact with `content: { content: '## Summary\nAll pass', cycle: 1 }`
  2. Reads document_artifacts.content from SQLite
  3. Asserts the value is the raw string, not JSON-wrapped

  ## Why
  Q-120: Format divergence between indexer and write path causes parsePrincipleVerdict Step 2 to fail silently.
