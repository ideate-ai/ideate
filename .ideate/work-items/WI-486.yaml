criteria:
  - handleWriteArtifact stores document_artifacts.content as the raw YAML content field string, not JSON.stringify(content)
  - The stored value matches what the indexer produces for the same artifact (raw content string)
  - parsePrincipleVerdict Step 2 (newline split + heading scan) works correctly for artifacts written via handleWriteArtifact
  - Unit test verifies that after handleWriteArtifact writes a cycle_summary, the document_artifacts.content column contains a raw string (not JSON-wrapped)
