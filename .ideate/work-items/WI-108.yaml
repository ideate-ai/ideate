  # WI-108: architecture.md — add domain-curator to agents table
  
  ## Context
  
  `specs/plan/architecture.md` §1 (Agents table) lists 8 agents. The domain-curator (`agents/domain-curator.md`) is a 9th agent actively used by `skills/review/SKILL.md` to maintain the `domains/` layer after each review cycle. After WI-104, it will also run in `skills/brrr/phases/review.md`. The table is out of date.
  
  ---
  
  ## Fix: `specs/plan/architecture.md` — add domain-curator row
  
  In the agents table in Section 1 (Component Map → Agents), add a new row after journal-keeper:
  
  ```
  | domain-curator | opus | no | Read, Write, Glob | review, brrr |
  ```
  
  Also update the Skills table in Section 1 to reflect that `/ideate:review` and `/ideate:brrr` both spawn domain-curator:
  
  Current `/ideate:review` row:
  ```
  | `/ideate:review` | Comprehensive multi-perspective evaluation | code-reviewer, spec-reviewer, gap-analyst, journal-keeper | archive/cycles/{NNN}/* |
  ```
  
  Update to:
  ```
  | `/ideate:review` | Comprehensive multi-perspective evaluation | code-reviewer, spec-reviewer, gap-analyst, journal-keeper, domain-curator | archive/cycles/{NNN}/*, domains/* |
  ```
  
  Current `/ideate:brrr` row:
  ```
  | `/ideate:brrr` | Autonomous SDLC loop until convergence (zero findings + zero violations) | spec-reviewer, code-reviewer, gap-analyst, proxy-human | brrr-state.md, proxy-human-log.md, journal.md |
  ```
  
  Update to:
  ```
  | `/ideate:brrr` | Autonomous SDLC loop until convergence (zero findings + zero violations) | spec-reviewer, code-reviewer, gap-analyst, journal-keeper, domain-curator, proxy-human | brrr-state.md, proxy-human-log.md, journal.md, domains/* |
  ```
  
  ---
  
  ## Acceptance Criteria
  
  1. `specs/plan/architecture.md` agents table contains a row for domain-curator with model: opus, background: no, tools: Read/Write/Glob, spawned by: review/brrr
  2. The skills table `/ideate:review` row lists domain-curator in its agents column
  3. The skills table `/ideate:brrr` row lists domain-curator and journal-keeper in its agents column
