notes: |-
  Current data model reference:
  - schema.ts: EDGE_TYPE_REGISTRY defines edge types with source/target type constraints and yaml_field mappings
  - db.ts: 16 extension tables (workItems, findings, domainPolicies, etc.) joined to base nodes table
  - nodes table: id, type, title, status, domain, cycle, content_hash, token_count, file_path

  Neo4j schema should be simpler than the relational model — node properties replace extension tables. Each artifact type becomes a node label. Relationships carry type and weight properties.

  Multi-tenant model: Organization node is the graph root. Codebase and Project nodes have BELONGS_TO relationships to Organization. Work items, phases, etc. have PART_OF relationships to their Project. Cross-project edges (knowledge promotion) connect project-scoped nodes to org-level policy/principle nodes.

  Consider constraint creation for uniqueness (artifact IDs within an org) and existence (required properties).
