notes: |-
  ## Root Cause

  WI-656 added vi.mock('../adapters/remote/client.js') at module level. Vitest hoists this to top of file, replacing real GraphQLClient for all tests including the pre-existing unreachable-endpoint test.

  ## Fix (Option A — preferred)

  1. Create new file src/__tests__/remote-adapter-fetchcycle.test.ts
  2. Move the fetchCurrentCycle describe block and its vi.mock entirely to the new file
  3. Remove the module-level vi.mock from remote-adapter.test.ts

  This gives the fetchCurrentCycle tests their own isolated module scope with no interference.

  Independent of WI-667/668/669 — can run in parallel.
resolution: "Extracted fetchCurrentCycle tests to new file remote-adapter-fetchcycle.test.ts to isolate vi.mock scope. Removed module-level vi.mock from remote-adapter.test.ts — initialize() throws ConnectionError test now passes via real network timeout. All 7 WI-656 error recovery tests preserved. Minor: removed unused ConnectionError import from remote-adapter-fetchcycle.test.ts. 984 tests passing."
