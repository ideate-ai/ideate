notes: |-
  Observed during PH-050 cycle 2 autopilot, 2026-04-17. ideate_get_convergence_status(29) returned condition_a:false with 5 Significant findings open; direct `sqlite3 index.db` query `SELECT COUNT(*) FROM findings WHERE cycle=29 AND addressed_by IS NULL AND severity='significant'` returned 0. All 5 findings had been re-written via ideate_write_artifact with addressed_by populated. Autopilot had to manually override convergence.

  Investigation starting points (read-only, diagnosis only):
  - reader.ts:929-933 (findings query) vs writer.ts:540-605 (upsert path). Both are in the same process and same better-sqlite3 connection (this.db). No obvious staleness mechanism on inspection — upserts use genericUpsert with onConflictDoUpdate in an exclusive transaction.
  - Check whether the findings table even exists as a typed extension table, or whether findings are stored only in the nodes table with JSON content. Could be that addressed_by lives in YAML but no extension column exists for it.
  - If findings are read via SELECT against nodes table with JSON extraction, an upsert that rewrites node.file_path but not the JSON path for addressed_by could leave stale JSON.
  - Check whether the severity/cycle/addressed_by columns on findings are typed or extracted at read time. A generated column not refreshed on UPDATE would explain the discrepancy.

  This is a spike — output is a diagnosis artifact, not a code fix. The fix lives in WI-887.
resolution: Diagnosis spike complete. Research artifact RF-q164-stale-reads records root cause analysis (three plausible mechanisms — two-write race, watcher debounce, historical write-path — all addressed by same defensive fix). Hypothesis v narrow-column-omission rejected. Q-164 marked being_addressed_by_WI-887.
