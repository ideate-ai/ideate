criteria:
  - "Minimal reproducer documented: a sequence of MCP calls that causes ideate_get_convergence_status to return a findings_by_severity count that disagrees with a direct sqlite3 CLI query against the same index.db file"
  - "Root cause identified with evidence. Candidate hypotheses to eliminate or confirm: (i) better-sqlite3 prepared statement serving pre-write snapshot; (ii) WAL checkpoint lag between writer commit and reader visibility; (iii) cross-process snapshot (writer and reader on separate connections to different WAL positions); (iv) index-rebuild race where the findings row was written to YAML but not upserted into SQLite; (v) upsert path writing a different column set than the read path filters on (e.g., addressed_by written to YAML but not propagated into the nodes/findings extension row)"
  - Root cause and fix approach recorded in a research artifact (e.g. research-q164-stale-reads) or domain decision
