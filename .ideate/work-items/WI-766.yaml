notes: |-
  Follow the existing pattern from work_items CASCADE (line 127-149) and findings CASCADE (line 151-165):

  ```typescript
  it('deleting a node cascades to {table} extension row', () => {
    const db = freshDb();
    db.pragma('foreign_keys = ON');
    db.prepare(`INSERT INTO nodes (id, type, content_hash, file_path) VALUES ('{ID}', '{type}', 'hash', '/tmp/test.yaml')`).run();
    db.prepare(`INSERT INTO {table} ({required_cols}) VALUES ({values})`).run();
    const before = db.prepare(`SELECT id FROM {table} WHERE id = '{ID}'`).get();
    expect(before).toBeDefined();
    db.prepare(`DELETE FROM nodes WHERE id = '{ID}'`).run();
    const after = db.prepare(`SELECT id FROM {table} WHERE id = '{ID}'`).get();
    expect(after).toBeUndefined();
  });
  ```

  Required NOT NULL columns per table (must be populated in INSERT):
  - domain_policies: id, domain
  - domain_decisions: id, domain
  - domain_questions: id, domain
  - guiding_principles: id, name
  - constraints: id, category
  - module_specs: id, name
  - research_findings: id, topic
  - journal_entries: id (only PK is NOT NULL)
  - metrics_events: id, event_name
  - document_artifacts: id (only PK is NOT NULL)

  Add these tests inside the existing CASCADE describe block (after line 165, before line 166).
resolution: "Added 10 ON DELETE CASCADE tests inside the existing describe block for: domain_policies, domain_decisions, domain_questions, guiding_principles, constraints (with reserved keyword comment), module_specs, research_findings, journal_entries, metrics_events, and document_artifacts. All use the established pattern: PRAGMA foreign_keys=ON, insert node + extension, delete node, verify extension row gone. Total test count: 110."
