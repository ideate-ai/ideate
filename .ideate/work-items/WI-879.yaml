notes: |
  ## Context

  Cycle 2 capstone introduced 1 critical regression (multiline YAML) from the S2 fix, plus residual significant + minor gaps. All fixes are scoped to files already touched by WI-878. Low-churn bundled fix.

  ## Implementation order

  1. **C1 newline fix**: In analysis.ts, rawSnippet = (content.length > SNIPPET_MAX_CHARS ? content.slice(0, SNIPPET_MAX_CHARS) + '...' : content).replace(/\n/g, ' ').replace(/\s+/g, ' ').trim()
  2. **C1 test**: Update or add WI-879 C1 test with content containing '\n\n' — assert yaml.parse(result) succeeds, parsed warning contains original text with spaces replacing newlines.
  3. **S1 S5 fixture test**: Seed test DB with cycle 31 spec-adherence content string including '**Principle Adherence Verdict**: Pass'. Call handleGetConvergenceStatus(31). Assert principle_verdict === 'pass'.
  4. **M1 restart.sh**: Change line 12 'Does NOT send SIGKILL' to 'Sends SIGTERM first; escalates to SIGKILL after ${GRACE}s if needed.'
  5. **M1 deployment-notes**: Fix line 95 similarly.
  6. **M2 JSDoc**: Replace 'Pass|Fail|Unknown' with 'Pass|Fail' throughout; add one-line note at end of JSDoc: 'Unknown and other verdicts produce verdict=unknown via step3 fallback, not explicit pattern match.'
  7. **M3 Step 2 Fail test**: Add test with body '### GP-14 Violation\n\n- Executor bypassed MCP.' under Principle Adherence heading. Assert principle_verdict: fail, source: step2.

  ## Finding map

  - F-CYCLE-37-C1 → steps 1, 2
  - F-CYCLE-37-S1 → step 3
  - F-CYCLE-37-M1 → steps 4, 5
  - F-CYCLE-37-M2 → step 6
  - F-CYCLE-37-M3 → step 7
