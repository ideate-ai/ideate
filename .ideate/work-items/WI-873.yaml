criteria:
  - 'CORE BUG FIX: `RemoteAdapter.getConvergenceData` post-filter at `src/adapters/remote/index.ts` (~line 1357) is changed from `if (addressedBy !== null && addressedBy !== undefined && addressedBy !== "") { continue; }` to `if (addressedBy !== null && addressedBy !== undefined) { continue; }`. For `addressedBy=""` the new filter triggers `continue` (both `"" !== null` and `"" !== undefined` are true), so empty-string findings are EXCLUDED from severity counts — matching LocalAdapter SQL `addressed_by IS NULL` semantics and matching `_countFindingsBySeverity` (WI-871).'
  - "TEST COVERAGE: A new describe block in `tests/adapters/equivalence-query.test.ts` calls `getConvergenceData(2)` and asserts (a) `localAdapter.getConvergenceData(2).findings_by_severity` equals `remoteAdapter.getConvergenceData(2).findings_by_severity` AND (b) the empty-string-addressed_by finding (F-WI-001-004) is NOT counted, i.e. the significant severity count for cycle 2 reflects only the null-addressed_by finding (F-WI-001-002). This test MUST fail against the current remote code and pass after the filter fix."
  - "JSDOC: `src/adapter.ts` getConvergenceData JSDoc (~line 489) is updated from 'non-null addressed_by' to 'non-null, non-empty addressed_by' to match countNodes JSDoc, adapter-contract.md, and adapter-interface.md. No semantic change — wording alignment only."
  - "ADAPTER-METHOD-SPECS: `docs/platform/adapter-method-specs.md` Section 15 'Current RemoteAdapter behavior' entry for countNodes is updated: after the existing 'Sends nodeCounts(filter, groupBy) query' line, add a two-paragraph note describing the severity+finding special path that was introduced by WI-871 — the adapter now uses `artifactQuery` with a client-side `_countFindingsBySeverity` post-filter when `group_by==='severity' && filter.type==='finding'`. Reference the filter semantic (exclude non-null, non-empty addressed_by) and mention the 10000-result cap as a known limitation."
  - "ADAPTER-METHOD-SPECS (getConvergenceData): same file — the getConvergenceData entry is also refreshed to clarify the 'Sends convergenceStatus(cycleNumber) query' pre-existing description vs the current reality (`artifactQuery` + client-side post-filter). One paragraph is sufficient."
  - "ADAPTER-CONTRACT: `mcp/artifact-server/docs/adapter-contract.md` test coverage list (~line 734) gains `tests/adapters/equivalence-query.test.ts` alongside `adapter-equivalence.test.ts`. Also, the Version History table gets a new row documenting WI-872 and WI-873's contract-level additions (countNodes exclusion clause added in WI-872; getConvergenceData empty-string parity fixed in WI-873)."
  - "FIXTURE-README: `tests/adapters/fixtures/equivalence/FIXTURE-README.md` is updated with entries for F-WI-001-002 (null addressed_by), F-WI-001-003 (WI-001 addressed_by), and F-WI-001-004 (empty-string addressed_by) explaining their purpose (adapter severity-count and convergence equivalence tests)."
  - "ADAPTER-INTERFACE: `docs/platform/adapter-interface.md` line ~385 countNodes filter clause standardized with `adapter-contract.md` — pick one of 'non-null, non-empty' OR 'non-null, non-undefined, and non-empty-string' and use it in both files. Prefer the shorter 'non-null, non-empty' since non-undefined is not meaningful in SQLite-sourced data."
  - "FINDING CLOSURE: Use `ideate_write_artifact` (merge semantics) OR inline YAML update via adapter patchNode to set `addressed_by: WI-871` on F-CYCLE-31-S1 and F-CYCLE-31-S4; `addressed_by: WI-872` on F-CYCLE-31-S2, F-CYCLE-31-S3, F-CYCLE-31-MI1; `addressed_by: WI-873` on F-CYCLE-32-S1, F-CYCLE-32-S2, F-CYCLE-32-S3, F-CYCLE-32-MI1, F-CYCLE-32-MI2. No other finding fields change."
  - "TESTS: `npm test` in `mcp/artifact-server` exits 0 after all changes. The new getConvergenceData(2) test passes."
  - "SCOPE BOUNDARY: No other files modified. No changes to local adapter, no changes to tool descriptions, no new MCP tools, no schema changes."
