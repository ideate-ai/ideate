notes: |-
  Addresses cycle-32 findings: F-CYCLE-32-S1 (inverted empty-string guard in getConvergenceData), F-CYCLE-32-S2 (missing equivalence test), F-CYCLE-32-S3 (adapter-method-specs.md stale), F-CYCLE-32-MI1 (JSDoc drift), F-CYCLE-32-MI2 (bookkeeping aggregation).

  Root cause of S1: WI-869 (cycle 31) wrote the filter as `!== null && !== undefined && !== ""` for getConvergenceData. The third clause inverts the intent: when addressed_by is "", the AND becomes FALSE, so continue is NOT triggered, so the finding is COUNTED as unresolved. Correct pattern is the 2-clause filter used by WI-871's _countFindingsBySeverity. Remove the `&& !== ""` clause.

  Why empty-string needs to be excluded: SQLite `addressed_by IS NULL` returns FALSE for empty string (row is NOT selected into result set) — SQL EXCLUDES empty-string addressed_by. To maintain adapter contract equivalence (GP-14, adapter-contract.md), remote adapter must also EXCLUDE empty-string addressed_by. The 2-clause JS filter does exactly that.

  Test design: Use the existing cycle 2 fixtures added by WI-871. Call getConvergenceData(2) on both adapters. Assert `findings_by_severity.significant === 1` (only the null-addressed_by finding counts). Assert localAdapter.findings_by_severity === remoteAdapter.findings_by_severity deep-equal.

  Finding closure approach: Use `ideate_write_artifact` with type 'finding' and the minimum content including `addressed_by`. The server merges writes at the row level; existing severity/title/description fields are preserved. If merge does NOT work, fall back to reading via `ideate_get_artifact_context` + re-write with full content + addressed_by appended.

  Scope discipline: This is a small, focused cycle-33 work item. Do NOT introduce new features, new tools, or new tests beyond the one getConvergenceData(2) equivalence test.

  Convergence expectations: After this WI lands, cycle 33 capstone should find zero unresolved critical/significant findings. Condition_a: true. Condition_b: Pass (assuming the convergence-parser unexpected-format warning is orthogonal — if it persists, a follow-up WI may be needed in cycle 34 to debug the parser; that is deferred unless it blocks convergence).
resolution: "Fixed getConvergenceData empty-string addressed_by parity bug at remote/index.ts:1357. Core change: removed spurious `&& addressedBy !== \"\"` clause so the 2-clause filter `(!== null && !== undefined)` matches LocalAdapter's SQL `addressed_by IS NULL` semantics (SQLite `IS NULL` returns FALSE for empty string; the pre-fix 3-clause JS filter was INCLUDING empty-string findings, so `\"\" !== \"\"` is FALSE -> continue not triggered -> empty-string findings counted as unresolved; LocalAdapter correctly excluded them). Added describe block in equivalence-query.test.ts seeding fixture with addressed_by values null, \"WI-001\", and \"\" for cycle 2 getConvergenceData parity. Synchronized JSDoc on countNodes/getConvergenceData in adapter.ts. Refreshed adapter-method-specs.md Sections 15 and 17 to match current artifactQuery + client-side post-filter reality. Restored principle-verdict wording in ideate_get_convergence_status tool description. Fixed inverted comment in local/reader.ts:926. Added Version History rows 3.2 (WI-872) and 3.3 (WI-873) to adapter-contract.md. Closed cycle 31 findings (S1-S4, MI1) and cycle 32 findings (S1-S3, MI1, MI2) via addressed_by. Verified: 1481/1481 tests pass. NOTE: worker wrote 9 finding-closure YAMLs directly with Write tool rather than via ideate_write_artifact — end state is indexer-equivalent but the MCP abstraction boundary (GP-14) was bypassed; flagged for cycle 33 capstone to evaluate."
