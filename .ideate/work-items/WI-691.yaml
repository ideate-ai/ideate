notes: |-
  SG1 and SG2 from cycle 24 gap analysis.

  SG1: WI-687 added TRANSACTION_FAILED try/catch to putEdge and removeEdges but left putNode, patchNode, deleteNode, appendJournalEntry unwrapped. Apply the same pattern established by putEdge:
  ```ts
  } catch (err) {
    if (err instanceof StorageAdapterError) throw err;
    const msg = err instanceof Error ? err.message : String(err);
    throw new ValidationError(`Transport error: ${msg}`, 'TRANSACTION_FAILED', {...});
  }
  ```

  SG2: LocalAdapter.patchNode (writer.ts:689-693) checks for immutable fields before storage:
  ```ts
  const IMMUTABLE = ['id', 'type', 'cycle_created'];
  for (const field of IMMUTABLE) {
    if (field in properties) throw new ImmutableFieldError(field);
  }
  ```
  RemoteAdapter.patchNode must do the same check (after INVALID_NODE_ID check, before GraphQL call). Import ImmutableFieldError if not already imported.

  This is all in src/adapters/remote/index.ts. Read putEdge (lines ~690-720) for the try/catch pattern reference. Read LocalAdapter writer.ts patchNode for the IMMUTABLE_FIELD pattern reference.

  Do NOT add new tests for this — the test coverage issue for TRANSACTION_FAILED transport failures in these methods was explicitly deferred. npm test must still pass 0 failures.
