notes: |-
  ## Context

  Q-123 was resolved (adapter-equivalence.test.ts now exists) but the file covers only shape equivalence (nextId, getNode, queryNodes result shape). Zero ValidationError imports, zero validation path tests. The purpose of the equivalence suite is to guarantee callers can swap adapters without behavioral surprises — silent divergence in validation behavior is exactly what it should catch.

  ## Cases to Add

  ```typescript
  describe('Validation equivalence', () => {
    it.skipIf(!remoteAvailable)('queryNodes: negative limit throws INVALID_LIMIT from both adapters', async () => {
      for (const adapter of [local, remote]) {
        await expect(adapter.queryNodes({}, -1)).rejects.toMatchObject({
          name: 'ValidationError', code: 'INVALID_LIMIT'
        });
      }
    });
    
    it.skipIf(!remoteAvailable)('traverse: non-array seed_ids throws from both adapters', async () => {
      for (const adapter of [local, remote]) {
        await expect(adapter.traverse({ seed_ids: 'not-an-array' })).rejects.toMatchObject({
          name: 'ValidationError', code: 'INVALID_SEED_IDS'
        });
      }
    });
    
    it.skipIf(!remoteAvailable)('batchMutate: empty batch throws EMPTY_BATCH from both adapters', async () => {
      for (const adapter of [local, remote]) {
        await expect(adapter.batchMutate({ nodes: [], edges: [] })).rejects.toMatchObject({
          name: 'ValidationError', code: 'EMPTY_BATCH'
        });
      }
    });
  });
  ```

  Use createDualAdapters() from equivalence-helpers.ts.
resolution: "Added Validation equivalence describe block to adapter-equivalence.test.ts with 6 cases (3 pairs): LocalAdapter assertions run unconditionally, RemoteAdapter assertions under it.skipIf(!remoteAvailable). Covers INVALID_LIMIT (queryNodes), INVALID_SEED_IDS (traverse), EMPTY_BATCH (batchMutate). 3 new tests always run (local), 3 skipped without live server. 1015 passing."
