notes: |-
  # WI-536: Fix project skill read-merge-write

  Addresses: C1 (critical data loss), M4 (abort path), MI2 (description)

  ## C1 Fix: Read-merge-write pattern
  Every command that calls ideate_write_artifact to update a project or phase status must first read the existing artifact. Pattern:

  1. Call ideate_get_artifact_context({artifact_id: id}) or ideate_artifact_query to get current state
  2. Merge only the changed field (e.g., status: 'paused') into the full content object
  3. Call ideate_write_artifact with the complete merged object

  Affected commands in skills/project/SKILL.md:
  - switch (line ~78): reads target project, merges {status: 'active'}
  - pause (line ~84): reads active project, merges {status: 'paused'}
  - complete (line ~89): reads active project, merges {status: 'complete', completed_date: today}
  - archive (line ~94): reads project, merges {status: 'archived'}
  - phase complete (line ~170): reads phase, merges {status: 'complete', completed_date: today}
  - phase abandon (line ~179): reads phase, merges {status: 'abandoned', abandoned_reason: reason}

  For each, add an explicit step: 'Read the existing artifact via ideate_get_artifact_context({artifact_id: id}). Extract its full content. Merge the status change into the existing content. Write the merged result.'

  ## M4 Fix: Abort path
  Add after option d in Phase Transition Protocol: 'On d: Report "Phase transition aborted." and stop. No artifacts are modified.'

  ## MI2 Fix: Description
  Change frontmatter description from 'Manage projects and phases — create, view, switch, complete' to 'Manage projects and phases — create, view, switch, pause, complete, archive, and phase lifecycle'
