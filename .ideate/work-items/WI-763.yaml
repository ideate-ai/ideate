  1. `trigger` column in `proxy_human_decisions` (line 616). The INSERT in schema.test.ts:794 already quotes it as `"trigger"` in DML. Add a comment in the DDL.

  2. `constraints` table name (line 522). `CONSTRAINT` is a SQL reserved keyword. SQLite tolerates it unquoted but it's worth documenting.

  Pattern: `-- NOTE: 'trigger' is a SQLite reserved word; quote it in DML: "trigger"`
