notes: |-
  ## Context
  Spec-reviewer S1 from Cycle 1. WI-701 AC2 specified that equivalence-journal.test.ts must contain a TRANSACTION_FAILED test for appendJournalEntry. The implementation placed the test in write-transaction.test.ts and left a delegating comment in equivalence-journal.test.ts.

  The AC was clear about file placement. This is a small fix — add the test to equivalence-journal.test.ts.

  ## Implementation
  In equivalence-journal.test.ts, add a describe block:
  ```typescript
  describe('appendJournalEntry — TRANSACTION_FAILED', () => {
    it('throws TRANSACTION_FAILED when SQLite transaction fails (local)', async () => {
      // Mock db.transaction to throw
      // Call localAdapter.appendJournalEntry(...)
      // Assert rejects with code 'TRANSACTION_FAILED'
    });
  });
  ```
  Follow the mock pattern established in write-transaction.test.ts for appendJournal.

  ## Note on D-177
  TRANSACTION_FAILED is an internal SQLite error — it cannot be tested against RemoteAdapter without mocking the network layer. Keep this test LocalAdapter-only (unconditional it(...)) with a comment explaining why no remote variant exists.
