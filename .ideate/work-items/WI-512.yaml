notes: |-
  ## Research Notes

  This depends on WI-509 (token metrics research) because the fix strategy for the aggregation bug depends on whether we're also changing how metrics are emitted.

  Known issues from metrics audit:
  1. aggregateByAgent() at metrics.ts:288 uses `event_name` instead of extracting `agent_type` from payload JSON
  2. Skills instruct extraction of <usage> block but this reads PARENT metadata, not subagent
  3. All token fields (input, output, cache_read, cache_write) are null in stored metrics

  The fix for #1 is straightforward (parse payload JSON, extract agent_type). But #2 and #3 depend on what WI-509 discovers about available data sources — if we can get tokens from hooks/transcripts, the skill-side instructions change entirely.
