notes: |-
  ## Context

  Cycle 23 review found that WI-712 updated the contract to use storage-neutral message prefix 'operation failed:' but did not update the code. The code still throws 'SQLite transaction failed: ...' at writer.ts lines ~938 and ~945 (deleteNode).

  ## Fix 1: writer.ts deleteNode

  Find the two throw statements in deleteNode that use 'SQLite transaction failed:' and change them to 'operation failed:'.

  Look for:
  ```
  throw new ValidationError("TRANSACTION_FAILED", `SQLite transaction failed: ...
  ```

  Change to:
  ```
  throw new ValidationError("TRANSACTION_FAILED", `operation failed: ...
  ```

  There should be exactly two throw sites in deleteNode:
  1. Single-failure: `'operation failed: ${err.message}'` (when only the primary op fails and restore succeeds)
  2. Double-failure: `'operation failed: ${err.message}; cleanup also failed: ${restoreErr.message}'` (when both fail)

  ## Fix 2: adapter-contract.md deleteNode Error Handling block

  The Error Handling block currently has two entries for TRANSACTION_FAILED. Add a third entry for FILESYSTEM_ERROR.

  Look for the deleteNode Error Handling block (~line 137) and add:
  ```
  - When artifact removal fails: `FILESYSTEM_ERROR` with message `'deleteNode failed: artifact removal failed: <err>'`
  ```

  The FILESYSTEM_ERROR message format comes from writer.ts line ~917:
  ```
  throw new ValidationError("FILESYSTEM_ERROR", `deleteNode failed: artifact removal failed: ${err.message}`);
  ```

  Verify the exact format by reading that line.

  ## Fix 3: Tests

  Check `mcp/artifact-server/src/__tests__/adapters/writer.test.ts` for any assertions that match the string 'SQLite transaction failed'. If found, update them to match 'operation failed'.

  Also check `mcp/artifact-server/tests/adapters/equivalence-journal.test.ts` — but that file only asserts `{ code: 'TRANSACTION_FAILED' }` so no message string assertions there.

  ## Verification

  Run `npm test` — all 1132 tests must pass.
