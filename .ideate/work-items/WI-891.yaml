notes: |
  # WI-891 Implementation Notes

  ## Context

  Full-audit finding [gap C1]: index.ts shutdown() never invokes adapter.shutdown(). RemoteAdapter HTTP connections leak on SIGINT; LocalAdapter pending writes may not flush.

  Also covers gap M6: watcher lifecycle is currently routed through the module-level artifactWatcher singleton rather than via the adapter. Routing through adapter.shutdown() makes the lifecycle consistent across adapter types and avoids leaks in test scenarios that construct multiple adapters.

  ## Fix shape

  1. Add `shutdown(): Promise<void>` to the StorageAdapter interface in adapter.ts. Default expectation: no-op if idempotent.
  2. LocalAdapter.shutdown(): stop the artifactWatcher instance (move the .close() call from index.ts here), await any in-flight index writes, close Drizzle connection if this adapter owns it (current code: shared state.db is closed by index.ts — keep that ordering).
  3. RemoteAdapter.shutdown(): close HTTP agent, cancel any outstanding AbortController-backed requests.
  4. index.ts shutdown(): `await state.ctx?.adapter?.shutdown(); await state.db?.close();` with try/catch logging on each.
  5. Remove the direct artifactWatcher.close() from index.ts; rely on LocalAdapter.shutdown() to own the watcher lifecycle.

  ## Testing

  Watch/events.test.ts already exercises the watcher. Add tests that call adapter.shutdown() and assert side-effects. For RemoteAdapter, verify via a mock HTTP fixture that fetch is not called after shutdown.

  ## Constraints

  - Idempotent: calling shutdown() twice must not throw or double-close.
  - No behavioral change to normal request handling — only SIGINT/SIGTERM + explicit-shutdown callers are affected.
resolution: adapter.shutdown() wired through SIGINT/SIGTERM. StorageAdapter interface already declared shutdown() (noted). LocalAdapter.shutdown() stops artifactWatcher (moved from index.ts) with _isShutDown idempotency guard. RemoteAdapter.shutdown() sets _isShutDown flag; all 20+ HTTP-issuing methods call assertNotShutDown() which throws ADAPTER_SHUT_DOWN. index.ts shutdown() made async; awaits adapter.shutdown() in try/catch before state.db?.close(); direct artifactWatcher.close() call removed. 9 regression tests in events.test.ts cover SIGINT ordering, post-shutdown HTTP guard, and idempotency.
