notes: |-
  Resolves full audit findings: P-53 violation in Section 6.1, archiveCycle precondition wording (M2), archived vs non-existent cycle distinction (M4).

  Section 6.1 currently says 'Phase 1 (YAML write)' and 'Phase 2 (SQLite upsert)'. Replace with storage-agnostic equivalents: 'Phase 1 (primary write) — Serialize node properties and write to the primary store. The primary store is the source of truth. Phase 2 (index upsert) — Upsert node metadata, extension rows, and edges in a single exclusive index transaction.'

  For archiveCycle precondition: change 'If neither condition is met' to 'If either condition is not met'. Add note: 'A cycle that has already been fully archived is not considered to have no artifacts — its artifacts exist in archived state. The throw condition applies only to cycle numbers that have never had any artifacts.'
