notes: |-
  ## Context
  Q-130. The ValidationError constructor in src/adapter.ts lines 577–592 uses a heuristic to decide whether the second argument is an error code or a field name:

  ```typescript
  const isCode = codeOrField === "TRANSACTION_FAILED"
    || codeOrField.endsWith("_ERROR")
    || codeOrField.startsWith("INVALID_")
  ```

  If the heuristic fails (e.g., someone passes 'alpha' or 'cycle' as second arg), `.code` silently becomes `'VALIDATION_ERROR'`. All current ~85 call sites happen to pass correct codes, but the heuristic is still live and will silently degrade any future misuse.

  ## Change

  ### 1. Simplify the constructor in src/adapter.ts

  Change:
  ```typescript
  constructor(
    message: string,
    codeOrField: string,
    detailsOrValue: Record<string, unknown> | unknown
  ) {
    const isCode = codeOrField === "TRANSACTION_FAILED"
      || codeOrField.endsWith("_ERROR")
      || codeOrField.startsWith("INVALID_")
    super(
      message,
      isCode ? codeOrField : "VALIDATION_ERROR",
      isCode ? (detailsOrValue as Record<string, unknown>) : { field: codeOrField, value: detailsOrValue }
    );
    this.name = "ValidationError";
  }
  ```

  To:
  ```typescript
  constructor(
    message: string,
    code: string,
    details?: Record<string, unknown>
  ) {
    super(message, code, details);
    this.name = "ValidationError";
  }
  ```

  ### 2. Audit all call sites

  Run: `grep -rn 'new ValidationError' src/` — ~85 results across:
  - src/adapters/local/writer.ts (~35 call sites)
  - src/adapters/local/reader.ts (~8 call sites)
  - src/adapters/local/context.ts (~10 call sites)
  - src/adapters/remote/index.ts (~30 call sites)
  - src/ppr.ts (4 call sites)

  For each call site, verify:
  - Second argument is a recognizable error code (starts with INVALID_, ends with _ERROR, is TRANSACTION_FAILED, MISSING_*, PARSE_ERROR, etc.) — not a raw field name.
  - Third argument is either absent or a `Record<string, unknown>` (not a scalar).

  All current call sites appear correct based on prior cycle fixes. If any are found with raw field names or scalar third args, fix them.

  Do NOT touch test files — test file updates for this area are in WI-734.

  ## P-49 Assessment
  No YAML backfill needed. ValidationError is a runtime-only class; it is never serialized to artifact files.
resolution: ValidationError constructor simplified to (message, code, details?). Heuristic removed. 102 call sites audited across writer.ts, reader.ts, context.ts, remote/index.ts, ppr.ts — all pass explicit codes. 1163 tests pass.
