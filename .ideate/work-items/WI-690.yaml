notes: |-
  S1 from cycle 24 code review. The current test mocks `drizzleDb.insert` to throw synchronously. The actual insertEdge call chain is `db.insert(...).values(...).onConflictDoNothing().run()`. Real DB failures occur at `.run()`, not at `.insert()`. The test passes but doesn't test the actual failure mode.

  Fix by returning a stub chain from `.insert()` that throws at `.run()`:

  ```ts
  vi.spyOn(drizzleDb, 'insert').mockReturnValue({
    values: () => ({
      onConflictDoNothing: () => ({
        run: () => { throw new Error('simulated SQLite insert failure'); }
      })
    })
  } as any);
  ```

  The file is at tests/adapters/write-transaction.test.ts (not src/__tests__/write-transaction.test.ts which is a different file).

  Do NOT change the removeEdges test — that test correctly mocks `db.prepare` since removeEdges in writer.ts calls `this.db.prepare(...)` directly.
