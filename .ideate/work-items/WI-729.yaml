notes: |-
  ## What to change

  In `mcp/artifact-server/src/indexer.ts`, inside `rebuildIndex`, remove the block at lines 1011–1015 (approximately, may shift slightly):

  ```typescript
  // Phase 3: derive cross-artifact edges that require a full graph view.
  // Runs outside a transaction since it is read-heavy and self-contained.
  const derivedEdges = deriveJournalEntryCycleEdges(drizzleDb);
  stats.edges_created += derivedEdges;
  stats.edges_created += deriveJournalEntryEdges(drizzleDb);
  ```

  These are bare calls leftover from a merge resolution conflict in WI-727. The correct implementations are the transactional wrappers that follow them:
  - `journalEdgePhase` (labeled 'Phase 3') — calls `deriveJournalEntryEdges`
  - `journalCyclePhase` (labeled 'Phase 4') — calls `deriveJournalEntryCycleEdges`

  Do NOT remove the transactional wrappers. Only remove the bare calls.

  Also remove the blank line between the deleted block and the `if (stats.files_failed > 0)` check to keep spacing clean.

  ## Why

  P-69: When a replacement is introduced, the superseded code must be removed in the same change. These bare calls run in addition to the transactional wrappers, causing each derivation function to execute twice per rebuild. `stats.edges_created` is double-counted as a result. DB correctness is preserved by P-67 (delete-before-insert idempotency), but stat accuracy and rebuild performance are degraded.

  ## P-49 assessment

  No on-disk YAML backfill needed. The orphaned calls affected only `stats.edges_created` runtime stat reporting, not any stored edge data. All edges stored in the SQLite index are correct (idempotent derivation). Removing the bare calls restores accurate stat counting on the next rebuild — no historical artifact remediation required.

  ## Verification

  After the change, search for `const derivedEdges` in indexer.ts — it must not exist. Count occurrences of 'Phase 3' and 'Phase 4' in rebuildIndex — exactly one each.
