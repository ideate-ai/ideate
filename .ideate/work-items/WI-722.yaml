criteria:
  - In extractEdges() or the EDGE_TYPE_REGISTRY loop in indexer.ts, the triggered_by edge type has yaml_field='triggered_by'. Currently the loop only handles array items of type string; triggered_by items are {type, id} objects, so edges are silently skipped.
  - "Extend the extraction loop to handle object-array items: when an array item is an object with an id property, use item.id as the target ID (not the whole object). The triggered_by entry in EDGE_TYPE_REGISTRY should now produce triggered_by edges for proxy_human_decision nodes."
  - "After index rebuild, proxy_human_decision nodes with triggered_by arrays gain triggered_by edges — verify with: sqlite3 .ideate/index.db \"SELECT COUNT(*) FROM edges WHERE edge_type='triggered_by'\" (expect non-zero if any proxy_human_decision artifacts exist with triggered_by populated)"
  - The fix must not break any existing edges that use string-array yaml_fields (depends_on, blocks, etc.) — confirm those counts are unchanged after rebuild
  - "Existing test suite passes: npm test in mcp/artifact-server/"
domain: artifact-structure
phase: null
notes: |-
  Source: WI-717 spike findings (research-merge-design), S2 finding.

  The EDGE_TYPE_REGISTRY has an entry for triggered_by with yaml_field: 'triggered_by'. The extraction loop in indexer.ts processes array items as strings: `for (const targetId of arr) { if (typeof targetId === 'string') emit_edge(...) }`. Since triggered_by items are objects like `{type: 'work_item', id: 'WI-NNN'}`, the string check fails and edges are skipped.

  Fix: in the array iteration, also handle the case where `typeof item === 'object' && item !== null && typeof item.id === 'string'` — extract item.id as the target ID.

  This is a generic fix to the registry loop, not a triggered_by-specific special case. Any other future yaml_fields that use object arrays will also benefit.
