criteria:
  - equivalence-helpers.ts provides createDualAdapters() that initializes both LocalAdapter (from fixture) and RemoteAdapter (from Docker server)
  - LocalAdapter is constructed pointing at the fixture .ideate/ directory with a temp SQLite database
  - RemoteAdapter fixture data is loaded via the migration CLI (or equivalent import) into the Dockerized Neo4j before tests run
  - assertNodesEquivalent(local, remote) normalizes and compares Node objects, ignoring adapter-specific metadata differences
  - assertEdgesEquivalent(local, remote) normalizes edge arrays (sort by source_id, target_id, edge_type) before comparison
  - assertQueryResultEquivalent(local, remote) normalizes QueryResult arrays before comparison
  - equivalence-setup.test.ts validates that both adapters are initialized and the fixture data is loaded before other test files run
  - All helpers are importable by the per-concern equivalence test files
domain: agent-system
phase: PH-024
work_item_type: feature
notes: The harness is the foundation — all subsequent equivalence tests build on it. Content hash may differ between backends (LocalAdapter computes from YAML file content, RemoteAdapter from stored properties), so the comparison helper should have an option to skip content_hash. Token count should match if both compute from the same serialized content. Sort all arrays before comparison to handle different ordering.
