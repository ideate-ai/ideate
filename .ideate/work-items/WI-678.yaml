notes: |-
  ## Changes in ppr.ts
  Four validation blocks in computePPR options validation. Each currently:
  ```ts
  throw new ValidationError('alpha must be between 0 and 1', 'alpha', { value: options.alpha });
  ```
  Change each:
  - 'alpha' → 'INVALID_ALPHA'
  - 'maxIterations' → 'INVALID_MAX_ITERATIONS'
  - 'convergenceThreshold' → 'INVALID_CONVERGENCE_THRESHOLD'
  - 'maxNodes' → 'INVALID_MAX_NODES'

  All four start with INVALID_ so the ValidationError constructor heuristic correctly treats them as code strings.

  ## Changes in ppr.test.ts
  Search for tests calling computePPR with invalid options. If any assert .code === 'VALIDATION_ERROR' with details.field, update to assert the specific code. Tests only asserting toThrow(ValidationError) without checking .code need no change.
resolution: "ppr.ts ValidationError codes fixed: INVALID_ALPHA, INVALID_MAX_ITERATIONS, INVALID_CONVERGENCE_THRESHOLD, INVALID_MAX_NODES. Autopilot cycle 1."
