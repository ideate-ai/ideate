notes: |-
  ## Research Notes

  Prior research findings to build on:
  - Linear model: issue → project → cycle + triage. Planning/doing boundary is explicit.
  - Shape Up: fixed-time cycles, appetite-based scoping, cool-down periods for maintenance.
  - Key insight: one universal primitive (work item) typed by category, flowing through separate but coexisting tracks.
  - Current ideate hierarchy: workspace > project > phase > cycle > work item. The broad strokes exist; we need interaction patterns at each level.

  Design constraints:
  - Don't copy a specific PM model. Design something native to ideate's existing hierarchy.
  - Three stakeholder tiers to consider: (1) leadership — cross-project reporting, (2) mid-level — objective/phase tracking, (3) IC — cycle-level execution.
  - The SDLC loop (plan→execute→review→refine) remains the core for feature work. Other work types need lighter-weight paths.
  - /ideate:settings is for global workspace config, NOT for project/phase management. Need a new mechanism.
  - Phase/project naming: auto-suggest based on work item themes, with retroactive renaming capability.

  Questions to answer:
  - What new skills/commands are needed? (e.g., /ideate:project, /ideate:phase, /ideate:triage)
  - How does a user create a new project? Currently only via /ideate:init.
  - How does a user list projects, switch active project, view project status?
  - How does ad-hoc work (bug fix, config change) enter without a full refine interview?
  - What metadata should phases carry? (name, description, appetite, success criteria — some exist already)
  - How do we surface the right view for each stakeholder level?
