notes: |
  # WI-888 Implementation Notes

  ## Context

  PH-051 cycle 1 capstone (cycle 74) returned Fail with six significant findings. Core fixes (WI-885 SKILL.md edit; WI-887 reader.ts YAML-ground-truth verification) are correct; findings are test-coverage and documentation gaps. This WI closes them.

  ## Implementation steps

  ### 1. Strengthen q160 monotonic test

  In mcp/artifact-server/src/__tests__/q160-regression.test.ts:

  - Extend the `resolveCycleNumber` helper to accept an optional `previousCycleNumber` argument. If provided and the computed result is <= previousCycleNumber, increment by 1 until strictly greater. This mirrors step 4 in skills/autopilot/SKILL.md.
  - Replace the existing monotonic test's weak assertions (`toBeGreaterThan(c - 1)`) with strict `toBeGreaterThan(c)`. Use inputs where cyclesCompleted dominates so that strict monotonicity is actually exercised, e.g., resolveCycleNumber(3, 0)=4, (3, 4)=5, (3, 5)=6. Update the test title if it misleads.

  ### 2. Add q160 step-4 guard test

  New test: simulate two iterations where current_cycle has not advanced between them (review-phase interruption scenario). First call: resolveCycleNumber(27, 0) -> 28. Second call: resolveCycleNumber(27, 0, /* previousCycleNumber */ 28) -> must return 29 (or higher). Assert strict increase.

  ### 3. Add q164 ENOENT test

  New test in q164-regression.test.ts:
  - Seed a finding via the existing helper (writes SQLite row + YAML file at computed path).
  - Null out SQLite's addressed_by to force the fix's fallback path (same technique used in existing Test 2).
  - Delete the YAML file from disk (fs.unlinkSync).
  - Spy on logger.warn (import log from ../../logger.js; use vi.spyOn or test-level stub if the existing tests have a pattern).
  - Call reader.getConvergenceData(cycle) and assert the finding is counted as open (1).
  - Assert the spy saw a warn call containing the `[q164]` tag.

  If the existing test file does not already stub/spy the logger, add the spy setup inside the specific test to keep blast radius small.

  ### 4. Add q164 explicit-null test

  New test:
  - Seed a finding normally.
  - Overwrite the YAML file on disk so that `addressed_by: null` appears as a literal YAML null (not an omitted key). Write the YAML manually with fs.writeFileSync, not via the adapter.
  - Null out SQLite's addressed_by to force the fallback path.
  - Assert the finding is counted as open (1) — i.e., YAML `null` is treated the same as missing key.

  ### 5. Create RF-q164-stale-reads research artifact

  Call `ideate_write_artifact` with type='research', id='RF-q164-stale-reads'. Content should capture WI-886's diagnosis:
  - Title: 'Q-164 stale SQLite convergence reads — root-cause diagnosis'
  - The three identified mechanisms:
    - A: Two-write race (SQLite row written + extension-state row written non-atomically)
    - B: Watcher debounce / index lag (YAML change lands on disk; watcher pipeline not yet propagated to DB)
    - C: Historical write-path bugs (prior schema migrations could have left rows with inconsistent addressed_by)
  - The rejected hypothesis (v): narrow-column-omission (rejected during WI-886 spike because the column IS projected in the relevant SELECT).
  - Reference to the WI-887 fix (YAML-ground-truth per-row verification) and to domain question Q-164 (now resolved).
  - Reference back to WI-886 (the spike that produced this artifact).

  ### 6. Record Q-160 option-(c) known limitation

  Pick ONE of:
  - (preferred) File a new domain_question. Get next id via `ideate_get_next_id({type: 'domain_question'})`. Title: 'Q-160 option-(c) cycle-number resolver does not scan existing cycle-directory slots.' Question body: 'max(current_cycle, cycles_completed) + 1 can still collide with populated cycle directories that are higher than both counters. Observed during cycle 74 bootstrap (algorithm yielded 28; slots 28-73 populated; manually picked 74). Open for future resolution.' derived_from: cycle 74 capstone. status: open.
  - (alternative) Amend D-217 via ideate_write_artifact with an updated content block explicitly listing this gap in the rationale section.

  Choose the new-question path unless you have reason to amend the decision.

  ### 7. Validation

  From /Users/dan/code/ideate/mcp/artifact-server: run `npm test`. All tests must pass. No new warnings in passing tests (except the pre-existing insertFinding-related [q164] warns in tools.test.ts, which are a separate minor finding out of this WI's scope).

  ## Files / constraints

  - Node 22 + vitest only. Do NOT use bun.
  - GP-14: all artifact writes (research, domain_question) go through MCP tools. Never write .ideate/*.yaml directly.
  - Use ideate_get_next_id for any new artifact that needs a fresh ID.
  - The WI-887 reader.ts fix is correct and in scope to exercise, not to modify.
