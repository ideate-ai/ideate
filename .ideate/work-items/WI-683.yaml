notes: |-
  Three related adapter-level improvements, all touching writer.ts and/or remote/index.ts.

  **A) TRANSACTION_FAILED wrapping (MG1 from cycle 22)**
  puts and removeEdges in both adapters currently propagate raw DB/network errors. Pattern from putNode/patchNode/deleteNode:
  ```typescript
  try {
    // db operation
  } catch (dbErr) {
    throw new ValidationError(
      `SQLite transaction failed: ${(dbErr as Error).message}`,
      'TRANSACTION_FAILED',
      { operation: 'putEdge' }
    );
  }
  ```
  For RemoteAdapter: the pattern is StorageAdapterError (not ValidationError). Check how other RemoteAdapter methods handle errors. If they wrap in StorageAdapterError, use that. The contract doc should reflect whichever class each adapter throws.

  **B) batchMutate canonical constants (M3 from cycle 22)**
  writer.ts batchMutate ~line 1016: replace inline Set with `new Set<string>(EDGE_TYPES)` (EDGE_TYPES already imported from schema.ts).
  remote/index.ts batchMutate ~line 1178: replace inline Set with `new Set<string>(ALL_EDGE_TYPES)` (ALL_EDGE_TYPES already imported from adapter.ts).

  **C) removeEdges empty-array guard (M1 from spec adherence cycle 22)**
  LocalAdapter.removeEdges (writer.ts ~line 953) has `if (edge_types.length === 0) return;`.
  RemoteAdapter.removeEdges (remote/index.ts ~line 709) does NOT have this guard.
  Add to RemoteAdapter after the validation block:
  ```typescript
  if (edge_types.length === 0) return;
  ```

  **adapter-contract.md updates**:
  - putEdge Error Codes: add TRANSACTION_FAILED
  - removeEdges Error Codes: add TRANSACTION_FAILED
  - removeEdges Validation: add 'If edge_types is empty, the method returns immediately without making changes'
resolution: All scope absorbed by validation layer work (cycles 21-27). LocalAdapter putEdge/removeEdges TRANSACTION_FAILED wrapping done by WI-686+676. batchMutate already used EDGE_TYPES canonical constant. RemoteAdapter.removeEdges empty-array guard and ALL_EDGE_TYPES in batchMutate already present. Contract doc updates done by WI-689. Verified in code 2026-04-07.
