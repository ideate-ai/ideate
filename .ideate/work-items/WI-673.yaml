notes: |-
  ## P-53 Violations to Remove

  P-53 prohibits specification documents defining storage-agnostic interfaces from referencing concrete storage formats. Specific violations:

  - Line 11: reference to YAML or similar storage format in introduction
  - Line 18: 'Two-Phase Write' principle — this is a LocalAdapter implementation detail, not part of the interface contract. Either remove or move to an 'Implementation Notes' appendix clearly labelled as LocalAdapter-specific (not part of the interface contract).
  - Lines 628-637: Implementation Notes section referencing SQLite, YAML file layout, or two-phase write details. Move to a separate 'LocalAdapter Implementation Notes' appendix or remove entirely.

  ## Error Code Table

  After WI-667 fixes the call sites, update the error code table to list INVALID_SEED_IDS, EMPTY_SEED_IDS, INVALID_SEED_ID, INVALID_ALWAYS_INCLUDE_TYPE, INVALID_CYCLE, and all PPR parameter codes as first-class codes (not as 'field-name style producing VALIDATION_ERROR').

  ## Edge Weight Gap (Q4 optional enhancement)

  Add a note under the traverse() method documentation:

  'RemoteAdapter.traverse() does not currently expose edge type weight customization. Edge type weights are fixed server-side at the values configured in the ideate-server PPR implementation. To customize weights, a future RemoteAdapter enhancement would need to expose them as GraphQL variables. LocalAdapter allows weight customization via the ppr.ts EdgeTypeWeights parameter.'

  ## Depends on WI-667, WI-668, WI-669

  Document the final corrected state, not intermediate states.
