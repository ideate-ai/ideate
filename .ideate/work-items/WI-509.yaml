notes: |-
  ## Research Notes

  Investigate these data sources:
  1. `~/.claude/` directory structure — look for usage logs, session metadata, token tracking files
  2. `~/.claude.json` — check for aggregate usage data
  3. `ccusage` npm package (https://www.npmjs.com/package/ccusage) — study how it aggregates token usage, what files it reads, what format the data is in
  4. Subagent JSONL transcripts at `~/.claude/projects/{project}/{session}/subagents/agent-{id}.jsonl` — confirmed to contain per-message `usage` objects with input_tokens, output_tokens, cache_creation_input_tokens, cache_read_input_tokens
  5. SubagentStop hook — provides `agent_transcript_path` but no token data directly
  6. The parent Agent tool response does NOT include subagent token metadata — this was confirmed by prior research

  Key questions:
  - Can we read token data at the right granularity (per-agent-spawn, not just per-session)?
  - Is the JSONL format stable enough to depend on?
  - What is the minimal hook/script needed to bridge subagent tokens into ideate_emit_metric?
  - Are there simpler approaches via ~/.claude that ccusage uses?
