  Project write branch field mapping:
    intent: content.intent, scope_boundary: JSON.stringify(content.scope_boundary), success_criteria: JSON.stringify(content.success_criteria), appetite: content.appetite, steering: content.steering, horizon: JSON.stringify(content.horizon), status: content.status ?? 'active'

