  Use ideate_update_work_items MCP tool to update WI-754's criteria field. Do NOT edit schema.test.ts — the implementation is correct; only the documentation needs updating.

  The current WI-754 criteria describe a 3-table exclusion (nodes, edges, node_file_refs). The implementation actually uses a 4-category filter: `!['nodes','edges','node_file_refs'].includes(t) && !t.startsWith('sqlite_')`. The startsWith guard is broader than a specific sqlite_sequence exclusion — it covers all SQLite system tables.

  Updated criteria text should say something like:
  'The DB extension table list is computed by filtering all tables from tableNames(db), excluding core tables (nodes, edges, node_file_refs) and any table whose name starts with sqlite_ (covering SQLite system tables such as sqlite_sequence). The filtered DB list must match the extensionTables fixture array sorted.'
