notes: |-
  This is a research/analysis spike, not an implementation task. The goal is to produce specifications that future work items can implement against. Focus areas based on the 20 remaining test failures:

  1. getNode/queryGraph — cycle_created/cycle_modified null in BFS results despite being populated in Neo4j. Check the full GraphQL response chain.
  2. traverse — token_budget enforcement and always_include_types handling differ. Local PPR includes all nodes matching type regardless of budget; server may cap them.
  3. putNode/patchNode — content blob update semantics. On update, does content merge with existing or replace? Local writes to YAML then re-indexes; server stores content as JSON.stringify(input.properties).
  4. batchMutate — result array format. Local returns {id, status} per node; server may return differently.
  5. nextId — Local uses COUNT+1; server may use MAX+1 or a different strategy.
  6. archiveCycle — message format alignment.
  7. appendJournalEntry — ID generation (J-{cycle}-{seq}) alignment.
  8. getConvergenceData — cycle_summary_content: local reads YAML file content, server reads content property from Neo4j node.

  IMPORTANT: The spec should define the BEST behavior for each method, not just document what exists. If analysis reveals that one adapter's approach is superior (cleaner semantics, better graph traversal, fewer edge cases), the spec should recommend that approach — even if it requires changing the other adapter. Alignment means converging on the best design, not freezing the current one.

  Read the source files side-by-side:
  - Plugin: mcp/artifact-server/src/adapters/local/{reader,writer,context,index}.ts
  - Plugin: mcp/artifact-server/src/ppr.ts
  - Server: ideate-server/src/resolvers/{queries,mutations}/*.ts
  - Server: ideate-server/src/services/ppr.ts
  - Server: ideate-server/src/loaders/index.ts
  - Interface: mcp/artifact-server/src/adapter.ts
