notes: |-
  This is the dogfood validation. Steps:
  1. Run migration CLI from ideate-server repo: npm run migrate -- migrate --source /Users/dan/code/ideate/.ideate --neo4j-uri bolt://localhost:7687 --neo4j-user neo4j --neo4j-password localpassword --org-id ideate-org --codebase-id ideate-plugin
  2. Run migration status to verify counts match expectations from migration-tool-spec.md Section 15
  3. Update ideate config.json: set backend to 'remote', add remote block with endpoint, org_id, codebase_id
  4. Run /ideate:status to verify the MCP server reads from the remote backend
  5. Verify the response matches what local mode produces
  6. Revert config.json to backend: 'local'

  This is a spike — the goal is validation, not permanent cutover. The permanent switch happens when the server is deployed to a real environment.
resolution: Migration imports 1551 nodes into Neo4j. GraphQL API serves data correctly (WI-543 retrievable with correct title/status). Enum case mismatch is a server-side issue, not a plugin issue. Full ideate skill invocation deferred until enum fix is applied server-side.
