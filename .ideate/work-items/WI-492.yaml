notes: |-
  ## What to add

  In tools.test.ts, add a describe block for P-33 compliance. Use a regex like `/\/[\w/.-]*\.ideate\//` to detect path leakage. Call representative tool handlers and assert responses don't match.

  Note: handleAssembleContext returns raw YAML which may contain file_path fields in artifact content — that's acceptable. Test should flag paths in tool response framing, not embedded artifact content.

  ## Why
  Q-109: No automated detection for P-33 violations.
