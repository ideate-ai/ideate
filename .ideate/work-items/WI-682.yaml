notes: |-
  Addresses SG5 and SG6 from Cycle 21 gap analysis.

  SG5: adapter-equivalence.test.ts currently covers putEdge MISSING_EDGE_SOURCE (lines 740-757). Three other error codes are missing equivalence pairs:
    - MISSING_EDGE_TARGET: call putEdge({ source_id: 'GP-01', target_id: '', edge_type: 'relates_to', properties: {} })
    - MISSING_EDGE_TYPE: call putEdge({ source_id: 'GP-01', target_id: 'GP-02', edge_type: '', properties: {} })
    - INVALID_EDGE_TYPE: call putEdge({ source_id: 'GP-01', target_id: 'GP-02', edge_type: 'not_a_valid_type', properties: {} })

  SG6: adapter-equivalence.test.ts covers removeEdges INVALID_NODE_ID (lines 759-772). Missing:
    - INVALID_EDGE_TYPE: call removeEdges('GP-01', ['not_a_valid_type' as EdgeType])

  Pattern: follow the D-177 pattern — LocalAdapter test uses it(...) unconditionally, RemoteAdapter test uses it.skipIf(!remoteAvailable)(...) with an if (!remoteAdapter) return guard.

  The existing putEdge equivalence test at line 740 uses:
    { source_id: '', target_id: 'GP-01', edge_type: 'relates_to', properties: {} }
  Use the same structure for new tests, varying the field being tested.

  Update the file header comment to include the new test coverage.

  EdgeType is imported from adapter.ts. The cast `as EdgeType` is needed for the invalid type test to satisfy TypeScript.
