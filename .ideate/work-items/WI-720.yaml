criteria:
  - "In extractEdges() (or the journal entry indexing path), add a derivation rule: for journal_entry nodes, parse the cycle number from the file path pattern .ideate/cycles/{NNN}/journal/J-{NNN}-{seq}.yaml and emit a belongs_to_cycle edge from the journal entry to the cycle_summary node with id matching the cycle number"
  - Only emit the edge if a cycle_summary node with the matching cycle exists in the index
  - "After index rebuild, journal entries that have a corresponding cycle_summary node gain belongs_to_cycle edges — verify with: sqlite3 .ideate/index.db \"SELECT COUNT(*) FROM edges WHERE edge_type='belongs_to_cycle'\" (expect significant increase)"
  - "Existing test suite passes: npm test in mcp/artifact-server/"
domain: artifact-structure
phase: null
notes: |-
  Source: WI-715 spike findings, Rank 4 extraction rule.

  Journal entries follow the filename pattern J-{cycle}-{seq}.yaml under .ideate/cycles/{cycle}/journal/. The cycle number is already encoded in both the file path and the artifact ID. Derivation: parse cycle from file_path (regex /(\d+)\/journal\//) or from the ID prefix (J-{NNN}-{seq} → NNN).

  The target is the cycle_summary node. The cycle_summary ID format needs investigation — check what format is used (e.g., 'CS-019' or similar). Use the nodes table to find the canonical ID format.

  Only emit if the cycle_summary node exists — some cycles may lack a summary.
resolution: Added deriveJournalEntryCycleEdges() as Phase 4 in rebuildIndex(). Parses cycle from J-NNN-SSS ID, queries document_artifacts+nodes for cycle_summary by cycle number, emits belongs_to_cycle edges. Handles multiple summaries per cycle. Also called in indexFiles() when journal entries are updated. 4 new tests (3 rebuildIndex + 1 incremental). 1148 tests pass.
