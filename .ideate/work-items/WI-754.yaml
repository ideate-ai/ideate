criteria:
  - The vacuous expect(extensionTables.length).toBe(16) assertion is removed and replaced by a DB-backed set equality check
  - "The DB extension table list is computed by filtering tableNames(db) to exclude: (1) core tables — nodes, edges, node_file_refs — and (2) any table whose name starts with 'sqlite_' via t.startsWith('sqlite_'), which covers sqlite_sequence and any future SQLite system tables"
  - The filtered DB list sorted must equal extensionTables sorted (using toEqual with both sides sorted)
  - vitest run --reporter=verbose exits 0 with the new assertion in place
domain: artifact-structure
phase: PH-017
work_item_type: bug
notes: |-
  ## Implementation

  The `extensionTables` array at line 83 lists 16 tables. The current assertion at line 108 is:
  ```typescript
  expect(extensionTables.length).toBe(16);
  ```
  This is vacuously true about the local array — it passes even if the DB has more or fewer extension tables.

  The `tableNames()` helper at line 21 queries `SELECT name FROM sqlite_master WHERE type = 'table' ORDER BY name`. Use it:

  ```typescript
  // Replace line 108 with:
  const dbTables = tableNames(db);
  const dbExtensionTables = dbTables
    .filter((t) => !["nodes", "edges", "node_file_refs"].includes(t))
    .sort();
  expect(dbExtensionTables).toEqual([...extensionTables].sort());
  ```

  The sorted `toEqual` gives a descriptive failure message showing exactly which table is present in one side but not the other. The existing per-table `toContain` loop above line 108 remains unchanged.

  No other changes to the file.
resolution: Replaced vacuous `extensionTables.length` assertion with DB-backed `toEqual` comparison. Added `sqlite_sequence` exclusion to filter alongside core tables (nodes, edges, node_file_refs). All 79 schema.test.ts tests pass.
