notes: |-
  ## Locations in remote/index.ts

  ### deleteNode (~line 655)
  ```ts
  if (typeof id !== 'string' || id.trim() === '') {
    throw new ValidationError('Node id must be a non-empty string', 'INVALID_NODE_ID', { value: id });
  }
  ```

  ### putEdge (~line 678) — same guards as LocalAdapter, same codes
  MISSING_EDGE_SOURCE, MISSING_EDGE_TARGET, MISSING_EDGE_TYPE, INVALID_EDGE_TYPE.

  ### removeEdges — same guards as LocalAdapter
  INVALID_NODE_ID for empty source_id, INVALID_EDGE_TYPE for invalid edge_type.

  ## Test pattern (remote-adapter-validation.test.ts)
  All three validations are pre-flight checks that fire before any GraphQL call — no live server needed. Use module-level vi.mock (already present in this file):
  ```ts
  it('deleteNode: empty id throws INVALID_NODE_ID', async () => {
    await expect(adapter.deleteNode('')).rejects.toMatchObject({ code: 'INVALID_NODE_ID' });
  });
  ```

  ## ALL_EDGE_TYPES
  Follow the same approach as WI-675 for the ALL_EDGE_TYPES constant. Both adapters must use the same source. Check adapter.ts or schema.ts EDGE_TYPE_REGISTRY.
