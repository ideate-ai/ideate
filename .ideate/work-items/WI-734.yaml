notes: |-
  ## Context
  Q-120 (cycle 17 gap analysis, SG2 + MG3). Two testing gaps remain from the original 6-item list.

  ## Gap 1: nextId INVALID_NODE_TYPE (SG2)

  In src/adapters/local/writer.ts:519–524, nextId throws ValidationError with code 'INVALID_NODE_TYPE' for any type other than 'journal_entry', 'work_item', or 'finding'. No test verifies this error path.

  In src/__tests__/nextid-cycle-validation.test.ts, add a test in the existing describe block (or a new describe for unsupported types):

  ```typescript
  it("throws INVALID_NODE_TYPE for unsupported node type", async () => {
    await expect(adapter.nextId("guiding_principle" as NodeType)).rejects.toMatchObject({
      code: "INVALID_NODE_TYPE",
    });
  });
  ```

  ### Also: fix stale test assertion if present

  Search nextid-cycle-validation.test.ts for any assertion of `.code === 'VALIDATION_ERROR'` on a ValidationError thrown by nextId cycle validation (the wrong value from before Q-131 was fixed). If found, update to assert `code === 'INVALID_CYCLE'`.

  ## Gap 2: Deprecated/superseded policy exclusion (MG3)

  In src/adapters/local/reader.ts:854 and src/tools/analysis.ts:239, domain policies with status 'deprecated' or 'superseded' are filtered from getDomainState results. No test verifies this exclusion.

  In src/__tests__/tools.test.ts, find the existing tests for the handleGetDomainState tool (or its equivalent). Add a test that:
  1. Creates a domain_policy node with status='deprecated' and another with status='superseded' using the adapter or direct DB insertion
  2. Calls the relevant handler or adapter method
  3. Asserts neither policy appears in the returned policies list

  If tools.test.ts has no appropriate insertion point (e.g., no getDomainState tests), create src/__tests__/domain-state-exclusion.test.ts following the pattern of other test files in __tests__/ (import freshDb from test helpers, set up a minimal schema, insert nodes directly via SQL or adapter).

  ## P-49 Assessment
  No YAML backfill needed. Test-only changes.
resolution: "Added 3 tests: INVALID_NODE_TYPE path via LocalWriterAdapter.nextId (2 tests in nextid-cycle-validation.test.ts), deprecated/superseded policy exclusion from getDomainState (1 test in tools.test.ts). Stale VALIDATION_ERROR assertion confirmed already corrected to INVALID_CYCLE. 1166 tests pass."
