criteria:
  - deleteNode saves the YAML file content before calling fs.unlinkSync
  - When SQLite DELETE fails after YAML unlink, the catch block restores the YAML file from saved content
  - TRANSACTION_FAILED is thrown after restore attempt (matching existing behavior)
  - If restore itself fails (second filesystem error), FILESYSTEM_ERROR or TRANSACTION_FAILED is thrown with a message indicating both Phase 1 and Phase 2 failed
  - A test verifies that when the SQLite transaction throws, the YAML file still exists on disk after the error
  - Existing passing tests remain passing (1126+)
