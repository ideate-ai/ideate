notes: |-
  ## Context
  Gap-analyst SG1 from Cycle 1 comprehensive review. deleteNode currently: (1) reads file path from SQLite, (2) calls fs.unlinkSync to remove YAML, (3) runs SQLite DELETE in a transaction. If step 3 fails, step 2 has already happened — YAML is gone, SQLite row remains. This is a P-44 data-integrity violation: the two-phase write contract requires Phase 1 to be reversible if Phase 2 fails.

  ## Fix Pattern
  Analogous to putNode's rollback:
  ```typescript
  // Before fs.unlinkSync:
  const originalContent = fs.readFileSync(absoluteFilePath, 'utf-8'); // save content
  // Then unlink:
  fs.unlinkSync(absoluteFilePath);
  // In catch block:
  if (originalContent !== null) {
    try { fs.writeFileSync(absoluteFilePath, originalContent); } catch { /* log */ }
  }
  throw new ValidationError('TRANSACTION_FAILED', ...);
  ```
  The file path is already available from the SQLite lookup before the transaction begins.

  ## Test Pattern
  Use vi.spyOn or mock on db.transaction to throw, verify fs.existsSync(filePath) is true after the error. Follow the pattern established in writer.test.ts for putNode rollback tests.
