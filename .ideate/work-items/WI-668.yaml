criteria:
  - putNode throws ValidationError with code INVALID_NODE_ID if id is empty string or non-string
  - putNode throws ValidationError with code INVALID_NODE_TYPE if type is not a valid NodeType
  - putNode throws ValidationError with code MISSING_NODE_PROPERTIES if properties is null or undefined
  - patchNode throws ValidationError with code INVALID_NODE_ID if id is empty string or non-string
  - patchNode throws ValidationError with code INVALID_NODE_TYPE if type is not a valid NodeType
