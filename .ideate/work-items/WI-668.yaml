notes: |-
  ## Context

  WI-655 added batchMutate node validation. Direct putNode/patchNode calls bypass it. adapter-contract.md documents validation for these methods. Code and contract are contradictory.

  ## Fix

  In LocalWriterAdapter.putNode and .patchNode (writer.ts), add guards before persistence:

  ```typescript
  if (typeof input.id !== 'string' || input.id.trim() === '') {
    throw new ValidationError('Node id must be a non-empty string', 'INVALID_NODE_ID', { value: input.id });
  }
  if (!ALL_NODE_TYPES.includes(input.type as NodeType)) {
    throw new ValidationError(`Invalid NodeType: ${input.type}`, 'INVALID_NODE_TYPE', { value: input.type });
  }
  if (input.properties == null) {
    throw new ValidationError('Node properties must be provided', 'MISSING_NODE_PROPERTIES', {});
  }
  ```

  Apply the same pattern in RemoteAdapter.putNode and .patchNode (remote/index.ts). patchNode allows partial properties — only guard null/undefined, not incompleteness.

  Depends on WI-667 for correct code-string pattern.
resolution: "Added input validation to putNode and patchNode in both LocalWriterAdapter (writer.ts) and RemoteAdapter (remote/index.ts). Codes: INVALID_NODE_ID, INVALID_NODE_TYPE, MISSING_NODE_PROPERTIES. Added 6 contract tests to adapter-contract.test.ts covering ACs 1-4 (putNode/patchNode INVALID_NODE_ID and putNode INVALID_NODE_TYPE/MISSING_NODE_PROPERTIES). Removed dead patchNode INVALID_NODE_TYPE guard (UpdateNodeInput has no type field). 984 tests passing."
