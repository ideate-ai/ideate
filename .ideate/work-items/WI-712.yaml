notes: |-
  ## Context

  Cycle 22 capstone review found a P-53 violation (principle: no implementation details in public specs) in the deleteNode Error Handling block.

  The current text reads approximately:
  > When TRANSACTION_FAILED is thrown because both the SQLite DELETE and the YAML restore fail, the error message includes both failure contexts: 'SQLite transaction failed: <sqlite err>; cleanup also failed: <restore err>'

  This violates P-53 on two counts:
  1. 'SQLite DELETE' — concrete storage implementation term
  2. 'YAML restore' — concrete storage implementation term
  3. 'SQLite transaction failed' — exposes the underlying error message prefix from the storage layer

  Additionally, only the double-failure case is documented. The single-failure case (primary op fails but artifact restore succeeds) is not documented.

  ## Required Change

  Rewrite the Error Handling block to use storage-neutral language and cover both cases:

  - **Single-failure**: TRANSACTION_FAILED with message `'operation failed: <primary err>'` (restore succeeded, so only the primary error is surfaced)
  - **Double-failure**: TRANSACTION_FAILED with message `'operation failed: <primary err>; cleanup also failed: <restore err>'` (restore also failed)

  ## Location

  File: `mcp/artifact-server/docs/adapter-contract.md`
  Find the deleteNode Error Handling block (look for 'SQLite DELETE' or 'YAML restore' or 'cleanup also failed').

  ## Verification

  Grep the modified section to confirm no occurrences of: SQLite, YAML, unlinkSync, writeFileSync, transaction, foreign_keys.
