  ## What to change

  Complete rewrite of mcp/artifact-server/README.md. Read the current file first, then replace with accurate content.

  Structure:
  1. **Header**: Package name and one-line description (MCP artifact server for ideate SDLC workflow)
  2. **Quick start**: Show .mcp.json config pointing to start.sh
  3. **Tools**: Table of all 22 tools with brief descriptions (derive from TOOLS array in tools/index.ts)
  4. **Architecture**: Accurate source file layout — index.ts (transport), server.ts (lifecycle), tools/ (handlers), indexer.ts (YAML->SQLite), db-helpers.ts (typed upserts), ppr.ts (PageRank), watcher.ts (file watch), config.ts (config resolution), schema.ts (DDL), hooks.ts (events)
  5. **Development**: npm test, npm run build, vitest

  Do NOT include: LRU cache description, semantic search, onnxruntime references, read-only claims.

  ## Reference
  - mcp/artifact-server/src/tools/index.ts TOOLS array for the authoritative tool list
  - mcp/artifact-server/src/ for actual source file layout

  ## Why
  Code-reviewer M1-M5: The README is extensively stale — wrong tool names, nonexistent features described, incorrect architecture.
