notes: |-
  # WI-874 — Resolution

  **Status**: Closed as already-addressed (2026-04-16).

  ## Original context

  Discovered 2026-04-14 during autopilot run. cycles/002/SA-002.yaml (a March 29 archive from a prior session) collided with autopilot's internal cycle 2, causing the parser to read the old verdict.

  Fix options proposed:
    (a) convergence-checker disambiguates by content date/source/session-id
    (b) autopilot maps internal cycle numbers to next-available workspace cycle slots
    (c) convergence-checker only reads canonically-named artifacts (spec-adherence, code-quality, gap-analysis), ignoring legacy ID-named files

  ## Resolution

  **Spike 2026-04-16 (PH-050)**: Option (c) is already implemented in reader.ts:969-974 via WI-824 (canonical-filename selector for getConvergenceData). The selector picks only `/spec-adherence.yaml` and `/summary.yaml` by filename suffix; legacy SA-NNN / CQ-NNN / GA-NNN files are invisible to the selector regardless of document_artifacts content.

  The observed 2026-04-14 `condition_b:false` symptom was NOT caused by legacy-artifact collision. Spike identified the actual cause: MCP server process had stale reader.js loaded in require.cache from before WI-860's `addressed_by IS NULL` filter landed in dist/. sqlite3 CLI confirmed DB had correct values; MCP returned old counts. The separate parser-drift concern (cycle 32 principle_verdict:unknown) is a real distinct bug, now tracked in rewritten WI-876.

  ## Verification

  - reader.ts getConvergenceData (lines 969-974) contains canonical-filename selector, verified present in HEAD.
  - No additional code change required for this WI's stated scope.
  - Follow-up work (WI-876 rewrite, WI-877) filed separately for the real defects.
