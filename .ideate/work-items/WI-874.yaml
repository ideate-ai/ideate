notes: |-
  Discovered 2026-04-14 during autopilot run. cycles/002/SA-002.yaml (a March 29 archive from a prior session) collided with autopilot's internal cycle 2, causing the parser to read the old verdict.

  Root cause: autopilot's internal cycle numbering (1, 2, 3...) reuses workspace cycle directory slots that may already contain unrelated archived artifacts from earlier sessions.

  Fix options (from reporter):
    (a) convergence-checker should disambiguate by content date/source/session-id
    (b) autopilot should map internal cycle numbers to next-available workspace cycle slots
    (c) convergence-checker should only read named files (code-quality, spec-adherence, gap-analysis) and ignore legacy ID-named files (SA-NNN, CQ-NNN, GA-NNN)

  Option (c) is simplest and lowest-risk — current-session artifacts already use canonical names. Option (b) changes autopilot state semantics. Option (a) requires session-id plumbing that may not exist yet.

  Reproducer: run autopilot in a workspace where cycles/{NNN}/ contains a legacy SA-*/CQ-*/GA-* artifact with verdict:Fail; observe condition_b:false even with all passing current-cycle reviewers.

  Related: cycle 32 convergence parser also returned principle_verdict:unknown despite the artifact containing the exact expected text. Possibly the same root cause (reading a legacy artifact rather than the current one), possibly independent regex drift — investigate as part of this work item.
