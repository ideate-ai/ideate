notes: |
  # WI-894 Implementation Notes

  ## Context

  Cycle 77 capstone found 1 Significant + 1 Minor from WI-891's asymmetric coverage:
  - ppr.ts:173 type error introduced by WI-893 (CONTAINMENT_EDGE_TYPES is now ReadonlySet<EdgeType>, but edge_type from Drizzle is string)
  - Remote no-op methods (indexFiles, removeFiles, getToolUsage) were not given assertNotShutDown() guards in WI-891

  ## Fix shape

  1. In ppr.ts:173, change `CONTAINMENT_EDGE_TYPES.has(e.edge_type)` to `CONTAINMENT_EDGE_TYPES.has(e.edge_type as EdgeType)` matching reader.ts:383. Import EdgeType if not already imported.

  2. In pretest.js (or package.json scripts), run `tsc --noEmit` before vitest. Prefer editing the `"test"` script to `"tsc --noEmit && vitest run"` for minimal changes.

  3. In RemoteAdapter (adapters/remote/index.ts), locate indexFiles/removeFiles/getToolUsage stubs. Add `this.assertNotShutDown()` as first line. Match the guard pattern used in putNode, queryNodes, etc.

  4. Extend the events.test.ts post-shutdown block to cover the 3 no-op methods.

  ## Constraints
  - Node 22 + vitest only. No bun.
  - GP-14: no direct .ideate/ writes.
  - Pretest integration must not break existing CI.

  ## Self-check
  Walk each of the 6 criteria with satisfied/unsatisfied status.
resolution: ppr.ts:173 uses `as EdgeType` cast on CONTAINMENT_EDGE_TYPES.has() matching reader.ts:383. Package.json test script changed to `tsc --noEmit && vitest run` — test suite now fails if TS compile fails. RemoteAdapter.indexFiles/.removeFiles/.getToolUsage each call assertNotShutDown() as first line. 3 new post-shutdown tests in events.test.ts. Also fixed one pre-existing writer.test.ts type cast (as unknown as typeof db.transaction) that was blocking pretest — minor scope bleed acceptable since it was blocking validation.
