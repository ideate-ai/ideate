notes: |-
  ## Research Notes

  Current state:
  - Projects have: id, intent, status, appetite, current_phase_id, horizon, success_criteria
  - Phases have: id, name, phase_type, status, project, intent, work_items, success_criteria, started_date
  - Phases already have a `name` field but it's often generic (e.g., 'Capstone — Release 3.8.0')
  - Projects have no `name` field — only `intent`

  Proposed additions:
  - Projects: add `name` field (short, human-friendly label)
  - Phases: existing `name` field is adequate but needs to be prompted with auto-suggestion
  - Both: add optional `description` field for longer context

  Auto-suggest approach:
  - When refine creates a new phase, analyze the work item titles/domains to suggest a thematic name
  - Present suggestion with option to accept, modify, or skip
  - For retroactive naming: need a command or tool to update existing phases/projects
