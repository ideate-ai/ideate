notes: |-
  ## Context

  Three issues in `handleGetConvergenceStatus` cause condition_b to remain false:

  ### Issue 1 (CQ-006 S1): resolveContent empty-string guard
  `if (row.da_content)` treats empty string as absent. Change to `if (row.da_content !== null && row.da_content !== undefined)`. File: analysis.ts line ~132.

  ### Issue 2 (CQ-006 S2): resolveContent non-string parsed.content
  When `JSON.parse(row.da_content)` succeeds but `parsed.content` is not a string (null, undefined, number, object), the function falls through and returns the raw JSON string. `parsePrincipleVerdict` then receives the full JSON string, which does not match the verdict regex. Add guard:
  ```typescript
  if (parsed && typeof parsed.content === 'string') {
    return parsed.content;
  }
  // parsed.content is not a string — log warning and return null
  console.warn('resolveContent: da_content parsed successfully but .content is not a string', { id: row.id });
  return null;
  ```

  ### Issue 3 (NEW): adherenceRow selection priority
  `rawRows.find()` checks `r.id.toLowerCase().includes('adherence')` which matches old-format artifact ids like `spec-adherence-006` before SA-006. Old-format artifacts use `## Principle Violation Verdict: Pass` (no bold markers) so Step 1 regex fails and Step 2 fails (content lines have 2-space indent from YAML block scalar). Fix: prefer SA-* over includes('adherence'):
  ```typescript
  const adherenceRow = rawRows.find((r) =>
    r.id.toUpperCase().startsWith('SA-')
  ) ?? rawRows.find((r) =>
    r.id.toLowerCase().includes('adherence')
  );
  ```

  ### Build requirement (P-51)
  After modifying src/tools/analysis.ts, run `npm run build` in `mcp/artifact-server/` to recompile dist/. The dist/tools/analysis.js currently lacks the WI-427 JSON.parse unwrap because it was not recompiled after WI-427 modified src/. This build step also picks up that fix.

  ## Implementation Order
  1. Apply all three changes to `src/tools/analysis.ts`
  2. Run `npm run build` in `mcp/artifact-server/`
  3. Run `npm test` to confirm all tests pass
  4. Verify `dist/tools/analysis.js` has the three changes
