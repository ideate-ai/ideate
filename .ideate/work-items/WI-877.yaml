notes: |
  # WI-877 — MCP server reload hygiene

  ## Context

  Incident 2026-04-16: WI-860 filter `WHERE addressed_by IS NULL` was committed at 15:45 after dist rebuild at 13:30. But separately, PID 68171 (MCP server for this project) was spawned at 9:25 AM. That process's require.cache held the pre-WI-860 reader.js. The DB and new dist/ were correct; the running process wasn't.

  Result: `ideate_get_convergence_status` returned stale/wrong counts despite the fix being "shipped." Took the PH-050 spike an hour to diagnose because the DB looked correct and the build output looked correct — but the process didn't.

  ## Goal

  Prevent recurrence. Either auto-reload, or make the staleness explicit at startup/first-call so future incidents are diagnosed in minutes not hours.

  ## Related

  - WI-874 (closed) and WI-876 (rewritten) both originated from this same incident.
