notes: |-
  # WI-528: Fix hardcoded defaults in migrate-to-hierarchy.sh

  ## Bug
  Lines 83-84 hardcode ideate-specific values:
  ```shell
  PROJECT_TITLE="Ideate structured SDLC workflow"
  PROJECT_INTENT="A Claude Code plugin providing a structured SDLC workflow..."
  ```

  These are used as defaults when overview.yaml extraction fails. Any non-ideate project that runs this migration gets ideate's own description.

  ## Fix
  1. Replace hardcoded defaults with generic placeholders
  2. Improve the body extraction (lines 93-97): the current `grep -A1 '^body:' | tail -1` fails on multiline YAML block scalars. Use a more robust extraction that handles `body: |-`, `body: |`, and `body: >-` block indicators.

  ## Files
  - `scripts/migrate-to-hierarchy.sh` lines 83-84 (defaults), lines 86-97 (extraction logic)
