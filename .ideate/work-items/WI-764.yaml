criteria:
  - "A `describe('createSchema — {table} table')` block exists for each of: work_items, domain_decisions, guiding_principles, constraints, module_specs, research_findings, journal_entries, metrics_events"
  - Each describe block has an `it` test that calls `columnNames(db, '{table}')` and asserts every column defined in schema.ts DDL is present
  - Each describe block has an `it` test that uses `PRAGMA table_info('{table}')` to verify NOT NULL constraints match the DDL — required columns have notnull=1, nullable columns have notnull=0
  - "Column counts match DDL: work_items=13, domain_decisions=8, guiding_principles=4, constraints=3, module_specs=6, research_findings=5, journal_entries=6, metrics_events=17"
  - All new tests pass (`vitest run src/__tests__/schema.test.ts`)
domain: artifact-structure
phase: PH-017
work_item_type: chore
notes: |-
  Follow the established pattern from `proxy_human_decisions` (schema.test.ts:756-801) and `projects` (line 678-708):

  1. Column enumeration: call `columnNames(db, tableName)`, loop over expected columns with `expect(cols).toContain(col)`
  2. NOT NULL constraints: call `PRAGMA table_info(tableName)`, build `byName` map, assert required columns have `notnull === 1` and nullable columns have `notnull === 0`
  3. Index assertions where applicable (e.g., `idx_work_items_domain`, `idx_domain_policies_domain`, `idx_domain_questions_domain`)

  Column definitions from schema.ts DDL:

  - **work_items** (13 cols): id PK, title NOT NULL, complexity, scope, depends, blocks, criteria, module, domain, phase, notes, work_item_type DEFAULT 'feature', resolution
  - **domain_decisions** (8 cols): id PK, domain NOT NULL, cycle, supersedes, description, rationale, title, source
  - **guiding_principles** (4 cols): id PK, name NOT NULL, description, amendment_history
  - **constraints** (3 cols): id PK, category NOT NULL, description
  - **module_specs** (6 cols): id PK, name NOT NULL, scope, provides, requires, boundary_rules
  - **research_findings** (5 cols): id PK, topic NOT NULL, date, content, sources
  - **journal_entries** (6 cols): id PK, phase, date, title, work_item, content
  - **metrics_events** (17 cols): id PK, event_name NOT NULL, timestamp, payload, input_tokens, output_tokens, cache_read_tokens, cache_write_tokens, outcome, finding_count, finding_severities, first_pass_accepted, rework_count, work_item_total_tokens, cycle_total_tokens, cycle_total_cost_estimate, convergence_cycles, context_artifact_ids

  Place new describe blocks after the existing partial tests (after line ~481, before interview_questions at line 487). Keep consistent section separator comments.
resolution: "Added 8 describe blocks (16 tests) for work_items, domain_decisions, guiding_principles, constraints, module_specs, research_findings, journal_entries, and metrics_events. Each block has column enumeration and NOT NULL constraint assertions matching the DDL. Note: metrics_events has 18 columns (not 17 as stated in spec — spec had a counting error). All 96 tests pass."
