criteria:
  - start.sh checks for dist/.build-version file and compares its content to the version field in package.json
  - If dist/.build-version does not exist or its content differs from package.json version, start.sh runs npm run build --prefix "$DIR"
  - After a successful build, start.sh writes the package.json version string to dist/.build-version
  - If npm run build fails, start.sh prints an error to stderr and exits with code 1
  - start.sh still checks for node_modules/.package-lock.json and runs npm install if missing (existing behavior preserved)
  - The npm install check runs before the build check (dependencies must exist before compiling)
  - .gitignore removes the two lines "!mcp/artifact-server/dist/" and "!mcp/artifact-server/dist/**"
  - ".gitignore removes the comment line \"# MCP artifact server — dist is committed so it works as a plugin without a build step\""
  - ".gitignore retains the \"dist/\" line under \"# Python\" and retains the \"node_modules/\" line"
  - ".gitignore adds a comment \"# MCP artifact server — built on first startup via start.sh\" above the node_modules/ line"
