notes: |
  # WI-208: Build on first MCP startup + gitignore dist/
  
  ## start.sh changes
  
  The current start.sh only handles npm install. Add a build step after the install check.
  
  ### Version marker approach
  
  Use `dist/.build-version` as a marker file. The file contains just the version string from package.json (e.g., "0.1.0").
