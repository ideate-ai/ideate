notes: |-
  Config change adds 'projects' and 'phases' to IDEATE_SUBDIRS so createIdeateDir creates these subdirectories. Indexer already walks all subdirectories recursively — no change to directory walking needed.

  For belongs_to_phase edge on work items: the edge registry (from WI-431) is registry-driven and will automatically extract this edge when it encounters a phase field on a work_item document. Verify in tests that journal_entries (which also have a phase field) do NOT produce these edges due to the source_types restriction.

  Do NOT bump CONFIG_SCHEMA_VERSION here — that tracks config.json format, not SQLite schema. SQLite schema version was bumped in WI-431.
