criteria:
  - StorageAdapter TypeScript interface defined with CRUD, edge, traversal, and batch operations
  - Interface uses graph-native vocabulary (nodes, edges, traversals, mutations) — zero YAML/SQLite/file-path idioms
  - "Local adapter behavior specified: wraps existing YAML + SQLite, delegates PPR to in-process ppr.ts"
  - "Remote adapter behavior specified: GraphQL client to ideate-server, delegates PPR to server"
  - "Refactoring plan documented: identifies all storage operations in tools/write.ts, tools/context.ts, tools/query.ts, tools/analysis.ts to extract behind the adapter"
  - "Config.json extension specified: backend field ('local' | 'remote') with connection config shape"
domain: artifact-structure
phase: PH-018
work_item_type: spike
notes: |-
  Review current tool handler implementations:
  - tools/write.ts (1289 lines) — YAML serialization + SQLite upserts interleaved
  - tools/context.ts (1405 lines) — PPR computation + YAML content reads + SQLite queries
  - tools/query.ts (789 lines) — Drizzle queries + YAML file reads for full content
  - tools/analysis.ts (696 lines) — SQLite aggregation queries

  The adapter interface should be the boundary between MCP tool handlers (business logic, validation, response formatting) and storage operations (CRUD, graph traversal, content retrieval). db-helpers.ts, indexer.ts, and ppr.ts become local adapter internals.

  Key design tension: the current write path does YAML-then-SQLite (two-phase). The adapter must abstract this into a single write operation. The local adapter preserves the two-phase pattern internally; the remote adapter does a single GraphQL mutation.
