notes: |-
  Follow the exact pattern of existing extension tables. projects table stores JSON-serialized fields for scope_boundary, success_criteria, and horizon. phases table stores work_items as JSON array. The belongs_to_phase edge on work items uses yaml_field: 'phase' restricted to source_types: ['work_item'] — journal_entries also have a 'phase' field but it stores a skill name, not a phase ID; the registry restriction prevents false edges.

  Note: proxy_human_decision currently uses prefix PH- in TYPE_PREFIX_MAP (query.ts). The Phase type also needs PH-. This collision is resolved in WI-434 by changing proxy_human_decision prefix to PHD-. No existing proxy_human_decision artifacts exist.
