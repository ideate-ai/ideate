content: |
  # Q-164 stale SQLite convergence reads — root-cause diagnosis

  **Date**: 2026-04-17
  **Scope**: Root-cause analysis of ideate_get_convergence_status returning stale finding counts.
  **Produced by**: WI-886 spike; fix implemented in WI-887.
  **Domain question**: Q-164 (resolved).

  ---

  ## Summary

  `ideate_get_convergence_status` for cycle 29 returned 5 Significant findings open while
  a direct SQLite CLI query on the same `index.db` returned 0 matching rows.  The MCP server
  and direct DB reads disagreed on the same `WHERE` clause against the same file.  Investigation
  (WI-886 spike) identified three plausible mechanisms and one rejected hypothesis.

  The fix (WI-887): `reader.ts getConvergenceData` now performs per-row YAML-ground-truth
  verification for every finding SQLite flags as open (`addressed_by IS NULL`).  If the YAML
  file says `addressed_by` is populated the finding is treated as resolved regardless of
  SQLite extension-table state, and a structured `log.warn` tagged `[q164]` is emitted.
  YAML read/parse errors fall back to counting as open (safe default).

  ---

  ## Identified mechanisms

  ### Mechanism A — Two-write race

  The most likely cause of the PH-050 cycle 2 incident.

  When a finding is reworked (verdict flipped from needs-fix → passing), the write path
  executes two sequential operations:
  1. YAML phase: overwrite the finding file on disk with `addressed_by` populated.
  2. SQLite phase: `UPDATE findings SET addressed_by = ?` in the extension table.

  If `getConvergenceData` is called between step 1 and step 2 (or if step 2 committed but
  the better-sqlite3 connection held a cached read snapshot), the SQL `WHERE addressed_by IS NULL`
  still matches and the finding is counted as open even though YAML ground truth says resolved.

  In practice the race window is very small for single writes but can accumulate across N
  batch reworks in the same session.

  ### Mechanism B — Watcher debounce / index lag

  The file watcher (chokidar) fires on YAML change events with a debounce delay.  During the
  debounce window the YAML file is updated on disk but the SQLite `findings.addressed_by`
  column has not yet been re-indexed.  A convergence check during this window sees the stale
  SQLite state.

  This mechanism is inherent to any event-driven re-index pipeline and cannot be eliminated
  without a synchronous re-index on every write (too expensive) or per-call YAML verification
  (the approach taken by WI-887).

  ### Mechanism C — Historical write-path bugs

  Prior schema migrations and write-path refactors may have left `findings` rows whose
  `addressed_by` column was never backfilled when the YAML file was updated manually or via
  a migration script.  These "zombie" rows show up as open in SQL but are resolved in YAML.

  This mechanism explains stale counts that persist across server restarts (ruling out
  mechanism A's connection-snapshot hypothesis for the specific PH-050 incident).  The
  YAML-verification fix handles these correctly without requiring a manual re-index.

  ---

  ## Rejected hypothesis

  ### Hypothesis V — Narrow-column-omission

  Initial hypothesis: the SQL SELECT used in `getConvergenceData` omitted the `addressed_by`
  column from its projection, causing the value to appear as NULL even when populated in the DB.

  **Rejected during WI-886 spike**: the column IS projected in the relevant SELECT
  (`SELECT f.id, f.severity, f.addressed_by, n.file_path FROM findings f ...`).  The column
  omission hypothesis does not explain the observed discrepancy.

  ---

  ## Fix reference

  **WI-887**: `reader.ts getConvergenceData` — YAML-ground-truth per-row verification.

  For each finding row where `findings.addressed_by IS NULL`, the YAML file is read and
  parsed.  If `addressed_by` is populated in YAML (non-null, non-empty string) the finding
  is treated as resolved regardless of SQLite state.  The stale-row warning is emitted via
  `log.warn("q164", ...)` so staleness windows are observable in the log without being fatal.

  **Regression test coverage**: 9 tests in `q164-regression.test.ts` (Tests 1–3) cover:
  - Two-write sequence (mechanism A post-write residual)
  - YAML-DB skew / manual corruption (mechanism B analogue)
  - MCP and raw-SELECT agreement invariant
  - ENOENT fallback (Test 4): deleted YAML file falls back to SQLite (count as open) + warn
  - Explicit-null (Test 5): `addressed_by: null` in YAML is treated as open

  ---

