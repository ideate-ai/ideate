notes: |
  # WI-168: document_artifacts table and type registration

  ## Context

  The migration script (`scripts/migrate-to-v3.ts`) produces YAML files for 10 artifact types that have no corresponding entry in `TYPE_TO_TABLE` (indexer.ts) or `TYPE_TO_DRIZZLE_TABLE` (db.ts). When `rebuildIndex` encounters these files it logs them as `unknown type` parse errors and discards them — the data is invisible to all MCP tool queries.

  The 10 unregistered types and their source paths:

  | Type | Source |
  |---|---|
  | `decision_log` | archive/cycles/{N}/decision-log.md |
  | `cycle_summary` | archive/cycles/{N}/summary.md |
  | `review_manifest` | archive/cycles/{N}/review-manifest.md |
  | `architecture` | plan/architecture.md |
  | `overview` | plan/overview.md |
  | `execution_strategy` | plan/execution-strategy.md |
  | `guiding_principles` | steering/guiding-principles.md |
  | `constraints` | steering/constraints.md |
  | `research` | steering/research/*.md |
  | `interview` | steering/interview.md / steering/interviews/**/*.md |

  All 10 share the same shape: a content blob with an optional title and optional cycle number. A single `document_artifacts` table with a `type` column distinguishes them.

  ## Changes

  ### In schema.ts

  Add the `DocumentArtifact` TypeScript interface after the existing `MetricsEvent` interface:

  ```typescript
  export interface DocumentArtifact extends ArtifactCommon {
    type:
      | "decision_log"
      | "cycle_summary"
      | "review_manifest"
      | "architecture"
      | "overview"
      | "execution_strategy"
      | "guiding_principles"
      | "constraints"
      | "research"
      | "interview";
    title: string | null;
    cycle: number | null;
    content: string | null;
  }
  ```

  Add `DocumentArtifact` to the `Artifact` union type.

  Add the `document_artifacts` DDL table inside `createSchema`, after the `metrics_events` table and before the edges table:

  ```sql
  CREATE TABLE IF NOT EXISTS document_artifacts (
    id            TEXT PRIMARY KEY,
    type          TEXT NOT NULL,
    cycle_created INTEGER,
    cycle_modified INTEGER,
    content_hash  TEXT NOT NULL,
    token_count   INTEGER,
    file_path     TEXT NOT NULL,
    status        TEXT,
    title         TEXT,
    cycle         INTEGER,
    content       TEXT
  )
  ```

  Note: unlike typed tables, `document_artifacts` does not use `DEFAULT` for the `type` column — the type value varies per row and must always be explicitly provided.

  Increment `CURRENT_SCHEMA_VERSION` from `4` to `5`. The startup schema version check will delete and recreate the database on mismatch — correct behavior for the development phase.

  ### In db.ts

  Add the `documentArtifacts` Drizzle table definition after the `metricsEvents` table:

  ```typescript
  export const documentArtifacts = sqliteTable("document_artifacts", {
    id:             text("id").primaryKey(),
    type:           text("type").notNull(),
    cycle_created:  integer("cycle_created"),
    cycle_modified: integer("cycle_modified"),
    content_hash:   text("content_hash").notNull(),
    token_count:    integer("token_count"),
    file_path:      text("file_path").notNull(),
    status:         text("status"),
    title:          text("title"),
    cycle:          integer("cycle"),
    content:        text("content"),
  });
  ```

  Update the `AnyTable` union to include `| typeof documentArtifacts`.

  Add all 10 entries to `TYPE_TO_DRIZZLE_TABLE`, each mapping to `documentArtifacts`:

  ```typescript
  decision_log:       documentArtifacts,
  cycle_summary:      documentArtifacts,
  review_manifest:    documentArtifacts,
  architecture:       documentArtifacts,
  overview:           documentArtifacts,
  execution_strategy: documentArtifacts,
  guiding_principles: documentArtifacts,
  constraints:        documentArtifacts,
  research:           documentArtifacts,
  interview:          documentArtifacts,
  ```

  ### In indexer.ts

  Add all 10 entries to `TYPE_TO_TABLE`:

  ```typescript
  decision_log:       "document_artifacts",
  cycle_summary:      "document_artifacts",
  review_manifest:    "document_artifacts",
  architecture:       "document_artifacts",
  overview:           "document_artifacts",
  execution_strategy: "document_artifacts",
  guiding_principles: "document_artifacts",
  constraints:        "document_artifacts",
  research:           "document_artifacts",
  interview:          "document_artifacts",
  ```

  Add `"document_artifacts"` to the `ALL_TYPED_TABLES` array.

  Add a `case "document_artifacts":` branch in `buildRow`:

  ```typescript
  case "document_artifacts":
    return {
      ...common,
      title:   toStrOrNull(doc.title),
      cycle:   toNumOrNull(doc.cycle),
      content: toStrOrNull(doc.content),
    };
  ```

  ### In schema.test.ts

  Add a test that the `document_artifacts` table is created with the expected additional columns. Follow the pattern used for other table column tests — use `PRAGMA table_info`:

  - verify `title` column exists (notnull === 0)
  - verify `cycle` column exists (notnull === 0)
  - verify `content` column exists (notnull === 0)

  ### In indexer.test.ts

  Add a test (or test group) that verifies each of the 10 new types resolves to `"document_artifacts"` via `TYPE_TO_TABLE`. Since `TYPE_TO_TABLE` is a module-level constant (not exported), test indirectly: create a minimal YAML file with each new type value and verify `rebuildIndex` does not log a parse error for it and that the row appears in the `document_artifacts` table. Alternatively, if the test suite already has a pattern for asserting `TYPE_TO_TABLE` entries directly (via import of the module), follow that pattern.

  ## Files to examine

  - `mcp/artifact-server/src/schema.ts` — existing DDL patterns, CURRENT_SCHEMA_VERSION, Artifact union
  - `mcp/artifact-server/src/db.ts` — existing Drizzle table definitions, AnyTable union, TYPE_TO_DRIZZLE_TABLE
  - `mcp/artifact-server/src/indexer.ts` — TYPE_TO_TABLE, ALL_TYPED_TABLES, buildRow switch
  - `mcp/artifact-server/src/__tests__/schema.test.ts` — existing column tests (PRAGMA table_info pattern)
  - `mcp/artifact-server/src/__tests__/indexer.test.ts` — existing type registration and buildRow tests
