notes: |
  # WI-169: Fix module_spec migration to output structured fields

  ## Context

  The `module_spec` table in the SQLite schema has structured columns: `name TEXT NOT NULL`, `scope TEXT`, `provides TEXT`, `requires TEXT`, `boundary_rules TEXT`. The `buildRow` case for `"module_specs"` in `indexer.ts` reads exactly these fields.

  However, `migratePlanArtifacts` in `migrate-to-v3.ts` currently writes module spec YAML with `title` and `content` fields instead:

  ```typescript
  const obj: Record<string, unknown> = {
    id,
    type: "module_spec",
    title,             // ← wrong: module_specs table has no title column
    content: content.trim(),  // ← wrong: module_specs table has no content column
    content_hash: "",
    token_count: 0,
  };
  ```

  When `rebuildIndex` encounters these files, `buildRow` for `module_specs` reads `doc.name`, `doc.scope`, `doc.provides`, etc. — all of which are missing — and fills the row with empty/null values. The actual module spec content is never indexed in a queryable form.

  ## Fix

  Replace the `title`+`content` holistic write with structured field extraction.

  ### Markdown format of module spec files

  Module spec files follow this structure:

  ```markdown
  # Module: Foo Bar

  Some optional intro paragraph.

  ## Scope
  Handles authentication, token refresh, and session management.

  ## Provides
  - Token validation
  - Session lookup
  - Refresh endpoint

  ## Requires
  - Database connection
  - Config loader

  ## Boundary Rules
  - Must not call the UI layer directly
  - Must not store plaintext credentials
  ```

  The H1 heading may or may not have a "Module: " prefix. All sections are optional — a file may lack one or more sections.

  ### Extraction helpers

  Add two private helper functions near `deriveTitle` in the file:

  ```typescript
  /** Extract the body of a named ## section, trimmed. Returns null if absent. */
  function extractSection(content: string, heading: string): string | null {
    const re = new RegExp(`^## ${heading}\\s*$([\\s\\S]*?)(?=^## |\\Z)`, "m");
    const match = content.match(re);
    return match ? match[1].trim() : null;
  }

  /** Extract bullet list items from a named ## section. Returns [] if absent. */
  function extractListItems(content: string, heading: string): string[] {
    const section = extractSection(content, heading);
    if (!section) return [];
    return section
      .split("\n")
      .map((line) => line.replace(/^[-*]\s+/, "").trim())
      .filter((line) => line.length > 0);
  }
  ```

  > Note: the regex approach for `extractSection` must handle both Unix and potential Windows line endings. The `(?=^## |\Z)` lookahead stops at the next `##` heading or end of string. In JavaScript multiline mode, `^` matches at line starts and `$` at line ends. Test with real fixtures to confirm correctness; adjust the regex if needed.

  ### Replace the module spec loop body

  Replace the current object construction inside the module spec loop in `migratePlanArtifacts`:

  ```typescript
  // BEFORE
  const title = deriveTitle(content, slug);
  const obj: Record<string, unknown> = {
    id,
    type: "module_spec",
    title,
    content: content.trim(),
    content_hash: "",
    token_count: 0,
  };

  // AFTER
  const h1 = content.match(/^# (.+)$/m);
  const rawName = h1 ? h1[1].trim() : slug;
  const name = rawName.replace(/^Module:\s*/i, "").trim() || slug;

  const obj: Record<string, unknown> = {
    id,
    type: "module_spec",
    name,
    scope:          extractSection(content, "Scope") ?? "",
    provides:       extractListItems(content, "Provides"),
    requires:       extractListItems(content, "Requires"),
    boundary_rules: extractListItems(content, "Boundary Rules"),
    content_hash: "",
    token_count: 0,
  };
  ```

  The `serializeArtifact` call and `writeOutput` call below this block are unchanged.

  ### Sync migrate-to-v3.js

  Apply the equivalent changes to `scripts/migrate-to-v3.js` (without TypeScript type annotations). The `.js` file is what the test suite imports — it must always match the `.ts` implementation.

  - Add `extractSection` and `extractListItems` as plain `function` declarations near `deriveTitle`.
  - Replace the module spec loop body with the same structured extraction.

  ### Tests in migrate.test.ts

  Update or extend the existing `"migrates plan/modules/*.md"` test. The current test only checks `type: module_spec` and `id: module_spec-auth`. Add assertions for structured fields:

  ```typescript
  it("migrates plan/modules/*.md extracting structured fields", () => {
    fs.mkdirSync(path.join(tmpSrc, "plan", "modules"), { recursive: true });
    fs.writeFileSync(
      path.join(tmpSrc, "plan", "modules", "auth.md"),
      [
        "# Module: Auth",
        "",
        "## Scope",
        "Handles authentication and sessions.",
        "",
        "## Provides",
        "- Token validation",
        "- Session lookup",
        "",
        "## Requires",
        "- Database connection",
        "",
        "## Boundary Rules",
        "- Must not store plaintext credentials",
      ].join("\n")
    );

    // ... setup ctx ...

    migratePlanArtifacts(ctx, tmpSrc, ideateDir);

    const outPath = path.join(ideateDir, "plan", "modules", "auth.yaml");
    const content = fs.readFileSync(outPath, "utf8");

    expect(content).toContain("type: module_spec");
    expect(content).toContain("id: module_spec-auth");
    expect(content).toContain("name: Auth");
    expect(content).toContain("scope: Handles authentication and sessions.");
    expect(content).toContain("Token validation");
    expect(content).toContain("Database connection");
    expect(content).toContain("Must not store plaintext credentials");
    // Verify no title or content fields in output
    expect(content).not.toContain("title:");
    expect(content).not.toContain("\ncontent:");
  });
  ```

  Also add a test for a module spec file with missing sections (verifies defaults):

  ```typescript
  it("module spec with missing sections produces empty defaults", () => {
    // file has only an H1, no ## sections
    fs.writeFileSync(
      path.join(tmpSrc, "plan", "modules", "minimal.md"),
      "# Minimal Module\n\nJust a description.\n"
    );

    migratePlanArtifacts(ctx, tmpSrc, ideateDir);

    const content = fs.readFileSync(
      path.join(ideateDir, "plan", "modules", "minimal.yaml"), "utf8"
    );
    expect(content).toContain("name: Minimal Module");
    expect(content).toContain("scope: ''");  // or scope: "" depending on serializer
    // provides, requires, boundary_rules should be empty arrays
    expect(content).toContain("provides: []");
    expect(content).toContain("requires: []");
    expect(content).toContain("boundary_rules: []");
  });
  ```

  > Adjust the exact YAML serialization assertions to match what `serializeArtifact` (js-yaml dump) actually produces for empty strings and empty arrays. Run a quick test to see the output format.

  ## Files to examine

  - `scripts/migrate-to-v3.ts` — `migratePlanArtifacts` function, `deriveTitle` helper (~line 1228), module spec loop (~line 1266)
  - `scripts/migrate-to-v3.js` — same sections (no type annotations)
  - `mcp/artifact-server/src/__tests__/migrate.test.ts` — existing `migratePlanArtifacts` describe block and module spec test (~line 867)
  - `mcp/artifact-server/src/schema.ts` — `ModuleSpec` interface to confirm expected field names
  - `mcp/artifact-server/src/indexer.ts` — `buildRow` case for `"module_specs"` to confirm field names
