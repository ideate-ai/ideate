title: `review-manifest.md` write location differs between autopilot and standalone review
description: |
  - **File**: `/Users/dan/code/ideate/skills/autopilot/phases/review.md:66`
  - **Issue**: The autopilot review phase writes `review-manifest.md` to `{artifact_dir}/archive/incremental/review-manifest.md`. The standalone review skill (Phase 3.5) writes it to `{output-dir}/review-manifest.md`, which is `archive/cycles/{N}/review-manifest.md`. The `work_items_reviewed` derivation at line 228 reads from `archive/incremental/review-manifest.md`, which is correct for the autopilot context. However, this inconsistency means the manifest ends up in different locations depending on which skill ran, and Phase 7.5 archival in the standalone skill moves it again. The inconsistency is unlikely to cause a runtime failure in normal operation, but it creates confusion when reviewing autopilot-produced cycle directories — they will not contain `review-manifest.md` at the cycle level unless it is explicitly moved.
  - **Suggested fix**: After the three reviewers complete in autopilot's review phase, copy or move `archive/incremental/review-manifest.md` to `archive/cycles/{formatted_cycle_number}/review-manifest.md` so the cycle directory is self-contained. Alternatively, document the location difference explicitly in the "Artifacts Written" section at the bottom of the file.
