content: |-
  ## Verdict: Fail

  Audit correctly identified gaps, but acceptance criteria not satisfied — 2 files missing the MCP abstraction prohibition.

  ## Critical Findings

  None.

  ## Significant Findings

  ### S1: Missing MCP abstraction prohibition in agents/decomposer.md
  - **File**: `agents/decomposer.md`
  - **Issue**: Agent file lacks the "What You Do Not Do" section that enforces MCP abstraction boundary
  - **Impact**: Decomposer agent could theoretically access .ideate/ files directly, violating GP-14 and P-37
  - **Suggested fix**: Add the prohibition section at end of file

  ### S2: Missing MCP abstraction prohibition in skills/settings/SKILL.md
  - **File**: `skills/settings/SKILL.md`
  - **Issue**: Settings skill lacks the "What You Do Not Do" section
  - **Impact**: Settings skill could theoretically access .ideate/ files directly
  - **Suggested fix**: Add the prohibition section at end of file

  ## Minor Findings

  ### M1: Phase files intentionally omit prohibition section
  - **Files**: `skills/autopilot/phases/*.md`
  - **Issue**: Phase files don't have prohibition section
  - **Note**: Intentional — loaded by autopilot which already has prohibition

  ## Unmet Acceptance Criteria

  - [x] Prohibition enforced in all skills and agents: NOT MET (decomposer.md, settings/SKILL.md missing)
  - [x] Each file has 'What You Do Not Do' section: NOT MET (same 2 files)
  - [ ] Language is consistent across all files: SATISFIED
  - [ ] No .ideate/ path references: SATISFIED
