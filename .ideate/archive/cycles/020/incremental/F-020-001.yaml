title: BFS duplicate node detection in LocalAdapter queryGraph
description: |
  - **File**: `mcp/artifact-server/src/adapters/local/reader.ts:648-656`
  - **Issue**: The queryGraph implementation uses a recursive CTE for depth > 1 traversal, but did not track visited nodes. A node reachable via multiple paths at the same depth would appear multiple times in results.
  - **Impact**: Duplicate nodes in query results, incorrect total_count in paginated results.
  - **Fix**: Added visited-node tracking to the CTE using a `visited` column that accumulates seen node IDs and filters duplicates with `instr(t.visited, ',' || node_id || ',') = 0`.
  - **Status**: Fixed by WI-630
