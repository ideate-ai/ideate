title: Stale `.d.ts` and `.js.map` files in `scripts/` not addressed
description: |
  - **File**: `/Users/dan/code/ideate/scripts/migrate-to-v3.d.ts`
  - **Issue**: `scripts/migrate-to-v3.d.ts` and `scripts/migrate-to-v3.d.ts.map` exist in the repository (untracked per git status, timestamp `Mar 24 11:02`) from a prior tsc invocation that did not use `--declaration false`. Running `npm run build:migration` correctly suppresses `.d.ts` generation on new runs, but the existing stale `.d.ts` files remain and will accumulate in the working tree. Similarly, `scripts/migrate-to-v3.js.map` exists from the prior run and is not regenerated by the current script (no `--sourceMap` flag), leaving it permanently out of sync with the compiled `.js`.
  - **Suggested fix**: Either add `scripts/migrate-to-v3.d.ts`, `scripts/migrate-to-v3.d.ts.map`, and `scripts/migrate-to-v3.js.map` to `.gitignore`, or delete the existing stale files and document that they are not maintained. The `.js.map` inconsistency is an existing condition not introduced by this work item, but it is worth noting.
