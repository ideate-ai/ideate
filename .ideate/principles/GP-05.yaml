id: GP-05
type: guiding_principle
title: Continuous Review
body: |-
  Review is not a phase that happens after execution — it overlaps with execution. Items are reviewed as they finish while other items continue building. The comprehensive end-of-cycle review is a capstone synthesis, not the first time anyone looks at the work. Catch issues as they occur.

  Review depth should be proportional to the risk and impact of the work. Not all work items warrant the same review treatment. The appropriate level of review is determined by the intersection of the work's priority (how urgent) and severity (how much damage if wrong) — higher-risk work gets deeper, multi-reviewer scrutiny; lower-risk work gets lighter, faster review. The default is full review; reduction requires both low severity and low priority, must be logged with reasoning, and confirmed before proceeding. The capstone review remains a synthesis across all completed work regardless of per-item review depth.
status: active
