id: GP-02
type: guiding_principle
title: Minimal Inference at Execution
body: "The executor should minimize inference. All decisions that can be resolved during planning must be resolved during planning. When the spec falls short during execution — a gap, ambiguity, or unforeseen condition — the executor must not silently fill in the blanks. The default response to insufficient specification is to stop and surface the gap (Andon cord). Inference is permitted only in two cases: (1) after an Andon event, when the resolution explicitly authorizes the executor to proceed with judgment, or (2) when the work item's spec explicitly directs the executor to use inference for a stated scope (e.g., 'choose the appropriate fix' for a diagnosed bug). The goal is to push decisions as far upstream as possible while acknowledging that not all decisions can be made before execution begins."
status: active
cycle_modified: 6
amendment_history:
  - cycle: 6
    change: Replaced prescriptive zero-inference rule with a framework. Inference is minimized but permitted after Andon events or when explicitly directed by the spec. Accommodates work types (bugs, spikes) where some execution-time judgment is inherent.
