id: GP-02
type: guiding_principle
name: Minimal Inference at Execution
status: active
description: The executor should not make subjective decisions. Every architectural choice, technology selection, interface contract, error handling strategy, user experience pattern, visual identity decision, and behavioral detail should be resolved during planning. The executor follows instructions; it does not design.
