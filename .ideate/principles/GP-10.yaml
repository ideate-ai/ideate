id: GP-10
type: guiding_principle
title: Full Lifecycle Ownership
body: Ideate manages work from identification through delivery and validation. It identifies what needs to be done, determines how to execute it, validates the result, and iterates — sustainably, across cycles. This applies to features, bugs, research, maintenance, and any other work type the project requires. The specific shape of each stage varies by work type — a feature goes from idea to user-testable output; a bug goes from report to verified fix; a spike goes from question to structured findings — but the lifecycle of identify, plan, execute, validate, iterate is consistent. The user performs human-in-the-loop validation and re-engages with ideate for refinement if the output misses the mark.
status: active
