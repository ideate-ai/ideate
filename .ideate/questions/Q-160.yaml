reexamination_trigger_satisfied: true
resolution: "Resolved by dual-path fix. (1) WI-824 landed Q-160 option (c) for the cycle_summary_content path via the canonical-filename-only selector at reader.ts:969-974 — only code-quality.yaml, spec-adherence.yaml, gap-analysis.yaml, and summary.yaml are read; legacy ID-named files in the same slot are ignored. (2) WI-885 landed Q-160 option (c) for the findings-table path via a skill-level change to skills/autopilot/SKILL.md: at the start of each loop iteration, autopilot resolves cycle_number = max(domain.current_cycle, cycles_completed) + 1. This forces autopilot to always pick a slot above any existing workspace era, eliminating the collision class. Domain decision D-217 records the option-(c) rationale. Regression tests in mcp/artifact-server/src/__tests__/q160-regression.test.ts verify the resolution algorithm and collision-free behavior. No reader.ts or analysis.ts code changes needed — the upstream skill fix prevents the collision entirely."
