id: Q-160
type: domain_question
title: "MCP cycle-slot collision: write semantics when autopilot cycle numbering reuses slots with existing content"
domain: artifact-structure
question: "Autopilot's internal cycle numbering (1, 2, 3...) reuses workspace cycle directory slots that may already contain unrelated archived artifacts. ideate_get_convergence_status parses any file containing 'verdict: Fail', even if the file is a legacy artifact from a different real cycle. What is the correct semantic: (a) convergence-checker disambiguates by content date/source/session-id; (b) autopilot maps internal cycles to next-available slots; (c) convergence-checker only reads named files (code-quality/spec-adherence/gap-analysis) and ignores legacy ID-named files?"
derived_from:
  - cycle: 28
    finding: Triaged 2026-04-16 as bug (out of PH-050 scope per D-214). Originally observed during autopilot run 2026-04-14.
established_cycle: 28
impact: "This is the actual root cause of the 2026-04-14 autopilot incident. Resolved by dual-path fix: WI-824 handled the cycle_summary_content path (canonical-filename-only selector in reader.ts:969-974); WI-885 handled the findings-table path via option (c)."
status: resolved
reexamination_trigger: If autopilot cycle numbering diverges from max(current_cycle, cycles_completed)+1 in a future refactor.
cycle_modified: 27
content_hash: 1c3a944f34ad9da3a97717917c34cafe8d6af62ed407295452859f9b196836d4
