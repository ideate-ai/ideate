title: getDomainState null-status boundary untested for domain_decisions and domain_questions
body: WI-743 added a null-status inclusion test for domain_policy. The decisions query (reader.ts:859-866) has no status filter — null-status decisions are included but untested. The questions query (reader.ts:868-875) uses WHERE n.status = 'open' — null-status questions are excluded, and that exclusion is also untested. Per-type behavior differs from domain_policy and from each other.
