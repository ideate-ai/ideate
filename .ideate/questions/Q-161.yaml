id: Q-161
type: domain_question
title: Should principle_verdict_source be a contract field (asserted/consumed) or a debug aid?
domain: agent-system
question: ideate_get_convergence_status emits principle_verdict_source (step1/step2/step3) as an informational field. No test asserts on it (EC3/EC4) and no downstream agent or skill reads it (II2). Should it be promoted to a contract field (add test assertions + autopilot consumer) or documented as a temporary debug aid and removed later?
derived_from:
  - cycle: 28
    finding: Gap-EC3, Gap-EC4, Gap-II2, Gap-IR2
established_cycle: 28
impact: Emitted field without test assertions or consumers adds schema surface without delivering its stated diagnostic value. If the field silently becomes wrong via refactor, no test catches it. Decision affects the autopilot convergence journal format (IR2).
status: resolved
reexamination_trigger: When Q-159 (autopilot unknown-verdict handler) is answered — same design review scope.
cycle_modified: 27
content_hash: 49be31052bf0a89a2da405466a14037ab3a476e1681cda458312408aab93fd0e
token_count: 351
resolution: principle_verdict_source is a test-asserted contract field as of WI-876/881/883. WI-876 and WI-881 tests now assert step1/step2/step3 values for principle_verdict_source. The autopilot-consumer read-path question is deferred — a new question will be filed if future cycles need it.
