id: Q-149
type: domain_question
title: ALL_NODE_TYPES.length hardcoded count assertion vs P-75
domain: artifact-structure
question: The ALL_NODE_TYPES.length test uses a hardcoded number assertion rather than deriving the expected count from the database or type system. Does this violate P-75 (schema test assertions must query live DB, not assert fixture array lengths), or is ALL_NODE_TYPES a compile-time constant exempt from P-75's scope?
source: gap-analyst, cycle 022 (CF4)
impact: If a new NodeType is added to the type system but the hardcoded count is not updated, the test fails with an opaque off-by-one error rather than a descriptive message about which type is missing. This is the exact anti-pattern P-75 targets.
status: deferred
deferred_rationale: The current assertion works (all tests pass) and changing it requires deciding whether ALL_NODE_TYPES should be validated against DB metadata or the TypeScript type union. Low urgency since the failure mode is a clear test failure, not a silent regression.
reexamination_trigger: Next time a NodeType is added or P-75 is reviewed
