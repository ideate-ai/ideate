impact: This is the residual systemic gap from 2026-04-14. WI-876 hardened the emitter but the consumer-side handler is unchanged. Any future parser fall-through silently triggers refinement instead of surfacing the diagnostic. Blocks full remediation of the original incident.
status: resolved
reexamination_trigger: Before PH-050 is formally closed as converged, OR before autopilot is next used for an unattended multi-cycle run.
