id: Q-159
type: domain_question
title: Should autopilot distinguish principle_verdict:unknown from principle_verdict:fail?
domain: agent-system
question: "When ideate_get_convergence_status emits principle_verdict:unknown with a principle_verdict_warning (step-3 parser fallback), what should autopilot Phase 6c do? Current behavior: reads only 'converged' boolean; treats unknown identically to fail and proceeds to refinement. Options: (a) surface warning as Andon condition and halt; (b) retry cycle; (c) treat unknown as pass with warning; (d) status quo."
