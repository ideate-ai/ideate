resolution: "Resolved 2026-04-17 by WI-882. Autopilot Phase 6c now implements option (a) — a three-way branch on principle_verdict where unknown routes to a named Andon event carrying principle_verdict_warning, patterns_tried, and content_snippet as discrete fields. Proxy-human then chooses (a) treat-as-pass, (b) treat-as-fail, or (c) halt. See skills/autopilot/phases/review.md Phase 6c section 'Branch C — principle_verdict: unknown' (~lines 296-344)."
