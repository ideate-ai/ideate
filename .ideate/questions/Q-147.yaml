id: Q-147
type: domain_question
title: Extension table column-structure test coverage gaps
domain: artifact-structure
question: 8 extension tables completely lack column-structure tests (work_items, domain_decisions, guiding_principles, constraints, module_specs, research_findings, journal_entries, metrics_events) and 4 have only partial coverage (findings, domain_policies, domain_questions, document_artifacts). Should a dedicated work item or phase address this systemic test debt?
source: gap-analyst, cycle 022 (CF1, CF2)
impact: Schema migrations could silently break column structure without test failures. The gap affects 12 of 16 extension tables, meaning most schema changes lack regression protection for column names, types, and constraints.
status: deferred
deferred_rationale: Outside PH-017 (Documentation & Cleanup) scope. These tables existed before this phase and the gaps predate the current cycle. Should be scoped into a future testing phase.
reexamination_trigger: Next phase that touches schema.ts or adds extension tables
