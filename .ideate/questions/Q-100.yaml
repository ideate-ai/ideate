id: Q-100
type: domain_question
domain: artifact-structure
title: handleAppendJournal has no transaction boundary
question: YAML write and SQLite upserts are independent operations with no atomic boundary or cleanup. Should handleAppendJournal adopt the two-phase pattern from P-44?
source: cycle 1 gap-analysis Gap 3; decision-log Q2
impact: Crash between file write and SQLite upsert leaves unindexed journal entry invisible to MCP queries until full index rebuild.
status: resolved
resolution: Fixed in current codebase. handleAppendJournal now wraps both YAML write and SQLite upsert inside a single .exclusive() transaction to prevent concurrent COUNT races for sequence numbers. See Q-111/Q-119 for policy alignment.
