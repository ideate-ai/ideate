id: Q-130
type: domain_question
domain: adapter-equivalence
question: Should the ValidationError constructor heuristic (field-name-vs-code inference) be replaced with an explicit error code API to make misuse a type error rather than a runtime surprise?
impact: P-64 enforcement currently depends on reviewer vigilance. An explicit-code API would catch violations at compile time. The current heuristic silently degrades to .code = VALIDATION_ERROR for any unrecognized second argument, affecting ~15 call sites across both adapters.
