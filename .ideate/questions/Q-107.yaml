id: Q-107
type: domain_question
domain: artifact-structure
title: handleWriteWorkItems content_hash inconsistency between YAML and SQLite
question: Phase 1 computes hash over YAML without metadata fields and embeds it. Phase 2 re-reads the file and hashes the full content (including embedded hash/token_count). The two values always differ.
source: cycle 1 code-quality M1; gap-analysis Gap 8; decision-log Q9
impact: Hash-based integrity checking between YAML and SQLite always fails for work items.
status: resolved
resolution: "Decision: The immediate write path is now consistent — both YAML and SQLite use the same contentHash variable computed in Phase 1 (write.ts:553 embeds in YAML, write.ts:587 stores in SQLite). The residual issue is that a full re-index computes hashes from the complete file (including embedded hash/token_count), producing a different value. Fix: normalize the indexer to exclude content_hash, token_count, and file_path fields when computing hashes, matching the write handler exclusion pattern at write.ts:780. Track as low-priority normalization for next cycle touching the indexer."
