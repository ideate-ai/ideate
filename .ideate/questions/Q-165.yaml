id: Q-165
type: domain_question
title: "Q-160 option-(c) cycle-number resolver does not scan existing cycle-directory slots"
domain: workflow
question: "max(current_cycle, cycles_completed) + 1 can still collide with populated cycle directories that are higher than both counters. Observed during cycle 74 bootstrap (algorithm yielded 28; slots 28-73 were populated from prior workspace eras; autopilot manually picked 74 to avoid collision). The option-(c) resolver (WI-885) is collision-free against legacy slots at or below current_cycle and cycles_completed, but does not scan for gaps above those floors. Open for future resolution — options include: (a) scan cycles/ directory for the highest populated slot and use that as an additional floor, (b) expose a 'max_cycle_slot' counter in domains/index.yaml maintained by the review skill, (c) document as a known limitation and rely on operator awareness."
derived_from:
  - cycle: 74
    source: PH-051 cycle 74 capstone review (cycle-number collision observed during bootstrap)
established_cycle: 74
impact: "If current_cycle and cycles_completed are both significantly lower than the highest populated cycle-directory slot, autopilot may pick a cycle number that collides with existing findings/summaries in that slot. This causes getConvergenceData to count legacy findings as open for the new cycle, inflating condition_a and blocking convergence. Severity: moderate — requires manual override similar to the original Q-160 scenario."
status: open
reexamination_trigger: "When autopilot is run in a workspace where cycles_completed and current_cycle are both lower than the highest occupied cycle-directory slot."
reexamination_trigger_satisfied: false
resolution: null
