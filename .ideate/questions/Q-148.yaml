id: Q-148
type: domain_question
title: Extension table ON DELETE CASCADE test coverage
domain: artifact-structure
question: 10 of 16 extension tables lack ON DELETE CASCADE tests. Are the CASCADE constraints actually present and correct, or could deleting a parent node leave orphaned extension rows?
source: gap-analyst, cycle 022 (CF3)
impact: Missing CASCADE behavior would cause orphaned rows when parent artifacts are deleted, leading to stale data in the SQLite index and potential query errors. Without tests, regressions in CASCADE definitions would go undetected.
status: deferred
deferred_rationale: Outside PH-017 scope. The CASCADE definitions exist in schema.ts but lack test verification for most extension tables. Should be bundled with Q-147 in a future testing phase.
reexamination_trigger: Next phase that touches schema.ts or adds extension tables
