id: Q-109
type: domain_question
domain: artifact-structure
title: No systematic automated test for P-33 compliance across all tool responses
question: No test iterates all tool handlers and checks for .ideate/ path leaks. handleAssembleContext returns raw YAML content which could leak paths if any YAML still contains file_path fields.
source: cycle 1 code-quality M3; gap-analysis Gap 5; decision-log Q11
impact: Future code changes could re-introduce path leakage with no automated detection. P-33 compliance is manual.
status: resolved
resolution: "Decision: Yes, a P-33 compliance test should be added, but it is low priority. The test should invoke each tool handler with representative inputs and assert that no response contains absolute paths matching the .ideate/ directory pattern. handleAssembleContext returning raw YAML is acceptable since YAML content is the artifact data itself — the concern is tool response metadata leaking storage paths. Track as a quality improvement for a future cycle; current manual review during code-review phases provides adequate coverage."
