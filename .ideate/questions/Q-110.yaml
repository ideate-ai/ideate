id: Q-110
type: domain_question
domain: artifact-structure
title: No direct unit tests for db-helpers.ts exported functions
question: 20+ typed upsert functions tested only indirectly via write handler integration tests. Column mismatches or wrong field names in individual helpers go undetected in isolation.
source: cycle 1 gap-analysis Gap 10; decision-log Q12
impact: Regressions in individual helpers masked by integration tests passing for different reasons.
status: resolved
resolution: "Decision: Defer. The integration tests in write-transaction.test.ts and tools.test.ts exercise all upsert functions through realistic write paths. Direct unit tests for db-helpers.ts would add value but are low priority since: (1) assertRequiredFields now validates all types, catching field mismatches at runtime; (2) TypeScript interfaces constrain row shapes at compile time; (3) the integration tests cover the actual call paths. Add unit tests opportunistically when modifying db-helpers.ts, not as a standalone work item."
resolved_date: 2026-03-31
