id: Q-112
type: domain_question
domain: artifact-structure
title: Should metrics_event and interview_question get dispatch branches or be removed from TYPE_TO_EXTENSION_TABLE?
question: Both types are registered in TYPE_TO_EXTENSION_TABLE and pass P-42 validation, but have no dispatch branch in handleWriteArtifact. Extension data is silently dropped. If these types are only written via non-MCP paths (JSONL import, interview skill), removing them from the registry prevents silent data loss. If they should be writable via MCP, dispatch branches are needed.
source: cycle 3 code-quality S1; gap-analysis Gaps 2-3; decision-log OQ-2
impact: Silent data loss for any caller writing these types via handleWriteArtifact. handleGetMetrics returns empty results.
status: resolved
resolution: "Decision: Add dispatch branches in handleWriteArtifact for both types. metrics_event is written via handleEmitMetric, and interview_question via the interview skill, but handleWriteArtifact should be a complete handler for all registered types. Silent data loss is worse than a redundant write path. The dispatch branches should call the existing upsertExtensionRow which already handles both types (db-helpers.ts:587, 594). Track as low-priority completeness fix."
