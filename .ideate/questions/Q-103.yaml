id: Q-103
type: domain_question
domain: artifact-structure
title: ideate_get_review_manifest ignores cycle_number parameter
question: Handler scans archive/incremental/*.md (pre-v3 path, non-existent). Incremental verdict column always shows 'None'. Should it query cycles/{NNN}/findings/*.yaml from SQLite instead?
source: cycle 1 gap-analysis Gap 4; decision-log Q5
impact: Autopilot manifests show no incremental reviews. Cycle-scoped review scope not determinable programmatically.
status: resolved
resolution: Fixed in current codebase. handleGetReviewManifest now queries findings from SQLite grouped by work_item, derives verdicts from finding severity/verdict fields. No longer reads archive/incremental/*.md.
