id: Q-111
type: domain_question
title: Should P-44 be amended to accommodate the exclusive-transaction pattern?
question: handleAppendJournal intentionally places the YAML write inside an exclusive transaction to prevent concurrent COUNT races that produce duplicate journal sequence numbers. This deviates from P-44's strict two-phase separation. Should P-44 be amended to allow exclusive-transaction wrapping when serialization is required, or should a separate policy cover this exception?
source: cycle 3 spec-adherence D1; decision-log OQ-3; D-139
domain: artifact-structure
impact: Without resolution, P-44 is technically violated by production code. Future handlers with similar serialization needs have no clear guidance.
