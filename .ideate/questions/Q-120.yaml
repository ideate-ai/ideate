id: Q-120
type: domain_question
description: Gap-analysis identified 7 testing gaps (GA-001 through GA-007) across adapter functionality. Critical gaps include PPR single-node regression tests, edge extraction coverage, max_nodes propagation verification, and getNextId shape verification. The test suite lacks systematic coverage of adapter equivalence.
domain: workflow
impact: Without systematic adapter equivalence tests, regressions in behavior consistency (P-56) and interface contracts (P-60) will not be caught. Future adapter implementations may diverge silently.
reexamination_trigger: When new adapter methods are added or existing methods modified; when equivalence test coverage falls below threshold.
