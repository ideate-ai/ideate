id: Q-164
type: domain_question
title: ideate_get_convergence_status returns stale finding counts that disagree with direct DB reads
domain: agent-system
question: "ideate_get_convergence_status for cycle 29 returned condition_a:false with 5 Significant findings reported open. Direct sqlite3 CLI query on the same index.db file returns 0 matching rows: `SELECT COUNT(*) FROM findings WHERE cycle=29 AND addressed_by IS NULL AND severity='significant'` returns 0. The MCP server and direct DB reads disagree on the same WHERE clause against the same file. Hypothesis: the MCP server's long-lived better-sqlite3 connection is serving stale data (frozen read snapshot, WAL/checkpoint desync, or cached prepared statement). Observed during PH-050 cycle 2 autopilot, 2026-04-17. All 5 findings were verified in the DB as having addressed_by populated. Autopilot had to manually override convergence because the tool output contradicted DB ground truth. Fix candidates: (a) force connection refresh on each tool call, (b) WAL checkpoint + reopen after writes, (c) investigate whether a held transaction is pinning the read snapshot, (d) add a reindex MCP tool to force DB rebuild from YAML truth."
derived_from:
  - cycle: 29
    source: PH-050 cycle 2 autopilot convergence-check
established_cycle: 29
impact: Autopilot cannot trust condition_a output. Every cycle where findings were addressed via rework but ideate_get_convergence_status was called before a server restart will falsely report failed convergence. Forces manual override and journal documentation, or causes wasted refinement cycles. Blocks reliable autopilot convergence detection.
status: resolved
reexamination_trigger: When MCP server is restarted and convergence_status is called fresh — verify whether the 5-vs-0 discrepancy persists or resolves. If it resolves, root cause is connection staleness.
reexamination_trigger_satisfied: true
resolution: "Resolved by WI-887. Fix: reader.ts getConvergenceData now performs YAML-ground-truth verification for every finding SQL flags as open (addressed_by IS NULL). For each such row the YAML file is read; if YAML has addressed_by populated the finding is treated as resolved regardless of SQLite extension-table state, and a structured log.warn is emitted tagged [q164] so staleness windows remain observable. YAML read/parse errors fall back to counting as open (safe). This is defensive against the three identified mechanisms: (A) two-write race, (B) watcher debounce / index lag, (C) historical write-path bugs. Hypothesis (v) narrow-column-omission rejected during WI-886 spike. 9 regression tests in q164-regression.test.ts guard the fix; full suite passes 1520 tests with no regressions. See research artifact RF-q164-stale-reads for full diagnosis."
