id: Q-102
type: domain_question
domain: artifact-structure
title: handleArchiveCycle work item filename matching broken for F-{cycle}-{seq} naming
question: Numeric prefix extracted from F-058-001.yaml is 058 (cycle number), not work item ID. Work items are never archived; they accumulate indefinitely in work-items/.
source: cycle 1 gap-analysis Gap 7; decision-log Q4
impact: work-items/ directory grows unbounded across cycles, degrading query performance and context assembly quality.
status: resolved
resolution: Fixed in current codebase. write.ts:219-238 now parses YAML content to extract the work_item field from each finding, then looks up the work item file by ID. No more numeric prefix extraction.
