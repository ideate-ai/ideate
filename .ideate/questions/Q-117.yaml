id: Q-117
type: domain_question
domain: artifact-structure
title: No end-to-end write-to-convergence roundtrip test
description: "No test exists that calls handleWriteArtifact with type cycle_summary and cycle: N, then calls handleGetConvergenceStatus(N) and asserts the spec-adherence artifact is found and parsed. Existing tests cover the write path and query path in isolation but not the full roundtrip."
source: cycle 4 gap-analysis-004 Gap 2
impact: A regression in either handleWriteArtifact's DB upsert logic or handleGetConvergenceStatus's query would go undetected until a real review cycle fails.
status: resolved
resolution: "Decision: Yes, add a roundtrip test. The test should: (1) write a cycle_summary artifact with a known principle verdict via handleWriteArtifact, (2) call handleGetConvergenceStatus for that cycle, (3) assert convergence status reflects the written verdict. This is a moderate-priority gap since convergence is a core autopilot signal. Track for next cycle that touches convergence or write-transaction tests."
resolved_date: 2026-03-31
