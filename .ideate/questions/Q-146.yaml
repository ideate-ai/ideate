id: Q-146
type: domain_question
domain: artifact-structure
title: Schema coverage gaps in schema.test.ts from cycle 22 gap analysis
question: "Three coverage gaps were found in schema.test.ts during the cycle 22 gap analysis: (1) proxy_human_decisions table has ON DELETE CASCADE on nodes.id but no cascade-behavior test exists — all other extension tables with CASCADE were covered by WI-757 but this table was missed; (2) projects.current_phase_id column has no assertion in the createSchema — projects table describe block; (3) phases.completed_date column has no assertion in the createSchema — phases table describe block. Are these addressed in the next refinement cycle?"
impact: Untested CASCADE behavior could mask referential integrity bugs if the CASCADE DDL is inadvertently removed. Missing column assertions mean schema drift for current_phase_id and completed_date would not be caught by the test suite.
source: gap-analyst findings EC1, EC2, EC3, cycle 22 review
status: open
reexamination_trigger: When work items are created to address these three gaps, or when a cycle review confirms they have been covered.
