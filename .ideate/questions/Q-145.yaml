id: Q-145
type: domain_question
domain: artifact-structure
title: Should singleton artifact types validate the id parameter against canonical location?
question: The domain_index artifact type ignores the id parameter passed to ideate_write_artifact and always writes to domains/index.yaml. No canonical-ID validation is performed. Should singleton artifact types (domain_index, plan/architecture, plan/overview, plan/execution-strategy, etc.) validate that the id parameter matches their canonical location, or is silent acceptance of any id the intended contract? If validation is required, should it be a hard error or a warning?
source: Full audit 2026-04-10, minor finding M3 (code-reviewer partial)
impact: "Low severity. Silent acceptance of mismatched ids hides caller bugs: a skill that computes the wrong id for a singleton type will appear to succeed but may confuse downstream readers who expect id to round-trip."
status: resolved
resolution: >-
  Spike WI-749 found domain_index is a fully implemented node type present in
  ALL_NODE_TYPES, the local and remote adapters, skills, agents, tests, and the
  live .ideate/domains/index.yaml artifact. The "missing type" concern was a
  misdiagnosis. The singleton-ID-validation question is a low-impact design
  consideration with no blocking effect; closed without action.
decision: D-190
cycle_modified: 21
