id: Q-144
type: domain_question
domain: artifact-structure
title: Resolve P-44 conflict with putNodeForJournal YAML-inside-transaction pattern
question: putNodeForJournal writes YAML inside the SQLite transaction body, violating P-44's two-phase (YAML-first) mandate. Is this (a) a bug that must be fixed to restore YAML-first ordering, or (b) a deliberate exception that P-44 must be amended to document? If (b), what is the rationale for the exception, and under what conditions may other write handlers adopt the same inverted pattern?
source: Full audit 2026-04-10, significant finding S2
impact: P-44 is the durability contract for MCP writes. Until resolved, P-44 is provisional. If the SQLite transaction fails, cleanup is best-effort (lines 1636-1651), leaving the possibility of orphan YAML files that the index no longer references.
