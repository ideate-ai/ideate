id: Q-134
type: domain_question
title: putEdge lacks input validation in both adapters despite batchMutate validating identical constraints
domain: adapter-equivalence
status: open
body: "putEdge has no input validation in either adapter (writer.ts:913, remote/index.ts:678). batchMutate validates edges with specific codes: MISSING_EDGE_SOURCE, MISSING_EDGE_TARGET, MISSING_EDGE_TYPE, INVALID_EDGE_TYPE. Calling putEdge directly bypasses all of this. adapter-contract.md lines 143-148 documents putEdge validation requirements and lists VALIDATION_ERROR as the code — but neither the documented requirements nor the specific codes exist in code. Fix: add edge validation guards to putEdge in both adapters using specific codes matching batchMutate; update adapter-contract.md to list those codes."
source: cycle 020 gap-analyst G2/G5
