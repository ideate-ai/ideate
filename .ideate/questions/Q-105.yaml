id: Q-105
type: domain_question
domain: artifact-structure
title: handleWriteArtifact missing extension table rows for guiding_principle and constraint types
question: Only upsertNode is called for these types in handleWriteArtifact. Extension tables only populated by rebuildIndex. Should handleWriteArtifact include extension table upserts for all artifact types?
source: cycle 1 gap-analysis Gap 2; decision-log Q7
impact: Agents writing guiding_principle or constraint via MCP then immediately querying get empty results. Extension tables inconsistent until next full index rebuild.
status: resolved
resolution: Fixed in current codebase. handleWriteArtifact now has explicit dispatch branches for guiding_principle (write.ts:894) and constraint (write.ts:902) that call upsertGuidingPrinciple and upsertConstraint respectively.
