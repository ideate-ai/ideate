id: Q-106
type: domain_question
domain: artifact-structure
title: assertRequiredFields checks undefined but not null
question: Null values pass the guard but violate NOT NULL SQLite constraints at the DB layer. Should the check be extended to cover null?
source: cycle 1 code-quality M2; gap-analysis Gap 9; decision-log Q8
impact: Corrupt rows could be inserted if callers pass null for required fields. Guard provides false safety guarantee.
status: resolved
resolution: "Decision: Yes, extend the guard to check both undefined and null. The fix is a one-line change: `if (row[field] === undefined || row[field] === null)`. The guard's purpose is to catch invalid data before it hits SQLite — letting null through defeats that purpose since SQLite NOT NULL constraints will reject it anyway, producing a less informative error. Track as low-priority fix for next cycle touching db-helpers.ts."
