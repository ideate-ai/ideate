source: cycle 1 gap-analysis Gap 11; decision-log Q10
impact: Invalid data (empty strings for NOT NULL fields) inserted silently for unguarded types.
status: resolved
resolution: "Fixed in current codebase. assertRequiredFields is now applied to all extension table types in upsertExtensionRow (db-helpers.ts:546-606): work_items, findings, domain_policies, domain_decisions, domain_questions, guiding_principles, constraints, module_specs, research_findings, metrics_events, interview_questions, proxy_human_decisions, projects, phases."
