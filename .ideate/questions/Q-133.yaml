id: Q-133
type: domain_question
title: deleteNode lacks input validation in both adapters — empty id returns silent not_found
domain: adapter-equivalence
status: open
body: "deleteNode returns silent not_found for empty or invalid id rather than throwing INVALID_NODE_ID. Both writer.ts:874 and remote/index.ts:655 exhibit this. Contrast: putNode and patchNode both validate id with INVALID_NODE_ID. adapter-contract.md's Validation-First principle is unmet for deleteNode. No test in either validation file covers deleteNode with empty/invalid id. Fix: add empty/non-string id guard to writer.ts deleteNode and remote/index.ts deleteNode; add test cases to local-adapter-validation.test.ts and remote-adapter-validation.test.ts."
