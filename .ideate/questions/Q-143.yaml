title: ALL_NODE_TYPES runtime length assertion uses loose lower-bound despite comment implying precise count
body: In tests/adapters/always-include-types-validation.test.ts:410-412, the runtime assertion is `toBeGreaterThan(0)` with a comment reading 'update this number when NodeType grows.' The comment implies a precise count should be maintained but the assertion is a loose lower bound. The compile-time sentinel in adapter.ts:77-84 covers the meaningful divergence case; the runtime assertion is secondary.
