id: Q-118
type: domain_question
domain: artifact-structure
title: No fallback in convergence query for null-cycle artifacts
description: handleGetConvergenceStatus filtered document_artifacts.cycle = N. If document_artifacts.cycle was null, the artifact was invisible. No secondary lookup by ID prefix or directory path existed.
source: cycle 4 gap-analysis-004 Gap 3
impact: "Any cycle-summary artifact with null cycle was invisible to convergence checks, returning principle_verdict: unknown silently."
status: resolved
resolution: WI-424 implemented a three-branch WHERE clause (D-156) that includes a fallback for artifacts where da.id IS NOT NULL AND da.cycle IS NULL, using file_path LIKE pattern to match by directory.
