impact: Users who want the simplest Ollama configuration must set three separate env vars instead of one. The omission affects discoverability, not functionality.
source: archive/cycles/013/gap-analysis.md MG1; archive/cycles/013/decision-log.md OQ-12
resolution: "Added a \"Single-model override\" subsection to the Custom Models section in README.md documenting CLAUDE_CODE_SUBAGENT_MODEL as a global override for all subagents, with guidance on when to use it (single-model Ollama configurations) versus per-tier ANTHROPIC_DEFAULT_*_MODEL variables."
resolved_in: 38
description: The research document identifies `CLAUDE_CODE_SUBAGENT_MODEL` as a global override that sets the model for all subagents in a session. The README documents per-tier `ANTHROPIC_DEFAULT_*_MODEL` vars but omits this simpler mechanism. Should it be mentioned for users who want a single model for all agents (e.g., single-model Ollama configurations)?
