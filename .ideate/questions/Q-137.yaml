id: Q-137
type: domain_question
title: ppr.ts has four ValidationError calls using raw field names instead of specific error codes
domain: artifact-structure
status: closed
body: "src/ppr.ts:112,121,130,139 call ValidationError with raw field names 'alpha', 'maxIterations', 'convergenceThreshold', 'maxNodes' as the second argument, producing .code === 'VALIDATION_ERROR' instead of specific PPR parameter codes. P-64 violation. Callers always hit context.ts validation first (which uses specific codes), so this only affects tests that call computePPR directly. Fix: change ppr.ts to use specific error codes for each parameter (e.g. INVALID_ALPHA, INVALID_MAX_ITERATIONS, INVALID_CONVERGENCE_THRESHOLD, INVALID_MAX_NODES). Out of cycle 020 file scope — track as next-cycle debt."
source: cycle 020 spec-adherence M1
reexamination_trigger: next PPR or adapter validation work item
cycle_modified: 19
resolution: "Resolved: ppr.ts uses specific error codes — INVALID_ALPHA (line 112), INVALID_MAX_ITERATIONS (line 121), INVALID_CONVERGENCE_THRESHOLD (line 130), INVALID_MAX_NODES (line 139)."
