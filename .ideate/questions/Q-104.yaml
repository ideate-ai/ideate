title: handleGetProjectStatus reads finding counts from stale pre-v3 archive path
question: analysis.ts:358 reads archive/cycles/{cyclePad}/summary.md. Current cycles use cycle_summary YAML artifacts indexed in SQLite. Dashboard always shows zero findings for current cycles.
source: cycle 1 gap-analysis Gap 6; decision-log Q6
impact: Autopilot convergence checks unreliable. Dashboard misleads users and autopilot about finding counts.
status: resolved
resolution: Resolved. handleGetProjectStatus no longer exists in the codebase. Its functionality was replaced by handleGetConvergenceStatus and handleGetReviewManifest, both of which query SQLite.
