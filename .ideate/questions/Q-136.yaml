body: "WI-669 added StorageAdapterError('PARSE_ERROR') throws in mapGqlNodeToNode and fetchCurrentCycle in remote/index.ts. Neither the StorageAdapterError error codes section nor the method-level sections of adapter-contract.md mention this code. Callers cannot learn from the contract that PARSE_ERROR is a possible outcome and cannot handle it gracefully. PARSE_ERROR is recoverable (corrupt data in a single node vs. full system failure). Fix: add PARSE_ERROR to the StorageAdapterError codes section and to the relevant method descriptions in adapter-contract.md."
