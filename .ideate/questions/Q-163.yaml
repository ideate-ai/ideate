id: Q-163
type: domain_question
title: What is the ownership model for reviewer output format contracts?
domain: agent-system
question: "When a reviewer agent changes its output format (e.g., introduces the all-bold verdict variant, adds a new heading section), who owns notifying downstream parsers? Options: (a) reviewer-side contract test that fails if parser is not updated; (b) shared format spec artifact that both sides depend on; (c) informal coordination (status quo)."
derived_from:
  - cycle: 28
    finding: Gap-EC2 (all-bold format drift), Gap-EC1 (Principle Adherence Evidence heading added without parser update)
established_cycle: 28
impact: The cycle 28 defects are symptoms of a format-contract ownership gap. Without a forcing function, reviewer-format drift will keep producing parser false-negatives. Affects long-term maintainability of all reviewer-consuming tools.
status: open
reexamination_trigger: Next reviewer-format change, or when adapter-contract framework is next extended.
