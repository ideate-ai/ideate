  # Decision Log — Cycle 014
  
  ## Decisions
  
  ### D-52: Benchmark system built as standalone module under benchmarks/
  - **Context**: User wanted continuous quality measurement for ideate. Investigated building it as a new skill vs standalone tooling.
  - **Decision**: Built as a standalone directory (`benchmarks/`) with shell scripts invoking `claude -p`. Treats ideate as an opaque CLI tool. No changes to existing ideate files.
  - **Rationale**: Keeps benchmark infrastructure decoupled from the SDLC workflow. The benchmark system evaluates ideate's output without needing internal access.
  - **Source**: refine-014 interview
  
  ### D-53: Workspace isolation for opacity
  - **Context**: Benchmark cases contain evaluation criteria (expected characteristics, rubric) that the executing LLM should not see.
  - **Decision**: Runner creates a temp workspace via `mktemp -d`, copies only `brief.md` (and `src/` if present). Evaluation materials stay outside the workspace.
  - **Rationale**: The executing LLM's context includes only the workspace contents. Evaluation criteria remain blind to it.
  - **Source**: refine-014 interview, WI-132
  
  ### D-54: Q&A answers inlined into brief (not kept opaque)
  - **Context**: Q&A scripts contain pre-written interview answers. The question was whether these should be visible to the executing LLM.
  - **Decision**: Q&A answers are appended to brief.md as a "Pre-answered Questions" addendum. The executing LLM sees them.
  - **Rationale**: Q&A answers are interview responses — they are inputs to planning, not evaluation criteria. The LLM needs them to produce a deterministic plan.
  - **Source**: WI-132 incremental review S2 discussion
  
  ### D-55: LLM judge uses temp files for data passing, not heredoc interpolation
  - **Context**: WI-135 incremental review found critical injection vulnerabilities where Claude output containing `'''` or `"""` would break Python string literals in heredoc scripts.
  - **Decision**: All data passed to Python via temp files and `sys.argv`, not string interpolation in heredocs.
  - **Rationale**: Security — prevents arbitrary code execution from LLM output. Also prevents silent failures from common characters in structured output.
  - **Source**: WI-135 incremental review C1, C2
  
  ## Open Questions
  
  ### OQ-13: No add-feature benchmark case
  - **Source**: gap-analysis MG1, spec-adherence M1
  - **Question**: Should an `add-feature` benchmark case be created for the next cycle?
  - **Impact**: One of four interview-requested categories has zero coverage.
  
  ### OQ-14: Execute-phase quality dimensions not measurable
  - **Source**: gap-analysis MG3
  - **Question**: Current benchmarks use `skill: plan` only. Dimensions like code idiomaticity, autonomy (andon_count), and problem anticipation require actual code execution. Should execute-phase benchmarks be added?
  - **Impact**: The rubric defines dimensions that current benchmarks cannot score.
  
  ### OQ-15: No end-to-end pipeline script
  - **Source**: gap-analysis MG2
  - **Question**: Should a `pipeline.sh` chain run → evaluate → human-eval → report, or is manual invocation acceptable?
  - **Impact**: 4 sequential manual commands increases operator error risk.
  
  ### OQ-16: config.yaml fields not consumed by judge
  - **Source**: gap-analysis IG1, spec-adherence M2
  - **Question**: Should `expected_work_items_min/max` from config.yaml be passed to the judge, or are they runner-only metadata?
  - **Impact**: The judge cannot flag over/under-scoped plans relative to expectations.
  
  ### OQ-17: Benchmark results not gitignored
  - **Source**: code-quality M3, gap-analysis MG4
  - **Question**: Should `benchmarks/results/` be added to `.gitignore`?
  - **Impact**: Large JSON files from benchmark runs could be accidentally committed.
