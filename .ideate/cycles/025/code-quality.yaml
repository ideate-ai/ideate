  ## Significant Findings

  - [S1] `src/adapters/remote/index.ts:637-643` / `tests/adapters/remote-adapter-validation.test.ts` — RemoteAdapter.patchNode IMMUTABLE_FIELD guard (new in WI-691) has no test coverage. remote-adapter-validation.test.ts contains zero tests for patchNode, ImmutableFieldError, or IMMUTABLE_FIELD. adapter-contract.test.ts tests immutable-field rejection only against LocalAdapter. P-002 requires specific error codes to be tested.

  ## Minor Findings

  - [M1] `src/adapters/remote/index.ts` — fetchCurrentCycle() can throw ValidationError(VALIDATION_ERROR) (a StorageAdapterError subclass) when a network error occurs. Inside the try block, the catch guard `if (err instanceof StorageAdapterError) throw err` re-throws it unchanged. A fetchCurrentCycle network failure propagates from putNode/patchNode as VALIDATION_ERROR rather than TRANSACTION_FAILED. Minor: fetchCurrentCycle is a prerequisite step; callers primarily care about mutation failures.
  - [M2] All TRANSACTION_FAILED tests in write-transaction.test.ts invoke the method twice (pre-existing pattern, not introduced this cycle).

  ## Principle Adherence

  - P-64: All new catch blocks use 'TRANSACTION_FAILED' as code string
  - P-65: No new vi.mock at module level
