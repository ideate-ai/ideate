  ## Code Review — Cycle 20

  **Verdict**: Fail

  ### Critical Findings
  None.

  ### Significant Findings

  **S1: `deriveJournalEntryEdges` and `deriveJournalEntryCycleEdges` called twice each in `rebuildIndex`**
  - File: `src/indexer.ts:1011–1036`
  - Bare calls at lines 1013–1015 are leftover merge artifacts; the transactional Phase 3/4 blocks at lines 1024–1036 are the intended implementation. Both sets run on every rebuild. `stats.edges_created` is inflated (double-counted). No data corruption because P-67 delete-before-insert makes calls idempotent, but rebuild performance and stat accuracy are degraded.
  - Fix: Remove lines 1013–1015. Relabel Phase 3/4 comments consistently.

  **S2: `hasJournalUpdate` guard in `indexFiles` not removed — causes double derivation on journal file changes**
  - File: `src/indexer.ts:798–803`
  - WI-727 spec said "replace" the guard; implementation kept the old `hasJournalUpdate` block alongside the new `hasDerivedEdgeUpdate` block. For journal file changes both blocks fire, running derivation twice. Correctness preserved by P-67; performance doubled for incremental journal updates.
  - Fix: Remove `hasJournalUpdate` block (lines 798–803). `hasDerivedEdgeUpdate` already covers journal files via its first regex clause.

  ### Minor Findings

  **M1: Duplicate 'Phase 3' comment label in `rebuildIndex`**
  - File: `src/indexer.ts:1011` and `1021`
  - Both lines carry `// Phase 3:`. After removing the bare calls per S1, relabel the transactional blocks as Phase 3 and Phase 4 without collision.

  ### Suggestions
  None.

