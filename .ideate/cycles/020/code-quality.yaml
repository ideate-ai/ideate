content: |-
  ## Code Quality Review — Full Audit (2026-04-07)

  **Verdict**: Fail

  ## Critical Findings
  None.

  ## Significant Findings

  ### S1: putNode update rollback deletes original file instead of restoring it
  - **File**: `src/adapters/local/writer.ts:656-671`
  - On a putNode call for an existing node, if the SQLite transaction fails, the rollback handler deletes `absoluteFilePath` rather than restoring original content. patchNode correctly saves and restores `existingContent`; putNode does not.
  - **Impact**: Silent data corruption — SQLite index points to a non-existent YAML file after a failed update.
  - **Fix**: Read and save `originalContent` before overwriting. Restore on catch instead of unlinking.

  ### S2: alpha=0 and max_iterations=0 pass adapter-layer validation but fail in ppr.ts
  - **Files**: `src/adapters/local/context.ts:231-232`, `src/ppr.ts:108-109,118-119`
  - Adapters allow `alpha >= 0` but `computePPR` rejects `alpha <= 0`. Same for `max_iterations`. Callers receive an error from a function they never called, with a message contradicting the advertised valid range.
  - **Fix**: Tighten adapter validation to match ppr.ts: `alpha <= 0` and `max_iterations <= 0`.

  ### S3: No test for dispatchHook allowlist rejection (P-58 violation)
  - **File**: `src/__tests__/hooks.test.ts`
  - The primary security control (allowlist enforcement in dispatchHook) has no unit test exercising the rejection path for non-allowlisted commands.
  - **Fix**: Add test: pass non-allowlisted command, assert throws with allowlist rejection message.

  ## Minor Findings

  ### M1: `_countNodesWithoutStatus` swallows all errors silently
  - `src/adapters/remote/index.ts:1438-1443` — catches all errors, returns 0.

  ### M2: fetchCurrentCycle wraps network errors as VALIDATION_ERROR
  - `src/adapters/remote/index.ts:463-468` — infrastructure failure surfaces as ValidationError, semantically wrong.

  ### M3: LocalWriterAdapter.nextId throws plain Error for unsupported types
  - `src/adapters/local/writer.ts:520` — should throw ValidationError(INVALID_NODE_TYPE) per P-002.

  ### M4: deleteNode reverses P-44 write order (SQLite before YAML)
  - `src/adapters/local/writer.ts:887-908` — SQLite delete precedes YAML removal, violating YAML-first policy.

  ## Principle Adherence Confirmed
  - P-40: dispatchHook uses spawnSync with explicit argument array, shell: false
  - P-64: All ValidationError throws use compliant code strings
  - P-002: All validation test files assert .code specifically
  - P-65: Module-level vi.mock only in new test files
  - P-36: write-transaction.test.ts covers all six write methods
  - Test suite: 1,084 passed, 306 skipped, 0 failed
