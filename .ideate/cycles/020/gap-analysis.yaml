  ### Minor Findings

  **MN1: Exhaustiveness sentinel in always-include-types-validation.test.ts is now redundant**

  - **Component**: `tests/adapters/always-include-types-validation.test.ts:26-29`
  - WI-742 added a functional sentinel in `adapter.ts:77-84`. The test file contains an identical sentinel. Both are now functional (the test-file copy is evaluated during test compilation; the adapter.ts copy by `tsc --noEmit`). Duplication creates maintenance confusion but no safety gap.
  - **Recommendation**: Defer — harmless duplication. Remove in a polish cycle.

  **MN2: getDomainState null-status coverage limited to domain_policy — decisions/questions untested**

  - **Component**: `adapter-contract.test.ts:1195-1210`
  - WI-743 added null-status test for `domain_policy`. The decisions query (reader.ts:859-866) has no status filter (null-status decisions included, untested). The questions query (reader.ts:868-875) uses `WHERE n.status = 'open'` (null-status questions excluded, untested). Secondary boundary conditions.
  - **Recommendation**: Defer — policies were the direct trigger. The decisions/questions behavior should be confirmed against the contract doc before testing.

  **MN3: ALL_NODE_TYPES runtime length check uses loose lower-bound**

  - **Component**: `tests/adapters/always-include-types-validation.test.ts:410-412`
  - Comment says 'update this number when NodeType grows' but assertion is `toBeGreaterThan(0)` (not `toBe(27)`). Compile-time sentinel covers the meaningful case. Comment/assertion mismatch is misleading.
  - **Recommendation**: Defer — polish item.

  ### Prior Findings Verification

  - **MI1 (stale handler names — WI-744)**: Resolved.
  - **MI2 (null-status getDomainState — WI-743)**: Resolved. Test at line 1195 guards `n.status IS NULL` clause.
  - **S1 (tautological exhaustiveness check — WI-742)**: Resolved. Annotation removed; sentinel in adapter.ts operative. Import ordering also resolved.

