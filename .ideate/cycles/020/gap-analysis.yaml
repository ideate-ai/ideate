  ## Gap Analysis — Cycle 20

  **Verdict**: Fail

  ### Critical Findings
  None.

  ### Significant Findings

  **SF1: Dead code in `rebuildIndex` causes double-call of both derivation functions and inflated `edges_created` stat**
  - File: `src/indexer.ts:1011–1015`
  - Merge artifact from WI-727 rework. Bare calls at lines 1013–1015 precede transactional Phase 3/4 blocks at lines 1024–1036. Every `rebuildIndex` runs both derivation functions twice. DB correctness preserved by P-67; `stats.edges_created` over-reports (counts derived edges twice). Comment label 'Phase 3' appears on both line 1011 and 1021.
  - Fix: Remove lines 1011–1015 bare calls. Retain and correctly label transactional blocks.

  **SF2: `indexFiles` `hasJournalUpdate` guard not removed — WI-727 spec said replace, implementation added alongside**
  - File: `src/indexer.ts:798–803`
  - Journal file changes trigger four derivation calls (two functions × two guards). Work item resolution note confirms intent was replacement. Double work on incremental journal updates.
  - Fix: Remove lines 798–803. `hasDerivedEdgeUpdate` already covers journal files.

  ### Minor Findings

  **MF1: No test verifies `stats.edges_created` is accurate when derived edges are present**
  - File: `src/__tests__/indexer.test.ts`
  - The double-counting in SF1 went undetected because no test asserts a specific `edges_created` value in a scenario with journal entries + cycle summaries. Add one test asserting exact `edges_created` count after rebuildIndex with a known fixture.

  **MF2: No P-49 backfill assessment documented for WI-725**
  - `belongs_to_cycle` edges are runtime-derived and no YAML backfill is needed (correct behavior). But WI-725 notes contain no P-49 statement, leaving the reasoning implicit. A future reviewer cannot confirm P-49 was considered.
  - Recommendation: Add to WI-725 resolution: 'No on-disk backfill needed — belongs_to_cycle edges are runtime-derived and regenerated on every rebuildIndex.'

  ### Suggestions

  **S1: Q-117 and Q-118 unaffected by cycle 20 changes.**
  SF2's double-trigger slightly worsens Q-117 concern (more work per journal file change) but the fundamental debounce question is unchanged.

  **S2: Pre-existing test coverage gap — `review_output` and `domain_index` types absent from document-type coverage test loop (indexer.test.ts:1154).**
  Not introduced by cycle 20. Pre-existing gap.
