  ## Gap Analysis — Full Audit (2026-04-07)

  **Verdict**: Fail

  ## Critical Gaps
  None.

  ## Significant Gaps

  ### SG1: LocalAdapter queryNodes and queryGraph do not validate limit/offset
  - `src/adapters/local/reader.ts:394,527` — no guard on limit/offset. RemoteAdapter rejects negatives with INVALID_LIMIT/INVALID_OFFSET. Contract (lines 257-262, 285-290) requires both codes for both adapters. Negative limit passes silently into SQLite as LIMIT -1 (unlimited). Equivalence tests verify these codes but local path doesn't implement them.

  ### SG2: Neither adapter validates getNode id as non-empty string
  - `src/adapters/local/reader.ts:278`, `src/adapters/remote/index.ts:509` — getNode("") or getNode(null) passes through silently. Local returns null. All write methods validate INVALID_NODE_ID; getNode does not. Asymmetric validation coverage. Contract doc has no Validation section for getNode (see MN1).

  ## Minor Gaps

  ### MN1: adapter-contract.md getNode section has no Validation or Error Codes block
  - `docs/adapter-contract.md:23-36` — every mutating method documents validation; getNode is silent. Needs either INVALID_NODE_ID entry or explicit statement that validation is caller responsibility.

  ### MN2: No happy-path traverse equivalence test
  - `tests/adapters/adapter-equivalence.test.ts` — only error cases (INVALID_SEED_IDS). No test verifying both adapters return TraversalResult with expected shape for valid seed_ids.

  ### MN3: No equivalence test for appendJournalEntry
  - `tests/adapters/adapter-equivalence.test.ts` — appendJournalEntry absent from equivalence suite. Contract documents TRANSACTION_FAILED as its error code but no cross-adapter coverage.
