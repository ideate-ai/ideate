  # Decision Log — Cycle 020
  
  > Synthesized from: journal.md (entries 1532–1564), review-manifest.md, code-quality.md, spec-adherence.md, gap-analysis.md, archive/incremental/174-build-migration-script.md, archive/incremental/175-toyaml-fix-and-test-cleanup.md, refine-021/_full.md.
  > This log covers the four work items (WI-174 through WI-177) executed in response to cycle 019 capstone findings Q-63 through Q-67.
  
  ---
  
  ## Cycle Summary
  
  Cycle 020 is a focused defect-resolution cycle. All five open questions carried forward from cycle 019 (Q-63 through Q-67) were scoped into four independent, non-overlapping work items and executed in parallel. No new features were added. The cycle closes Q-63–Q-67 and introduces four new minor open questions (Q-68–Q-71) identified during the capstone review.
  
  ---
  
  ## Decisions Made This Cycle
  
  ### Planning Phase
  
  #### D-91: Address all five cycle 019 open questions in a single cycle
  
  - **When**: Planning — refine-021 interview, 2026-03-24
  - **Decision**: Q-63 (build:migration absent), Q-64 (db.ts architecture row), Q-65 (stale 3-arg call sites), Q-66 (array-item whitespace guard), and Q-67 (checkSchemaVersion version-0 test) all addressed in cycle 020.
  - **Rationale**: All findings resolvable from existing context; no user decisions required. Scoping all five into one cycle avoids carrying technical debt forward when the combined effort is low.
  - **Implications**: Cycle 020 produces four work items (WI-174–WI-177) with non-overlapping file scope, enabling full parallel execution.
  - **Source**: refine-021/_full.md; journal entry 2026-03-24 [refine]
  
  #### D-92: `close()` defensive `debounceTimers.clear()` suggestion deferred
  
  - **When**: Planning — refine-021 interview, 2026-03-24
  - **Decision**: The cycle 019 suggestion to add a defensive `debounceTimers.clear()` call in `ArtifactWatcher.close()` is out of scope for cycle 020.
  - **Rationale**: Suggestion-grade only; not a correctness issue. No concrete SDLC need identified.
  - **Implications**: `debounceTimers.clear()` remains absent from `close()`. Timers pending at shutdown are abandoned rather than cancelled. Risk is low (process exit clears all timers).
  - **Source**: refine-021/_full.md
  
  #### D-93: Guiding principles and constraints unchanged
  
  - **When**: Planning — refine-021 interview, 2026-03-24
  - **Decision**: No amendments to guiding principles or constraints for this cycle.
  - **Rationale**: All principles hold; cycle is purely corrective.
  - **Implications**: GP-8 (Durable Knowledge Capture) and GP-5 (Continuous Review) continue as the primary governing principles.
  - **Source**: refine-021/_general.md
  
  #### D-94: All four work items executed in full parallel
  
  - **When**: Planning — refine-021 interview, 2026-03-24
  - **Decision**: WI-174, WI-175, WI-176, and WI-177 declared fully independent and executed simultaneously.
  - **Rationale**: Non-overlapping file scope: WI-174 (`package.json` only), WI-175 (`migrate-to-v3.ts`, `migrate-to-v3.js`, `migrate.test.ts`), WI-176 (`architecture.md` only), WI-177 (`schema.test.ts` only). No cross-item dependencies.
  - **Implications**: All four code-reviewers spawn simultaneously. Slowest item is the critical path.
  - **Source**: journal entry 2026-03-24 [refine]; overview.md
  
  ### Execution Phase
  
  #### D-95: `build:migration` npm script added as `tsc --declaration false` invocation targeting `scripts/`
  
  - **When**: Execution — WI-174, 2026-03-24
  - **Decision**: `build:migration` compiles `../../scripts/migrate-to-v3.ts` with `--module NodeNext`, `--target ES2022`, `--declaration false`, and `--outDir ../../scripts`.
  - **Rationale**: Closes Q-63. Restores the documented dual-maintenance recovery path: `pretest` detects staleness, `build:migration` resolves it. `--declaration false` prevents `.d.ts` generation on future runs.
  - **Implications**: Closes Q-63. Stale `.d.ts` and `.js.map` files already on disk at time of execution are not removed by the script (see Q-68).
  - **Source**: journal entry 2026-03-24 [execute WI-174]; incremental review 174-build-migration-script.md
  
  #### D-96: `pretest` warning message updated to reference `npm run build:migration`; stale artifact paths added to `.gitignore`
  
  - **When**: Execution — WI-174 rework, 2026-03-24
  - **Decision**: Two minor findings from incremental review fixed before capstone: (1) pretest warning text changed from "regenerate with tsc" to "run npm run build:migration from mcp/artifact-server/"; (2) `scripts/migrate-to-v3.d.ts`, `scripts/migrate-to-v3.d.ts.map`, and `scripts/migrate-to-v3.js.map` added to `.gitignore`.
  - **Rationale**: The stated purpose of Q-63 was that the recovery command be discoverable. The original warning text did not name the script. The `.gitignore` entries prevent future commits of build artifacts suppressed by `--declaration false`.
  - **Implications**: Pretest now directs contributors to the correct command. Stale files already present on existing working trees are not deleted (see Q-68).
  - **Source**: journal entry 2026-03-24 [execute WI-174 rework]; incremental review 174-build-migration-script.md M1, M2
  
  #### D-97: `toYaml` array-item whitespace guard added as `/^\s/.test(item)` — mirrors scalar guard
  
  - **When**: Execution — WI-175, 2026-03-24
  - **Decision**: Array-item quoting condition in `toYaml` extended to include `/^\s/.test(item)` at `migrate-to-v3.ts:110`. Change mirrored identically in `migrate-to-v3.js:146` (dual-maintenance preserved, GP-8 satisfied).
  - **Rationale**: Closes Q-66. Without this guard, array items with leading whitespace were emitted unquoted, producing syntactically invalid YAML.
  - **Alternatives considered**: Extending the guard to full parity with the scalar guard (reserved scalars and indicator characters) — not done; deferred to Q-69.
  - **Implications**: Closes Q-66. Array-item guard remains narrower than scalar guard for reserved YAML scalar values and indicator characters (see Q-69).
  - **Source**: journal entry 2026-03-24 [execute WI-175]; gap-analysis.md EC2
  
  #### D-98: Stale 3-argument test call sites removed from `migrate.test.ts`
  
  - **When**: Execution — WI-175, 2026-03-24
  - **Decision**: All 13 call sites for `migratePlanArtifacts`, `migrateSteeringArtifacts`, and `migrateInterviews` in `migrate.test.ts` updated to pass exactly 2 arguments.
  - **Rationale**: Closes Q-65. The third argument was silently discarded by JavaScript; the stale call sites were misleading about current function signatures (reduced to 2 params by WI-172).
  - **Implications**: Closes Q-65. Test file now accurately reflects the 2-parameter signatures.
  - **Source**: journal entry 2026-03-24 [execute WI-175]; incremental review 175-toyaml-fix-and-test-cleanup.md AC4
  
  #### D-99: `toYaml` array-item whitespace test assertion strengthened to exact quoted-form check
  
  - **When**: Execution — WI-175 rework, 2026-03-24
  - **Decision**: Test assertion changed from `expect(result).toContain('"')` to `expect(result).toContain('- " indented"')`.
  - **Rationale**: The incremental reviewer returned Fail: a double-quote character appears in unrelated parts of `toYaml` output, so the weak assertion would pass trivially even without the whitespace guard. No acceptance criteria were unmet; the finding was minor and fixed in rework before capstone.
  - **Implications**: Test now serves as a genuine regression guard for the array-item whitespace branch. All 156 tests pass before and after rework.
  - **Source**: journal entry 2026-03-24 [execute WI-175 rework]; incremental review 175-toyaml-fix-and-test-cleanup.md M1
  
  #### D-100: `db.ts` architecture row updated to include `metricsEvents` and `TYPE_TO_DRIZZLE_TABLE`
  
  - **When**: Execution — WI-176, 2026-03-24
  - **Decision**: Source code index row for `db.ts` in `architecture.md` updated to add the `metricsEvents` and `TYPE_TO_DRIZZLE_TABLE` exports added during cycles 016–019.
  - **Rationale**: Closes Q-64. The WI-173 regeneration in cycle 019 updated five other module rows but missed `db.ts`, leaving the architecture index inaccurate as the inter-phase contract (GP-8).
  - **Implications**: Closes Q-64. Architecture.md now accurately reflects all public exports of `db.ts`.
  - **Source**: journal entry 2026-03-24 [execute WI-176]; cycle 019 spec-adherence.md D1
  
  #### D-101: `checkSchemaVersion` version-0 path test added using `:memory:` database
  
  - **When**: Execution — WI-177, 2026-03-24
  - **Decision**: One test case added to `schema.test.ts` asserting that `checkSchemaVersion` returns `true` when `PRAGMA user_version = 0` on a fresh `:memory:` database.
  - **Rationale**: Closes Q-67. The version-0 bypass path was correct but untested; a regression would be silent.
  - **Implications**: Closes Q-67 partially. Version-mismatch and version-current branches remain untested (see Q-70).
  - **Source**: journal entry 2026-03-24 [execute WI-177]; spec-adherence.md WI-177 section
  
  ---
  
  ## Questions Resolved This Cycle
  
  - **Q-63**: `build:migration` npm script absent — resolved by WI-174: script added to `package.json`; pretest warning updated; `.gitignore` entries added.
  - **Q-64**: `db.ts` source code index row incomplete — resolved by WI-176: `metricsEvents` and `TYPE_TO_DRIZZLE_TABLE` added to the `architecture.md` row.
  - **Q-65**: Stale 3-argument call sites in migrate tests — resolved by WI-175: all 13 call sites reduced to 2 arguments.
  - **Q-66**: `toYaml` array-item branch missing leading-whitespace guard — resolved by WI-175: `/^\s/.test(item)` added; dual-maintenance preserved.
  - **Q-67**: `checkSchemaVersion` version-0 path untested — resolved by WI-177: `:memory:` test added for the fresh-DB path.
  
  ---
  
  ## New Open Questions
  
  ### Q-68: Stale `.d.ts` and `.js.map` files on existing working trees not cleaned up by `build:migration`
  
  - **Question**: `scripts/migrate-to-v3.d.ts`, `scripts/migrate-to-v3.d.ts.map`, and `scripts/migrate-to-v3.js.map` exist on disk from a prior `tsc` invocation that lacked `--declaration false`. Running `npm run build:migration` suppresses `.d.ts` generation on new runs, and `.gitignore` entries prevent future commits, but the already-present stale copies are never deleted by the script. Should a `prebuild:migration` step using `rmSync` remove them before compilation?
  - **Source**: code-quality.md M1; incremental review 174-build-migration-script.md M2
  - **Impact**: Stale `.d.ts` files remain in contributors' working trees indefinitely. No correctness impact; creates noise in `git status` and may confuse IDE tooling that reads `.d.ts` for type resolution.
  - **Consequence of inaction**: Stale declaration files accumulate on contributor working trees across rebuilds. IDE tooling may resolve types from stale declarations rather than live source.
  
  ### Q-69: `toYaml` array-item guard narrower than scalar guard — reserved scalars and indicator characters unguarded
  
  - **Question**: The scalar quoting guard at `migrate-to-v3.ts:76` checks for reserved YAML scalar values (`true`, `false`, `null`, `~`) and YAML indicator characters (`{`, `}`, `[`, `]`, `|`, `>`, `*`, `&`) in addition to leading whitespace. The array-item guard added by WI-175 at line 110 covers only leading whitespace. Should the array-item condition be extended to full parity with the scalar guard?
  - **Source**: gap-analysis.md EC2
  - **Impact**: Array items containing reserved scalars or YAML indicator characters may be emitted unquoted. Consumers parse `- true` as boolean, `- {key: val}` as an inline mapping, etc., rather than as strings.
  - **Consequence of inaction**: Migration produces semantically wrong YAML for artifact arrays containing boolean-like strings or indicator characters. The migration is a one-time operation on known ideate content; the correctness gap persists for any future content that triggers these cases.
  
  ### Q-70: `checkSchemaVersion` version-mismatch and version-current branches untested
  
  - **Question**: WI-177 added a test for the version-0 (fresh DB) path. The version-mismatch path (`user_version` is non-zero and does not match `CURRENT_SCHEMA_VERSION`) and the version-current path (`user_version` matches `CURRENT_SCHEMA_VERSION`, function returns `true`) have no tests. The version-current path is exercised on every server startup after a successful migration. Should a single work item add tests for all three branches?
  - **Source**: gap-analysis.md EC1 and IR1
  - **Impact**: A regression in the mismatch path would skip WAL/SHM cleanup and database deletion, leaving the server running on a schema-mismatched database. A regression in the current-version path would cause all post-migration startups to fail or misbehave.
  - **Consequence of inaction**: Two of three `checkSchemaVersion` branches remain without coverage. A regression in the mismatch path silently skips database deletion; the server proceeds on a mismatched schema.
  
  ### Q-71: `pretest` does not fail-fast when `migrate-to-v3.js` is stale or absent
  
  - **Question**: The `pretest` hook detects staleness and emits a warning to stderr but exits 0. A developer running `npm test` with a stale or absent compiled file sees the warning scroll past and proceeds with potentially incorrect results. Additionally, when `migrate-to-v3.js` does not exist (fresh clone before running `build:migration`), `statSync` throws and the `catch(e) {}` block swallows the error silently — no warning is emitted at all. Should `pretest` exit non-zero on staleness or absence?
  - **Source**: code-quality.md M2; gap-analysis.md MI1
  - **Impact**: Developers running `npm test` on a stale `.js` file receive no hard stop. The migrate tests exercise the compiled `.js` directly; stale results may mislead the developer about whether a bug is fixed. On a fresh clone, the missing-file case produces no signal whatsoever.
  - **Consequence of inaction**: CI and local runs against stale or absent compiled scripts produce incorrect test results with no machine-readable signal.
  
  ---
  
  ## Cross-References
  
  ### CR9: `--declaration false` / `.gitignore` — suppression is forward-only, stale files remain
  
  - **Code review**: M1 — `--declaration false` correctly suppresses `.d.ts` generation on new runs, but stale `.d.ts` and `.js.map` files from a prior `tsc` invocation remain on disk.
  - **Gap analysis**: No directly related finding; the `.gitignore` addition (WI-174 rework) closes future commits but leaves already-present files.
  - **Connection**: The WI-174 rework split the stale-artifact problem into two halves: "prevent future commits" (done) and "remove files already on disk" (not done). Q-68 captures the remaining half.
  
  ### CR10: `toYaml` guard parity — whitespace fixed, type-coercion cases still open
  
  - **Code review**: No capstone finding (the whitespace guard is correctly implemented and passes all tests).
  - **Gap analysis**: EC2 — the array-item guard added by WI-175 covers leading whitespace but not reserved scalar values or YAML indicator characters that the scalar guard at line 76 also covers.
  - **Connection**: WI-175 brought the array-item branch from zero guards to one guard. EC2 identifies the remaining four conditions the scalar branch checks but the array-item branch does not. These are pre-existing gaps, not regressions. Q-69 tracks them.
  
  ### CR11: `checkSchemaVersion` test coverage — version-0 added, two branches still absent
  
  - **Gap analysis EC1**: Version-mismatch and version-current branches untested.
  - **Gap analysis IR1**: Version-current (happy path) specifically flagged as the highest-traffic path at runtime — exercised on every server startup after a successful migration.
  - **Spec adherence**: WI-177 noted as satisfying C-7 for the version-0 criterion specifically; no comment on the other branches.
  - **Connection**: EC1 and IR1 describe the same coverage gap from two angles (completeness vs. operational risk). Together they define a single future work item: add tests for all three `checkSchemaVersion` branches. Q-70 combines both findings.
  
  ### CR12: `pretest` staleness detection — two weaknesses in the same script
  
  - **Code review**: M2 — staleness detected but script exits 0, no fail-fast.
  - **Gap analysis**: MI1 — when `.js` is absent, `statSync` throws and the `catch {}` block swallows the error silently; not even the warning fires.
  - **Connection**: M2 and MI1 are adjacent weaknesses in the same `pretest` script with the same consequence: the developer proceeds with wrong or missing compiled output. Q-71 combines both into a single actionable fix.
