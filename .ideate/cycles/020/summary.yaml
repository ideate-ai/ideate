  # Review Summary — Cycle 20

  ## Overview
  Cycle 20 implemented four policy-compliance fixes to the indexer (P-66, P-67, P-68, and comma-split scope restriction). All four work items completed with acceptance criteria met. Post-review identified two significant merge artifacts from WI-727's rework pass: orphaned bare derivation calls in `rebuildIndex` and the old `hasJournalUpdate` guard left alongside the new `hasDerivedEdgeUpdate` guard in `indexFiles`. Both cause double-execution of derivation functions; data correctness is preserved by P-67 but `stats.edges_created` is inflated and incremental performance is degraded.

  ## Phase Convergence
  Phase: PH-039
  Cycles completed in this phase: 1 / 5 (threshold)
  Convergence status: First cycle — no trend data

  Trend: First cycle in phase. Two significant findings, both merge cleanup artifacts from a single work item (WI-727). Addressable in one targeted commit.

  ## Project Progress

  | Success Criterion | Status |
  |---|---|
  | `belongs_to_cycle` edge type registered in all three required locations | pass |
  | `deriveJournalEntryCycleEdges` implements delete-before-insert (P-67) | pass |
  | `indexFiles` trigger guard covers all upstream artifact types (P-68) | partial — old guard not removed, causing double-trigger |
  | Comma-split restricted to `derived_from` field only | pass |
  | All tests pass (1162 tests) | pass |

  ## Critical Findings
  None.

  ## Significant Findings
  - [code-reviewer] Orphaned bare derivation calls in `rebuildIndex` lines 1013–1015 cause both `deriveJournalEntryEdges` and `deriveJournalEntryCycleEdges` to run twice per rebuild; `stats.edges_created` is inflated — relates to: WI-727, P-67
  - [code-reviewer] `hasJournalUpdate` guard (lines 798–803) retained alongside `hasDerivedEdgeUpdate` in `indexFiles`; journal file changes trigger four derivation calls instead of two — relates to: WI-727, P-68

  ## Minor Findings
  - [gap-analyst] No test asserts `stats.edges_created` accuracy when derived edges are present; inflated count went undetected by test suite — relates to: WI-727 → carry-forward
  - [gap-analyst] WI-725 has no explicit P-49 backfill assessment; implicit conclusion (no backfill needed for runtime-derived edges) is correct but undocumented — relates to: WI-725, P-49 → carry-forward
  - [spec-reviewer] Duplicate 'Phase 3' comment label at indexer.ts lines 1011 and 1021 — relates to: cross-cutting → carry-forward
  - [gap-analyst] Pre-existing test coverage gap: `review_output` and `domain_index` types absent from document-type coverage test loop (indexer.test.ts:1154) — relates to: cross-cutting → carry-forward

  ## Suggestions
  - [gap-analyst] Q-117 (burst writes) and Q-118 (hash-check table scans) unaffected by cycle 20; continue aging without new information unless explicitly scheduled

  ## Findings Requiring User Input
  None — all findings can be resolved from existing context.

  ## Proposed Refinement Plan
  Two significant findings require a refinement cycle. Both trace to a single root cause (WI-727 merge cleanup gap) and can be fixed in one targeted work item:

  **Fix scope**:
  - Remove bare derivation calls from `rebuildIndex` lines 1013–1015
  - Remove `hasJournalUpdate` block from `indexFiles` lines 798–803
  - Relabel Phase 3/4 comments consistently
  - Add one `stats.edges_created` accuracy test (after bare-call removal)
  - Add P-49 backfill assessment note to WI-725 resolution

  Estimated scope: 1 work item, low complexity. No architecture changes needed.
