  # Review Summary — Full Audit (2026-04-07)

  ## Overview
  Full audit of mcp/artifact-server (PR-002) after StorageAdapter validation layer convergence. The validation layer itself is complete and correct. The audit surfaced three new significant findings — a data-corruption bug in putNode rollback, a validation boundary mismatch between adapters and ppr.ts, and a security test coverage gap in hook allowlist enforcement — plus two significant gaps in LocalAdapter read-method validation.

  ## Phase Convergence
  Phase: PH-017 (Documentation & Cleanup)
  Convergence status: Not converged — new significant findings from full audit
  Trend: Validation layer converged at cycle 27; full audit reveals pre-existing issues outside the validation layer scope.

  ## Project Progress

  | Success Criterion | Status |
  |---|---|
  | LocalAdapter and RemoteAdapter have matching input validation for all write methods | pass |
  | All validation errors use specific error codes (not generic VALIDATION_ERROR) | pass |
  | adapter-contract.md accurately documents all error codes | partial (minor gaps: MISSING_CYCLE in consolidated list; cycle_modified injection undocumented) |
  | TRANSACTION_FAILED wrapping on all write methods in both adapters | pass |
  | Equivalence test suite covers all validation codes cross-adapter | pass |
  | Test suite passes clean | pass (1084/0 fail) |
  | putNode rollback handles update path correctly | fail (S1) |
  | Validation consistent between adapter layer and ppr.ts | fail (S2) |
  | Security-relevant code has test coverage (P-58) | partial (S3: allowlist rejection untested) |
  | LocalAdapter read methods validate limit/offset | fail (SG1) |

  ## Critical Findings
  None.

  ## Significant Findings

  - [code-reviewer] putNode update rollback deletes original file instead of restoring it — `src/adapters/local/writer.ts:656-671` — cross-cutting (not covered by any single work item)
  - [code-reviewer] alpha=0/max_iterations=0 pass adapter validation but fail in ppr.ts with misleading error — `src/adapters/local/context.ts:231-232`, `src/ppr.ts:108-119` — cross-cutting
  - [code-reviewer] dispatchHook allowlist rejection has no unit test (P-58 violation) — `src/__tests__/hooks.test.ts` — cross-cutting
  - [gap-analyst] LocalAdapter queryNodes and queryGraph do not validate limit/offset (INVALID_LIMIT/INVALID_OFFSET missing from local path) — `src/adapters/local/reader.ts:394,527` — cross-cutting adapter equivalence
  - [gap-analyst] Neither adapter validates getNode id as non-empty string — `src/adapters/local/reader.ts:278`, `src/adapters/remote/index.ts:509` — cross-cutting adapter validation

  ## Minor Findings

  - [code-reviewer] _countNodesWithoutStatus swallows all errors silently — `src/adapters/remote/index.ts:1438-1443` → carry-forward
  - [code-reviewer] fetchCurrentCycle wraps network errors as VALIDATION_ERROR (semantically wrong) — `src/adapters/remote/index.ts:463-468` → carry-forward
  - [code-reviewer] LocalWriterAdapter.nextId throws plain Error for unsupported types (should be ValidationError) — `src/adapters/local/writer.ts:520` → carry-forward
  - [code-reviewer] deleteNode reverses P-44 write order (SQLite deleted before YAML) — `src/adapters/local/writer.ts:887-908` → carry-forward
  - [spec-reviewer] MISSING_CYCLE absent from consolidated error code list in adapter-contract.md — `docs/adapter-contract.md:541-565` → carry-forward
  - [spec-reviewer] putNode/patchNode cycle_modified auto-injection unspecified in contract — `docs/adapter-contract.md:60-110` → carry-forward
  - [gap-analyst] adapter-contract.md getNode section has no Validation or Error Codes block — `docs/adapter-contract.md:23-36` → carry-forward
  - [gap-analyst] No happy-path traverse equivalence test — tests/adapters/adapter-equivalence.test.ts → carry-forward
  - [gap-analyst] No equivalence test for appendJournalEntry — tests/adapters/adapter-equivalence.test.ts → carry-forward

  ## Findings Requiring User Input
  None — all findings can be resolved from existing context.

  ## Proposed Refinement Plan
  5 significant findings require a refinement cycle. Recommended work items:
  1. Fix putNode rollback to restore original content on SQLite failure (src/adapters/local/writer.ts)
  2. Tighten adapter alpha/max_iterations validation to match ppr.ts boundaries (context.ts + remote/index.ts)
  3. Add dispatchHook allowlist rejection test (src/__tests__/hooks.test.ts)
  4. Add INVALID_LIMIT/INVALID_OFFSET validation to LocalAdapter.queryNodes and queryGraph (src/adapters/local/reader.ts)
  5. Decide and implement getNode id validation; update adapter-contract.md getNode section accordingly
  Minor doc and test gaps can be bundled into a single cleanup work item.
