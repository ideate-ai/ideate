title: "`pretest` warning message says \"regenerate with tsc\" not \"regenerate with `npm run build:migration`\""
description: |
  - **File**: `/Users/dan/code/ideate/mcp/artifact-server/package.json:11`
  - **Issue**: The `pretest` staleness warning reads `regenerate with tsc`. The stated rationale for WI-174 (from Q-63 and cycle 019 gap analysis) was that `pretest` references `build:migration` as the recovery command. The current message does not reference `npm run build:migration`. A contributor seeing this warning cannot follow it to the newly added script without already knowing about it.
  - **Suggested fix**: Change the warning string in `pretest` from `'WARNING: migrate-to-v3.js may be stale — regenerate with tsc\n'` to `'WARNING: migrate-to-v3.js may be stale — run npm run build:migration from mcp/artifact-server/ to regenerate\n'`.
