content: |-
  ## Decision Log — Full Audit (2026-04-07)

  ### Context

  Full audit of mcp/artifact-server (PR-002, Adapter Refactor) triggered after the StorageAdapter validation layer converged in logical cycle 27. Covers the entire adapter codebase holistically. Three review outputs incorporated: code-quality (Fail), spec-adherence (Pass), gap-analysis (Fail).

  ### Key Findings (Cross-Referenced)

  **Theme A: putNode rollback deletes instead of restores (code-reviewer S1)**
  Code-reviewer identified that putNode's SQLite failure rollback deletes the original YAML file instead of restoring it. patchNode handles this correctly (saves and restores existingContent). Neither spec-reviewer nor gap-analyst flagged this — it is a new finding from the full audit not caught in incremental reviews. Impact: silent data corruption on failed updates.

  **Theme B: alpha=0 / max_iterations=0 validation boundary mismatch (code-reviewer S2)**
  Adapter-layer validation allows alpha >= 0 but computePPR rejects alpha <= 0. Callers see an error from an internal function with a message contradicting the advertised valid range. A cross-cutting consistency issue not visible from per-method review.

  **Theme C: dispatchHook allowlist rejection untested (code-reviewer S3)**
  P-58 violation: the primary security control against arbitrary command execution (allowlist enforcement in dispatchHook) has no unit test directly exercising the rejection path. Pre-existing gap not caught in validation layer cycles.

  **Theme D: LocalAdapter queryNodes/queryGraph missing limit/offset validation (gap-analyst SG1)**
  RemoteAdapter validates INVALID_LIMIT/INVALID_OFFSET; LocalAdapter silently passes negatives to SQLite. Contract documents both codes for both adapters. Equivalence tests exist for these codes but local path doesn't implement them — equivalence tests would fail against a real LocalAdapter for these cases.

  **Theme E: getNode lacks id validation (gap-analyst SG2)**
  All write methods validate INVALID_NODE_ID; getNode does not. Asymmetric validation-first coverage. Contract doc has no Validation section for getNode (MN1). Both reviewers (code and gap) independently converged on the adapter validation symmetry theme.

  ### Confirmed Working

  - Full validation layer: deleteNode, putEdge, removeEdges, patchNode IMMUTABLE_FIELD in both adapters
  - TRANSACTION_FAILED try/catch for all six write methods in both adapters
  - fetchCurrentCycle inside try block in RemoteAdapter.putNode and patchNode
  - adapter-contract.md matches implementation for all documented error codes
  - P-64 (ValidationError code strings), P-65 (vi.mock isolation), D-177 (Local unconditional / Remote skipIf), P-002 (specific code assertions) all confirmed adherent
  - P-40 (hook security): spawnSync with explicit argument array, shell: false
  - batchMutate equivalence: all 8 validation codes covered cross-adapter
  - Test suite: 1,084 passed, 306 skipped, 0 failed

  ### Open Questions for Next Refinement

  1. Fix putNode rollback: save originalContent before overwrite, restore on catch instead of unlink
  2. Fix alpha/max_iterations validation boundary: tighten adapter guards to match ppr.ts (alpha <= 0, max_iterations <= 0)
  3. Add dispatchHook allowlist rejection test (P-58)
  4. Add limit/offset validation to LocalAdapter queryNodes and queryGraph (INVALID_LIMIT, INVALID_OFFSET)
  5. Decide: add INVALID_NODE_ID validation to getNode? Update contract doc either way (add validation or explicit note that callers are responsible)
  6. Minor: MISSING_CYCLE in consolidated error code table; cycle_modified injection documented; adapter-contract.test.ts legacy IMMUTABLE_FIELD tests add .code; traverse/appendJournalEntry equivalence happy-path tests
