  ## Decision Log — Cycle 20

  ### Decisions Made

  **D1 — Register `belongs_to_cycle` in the edge type system (WI-725)**
  `belongs_to_cycle` added to EDGE_TYPES, EDGE_TYPE_REGISTRY, and adapter-contract.md. P-66 compliance. No rework.

  **D2 — Apply delete-before-insert in `deriveJournalEntryCycleEdges` (WI-726)**
  Function made idempotent per P-67. One rework pass to correct scoping of delete step.

  **D3 — Expand `hasDerivedEdgeUpdate` trigger guard in `indexFiles` (WI-727)**
  Replaced narrow `hasJournalUpdate` with broader guard covering journal, cycle_summary, and work_item files. P-68 compliance. One rework pass plus merge cleanup gap that left dead code in place.

  **D4 — Restrict comma-split to `derived_from` only (WI-728)**
  Comma-split path in `extractEdges` gated on `spec.yaml_field === 'derived_from'`. No rework.

  ### Execution Notes

  WI-727 rework that resolved a duplicate `deriveJournalEntryEdges` definition left two merge artifacts: (1) bare calls at rebuildIndex lines 1013–1015, (2) old `hasJournalUpdate` block at indexFiles lines 798–803. These are the root cause of both post-review significant findings.

  ### Review Findings Summary

  All three reviewers independently converged on the same two significant issues:
  - **S1**: Orphaned bare derivation calls in `rebuildIndex` (lines 1013–1015) — double execution, inflated `stats.edges_created`
  - **S2**: `hasJournalUpdate` guard retained alongside `hasDerivedEdgeUpdate` in `indexFiles` (lines 798–803) — double derivation on journal file changes

  P-67 prevents data corruption in both cases. Fix: delete lines 1013–1015 and lines 798–803, relabel Phase 3/4 comments.

  ### Connections to Prior Cycles

  Cycle 20 is the first implementation cycle for P-66, P-67, P-68 (all established in cycle 19). P-67 acted as a safety net — without it, S1 and S2 would be data-corruption bugs rather than stats/performance issues. The policies are working as a system.

  ### Open Questions
  - **OQ-1**: Cleanup of lines 1013–1015 and 798–803 required before cycle closes
  - **OQ-2**: Add `stats.edges_created` accuracy test after S1 is fixed (not before — would assert inflated value)
  - **OQ-3**: Add formal P-49 backfill assessment note to WI-725 record
  - **OQ-4**: Q-117 and Q-118 remain open, unaffected by cycle 20 work
