content: |-
  ## Decision Log — Cycle 20 (WI-742/743/744)

  ### Decision 1 — Move exhaustiveness sentinel from tests/ to adapter.ts src/
  WI-742 incremental review found that `tests/` is excluded from tsconfig include glob (`src/**/*`), so the sentinel in `always-include-types-validation.test.ts` was never evaluated by `tsc --noEmit`. Resolution: added `_ExhaustiveNodeTypeCheck` sentinel inline in `adapter.ts:77-84`. This is evaluated on every `tsc --noEmit` run. The copy in tests/ is now redundant (deferred for removal).

  ### Decision 2 — Remove : readonly NodeType[] widening annotation
  The explicit type annotation on ALL_NODE_TYPES widened `typeof ALL_NODE_TYPES[number]` to the full `NodeType` union, making the exhaustiveness check tautological. Removed; `as const` retained. No call-site regressions (tsc clean, 1170 tests pass).

  ### Decision 3 — Fix import ordering for EdgeType/EDGE_TYPES in adapter.ts
  `import type { EdgeType }` moved to precede `export type { EdgeType }` re-export. Pattern is valid under NodeNext; comment retained explaining the dual import/re-export.

  ### Decision 4 — Add null-status getDomainState test
  New test in adapter-contract.test.ts guards `n.status IS NULL` clause in reader.ts:854. Confirms null-status policies appear in getDomainState results. Analogous paths for decisions/questions deferred (OQ-1).

  ### Decision 5 — Remove three redundant as NodeType casts
  Casts on `'domain_policy'` were redundant after WI-742 annotation removal. Removed for consistency with rest of test file.

  ### Decision 6 — Correct stale handler names via MCP
  architecture.yaml file registry: handleGetWorkItemContext→handleGetArtifactContext (context.ts:216), handleGetProjectStatus→handleGetWorkspaceStatus (analysis.ts:650). Used ideate_write_artifact only (P-37).

  ### Deferred Items
  - OQ-1: getDomainState null-status coverage for decisions/questions
  - OQ-2: ALL_NODE_TYPES runtime length assertion too loose
  - OQ-3: Remove redundant sentinel from always-include-types-validation.test.ts

  ### Cross-References
  - All three reviewers independently identified the dual-sentinel situation (code quality M1, spec M1, gap MN1) from different angles — all agree it is deferred.
  - Spec reviewer confirmed P-59 compliance; gap analyst confirmed prior findings MI1/MI2/S1 all resolved.
