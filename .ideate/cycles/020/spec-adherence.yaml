content: |-
  ## Spec Adherence Review — Cycle 20

  **Verdict**: Fail

  ## Critical Findings

  - [C1] `src/adapters/local/writer.ts:474,481` — nextId() cycle validation still uses raw field name `"cycle"` as the second ValidationError argument (produces code `"VALIDATION_ERROR"` instead of `"INVALID_CYCLE"`). WI-667 scope listed `local/index.ts` for cycle validation fixes but the actual code is in `writer.ts`. Remote adapter was correctly fixed. P-64 violation.
    Corroborating: `src/__tests__/nextid-cycle-validation.test.ts:232` still asserts `code === "VALIDATION_ERROR"` with `details.field === "cycle"`.

  ## Significant Findings

  - [S1] `docs/adapter-contract.md:104` — patchNode Validation section states "type must be a valid NodeType if provided (immutable fields cannot be changed)." `UpdateNodeInput` has no `type` field and no `INVALID_NODE_TYPE` guard exists in either adapter's patchNode. WI-668's resolution explicitly removed this as dead code. WI-673 criterion 5 requires the contract to accurately reflect WI-668 validation — this line is inaccurate and should be removed.

  ## Minor Findings

  - [M1] `src/ppr.ts:112,121,130,139` — four ValidationError calls use raw field names ("alpha", "maxIterations", "convergenceThreshold", "maxNodes") producing `VALIDATION_ERROR` code. Outside cycle 20 file scope; callers via adapter always hit `context.ts` validation first. Tests calling computePPR directly observe wrong codes.
  - [M2] `tests/adapters/local-adapter-validation.test.ts:490` — test titled "rejects negative cycle number with INVALID_CYCLE" only asserts `.rejects.toThrow(ValidationError)` without checking `.code`. The name is misleading — it does not verify the specific code, and because writer.ts produces VALIDATION_ERROR (not INVALID_CYCLE), the test passes while masking the wrong behavior.

  ## Principle Adherence Confirmed

  - P-65: vi.mock isolation pattern followed correctly — module-level vi.mock only in new files
  - P-53: adapter-contract.md no longer references concrete storage formats
  - P-58: putNode/patchNode validation covered with both error and happy-path tests
  - P-002: New test files assert specific error codes, not generic throws
