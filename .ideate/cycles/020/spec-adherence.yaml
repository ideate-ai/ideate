  ## Spec Review — Cycle 20

  **Verdict**: Pass

  ### Policy Compliance
  - **P-66**: Met. `belongs_to_cycle` registered in EDGE_TYPES, EDGE_TYPE_REGISTRY, and adapter-contract.md (WI-725).
  - **P-67**: Met. Both derivation functions implement targeted delete-before-insert scoped to their own edge type.
  - **P-68**: Substantively met. `hasDerivedEdgeUpdate` covers journal entries, cycle_summary, and work_item file types. Retention of `hasJournalUpdate` causes extra triggering but is not a P-68 violation.
  - **P-36 / P-50**: Met. All new code paths have corresponding tests.

  ### Significant Findings

  **S1: `indexFiles` retains superseded `hasJournalUpdate` guard — double derivation on journal file changes**
  - File: `src/indexer.ts:798–803`
  - WI-727 resolution field states 'hasDerivedEdgeUpdate replaces hasJournalUpdate' but old guard was not removed. Two derivation runs per journal file change.

  **S2: `rebuildIndex` orphaned bare derivation calls at lines 1013–1015**
  - File: `src/indexer.ts:1013–1015`
  - Leftover merge artifact from WI-727 rework. Causes double derivation and inflated `stats.edges_created`.

  ### Minor Findings

  **M1: Stale-removal test for `deriveJournalEntryCycleEdges` uses `rebuildIndex` rather than direct call**
  - File: `src/__tests__/indexer.test.ts:1931–1964`
  - Test exercises observable outcome correctly but does not isolate whether `deriveJournalEntryCycleEdges` itself removes the stale edge (the full wipe in Phase 2 removes it first). Idempotency test (lines 1865–1928) correctly isolates the function.

  **M2: Duplicate 'Phase 3' comment at `src/indexer.ts:1011` and `1021`**

  ### Acceptance Criteria
  All acceptance criteria for WI-725, WI-726, WI-727, WI-728 are met.
