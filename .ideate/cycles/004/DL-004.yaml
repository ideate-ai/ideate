  # Decision Log — autopilot Cycle 004
  
  **Brrr run**: WI-102 through WI-116 (autopilot autonomous run, Cycle 4)
  **This cycle scope**: WI-113 (Fix quality_summary skill field)
  **Full review**: Yes (cycle 4 triggers full review: cycle_number=4 ≥ last_full_review_cycle + full_review_interval)
  **Date**: 2026-03-22
  
  ---
  
  ## Execution Phase
  
  ### D1: WI-113 — one-word fix resolved cycle 003 significant finding II1
  - **When**: Execution — WI-113, 2026-03-22
  - **Decision**: Changed `"skill":"review"` to `"skill":"autopilot"` at `skills/autopilot/phases/review.md:235`.
  - **Rationale**: `artifact-conventions.md:735` canonically specifies the two-value enum; autopilot-emitted events must use `"autopilot"`.
  - **All 3 acceptance criteria**: Pass. Q-14 is now closed.
  
  ---
  
  ## Review Phase — Full Review
  
  ### D2: Full review triggered — cycle 4 meets interval threshold
  - **When**: Phase 6b, 2026-03-22
  - **Decision**: Full review (not differential) because `cycle_number(4) - last_full_review_cycle(1) = 3 ≥ full_review_interval(3)`. Updated `last_full_review_cycle` to 4.
  - **Impact**: All source files reviewed, revealing two pre-existing bugs in `scripts/report.sh` that were not caught by any prior incremental or cycle review.
  
  ### D3: Two critical bugs found in report.sh — nested vs flat severity path
  - **When**: Capstone review — code-quality C1/C2, spec-adherence S1, 2026-03-22
  - **Finding**: `scripts/report.sh` reads severity counts from flat top-level keys (`qe.get('critical', 0)`) but the `quality_summary` event schema nests them at `findings.by_severity.{critical,significant,minor}`. Both the Per-Cycle Breakdown (lines 207–209) and Quality Trends (lines 376–378) sections are affected. All severity columns will always display 0.
  - **Root cause**: WI-094 note implied flat keys; WI-093 SKILL.md defined nested structure. The specs were inconsistent across the two work items; the executor implemented conflicting assumptions.
  - **Resolution**: WI-114 will fix both locations.
  
  ### D4: Significant bug found in report.sh — camelCase key mismatch breaks auto-discovery
  - **When**: Capstone review — code-quality S1, spec-adherence S2, 2026-03-22
  - **Finding**: `discover_metrics()` reads `config.get('artifact_dir')` (snake_case) but all skills and the MCP server write `artifactDir` (camelCase). Auto-discovery exits with error for every real project.
  - **Resolution**: WI-114 will fix the key lookup to accept both forms; WI-114 will also update the HELP text.
  
  ### D5: Significant gap — metrics.jsonl absent from artifact-conventions.md
  - **When**: Capstone review — gap-analyst G-S1, code-quality M2, 2026-03-22
  - **Finding**: `artifact-conventions.md` is the authoritative schema reference for the artifact directory but has no entry for `metrics.jsonl` — neither in the directory tree nor in the file specification sections. Added by WI-092/093 but never documented in the conventions file.
  - **Resolution**: WI-115 will add the directory tree entry and a full specification section with both event schemas.
  
  ### D6: Cycle 004 not converged — 2 critical + 4 significant findings
  - **When**: Phase 6c convergence check, 2026-03-22
  - **Decision**: Condition A fails (critical_count=2, significant_count=4). Condition B passes (Principle Violations: None). Proceeding to refinement.
  
  ---
  
  ## Refinement Phase
  
  ### D7: Three work items created to address critical and significant findings
  - **When**: Phase 6d refinement, 2026-03-22
  - **Decision**:
    - WI-114: Fix report.sh — nested severity path and camelCase auto-discovery key (addresses C1, C2, S1 from code-quality; S1, S2 from spec-adherence; G-M1 from gap-analyst)
    - WI-115: Add metrics.jsonl to artifact-conventions.md (addresses G-S1 from gap-analyst; M2 from code-quality)
    - WI-116: Fix stale reviews/final/ paths in skills/refine/SKILL.md (addresses M1 from code-quality; M1 from spec-adherence — minor, included to clear persistent stale path debt)
  
  ---
  
  ## Open Questions
  
  ### OQ1: WI-094 acceptance criteria 3, 7, 12 remain unmet until WI-114 ships
  - **Question**: WI-094 had 3 unmet acceptance criteria (auto-discovery, Per-Cycle Breakdown severity columns, Quality Trends). WI-114 fixes all three. After WI-114, these criteria should be re-verified.
  - **Who answers**: Verified by WI-114 incremental review.
  
  ### OQ2: report.sh fmt_ms(0) displays "0s" instead of "-" for missing timing data
  - **Source**: code-quality M3 (cycle 004)
  - **Impact**: Spawns with missing wall_clock_ms data appear as "0s" rather than "-". Display ambiguity only.
  - **Deferred**: Minor display issue; deferred to a future micro-fix.
  
  ---
  
  ## Cross-References
  
  ### CR1: Q-14 closed by WI-113
  - WI-113 executed: `"skill":"autopilot"` at `skills/autopilot/phases/review.md:235`. All 3 criteria Pass. Q-14 is closed.
  
  ### CR2: report.sh bugs are pre-existing from prior autopilot run (WI-092 through WI-094)
  - The bugs at lines 207–209 and 376–378 were introduced during the previous autopilot run (cycle 004 in that session, WI-092–094). They survived incremental review because per-item reviewers lacked the full schema context needed to detect the mismatch across WI-093 and WI-094. The full capstone review in this cycle surfaced them.
  - The incremental review unverifiable-claims block is the designed catch for this: it flags claims the incremental reviewer cannot verify independently. WI-093/WI-094 reviewers did not flag the cross-item schema consistency. This is a known gap in incremental review coverage.
