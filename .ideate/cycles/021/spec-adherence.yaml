  - **P-65**: Module-level vi.mock only in new file (remote-adapter-validation.test.ts was created in WI-671). No vi.mock added to pre-existing files.
  - **P-002**: deleteNode/putEdge/removeEdges validation covered by local-adapter-validation.test.ts AC-7, remote-adapter-validation.test.ts AC-676, and nextid-cycle-validation.test.ts.
  - **P-58**: Input validation for all mutating methods (deleteNode, putEdge, removeEdges, putNode, patchNode, nextId) has test coverage.
  - **D-177**: LocalAdapter equivalence tests run unconditionally; RemoteAdapter tests use `it.skipIf(!remoteAvailable)`. Verified in adapter-equivalence.test.ts.
  - **P-53**: adapter-contract.md no longer references concrete storage formats.
