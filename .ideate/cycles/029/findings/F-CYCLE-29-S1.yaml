title: executeOnceWithAuth ConnectionError retried by outer execute() loop
description: executeOnceWithAuth throws ConnectionError on network failure. isRetryableError returns true for all ConnectionError instances, so the outer execute() retry loop retries the entire flow including tokenProvider rotation. This causes up to 3 tokenProvider calls and 7+ seconds of backoff for what should be an immediate failure. Introduced by WI-837.
