id: gap-analysis
type: cycle_summary
reviewer: gap-analyst
content: |
  ## Verdict: Pass

  No Critical or Significant gaps. Five Minor findings, all documentation or deferred-infrastructure.

  ## Missing Requirements from Interview

  None.

  ## Unhandled Edge Cases

  ### EC1: Script fail-fast path for unreachable remote backend has no automated test (Minor)
  - scripts/report-tool-usage.sh:229-239: when backend='remote' and endpoint is unreachable, rawAdapter.initialize() throws and script exits 2. Correct code path but no test in scripts/tests/ covers it.
  - Recommendation: Defer. Path is straightforward try/catch/exit; RemoteAdapter not yet in production use.

  ## Incomplete Integrations

  ### II1: remote-contract.test.ts does not pass seedToolUsage, silently skipping RemoteAdapter getToolUsage seeded tests (Minor)
  - Producer: adapter-contract.test.ts runAdapterContractTests factory (line 68).
  - Consumer: remote-contract.test.ts line 66 — passes no options, so seedToolUsage is undefined.
  - Every getToolUsage test that guards 'if (!options.seedToolUsage) return' is silently skipped. WI-863's AC says 'both LocalAdapter and RemoteAdapter pass the contract' but seeded tests cannot pass or fail — they are skipped. Two unconditional shape tests do run (trivially against the stub's empty array).
  - Recommendation: Defer. Would become Significant once the remote endpoint is implemented. Update comment at adapter-contract.test.ts:1653 to say 'skipped (not deferred)'.

  ## Missing Infrastructure

  ### MI1: config.json 'backend' field absent from README.md (Minor)
  - Field branched in report-tool-usage.sh (WI-862) and server.ts selectAdapter. No user-facing doc.
  - Recommendation: Defer until RemoteAdapter's tool_usage endpoint is implemented. Add 'Configuration' section covering backend, remote.endpoint, remote.org_id, remote.codebase_id.

  ### MI2: getToolUsage method absent from docs/adapter-contract.md (Minor)
  - All 18 other StorageAdapter interface methods documented; getToolUsage missing.
  - Recommendation: Defer. Well-covered by contract tests and inline comments. Add during next doc-sync cycle.

  ### MI3: ValidatingAdapter.getToolUsage validates only 3 of 9 row fields (Minor)
  - Validates id, tool_name, timestamp. Does not validate session_id, cycle, phase, request_tokens, response_tokens, request_bytes, response_bytes.
  - Recommendation: Defer. All current adapters produce correctly typed rows. Add type guards when RemoteAdapter's getToolUsage is implemented. Overlaps with code-reviewer M1 (request_bytes/response_bytes specifically).

  ## Implicit Requirements

  None. Phase scope was narrow and implementation-complete.

  ## Summary

  The core telemetry pipeline — context read → wiring → insert → query → report — is tested end-to-end by new tests in telemetry-wiring.test.ts, instrumentation.test.ts, and tool-usage-tool.test.ts. The LocalAdapter contract is fully exercised with seedToolUsage. The RemoteAdapter stub is acknowledged. The --limit 0 guard is implemented and documented. PH-048 resolves all six cycle-28 minor findings without introducing new gaps of consequence.
