title: getConvergenceData remote post-filter includes empty-string addressed_by findings (inverted guard)
description: Filter at remote/index.ts:1357 is `addressedBy !== null && addressedBy !== undefined && addressedBy !== ""`. For addressedBy="", this evaluates to false, so continue is NOT triggered, so empty-string finding is COUNTED. LocalAdapter SQL `addressed_by IS NULL` evaluates FALSE on empty string (row is NOT in result set) — SQL EXCLUDES empty-string rows. Adapters diverge for addressed_by="". Introduced by WI-869 in cycle 31, surfaced by cycle 32 when WI-871 added the parallel countNodes path using the correct 2-clause filter.
suggestion: Change remote/index.ts:1357 to `if (addressedBy !== null && addressedBy !== undefined) { continue; }` to match _countFindingsBySeverity and LocalAdapter SQL semantics.
