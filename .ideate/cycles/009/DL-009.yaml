  # Decision Log — Cycle 009
  
  **Cycle**: 009
  **Date**: 2026-03-22
  **Work items**: WI-121
  **Review verdict**: Fail (SG1 — `agents/code-reviewer.md` out of sync with new P-22)
  
  ---
  
  ## Decision Log
  
  ### DL-1: Reject unconditional-Andon as the startup-failure response
  
  - **When**: Refine-011 interview, 2026-03-22 — user correction after Cycle 008 delivery
  - **Decision**: The unconditional-Andon startup-failure rule introduced by WI-120 was wrong and must be replaced. Startup failures that have a diagnosable, in-scope root cause should be fixed autonomously; Andon escalation is reserved for cases where the root cause cannot be corrected within the current work item's scope.
  - **Rationale**: GP-6 ("User intervention is reserved for critical issues that cannot be resolved from existing steering documents") and P-5 both imply that escalation must be the last resort, not the default. The Cycle 008 rule escalated fixable failures unnecessarily.
  
  ### DL-2: Scope WI-121 to three files, exclude code-reviewer agent
  
  - **When**: Refine-011 planning session, 2026-03-22
  - **Decision**: WI-121 targets exactly `skills/execute/SKILL.md`, `skills/brrr/phases/execute.md`, and `specs/domains/workflow/policies.md` — and explicitly excludes `agents/code-reviewer.md`.
  - **Rationale**: The code-reviewer's description of downstream handling behavior was treated as a secondary concern deferred to a future cycle.
  - **Implications**: `agents/code-reviewer.md` ~line 91 still instructs the code-reviewer that startup failure is "an Andon-level issue" — inconsistent with the new protocol. This becomes SG1.
  
  ### DL-3: Add smoke-test re-failure fallback as M1 fix during execution
  
  - **When**: Execution of WI-121, 2026-03-22 — incremental review M1, fixed before delivery
  - **Decision**: Both skill files extended beyond the specified replacement text to add: "If the smoke test still fails after the fix, treat the root cause as indeterminate and route to the Andon cord."
  - **Rationale**: Without this clause the executor had no instruction if the post-fix smoke test still failed. The fix was behaviorally consistent with P-22's existing "cause is indeterminate" Andon trigger.
  - **Implications**: The two skill files now encode a smoke-test re-run requirement and its failure path that P-22 does not mention. Creates OQ-2 (see below).
  
  ### DL-4: Gap analysis verdict Fail on SG1
  
  - **When**: Cycle 009 capstone gap analysis, 2026-03-22
  - **Decision**: Fail verdict because `agents/code-reviewer.md` still describes startup failure as "scope-changing — this is an Andon-level issue," which contradicts the diagnose-and-fix protocol now encoded in the skill files and P-22.
  - **Implications**: Until corrected, any code-reviewer reading its own instructions will believe Andon is the correct and only response to a startup failure.
  
  ---
  
  ## Open Questions
  
  ### OQ-1 (significant): `agents/code-reviewer.md` startup-failure language still describes unconditional Andon
  
  - **Source**: Gap analysis SG1
  - **Impact**: The code-reviewer agent definition contradicts the executor protocol. Every execution cycle uses this agent.
  - **Fix needed**: Change `agents/code-reviewer.md` ~line 91: remove "and treat it as scope-changing — this is an Andon-level issue" or replace with language consistent with the diagnose-and-fix protocol.
  - **Consequence of inaction**: Code-reviewers will continue to instruct that startup failure is unconditionally Andon-level; fixable startup failures escalated to user unnecessarily.
  
  ### OQ-2 (minor): P-22 does not document the smoke-test re-run step or its failure path
  
  - **Source**: Code quality M1; spec-adherence D1
  - **Impact**: P-22 is less precise than the skill files it governs. Future work items modifying the startup-failure path may not preserve the re-run step.
  - **Fix**: Append to P-22: "When a surgical fix is applied, the smoke test must be re-run; if it still fails, the failure is classified as indeterminate and routes to Andon."
  
  ### OQ-3 (deferred, Cycle 007): Smoke-test blocking — smoke test cannot execute
  
  - **Impact**: Executor has no signal about fix success; no instruction for what to do next.
  
  ### OQ-4 (deferred, Cycle 007): Library projects with no startup command
  
  - **Impact**: Library projects silently skip the startup-failure safety net; may be correct by design but is undocumented.
  
  ### OQ-5 (minor): No journal instruction on the unfixable Andon path
  
  - **Source**: Gap analysis MG1
  - **Fix**: Insert before Andon routing: "Append to journal: `Diagnosis: {root cause finding}. Routing to Andon — cause not fixable within work item scope.`"
  
  ---
  
  ## Cross-References
  
  ### CR1: Smoke-test re-failure path — policy gap
  
  Code quality M1 and spec-adherence D1 independently identified the same gap: the smoke-test re-run step introduced as an execution-time M1 fix was never back-propagated to P-22. Both point to OQ-2. Fix is a single sentence addition to P-22 with no behavioral change.
  
  ### CR2: Code-reviewer agent inconsistency — scope boundary and gap
  
  The DL-2 scoping exclusion of `agents/code-reviewer.md` is what produced the SG1 gap. The three reviewers are not in contradiction — code-quality and spec-adherence correctly found nothing wrong within the three changed files; the gap-analyst correctly found that the broader agent ecosystem was not updated. OQ-1 is the actionable item.
