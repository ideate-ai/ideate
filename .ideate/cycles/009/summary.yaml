content: |-
  # Review Summary — Cycle 9 (PH-019 StorageAdapter Extraction)

  ## Overview
  The StorageAdapter interface is well-designed and the LocalAdapter correctly encapsulates storage operations. All 630 tests pass. However, the adapter is never wired into the production runtime — ctx.adapter is undefined, making all adapter delegation branches dead code. The refactoring is structurally complete but not operationally active.

  ## Phase Convergence
  Phase: PH-019
  Cycles completed: 1 / 5 (threshold)
  Convergence status: Not converged
  Trend: First cycle — critical wiring gap identified

  ## Critical Findings

  - [code-reviewer] C1: ctx.adapter is never set in server.ts initServer(). ToolContext is built as {db, drizzleDb, ideateDir} without an adapter field. All if(ctx.adapter) branches in tool handlers are permanently dead code. The refactor's business value (runtime decoupling) is not delivered. — relates to: WI-556, cross-cutting
  - [gap-analyst] II1/MI1: Same finding. server.ts constructs ToolContext without LocalAdapter. selectAdapter() validates config but returns void — it does not create or return an adapter instance. — relates to: WI-556, cross-cutting

  ## Significant Findings

  - [code-reviewer] S1: context.ts creates LocalContextAdapter directly (line 806, 1149) instead of using ctx.adapter.traverse(). LocalAdapter.traverse() is an unimplemented stub. PPR works because context.ts bypasses the interface. — relates to: WI-554
  - [code-reviewer] S2: batchMutate defaults status to 'pending' while putNode defaults to null. Inconsistent write behavior between the two paths. — relates to: WI-552
  - [code-reviewer] S3: handleAppendJournal casts to LocalAdapter for putNodeForJournal — a method not on StorageAdapter. handleArchiveCycle uses archiveCycleLocal similarly. Both break the abstraction. — relates to: WI-552
  - [gap-analyst] EC1: handleAppendJournal makes direct ctx.db call for cycle number lookup even when adapter is set. — relates to: WI-552
  - [gap-analyst] II2: metrics.ts imports db-helpers directly, no adapter path. — relates to: cross-cutting
  - [gap-analyst] II3: context.ts never uses ctx.adapter for node/edge reads. — relates to: WI-554
  - [gap-analyst] II4: analysis.ts buildProjectView/buildPhaseView bypass adapter unconditionally. — relates to: WI-553
  - [gap-analyst] II5: LocalAdapter.traverse throws 'not yet implemented'. — relates to: WI-554
  - [gap-analyst] MI2: createAdapter declared in adapter.ts but never implemented. — relates to: WI-551
  - [spec-reviewer] D7/N2/N3: Config uses 'url' instead of spec-defined 'endpoint', missing 'codebase_id'. — relates to: WI-556
  - [spec-reviewer] U1/U2: putNodeForJournal and archiveCycleLocal are non-interface methods exposed to handlers via instanceof casts. — relates to: WI-552

  ## Minor Findings

  - [code-reviewer] M1: archiveCycle doesn't throw NotFoundError per JSDoc → carry-forward
  - [code-reviewer] M2: nextId shadowing between writer and reader → carry-forward
  - [code-reviewer] M3: selectAdapter() returns void despite name implying return → carry-forward
  - [gap-analyst] EC2: archiveCycle idempotency case untested → carry-forward
  - [gap-analyst] EC3: Migration v3→4 doesn't handle missing config.json → carry-forward
  - [spec-reviewer] N1: adapter optional in ToolContext vs required in spec → carry-forward

  ## Findings Requiring User Input
  None — all findings are implementable from existing specs.

  ## Proposed Refinement Plan

  1. **Wire adapter in server.ts** (Critical): Construct LocalAdapter in initServer, assign to ctx.adapter. Change selectAdapter to return the adapter. This is the #1 priority — without it, the refactor is non-functional.
  2. **Wire LocalAdapter.traverse**: Delegate to LocalContextAdapter.traverse instead of throwing. Update context.ts to use ctx.adapter.traverse() when adapter is set.
  3. **Add interface methods for journal/archive**: Add appendJournalEntry and improve archiveCycle on StorageAdapter interface. Remove instanceof casts from write.ts.
  4. **Fix remaining direct DB calls**: context.ts node/edge reads, analysis.ts project/phase views, metrics.ts, execution.ts.
  5. **Fix config naming**: url→endpoint, add codebase_id.
  6. **Fix batchMutate status default**: Match putNode (null, not 'pending').

  Estimated: 4-6 work items, mix of small and medium complexity.
