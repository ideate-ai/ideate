  # Decision Log — Cycle 007
  
  **Brrr run**: Standalone execute + review (not brrr)
  **Work items**: WI-117, WI-118, WI-119
  **Date**: 2026-03-22
  
  ---
  
  ## Execution Phase
  
  ### D1: WI-117 — Dynamic Testing section added to code-reviewer agent
  - **When**: Execution, WI-117, 2026-03-22
  - **Decision**: Added `### 6. Dynamic Testing` section to `agents/code-reviewer.md` with testing model discovery (6 discovery sources), incremental scope (smoke test + targeted tests), and comprehensive scope (full test suite). Updated How to Review step 7.
  - **Rationale**: Code reviewers performed only static analysis; breaking app startup is an egregious failure that must be caught at incremental review. Guidance-based approach (not hard requirements) preserves domain agnosticism.
  
  ### D2: WI-118 — Incremental reviewer spawn prompts updated; false positive dismissed
  - **When**: Execution, WI-118, 2026-03-22
  - **Decision**: Added dynamic testing (incremental scope) instruction to `skills/execute/SKILL.md` Phase 7 and `skills/brrr/phases/execute.md`. Incremental reviewer Fail verdict (S1: AC5 out-of-scope changes) dismissed as false positive after git diff confirmed WI-118 added only the dynamic testing instruction; flagged changes are pre-existing from WI-105/106.
  - **Rationale**: False positive from uncommitted prior work in the working tree. Git diff is authoritative.
  
  ### D3: WI-119 — Capstone reviewer spawn prompts updated
  - **When**: Execution, WI-119, 2026-03-22
  - **Decision**: Added dynamic testing (comprehensive scope) instruction to `skills/review/SKILL.md` section 4.1 and `skills/brrr/phases/review.md`.
  - **All acceptance criteria**: Pass.
  
  ---
  
  ## Review Phase
  
  ### D4: Cycle 007 not converged — gap-analysis Significant finding II1
  - **When**: Capstone review, 2026-03-22
  - **Decision**: code-quality Pass, spec-adherence Pass, gap-analysis Fail (II1 Significant). Not converged.
  - **Finding II1**: Startup failure → Andon routing is not unconditionally enforced. `skills/execute/SKILL.md` Phase 8 instructs the execute skill to judge whether a Critical finding is scope-changing. A startup failure that appears trivially fixable (e.g., missing import) may be silently fixed rather than escalated to Andon, defeating the quality floor. Same gap in `skills/brrr/phases/execute.md` finding-handling block.
  - **Impact**: The quality floor ("never leave the codebase unable to start after a WI") is not guaranteed by the current finding-handling rules — it depends on the code-reviewer correctly labeling the finding as scope-changing AND the execute skill honoring that label.
  
  ### D5: Minor findings do not block convergence
  - **When**: Capstone review, 2026-03-22
  - **code-quality M1**: Cross-reference label format inconsistency (spawn prompts use "Dynamic Testing > Incremental review scope" but agent definition uses "Step 2 — Incremental review scope (single work item)"). Functionally navigable; documented for next pass.
  - **code-quality M2**: WI-118 Pass* relies on git history evidence; documented.
  - **gap-analysis EC1**: Smoke test blocking on external service dependencies — deferred.
  - **gap-analysis EC2**: Library projects have no startup proxy — deferred.
  - **gap-analysis MI1**: refine skill doesn't spawn code-reviewer — by design.
  - **gap-analysis IR1**: brrr controller needs no changes — confirmed clean.
  
  ---
  
  ## Open Questions
  
  ### OQ1: Should "Startup failure after ..." be an explicit named exception in Phase 8?
  - **Source**: gap-analysis II1 (cycle 007)
  - **Question**: Phase 8 currently routes Critical findings by asking whether the finding is "scope-changing." Startup failure may not appear scope-changing to a worker who can fix a typo in 30 seconds. Should Phase 8 include a named exception rule that startup failure Critical findings are always Andon-level?
  - **Who answers**: WI-120 (proposed next cycle).
  
  ---
  
  ## Cross-References
  
  ### CR1: II1 follows from the design intent stated in refine-009
  - The refinement interview (`steering/interviews/refine-009/_general.md`) stated: "finishing a work item which breaks an app is a fundamental requirement miss and isn't a small mistake." The gap-analysis finding II1 reveals that this intent is not yet encoded unconditionally in the execute skill's finding-handling logic. CR1 connects the user's stated design intent to the gap found in review.
  
  ### CR2: WI-118 false positive pattern recurs from prior sessions
  - This cycle's WI-118 false positive (pre-existing changes from prior brrr run flagged as out-of-scope) follows the same pattern seen in prior brrr sessions where uncommitted working tree changes accumulate across multiple work items. The recurring false positive suggests that committing between work items (or using worktree isolation) would eliminate this class of reviewer confusion.
