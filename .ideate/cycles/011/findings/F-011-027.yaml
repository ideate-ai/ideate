title: Inline code-reviewer prompts use narrower trigger condition than the agent definition
description: |
  - **File**: `skills/execute/SKILL.md:325`
  - **Issue**: The inline prompt passed to the code-reviewer agent reads: "If the project cannot build or start, report a Critical finding titled 'Startup failure after [work item name]'." WI-126 generalized the smoke test concept in the agent definition (agents/code-reviewer.md:94) to "If the smoke test fails, report this as a Critical finding." The inline prompts in both executor files were not updated, so a code-reviewer running under execute/autopilot would receive a narrower directive than its own agent instructions specify. For projects where the appropriate smoke test is an e2e test, library build, or CLI invocation (not a startup command), the inline prompt would not trigger the Critical finding even if that smoke test fails.
  - **Impact**: Smoke test failures for non-startup-command projects (library builds, e2e flows, CLI invocations) are not reported as Critical findings when the executor's inline prompt governs, undermining the WI-126 generalization.
  - **Suggested fix**: In `skills/execute/SKILL.md:325`, replace "If the project cannot build or start, report a Critical finding titled 'Startup failure after [work item name]'." with "If the smoke test fails, report a Critical finding titled 'Startup failure after [work item name]'." Apply the identical change in `skills/autopilot/phases/execute.md:113`.
