  - [code-reviewer] S2 / [gap-analyst] EC1+EC2: Triage skill Phase 5 uses wrong field names (acceptance_criteria→criteria, phase_id→phase). Work items created via triage lose acceptance criteria and phase assignment — triage/SKILL.md:174-176
  - [gap-analyst] EC3: Project skill writes horizon.completed but schema defines horizon.current. Projects created via skill have wrong horizon structure — project/SKILL.md:57
  - [gap-analyst] MI1+MI2 / [spec-reviewer]: New skills absent from ARCHITECTURE.md, README.md, CLAUDE.md. P-35 violation — documentation not updated for new components
  - [gap-analyst] II3: work_item_type filter implemented in query.ts but not declared in ideate_artifact_query inputSchema — index.ts
  - [spec-reviewer]: Phase view missing status field display — analysis.ts:428

  ## Minor Findings
  - [code-reviewer] M1: work_item_type template variable undefined in review skills → FIXED
  - [code-reviewer] M2: sed fallback in migrate-to-hierarchy.sh broken on macOS (literal \n)
  - [spec-reviewer] N1: triage name missing ideate: prefix → FIXED
  - [gap-analyst] II1: Journal skill enum missing 'project' value
  - [gap-analyst] IR1: Status skill missing model declaration in frontmatter

  ## Findings Requiring User Input
  None — all findings can be resolved from existing context.

  ## Proposed Refinement Plan
  6 significant findings require a refinement cycle. Estimated scope: 4-5 work items covering triage field fix, horizon logic rewrite, project skill schema alignment, documentation updates, and inputSchema fix. All are small complexity.
