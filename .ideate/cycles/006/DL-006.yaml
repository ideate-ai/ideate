content: |
  # Decision Log — Cycle 006
  
  ## Planning Phase
  
  ### D1: Address cycle 003 documentation debt in the same cycle as new metrics work
  - **When**: refine-004 planning session, 2026-03-20
  - **Decision**: Bundle three manifest.json documentation propagation fixes (WI-088, WI-089, WI-090) with new metrics instrumentation (WI-092, WI-093, WI-094) and stale script removal (WI-091) into a single cycle rather than running a separate micro-cycle for documentation only.
  - **Rationale**: All seven work items touch documentation artifacts and are non-overlapping in file scope. Bundling reduces cycle overhead while clearing the outstanding documentation debt from cycle 003. Recorded in `plan/overview.md` Group 1.
  - **Implications**: Seven work items execute in parallel, consistent with Principle 4 (Parallel-First Design). The cycle scope grows from three mandatory fixes to include new observability features.
  
  ### D2: Extend metrics.jsonl schema with token and MCP tracking fields across all skills
  - **When**: refine-004 planning, 2026-03-20
  - **Decision**: Add `input_tokens`, `output_tokens`, `cache_read_tokens`, `cache_write_tokens` (nullable integers), and `mcp_tools_called` (array) to every agent-spawn event in metrics.jsonl. Propagate the schema addition to all five skill SKILL.md files and `skills/brrr/phases/execute.md`.
  - **Rationale**: Token cost and MCP tool usage are the primary levers for evaluating spawn efficiency. These fields must be present in the log before a reporting script can surface them. Recorded in `plan/overview.md` Group 2.
  - **Implications**: Projects with earlier-cycle metrics entries will not have these fields; consumers must treat them as nullable. The WI-094 report script was designed with `or 0` fallbacks accordingly.
  
  ### D3: Emit a quality_summary event from the review skill after findings are compiled
  - **When**: refine-004 planning, 2026-03-20
  - **Decision**: After the four review agents complete, the review skill emits a `quality_summary` event to metrics.jsonl storing severity counts under `findings.by_severity` and per-reviewer breakdowns under `findings.by_reviewer`.
  - **Rationale**: The reporting script (WI-094) needs machine-readable review-cycle outcome data to populate the Quality Trends section. Storing the data in metrics.jsonl keeps the established single-file telemetry pattern. Recorded in `plan/overview.md` Group 2.
  - **Implications**: The `quality_summary` event was specified only for `skills/review/SKILL.md`. The brrr review phase (`skills/brrr/phases/review.md`) is a self-contained reimplementation that does not delegate to SKILL.md and does not inherit this emission. This architectural gap was not identified during planning (see OQ1).
  
  ### D4: Scope WI-093 implementation to skills/review/SKILL.md only
  - **When**: refine-004 planning, WI-093 work item scope definition
  - **Decision**: WI-093's file scope lists `skills/review/SKILL.md` only. `skills/brrr/phases/review.md` is not in scope.
  - **Rationale**: Not recorded. The brrr review phase was not identified as a parallel implementation of review orchestration that would also require the quality_summary block.
  - **Implications**: brrr-driven projects never emit `quality_summary` events. The Quality Trends section of `report.sh` is permanently empty for all brrr-driven projects. This is the root cause of gap-analysis SG1.
  
  ### D5: Implement report.sh as a standalone Python-inside-shell script using stdlib only
  - **When**: refine-004 planning, WI-094 implementation note
  - **Decision**: `scripts/report.sh` wraps a Python heredoc using only Python stdlib (`json`, `sys`, `os`, `pathlib`, `datetime`). No third-party libraries.
  - **Rationale**: The script must run in any environment where ideate is installed without a separate dependency install step. Recorded in `plan/overview.md` Group 3.
  - **Implications**: Output formatting is constrained to what plain Python can produce. Script requires only Python to be available on the PATH.
  
  ### D6: Auto-discovery for metrics.jsonl walks parent directories for .ideate.json
  - **When**: refine-004 planning, WI-094 implementation note
  - **Decision**: If no explicit metrics path is passed, `discover_metrics()` walks from `$PWD` to the filesystem root looking for `.ideate.json`, reads the artifact directory key, and constructs the metrics.jsonl path from it.
  - **Rationale**: Users running `report.sh` from anywhere inside a project should not need to remember the metrics file path.
  - **Implications**: The key name was documented in the work item note as `artifact_dir` (snake_case). The canonical key used by all skills is `artifactDir` (camelCase). This mismatch was not caught during planning and produced the C1/C2 critical bugs in the cycle 004 capstone. Fixed by WI-095.
  
  ### D7: Delete stale migration scripts and fix stale reviews/ paths in artifact-conventions.md (WI-091)
  - **When**: refine-004 planning, 2026-03-20
  - **Decision**: Delete `scripts/migrate-to-cycles.sh` and `scripts/migrate-to-domains.sh` (deferred from cycle 003 interview commitment) and fix remaining `reviews/` path references in `specs/artifact-conventions.md`. Scope narrowly to these two tasks.
  - **Rationale**: The cycle 003 interview committed to removing these scripts but no work item was created at that time.
  - **Implications**: `skills/refine/SKILL.md` was not in WI-091's scope and retained stale `reviews/final/` references. These were addressed by WI-097 in brrr cycle 2.
  
  ### D8: Execute WI-088 through WI-097 via brrr autonomous loop; skip domain curator on both brrr capstone cycles
  - **When**: brrr execution start, 2026-03-20
  - **Decision**: The ten work items (WI-088 through WI-097) were executed under brrr. The domain curator was explicitly skipped after both brrr-driven capstone reviews (cycles 004 and 005).
  - **Rationale**: Cycle 004 findings were implementation bugs in a single script and one documentation gap — not policy-grade conventions warranting domain knowledge updates. Cycle 005 had only minor documentation inconsistencies.
  - **Implications**: Domain layer was not updated during either brrr cycle. The domain curator will run as part of the cycle 006 capstone instead.
  
  ---
  
  ## Execution Phase
  
  ### D9: WI-090 rework expanded scope to fix 14 stale path references across four architecture.md sections
  - **When**: WI-090 incremental review, 2026-03-20
  - **Decision**: The incremental review found 14 remaining stale `reviews/` path references in architecture.md sections 1, 2, 3, and 7 that the original work item scope (permissions table and Section 8 only) did not cover. These were fixed during rework.
  - **Rationale**: Continuous review model — incremental reviews trigger rework before the capstone (Principle 5).
  - **Implications**: architecture.md is now fully consistent on the `archive/` path convention.
  
  ### D10: WI-093 rework added suggestion field to by_reviewer sub-objects
  - **When**: WI-093 incremental review rework, 2026-03-20
  - **Decision**: The incremental review (M2) found that `by_reviewer` sub-objects lacked the `suggestion` key present in `by_severity`. The rework added `suggestion` to `by_reviewer` for symmetry.
  - **Rationale**: Incremental review M2 identified asymmetry between the two dimensions. Full symmetry makes schema consistent for any future consumer.
  - **Implications**: `by_reviewer` now includes `suggestion` in schema and derivation rules. However, `report.sh` does not parse `by_reviewer` at all, leaving the field without a current consumer (see OQ3).
  
  ### D11: WI-094 rework replaced lexicographic cycle sort with numeric sort
  - **When**: WI-094 incremental review rework, 2026-03-20
  - **Decision**: Cycle sort was changed from lexicographic to numeric (with `(none)` sentinel separated from real cycle values) after the incremental reviewer identified incorrect ordering for cycle 10+.
  - **Rationale**: Standard correctness requirement for numeric ordering.
  - **Implications**: The incremental review caught the sort issue but did not catch the schema mismatch bugs (C1/C2) or key-name bug (S1) that were present in the same file and more severe.
  
  ### D12: brrr cycle 1 capstone (cycle 004) verdict Fail — three new work items created for cycle 2
  - **When**: brrr cycle 1 capstone review, 2026-03-20
  - **Decision**: Cycle 004 capstone issued a Fail verdict. brrr planned three new work items: WI-095 (fix report.sh integration bugs), WI-096 (document metrics.jsonl in artifact-conventions.md), WI-097 (fix stale reviews/final/ paths in skills/refine/SKILL.md).
  - **Rationale**: Two critical bugs and one significant documentation gap required a second brrr cycle per the convergence protocol.
  - **Implications**: brrr proceeded to cycle 2. Domain curator skipped for cycle 004.
  
  ### D13: WI-095 through WI-097 executed in parallel in brrr cycle 2
  - **When**: brrr cycle 2 execution, 2026-03-20
  - **Decision**: WI-095, WI-096, and WI-097 have non-overlapping file scopes and no dependencies between them; all three ran in parallel.
  - **Rationale**: Principle 4 (Parallel-First Design) — no reason to sequence when scopes are non-overlapping.
  - **Implications**: All three completed without rework. Cycle 005 capstone: 0 critical, 0 significant, 3 minor. brrr declared convergence.
  
  ### D14: brrr convergence declared after cycle 2 with three minor open items carried forward
  - **When**: brrr convergence check, 2026-03-20
  - **Decision**: brrr declared convergence after cycle 005. Three minor items (OQ1: heading level, OQ2: stale agent definition paths, OQ3: placeholder notation) were deferred without fix.
  - **Rationale**: brrr convergence criterion is zero critical and zero significant findings. Minor items do not block convergence.
  - **Implications**: OQ1, OQ2, and OQ3 carry forward to the cycle 006 capstone. All three were confirmed present by all three cycle 006 reviewers.
  
  ---
  
  ## Review Phase
  
  ### D15: Cycle 006 overall verdict is mixed — code and spec pass, gap analysis fails
  - **When**: Cycle 006 capstone review, 2026-03-21
  - **Decision**: Code-quality and spec-adherence issued Pass verdicts; gap-analysis issued Fail. The overall cycle 006 verdict is conditional pass: existing work is correct and complete against its acceptance criteria, but a significant feature gap exists.
  - **Rationale**: The gap-analysis Fail is based on a missing feature (quality_summary emission in brrr/phases/review.md) rather than a defect in what was implemented. All ten work items satisfy their acceptance criteria.
  - **Implications**: A new work item is needed in the next refinement cycle to add quality_summary emission to brrr/phases/review.md. The three carry-forward minor items (OQ1-OQ3 from brrr) and two new minor items (OQ4: refine cycle field; OQ7: report.sh undiscoverable) should also be addressed.
  
  ### D16: Gap-analyst re-elevated stale agent definition paths from minor to significant
  - **When**: Cycle 006 capstone review, gap-analysis SG2, 2026-03-21
  - **Decision**: The gap-analyst assessed the stale `reviews/incremental/` path in three agent definitions as significant rather than minor (the assessment carried forward from brrr cycles 004 and 005).
  - **Rationale**: Each review cycle compounds the impact — three agents operating without incremental review context means deduplication is silently broken on every cycle. The gap-analyst cited the compounding nature as justification for elevation.
  - **Implications**: Divergence between gap-analysis (significant) and code-quality/spec-adherence (minor) assessments of the same issue. The gap-analyst's severity assessment is better supported given the compounding impact.
  
  ---
  
  ## Open Questions
  
  ### OQ1: brrr review phase never emits quality_summary events
  - **Question**: Should `skills/brrr/phases/review.md` include a quality_summary emission block equivalent to `skills/review/SKILL.md` Phase 7.6? The `last_cycle_findings` dict is already in scope at the point of insertion.
  - **Source**: gap-analysis SG1; decision D4 records how this gap originated
  - **Impact**: The Quality Trends section of `scripts/report.sh` produces no rows for any brrr-driven project. Since brrr is the primary path for multi-cycle runs, the quality trend feature is non-functional for its primary use case.
  - **Who answers**: Next refinement — no design decision required. Additive: insert a Phase 7.6-equivalent block after the journal-keeper step in `skills/brrr/phases/review.md`.
  - **Consequence of inaction**: Quality trend analysis is unavailable for all projects using the brrr skill. The observability feature delivered by WI-093 does not function for the majority of ideate users.
  
  ### OQ2: Three agent definitions reference stale reviews/incremental/ path
  - **Question**: Should `agents/spec-reviewer.md:26`, `agents/gap-analyst.md:24`, and `agents/journal-keeper.md:20` replace `reviews/incremental/` with `archive/incremental/`?
  - **Source**: gap-analysis SG2; code-quality M2; spec-adherence MF1. Carry-forward from brrr cycle 005 OQ2.
  - **Impact**: Agents following these definitions look in a non-existent directory and silently omit prior incremental review context. spec-reviewer's deduplication instruction and journal-keeper's synthesis both depend on this context.
  - **Who answers**: Next refinement — three mechanical one-line fixes, no design decision required.
  - **Consequence of inaction**: Every review cycle run by these three agents silently operates without incremental review context. Findings already caught in incremental reviews may be duplicated in capstone reviews. The problem compounds across every review cycle until fixed.
  
  ### OQ3: by_reviewer includes suggestion field but no consumer uses it
  - **Question**: Should `findings.by_reviewer.{reviewer}.suggestion` be retained, or should the derivation rules explicitly state that suggestions are excluded from per-reviewer breakdown?
  - **Source**: code-quality M4; spec-adherence MF4. Introduced by WI-093 rework (incremental review M2 fix).
  - **Impact**: The schema documents a field that no current consumer parses. Future consumers must independently determine whether `by_reviewer.suggestion` is reliably populated.
  - **Who answers**: Design review — either add a consumer in report.sh or add explicit documentation in the quality_summary derivation rules.
  - **Consequence of inaction**: Undocumented schema intent accumulates as technical debt. No functional failure in current code.
  
  ### OQ4: refine skill inline metrics schema omits the cycle field
  - **Question**: Should `skills/refine/SKILL.md:373` include `"cycle":null` between `"phase"` and `"agent_type"` to match the canonical schema in `specs/artifact-conventions.md:719`?
  - **Source**: code-quality M4 (new finding, not a carry-forward from brrr cycles)
  - **Impact**: Refine skill entries written without a `cycle` field are bucketed as `(none)` by report.sh — a distinct bucket from entries that write `"cycle": null`. The per-cycle breakdown in report.sh may split what should be a single bucket.
  - **Who answers**: Next refinement — mechanical one-line fix to the inline schema example.
  - **Consequence of inaction**: report.sh may produce separate `(none)` and null rows for refine-skill entries, making the per-cycle breakdown silently inconsistent for any project that uses the refine skill.
  
  ### OQ5: metrics.jsonl section heading level is wrong in artifact-conventions.md
  - **Question**: Should `specs/artifact-conventions.md:710` be changed from `####` to `###` to match the heading level of all peer artifact entries?
  - **Source**: code-quality M1; spec-adherence MF2; gap-analysis MG1. Carry-forward from brrr cycle 005 OQ1.
  - **Impact**: metrics.jsonl section renders as a visual sub-section of journal.md rather than a peer entry. No functional impact.
  - **Who answers**: Next refinement — one-character fix.
  - **Consequence of inaction**: Readers of artifact-conventions.md perceive metrics.jsonl as subordinate to journal.md. Cosmetic only.
  
  ### OQ6: Literal null/0 in metrics.jsonl schema example instead of placeholder notation
  - **Question**: Should the agent spawn entry example in `specs/artifact-conventions.md:720-732` replace literal `null` and `0` with `<null or integer>` and `<integer>` placeholder notation?
  - **Source**: code-quality M3; spec-adherence MF3; gap-analysis MG2. Carry-forward from brrr cycle 005 OQ3.
  - **Impact**: A reader cannot distinguish "always null" from "null when not available." Ambiguity may cause future implementers to emit null for fields that should have values.
  - **Who answers**: Next refinement — documentation-only change.
  - **Consequence of inaction**: Schema example retains ambiguous placeholder convention. No functional failure in current code.
  
  ### OQ7: report.sh not referenced in README.md or plugin manifests
  - **Question**: Should `README.md` include a section documenting `scripts/report.sh`, analogous to the existing Validation and Migration Tools section?
  - **Source**: gap-analysis MG3 (new finding, not a carry-forward)
  - **Impact**: A user installing ideate has no documented path to discover the reporting script. The observability feature delivered by WI-094 is invisible at the user-facing entry point.
  - **Who answers**: Next refinement — additive README section, no design decision required.
  - **Consequence of inaction**: Users who do not read artifact-conventions.md never discover report.sh. The metrics reporting capability is effectively hidden from primary user documentation.
  
  ---
  
  ## Cross-References
  
  ### CR1: quality_summary gap in brrr — specification scope vs. brrr architecture
  - **Code review**: No finding (brrr/phases/review.md was not in WI-093 file scope; implemented correctly within scope)
  - **Spec review**: No finding (all WI-093 acceptance criteria met in skills/review/SKILL.md)
  - **Gap analysis**: SG1 — brrr/phases/review.md never emits quality_summary; Quality Trends always empty for brrr-driven projects
  - **Connection**: All three reviewers are consistent. The gap is not a defect in what was implemented — WI-093 was correctly implemented within its specified scope. The gap is that the work item scope excluded brrr/phases/review.md despite it being a parallel implementation of the same review orchestration logic. The code and spec reviewers confirm implementation correctness; the gap-analyst identifies the planning-phase blind spot that the acceptance criteria did not cover. Together the picture is: the feature works for `/ideate:review` but not for `/ideate:brrr`.
  
  ### CR2: Stale reviews/incremental/ path in agent definitions — severity disagreement across reviewers
  - **Code review**: M2 (minor) — confirmed in spec-reviewer.md:26, gap-analyst.md:24, journal-keeper.md:20
  - **Spec review**: MF1 (minor) — same finding, same files, same assessment, noted as known carry-forward
  - **Gap analysis**: SG2 (significant) — same three files, elevated severity citing compounding impact on every review cycle
  - **Connection**: All three reviewers identified the same defect in the same three files. The only divergence is severity: code-quality and spec-adherence kept it minor; gap-analyst elevated to significant. The gap-analyst's rationale (compounding impact across every cycle) is better supported than the minor classification. The combined picture: this is a functional defect that silently degrades every review cycle, not a cosmetic issue. The next refinement should treat it as high-priority.
  
  ### CR3: suggestion field in by_reviewer — implementation vs. consumption asymmetry
  - **Code review**: M4 — by_reviewer includes suggestion but report.sh does not parse by_reviewer at all
  - **Spec review**: MF4 — same finding; noted as carry-forward from incremental review 093-quality-event.md M2
  - **Gap analysis**: No finding
  - **Connection**: The code-quality and spec-adherence reviewers identified the same asymmetry from different angles. The gap-analyst did not flag this as a missing feature, suggesting it is schema over-specification rather than a missing capability. The combined picture: the field was added during rework to achieve symmetry; no consumer has been built for it; the schema documents intent that is not exercised. OQ3 captures the remediation.
  
  ### CR4: metrics.jsonl documentation cluster — heading and example notation
  - **Code review**: M1 (heading level at line 710), M3 (literal null/0 at lines 720-732)
  - **Spec review**: MF2 (heading level), MF3 (literal null/0)
  - **Gap analysis**: MG1 (heading level), MG2 (literal null/0)
  - **Connection**: All three reviewers flagged the same two documentation issues independently, confirming these are genuine carry-forward items rather than false positives. Six instances across three reviewers, all in agreement on both diagnosis and fix. These are the lowest-friction items in the open questions list.
