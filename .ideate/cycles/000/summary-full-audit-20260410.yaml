  # Review Summary — Full Audit 2026-04-10

  ## Overview
  Full audit of the ideate codebase (project PR-002, Adapter Refactor). The spec-reviewer completed its review and identified two significant findings — both related to schema version management and the P-44 atomic write policy. The code-reviewer and gap-analyst both exhausted their turn budgets before producing findings, leaving material portions of the audit uncovered. One critical finding was identified by the review orchestrator during MCP server initialization.

  ## Phase Convergence
  Phase: PH-017, PH-021, PH-025, PH-026, PH-027, PH-029, PH-030, PH-035, PH-036, PH-038, PH-039 (multiple active)
  Convergence status: Not assessed (ad-hoc review)
  Trend: Multiple active phases indicate broad work in progress on the adapter layer. No cycle trend data available for a full audit.

  ## Critical Findings
  - [session-diagnostic] MCP server failed to initialize due to missing `title` column in existing `findings` table — `CURRENT_SCHEMA_VERSION=5` matches DB `user_version=5` so `checkSchemaVersion` passes, but `CREATE TABLE IF NOT EXISTS` does not add columns to existing tables. Drizzle throws `SqliteError: table findings has no column named title` on rebuildIndex. Root cause: v4->v5 migration exists in migrations.ts but CONFIG_SCHEMA_VERSION was not bumped from 4 to 5, so the migration never runs. Affects any installation with schema_version:4 in config.json and an existing index.db at user_version=4 or 5. Workaround: delete index.db. Violates GP-16 (Frictionless Install). — relates to: artifact-structure / cross-cutting

  ## Significant Findings
  - [spec-reviewer] CONFIG_SCHEMA_VERSION (config.ts:4) remains at 4 while migration v4->v5 exists in migrations.ts:58-93. The migration gate at migrations.ts:129 returns early when currentVersion >= targetVersion (=CONFIG_SCHEMA_VERSION=4), so the migration never executes on any existing installation. The equivalence test fixture already has schema_version:5, confirming the bump was intended. — relates to: P-17, artifact-structure
  - [spec-reviewer] putNodeForJournal (adapters/local/writer.ts:1583-1607) writes YAML inside the SQLite transaction instead of before it, violating P-44. Module header at line 8 inaccurately states 'Two-phase write pattern (YAML first, SQLite second) is preserved here.' The YAML cleanup on transaction failure (lines 1636-1651) is best-effort, not atomic. — relates to: P-44, artifact-structure

  ## Minor Findings
  - [spec-reviewer] schema.test.ts:606,608 — stale comments say 'CURRENT_SCHEMA_VERSION (3)'; current value is 5. Test behavior correct (uses constant), comments mislead. → carry-forward
  - [spec-reviewer] adapters/local/writer.ts:6 — module header method list omits appendJournalEntry, which is fully implemented at line 1544. → carry-forward
  - [code-reviewer (partial)] domain_index artifact type ignores id parameter, always writes to domains/index.yaml with no canonical-ID validation. Singleton design but unvalidated. → carry-forward

  ## Suggestions
  - Bump CONFIG_SCHEMA_VERSION to 5 in config.ts. Update bootstrap.ts and test fixtures that set schema_version:4 to use schema_version:5. This aligns the config schema version with the equivalence fixture that already uses 5.
  - Document the journal write exception to P-44 explicitly in the policy or in a code comment explaining why YAML-inside-transaction is correct for the journal sequence-number use case.
  - Fix module header comment in writer.ts to list appendJournalEntry and correct the P-44 claim.
  - Increase agent_budgets for code-reviewer and gap-analyst when running --full audits. Current budgets (80 and 100) were exhausted before findings were produced in this 674-second run.

  ## Findings Requiring User Input
  - Is putNodeForJournal's YAML-inside-transaction intentional (a deliberate exception to P-44 for journal serialization), or a bug? The P-44 cycle 6 amendment permits single-transaction writes but does not explicitly sanction YAML inside the SQLite callback body.
  - Should agent_budgets for full-audit reviews be higher than for cycle reviews? The code-reviewer and gap-analyst both ran out of turns without completing their analysis.

  ## Proposed Refinement Plan
  Two critical/significant findings require remediation:
  1. CONFIG_SCHEMA_VERSION bump (config.ts:4 → 5): one-line fix plus fixture updates and tests. Low complexity.
  2. putNodeForJournal P-44 clarification: either amend P-44 to explicitly cover this pattern, or restructure the function to write YAML before opening the transaction. Medium complexity (requires preserving sequence-number atomicity guarantee).
  3. schema.test.ts and writer.ts comment cleanup: carry-forward minor fixes.
  4. domain_index ID validation: small validation check; requires completing the code-reviewer analysis first (OQ-3).
  Additionally, two reviewers did not complete their analysis — key areas (adapter completeness, skill completeness, test infrastructure, ARCHITECTURE.md accuracy) remain unaudited.
