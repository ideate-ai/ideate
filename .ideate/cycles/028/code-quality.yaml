content: |
  # Code-Quality Review — Cycle 28 (PH-050 capstone)

  Scope: WI-876, WI-877, WI-878, WI-879. Uncommitted tree. 1503 tests pass.

  ## Verdict: Fail

  2 significant findings prevent Pass. Structural implementation is sound, but the step2 heading prefix-match leaves a parser false-negative path open — the same class of defect PH-050 was intended to eliminate.

  ## Critical Findings
  None.

  ## Significant Findings

  ### S1: Step2 heading prefix-match triggers on `## Principle Adherence Evidence`
  - File: src/tools/analysis.ts:116-131
  - Issue: Step2 uses `heading.startsWith("principle adherence")`. Prefix matches not only `## Principle Adherence` (intended) but also `## Principle Adherence Evidence`, which is a standard section in spec-reviewer.md output. Its body contains bullet lines matching the violation regex (`/^\s*-\s/`), which will return `fail`.
  - Impact: Document with no violations but no step1-parseable verdict tag, where `Principle Adherence Evidence` precedes `Principle Violations`, yields `principle_verdict: fail`, `converged: false`. Autopilot stalls — same failure mode as 2026-04-14 that PH-050 was meant to fix.
  - Fix: Exact-match allowed headings (`principle adherence`, `principle violation`, `principle violations`); keep `startsWith` only for `guiding principle`. Add a test where `## Principle Adherence Evidence` with bullet content does not produce `fail` when step1 also fails.

  ### S2: Missing test coverage for step1 Fail patterns 2 and 3
  - File: src/__tests__/tools.test.ts
  - Issue: Pass-side pattern 2 (`**Label:** Pass`, colon inside bold) and pattern 3 (`Label: Pass`, no bold) are tested at lines 1241, 1257. Fail counterparts have no tests. A regression in STEP1_FAIL_RES[1] or STEP1_FAIL_RES[2] would silently flip `fail` to `unknown`, causing `converged: true` even when the reviewer wrote a clear Fail.
  - Fix: Mirror the Pass tests with Fail content for patterns 2 and 3 (colon-inside-bold Fail; no-bold Fail). Cover Violation-label Fail variants (patterns 5, 6) likewise.

  ## Minor Findings

  ### M1: JSDoc step2 description does not disclose prefix semantics
  - File: src/tools/analysis.ts:77-79
  - JSDoc implies exact match; implementation uses `startsWith`. Clarify the doc to prevent future readers from assuming exact-match invariants.

  ### M2: SNIPPET_MAX_CHARS off-by-one — content of exactly 200 chars omits ellipsis
  - File: src/tools/analysis.ts:157-163
  - `length > 200` misses the boundary; use `>=` so truncated content always ends with `...`.

  ### M3: restart.sh regex escape set omits ERE metachars `( ) + ? { } |`
  - File: scripts/restart.sh:45
  - Current escape set: `. [ \* ^ $`. Paths with parentheses (e.g. `my-project(v2)`) produce unescaped patterns and risk unintended pgrep matches. Expand the escape set; put `]` first in the class.

  ### M4: deployment-notes.md does not state the grace-period duration
  - File: docs/deployment-notes.md:95
  - Says "after grace period"; actual is 5 seconds (`GRACE=5`). Document the number.

  ### M5: start.sh $DIR interpolation breaks if path contains a double-quote
  - File: start.sh:22
  - `node -e "...require('$DIR/...').version"` is a double-quote-nested-in-double-quote embedding. A double-quote in `$DIR` produces invalid JS; PKG_VERSION silently empties; rebuild runs every invocation. Low likelihood, easy fix: use heredoc + env var.

  ## Unmet Acceptance Criteria
  None strictly. S1 and S2 represent coverage gaps and a behavioral-correctness risk rather than explicit unmet AC.

  ## Requires Human Review
  - WI-877 manual verification procedure (live MCP host walkthrough).
  - restart.sh SIGKILL escalation path — never exercised by tests; requires manual test with a non-terminating process.

  ## Tests
  1503 tests pass (npm test full suite). No regressions.
