content: |
  # Capstone Code Review — PH-048 Quality Metrics Rebuild (Cycle 28)

  ## Verdict: Pass

  All 17 work items in PH-048 produced code that is correct, well-tested, and free of critical defects. The full test suite passes (1432 tests, 0 failures). TypeScript compiles cleanly. Metrics removal is complete with no dead code. The dispatch wrapper's fail-soft guarantee is correctly implemented. The findings below are minor issues that affect documentation accuracy, test coverage gaps, or silent edge-case behavior — none cause incorrect production behavior.

  ## Critical Findings

  None.

  ## Significant Findings

  None.

  ## Minor Findings

  ### M1: `session_id`, `cycle`, `phase` are never populated in production but this is undocumented at the API surface

  - **File**: `mcp/artifact-server/src/types.ts:11`
  - **Issue**: The comment says "Not wired from server.ts yet — that is a follow-up work item." `server.ts` constructs `ToolContext` at line 170 (`state.ctx = { db: newDb, drizzleDb: newDrizzle, ideateDir: dir, adapter }`) with no `session_id`, `cycle`, or `phase`. Every `tool_usage` row will have `NULL` for these three columns until the follow-up work item ships. The MCP tool's `inputSchema` advertises `session_id`, `cycle`, and `phase` as useful filter fields (tools/index.ts:253-255), and `ARCHITECTURE.md:484` describes them as active context — but they are non-functional silently.
  - **Suggested fix**: Add a comment to the `inputSchema` properties for `session_id`, `cycle`, and `phase` in `tools/index.ts` noting they are not yet populated by the server and will always return no filtered results. Alternatively, track the follow-up as a work item with an explicit WI identifier referenced from `types.ts`.

  ### M2: Report script ignores `config.backend` and always uses `LocalAdapter`

  - **File**: `scripts/report-tool-usage.sh:151-170`
  - **Issue**: The script unconditionally instantiates `new LocalAdapter(...)`. If a workspace is configured with `config.backend = "remote"`, the script opens the local `index.db` (which has no `tool_usage` rows for a remote-backend workspace) and silently reports zero rows rather than forwarding to the remote adapter or emitting an error.
  - **Suggested fix**: After importing `server.js`, use `selectAdapter()` (already exported from `server.ts`) instead of hardcoding `LocalAdapter`. If the selected adapter is `RemoteAdapter`, either delegate properly or print a clear message: `Error: --report-tool-usage is not supported for remote backends.` and exit non-zero.

  ### M3: `getToolUsage` is absent from the `adapter-contract.test.ts` contract test suite

  - **File**: `mcp/artifact-server/src/__tests__/adapter-contract.test.ts` (method is entirely absent)
  - **Issue**: `adapter-contract.test.ts` defines the behavioral contract that all `StorageAdapter` implementations must satisfy. `getToolUsage` is the only adapter method added in this phase that is not tested there. A future `RemoteAdapter` implementation could return rows in a different order, omit fields, or handle missing filters differently and the contract test would not catch it. The dedicated `local-getToolUsage.test.ts` and `tool-usage-tool.test.ts` cover the local path, but they do not substitute for the contract test's role.
  - **Suggested fix**: Add a `getToolUsage` block to `runAdapterContractTests()` in `adapter-contract.test.ts` covering: (a) no filter returns all rows ordered by timestamp ASC; (b) `tool_name` filter; (c) `from`/`to` range (inclusive); (d) empty result for non-matching filter.

  ### M4: `both`-view truncation behavior (aggregate covers all rows, detail covers only `limit` rows) is undocumented

  - **File**: `mcp/artifact-server/src/tools/tool-usage.ts:153-161`
  - **Issue**: In `view="both"` with truncation active, `aggregate` totals span all matched rows while `rows` is sliced to `limit`. A caller reading `rows` and computing their own totals will get a different number from `aggregate`. Neither `ARCHITECTURE.md:507` nor the GraphQL schema's `ToolUsageResult` comments explain that aggregate is computed from the full result set, not the truncated `rows` slice. The `both`-view test at `tool-usage-tool.test.ts:226` does not exercise the truncated case.
  - **Suggested fix**: Add a JSDoc note above the `// view === "both"` branch at line 153 of `tool-usage.ts`: `// aggregate covers the full matched set; rows is the truncated slice. Callers must use total_count to determine if rows is incomplete.` Add a test case: `view: "both", limit: 2` against 5 seeded rows, asserting `rows.length === 2`, `total_count === 5`, `truncated === true`, and `aggregate[*].count` summing to 5 (not 2).

  ### M5: `tools.test.ts` header says "11 tool handlers" — stale after PH-048 additions

  - **File**: `mcp/artifact-server/src/__tests__/tools.test.ts:2`
  - **Issue**: The file comment reads `Integration tests for all 11 tool handlers.` The file now contains describe blocks for at least 18 distinct handlers plus `ideate_get_config` tested via `handleTool`. `handleGetToolUsage` is not tested in this file at all.
  - **Suggested fix**: Update the header to reflect the current number of handlers covered, and add `handleGetToolUsage` to the file or note its dedicated test file (`tool-usage-tool.test.ts`).

  ### M6: Report script `--limit 0` silently reverts to 1000

  - **File**: `scripts/report-tool-usage.sh:77-80` and `mcp/artifact-server/src/tools/tool-usage.ts:87-89`
  - **Issue**: The bash validation accepts `0` as a valid value for `--limit` (regex `^[0-9]+$` matches `"0"`; error message says "positive integer" but 0 is not positive). When `LIMIT=0` is passed to the inline Node script, `if (env.LIMIT)` evaluates as true (string `"0"` is truthy in JS), so `args.limit = 0` is set. In `tool-usage.ts`, `rawLimit <= 0` maps to `limit = 1000`. The user sees 1000 rows when they specified 0.
  - **Suggested fix**: Change the bash validation regex to `^[1-9][0-9]*$` (excludes zero), or change the Node script check to `if (env.LIMIT && env.LIMIT !== "0")`.

  ## Unmet Acceptance Criteria

  None.

  ## Requires Human Review

  None. All acceptance criteria in the phase scope are machine-verifiable, and all were verified by dynamic test execution or static code inspection.
