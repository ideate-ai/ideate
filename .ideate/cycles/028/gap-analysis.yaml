content: |
  # Capstone Gap Analysis — PH-048 (Cycle 28)

  ## Verdict: Incomplete

  **Reviewer session exhausted its turn budget before synthesizing a final verdict** (115 tool uses over 372s; maxTurns=200 was not hit — session may have terminated on wall-clock or another budget). Investigation progressed through work item enumeration and documentation surface checks but stopped before validating the full round-trip integration test (dispatch wrapper → tool_usage write → getToolUsage query → report script). No final gap list synthesized.

  ## Critical Gaps

  None identified in partial output.

  ## Significant Gaps

  ### SG1: `docs/platform/architecture-overview.md` does not mention `tool_usage` or `ideate_get_tool_usage`

  - **File**: `docs/platform/architecture-overview.md`
  - **Gap**: The platform-level architecture overview contains no reference to the new `tool_usage` table, `ideate_get_tool_usage` MCP tool, or the MCP-boundary instrumentation mechanism. A reader learning the ideate platform from this doc would not discover that tool-usage telemetry exists. The root `ARCHITECTURE.md` has full coverage; the platform-facing doc does not.
  - **Suggested fix**: Add a brief section to `docs/platform/architecture-overview.md` linking out to the root `ARCHITECTURE.md` MCP boundary instrumentation section, or duplicate the key facts (one SQLite table, boundary-emitted, surfaced via `ideate_get_tool_usage`).

  ### SG2: Scope path discrepancy in WI-852 / WI-859

  - **Finding cross-referenced from spec-adherence S1**: Both work items name `docs/platform/ARCHITECTURE.md` in scope but the file updated was `ARCHITECTURE.md` at the repo root. This is both a gap (the platform-level doc was not updated) and a spec-adherence issue (scope path is inaccurate).

  ## Minor Gaps (partially explored)

  The reviewer began exploring but did not complete checks on:
  - Whether the graphql-schema.graphql `ToolUsage` types are mirrored in any consumer documentation or client stub.
  - Whether a retention policy is defined for `tool_usage` rows (unbounded growth concern).
  - Whether the GP-8 fail-soft path is tested explicitly (i.e. a test that simulates `insertToolUsage` throwing and asserts the tool call still succeeds).
  - Round-trip integration test: dispatch wrapper → real DB write → `ideate_get_tool_usage` query → row visible in report-tool-usage.sh output.

  ## Coverage Confirmed (partial)

  - All 17 work items in PH-048 are in `done` state.
  - `mcp/artifact-server/README.md` lists `ideate_get_tool_usage`.
  - `graphql-schema.graphql` contains `ToolUsage` types.
  - Root `ARCHITECTURE.md` section on `session_id` / `cycle` / `phase` context (partial inspection — reviewer was mid-quote when terminated).

  ## Requires Human Review

  - Round-trip integration test coverage: confirm whether an end-to-end test exists (real DB, dispatch wrapper emission, subsequent read via handler).
  - Retention policy for `tool_usage` table: is there a documented expectation of table growth, or a pruning mechanism planned as a follow-up?
  - Session ID / cycle / phase wiring: is there an open follow-up work item tracking the server-side wiring that `types.ts:11` promises?
