  # Decision Log — Cycle 28 Capstone (PH-048 Quality Metrics Rebuild)

  Phase: PH-048 — Full removal of the metrics experiment (ideate_emit_metric / ideate_get_metrics / metrics_events table) and replacement with narrow MCP-boundary instrumentation (tool_usage table, instrumentToolDispatch wrapper, ideate_get_tool_usage MCP tool).

  Work items: WI-843 through WI-859 (17 items, all done).
  Phase-complete journal: J-071-451.

  ---

  ## Decisions

  ### D-CY28-PH48-01: Scope instrumentation exclusively to the MCP boundary
  - **Decision**: Capture only MCP-boundary signals: tool_name, request/response_tokens, request/response_bytes, session_id, cycle, phase, timestamp. Agent-side SubagentStop hook extraction abandoned.
  - **Rationale**: Agent tool returns no token metadata; Claude Code output_tokens undercount bug (#22686). MCP-server-side measurement is the only high-quality signal available.
  - **Implications**: session_id/cycle/phase fields are captured in schema but not yet wired server-side (see OQ-028P48-01).

  ### D-CY28-PH48-02: Full deletion of the metrics experiment — no backward-compatible shims
  - **Decision**: Delete ideate_emit_metric, ideate_get_metrics, metrics_events table, schema plumbing, adapter methods, 249 YAML metric files, four legacy report scripts, tests, and docs entirely. No stubs retained.
  - **Rationale**: D-211 had already made ideate_emit_metric a no-op; remaining surface was dead code. Historical values unreliable by definition.
  - **Implications**: D-211 (soft-deprecation) and D-155 (metrics trust) are superseded by this phase. The 'keep entry points' saved feedback was explicitly overridden (interview Q4) under the YAGNI bar.

  ### D-CY28-PH48-03: No latency/duration fields — tokens and byte sizes only
  - **Decision**: Exclude latency and duration from tool_usage schema. Only tiktoken cl100k_base token approximations and byte lengths.
  - **Rationale**: Computer sleep/suspend corrupts wall-clock measurements. YAGNI: add duration later if a concrete analysis requires it.

  ### D-CY28-PH48-04: Single-phase removal-then-build, sequential buckets, delete old scripts
  - **Decision**: Single phase with sequential buckets: (1) strip skill emission sites, (2) remove MCP tools, (3) drop schema/storage plumbing, (4) delete YAML data and old report scripts, (5) remove tests, (6) update docs, (7) build replacement.
  - **Rationale**: Partial removal leaves the system in a useless intermediate state. Dead code should not be stubbed in a phase explicitly removing dead code.
  - **Implications**: 'Keep reporting scripts' saved feedback overridden. Four legacy scripts deleted; one new report-tool-usage.sh replaces all four.

  ### D-CY28-PH48-05: tool_usage as standalone SQLite table, outside node/edge graph
  - **Decision**: tool_usage is standalone SQLite. Not a node type, not in EXTENSION_COLUMNS/FIELD_FALLBACKS, not accessible via ideate_query_artifacts.
  - **Rationale**: P-33 (operational data outside artifact graph); GP-14 (MCP abstraction boundary).

  ### D-CY28-PH48-06: Andon — merge WI-846/847/848/849 into atomic single removal
  - **Decision**: WI-846 expanded to absorb WI-847, WI-848, WI-849. All four originally-separate removal WIs merged into one atomic commit.
  - **Rationale**: Incremental reviewer identified that removing the table DDL without simultaneously cleaning reader JOINs, indexer cases, adapter interfaces, and remote stubs left the codebase internally inconsistent — violating P-44 (atomic writes) and P-69 (remove-and-replace pairing).
  - **Implications**: Over-granular decomposition of coupled removal work should be caught at planning time.

  ### D-CY28-PH48-07: Instrumentation via fail-soft dispatch wrapper, not inline guards
  - **Decision**: instrumentToolDispatch wraps dispatch loop; insertToolUsage errors are swallowed and logged via log.warn. Tool calls always succeed regardless of telemetry state.
  - **Implications**: GP-8 fail-soft path is not explicitly tested (noted as minor unexplored gap).

  ### D-CY28-PH48-08: WI-859 rework accepted — category count correction
  - **Decision**: WI-859 initial header said '11 categories'. Incremental review caught this as Significant; fix: '10 categories' (Metrics→Telemetry was a 1-for-1 swap).
  - **Implications**: Authoritative post-PH-048 count: 21 tools in 10 categories.

  ---

  ## Convergence Signal

  **code-reviewer**: Pass — 0 critical, 0 significant, 6 minor (M1–M6). Full test suite 1432 tests, 0 failures; TypeScript compiles cleanly.

  **spec-reviewer**: Incomplete (turn budget exhausted at 133 tool uses / 365s). Partial coverage confirmed WI-855 stub behavior, test semantics, D-210 compliance. Isolated finding: S1 (WI-852/WI-859 scope path discrepancy).

  **gap-analyst**: Incomplete (115 tool uses / 372s). Two significant gaps: SG1 (platform doc missing telemetry), SG2 (cross-references S1).

  **Phase readiness**: No finding rises to critical or work-blocking. The only complete reviewer issued a Pass. Documentation cleanup (S1/SG1) and M1–M6 code quality items are the only outstanding work. Phase completion is not blocked.

  ---

  ## Open Questions

  ### OQ-028P48-01: session_id / cycle / phase wiring — server-side enrichment absent
  - Code-reviewer M1; gap-analyst. Schema captures these but types.ts:11 admits they are not populated by server.ts. ideate_get_tool_usage filter parameters exist but non-functional.
  - **Answer needed**: follow-up work item to wire server-side context.

  ### OQ-028P48-02: tool_usage retention policy — no documented growth bound
  - Gap-analyst. Unbounded table growth over time; first symptom will be report-tool-usage.sh slow on large workspaces.
  - **Answer needed**: accept unbounded, add auto-prune WI, or add --prune flag.

  ### OQ-028P48-03: Round-trip integration test gap — dispatch → DB write → query → report
  - Code-reviewer M3; gap-analyst. Three sub-system tests exist; seam-level bugs between layers (timestamp format, type mismatch) would not be caught in CI.
  - **Answer needed**: verify whether an integration test exists; if not, add one.

  ### OQ-028P48-04: ARCHITECTURE.md path discrepancy in WI-852/WI-859 scope
  - Spec-adherence S1; gap-analysis SG2. WIs name docs/platform/ARCHITECTURE.md in scope, but no such file exists; target was repo-root ARCHITECTURE.md.
  - **Answer needed**: correct WI scope fields retroactively, or accept known artifact-tracking limitation.

  ### OQ-028P48-05: docs/platform/architecture-overview.md missing telemetry section
  - Gap-analysis SG1. Platform-facing doc has no reference to tool_usage or ideate_get_tool_usage.
  - **Answer needed**: is architecture-overview.md a narrative supplement or a parallel canonical source?

  ### OQ-028P48-06: getToolUsage absent from adapter-contract.test.ts
  - Code-reviewer M3. Contract tests for all adapter methods except getToolUsage; RemoteAdapter divergence would not be caught.
  - **Answer needed**: add to contract suite in next refinement cycle.

  ### OQ-028P48-07: report-tool-usage.sh ignores config.backend
  - Code-reviewer M2. Hardcodes LocalAdapter; remote-backend workspaces silently report zero.
  - **Answer needed**: use selectAdapter() or print an error for remote-backend configs.

  ### OQ-028P48-08: 'both'-view truncation behavior undocumented
  - Code-reviewer M4. aggregate spans all rows while rows is sliced to limit; API surprise for clients computing totals from rows.
  - **Answer needed**: add JSDoc note + test.

  ### OQ-028P48-09: tools.test.ts header '11 tool handlers' stale; handleGetToolUsage untested therein
  - Code-reviewer M5. Comment rot + coverage gap.
  - **Answer needed**: update comment, add or cross-reference handleGetToolUsage.

  ### OQ-028P48-10: --limit 0 accepted by bash validation but reverts to 1000
  - Code-reviewer M6. Regex ^[0-9]+$ accepts 0; JS env.LIMIT truthiness yields 0; tool-usage.ts maps <=0 to 1000. Silent misbehavior.
  - **Answer needed**: change regex to ^[1-9][0-9]*$.

  ---

  ## Cross-References

  ### CR1: ARCHITECTURE.md path discrepancy (convergent)
  - Spec-adherence S1 + Gap-analysis SG2 are the same root issue. Code-reviewer silent.
  - Resolving OQ-028P48-04 (scope fields) and OQ-028P48-05 (platform doc) closes both.

  ### CR2: session_id/cycle/phase wiring gap (complementary)
  - Code-reviewer M1 + gap-analyst 'Requires Human Review'. Combined: three columns exist that will always be null until a new WI is created.

  ### CR3: Round-trip integration test gap (complementary)
  - Code-reviewer M3 (contract test) + gap-analyst (end-to-end seam). Two separate test additions required.

  ### CR4: Fail-soft GP-8 trace (unexplored, not a defect)
  - Gap-analyst + spec-adherence both flagged this as an unchecked item due to session exhaustion. If a future cycle verifies, this cross-reference closes.

  ---

  ## Phase Readiness Assessment

  PH-048 scope fully delivered. All 17 WIs done. Code-reviewer Pass. No critical/significant/work-blocking findings from any reviewer.

  **Documentation cleanup (metadata + one small addition)**:
  - WI-852/WI-859 scope field correction (OQ-028P48-04)
  - docs/platform/architecture-overview.md telemetry section (OQ-028P48-05)

  **Single small next-cycle WI bundle**:
  - adapter-contract.test.ts + getToolUsage (OQ-028P48-06)
  - report-tool-usage.sh backend selection + --limit 0 fix (OQ-028P48-07, OQ-028P48-10)
  - both-view truncation JSDoc + test (OQ-028P48-08)
  - tools.test.ts comment update (OQ-028P48-09)

  **Design-level follow-up requiring user decisions or new WIs**:
  - session_id/cycle/phase server-side wiring (OQ-028P48-01)
  - tool_usage retention policy (OQ-028P48-02)
  - Round-trip integration test (OQ-028P48-03)

  No rework blocks phase completion.
