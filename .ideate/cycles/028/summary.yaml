  # Capstone Review Summary — Cycle 28 / PH-048

  **Phase**: PH-048 "Quality Metrics Rebuild"  
  **Work items**: WI-843 – WI-859 (17 items, all done)  
  **Verdict**: **Pass with documentation follow-ups**

  ## Top-Level Assessment

  PH-048 delivered its scope: remove the failed metrics experiment (ideate_emit_metric / ideate_get_metrics / metrics_events) and replace it with narrow MCP-boundary instrumentation (tool_usage table, instrumentToolDispatch wrapper, ideate_get_tool_usage). The code-reviewer issued an unambiguous **Pass** with 1432 passing tests, no critical or significant findings. Two reviewers (spec-adherence, gap-analysis) hit their turn budgets and returned **Incomplete** verdicts, but the partial findings they did surface do not rise to critical.

  ## Reviewer Verdicts

  | Reviewer | Verdict | Critical | Significant | Minor |
  |---|---|---|---|---|
  | code-reviewer | Pass | 0 | 0 | 6 |
  | spec-reviewer | Incomplete (budget exhausted) | 0 | 1 | 0 |
  | gap-analyst | Incomplete (budget exhausted) | 0 | 2 | unknown |

  ## Critical Findings

  None.

  ## Significant Findings

  ### F-028-S1: WI-852 / WI-859 scope declaration names a nonexistent file
  - **Source**: spec-adherence S1, gap-analysis SG2 (convergent)
  - Both work items list `docs/platform/ARCHITECTURE.md` in scope. No such file exists. Actual target: repo-root `ARCHITECTURE.md`. Work was executed correctly against the right file; only the scope metadata is inaccurate.

  ### F-028-S2: Platform-facing doc lacks telemetry surface coverage
  - **Source**: gap-analysis SG1
  - `docs/platform/architecture-overview.md` has no mention of `tool_usage` or `ideate_get_tool_usage`. Platform readers learning from this doc would not discover the new telemetry surface.

  ## Minor Findings (all from code-reviewer)

  - **M1**: `session_id` / `cycle` / `phase` columns exist but are not populated by server.ts. Filter params are silently non-functional.
  - **M2**: `report-tool-usage.sh` hardcodes LocalAdapter; remote-backend workspaces silently report zero.
  - **M3**: `getToolUsage` missing from `adapter-contract.test.ts` suite.
  - **M4**: `both`-view truncation behavior undocumented (aggregate spans all rows, rows sliced to limit).
  - **M5**: `tools.test.ts` header says "11 handlers" — stale.
  - **M6**: `--limit 0` in bash validation silently reverts to 1000.

  ## Phase Convergence

  **Condition A** (zero critical/significant from the only complete reviewer): Pass.  
  **Condition B** (principle adherence verdict): Partial — spec-reviewer incomplete, but partial coverage confirmed D-210, P-33, GP-14 compliance for inspected areas.  
  **Phase convergence**: **Yes, with documentation follow-ups.** No rework blocks PH-048 completion. Two significant findings (F-028-S1, F-028-S2) and six minor findings are documentation / test-coverage issues addressable in a single small refinement cycle.

  ## Project Progress

  PH-048 was a YAGNI-driven maintenance phase closing a failed experiment. The replacement instrumentation (tool_usage table, MCP-boundary dispatch wrapper, report-tool-usage.sh) is installed, working, and tested at each layer. The project's strategic arc toward standalone-PM evolution is unaffected — PH-048 was a hygiene phase.

  ## Recommended Follow-up

  **Option A (single refinement cycle, small scope)**: Bundle F-028-S1, F-028-S2, and M1–M6 into one follow-up phase. Total estimated work: 6–8 small WIs, mostly doc + test additions.

  **Option B (defer)**: Accept current state; address items opportunistically as they surface in user-facing work. No immediate risk.

  **Option C (re-run incomplete reviewers)**: Respawn spec-reviewer and gap-analyst with expanded turn budgets (e.g., 180) or scoped prompts to resolve the unexplored coverage (GP-8 fail-soft trace, round-trip integration test, P-44 verification) before closing the cycle.

  ## Open Questions for User

  See decision-log for full list (OQ-028P48-01 through OQ-028P48-10). The three that require user decisions (not just technical follow-up):

  - **OQ-028P48-02** (retention policy): how should tool_usage table growth be bounded?
  - **OQ-028P48-04** (scope path fix): correct WI-852/WI-859 scope metadata, or accept as known limitation?
  - **OQ-028P48-05** (platform doc): is `docs/platform/architecture-overview.md` a parallel canonical source, or a supplement pointing to root?
