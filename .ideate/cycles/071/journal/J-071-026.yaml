content: "## [refine] 2026-03-30 — Refinement planning completed\\nTrigger: new
  requirements — ideate cannot plan long-term or large-scale projects; single
  cycles don't scale\\nPrinciples changed: GP-15 added (Progressive Elaboration
  Across Planning Horizons)\\nNew work items: WI-431 through WI-443 (13
  items)\\n\\nIntroducing four-level planning hierarchy: Workspace > Project >
  Phase > Cycle.\\n- Project (PR-NNN): strategic body of work with intent,
  appetite, success criteria, steering, horizon\\n- Phase (PH-NNN): planned unit
  within a project (research/design/implementation/spike)\\n- Cycles remain as
  execute→review iterations within a phase (unchanged)\\n- Workspace rename: all
  MCP tools referencing 'project' (meaning artifact directory) renamed to
  'workspace'\\n- Circuit breaker: configurable cycle-per-phase threshold
  integrated with Andon cord\\n- Autopilot spans entire projects, transitioning
  between phases automatically\\n- Migration script creates retroactive PR-001
  for existing work\\n\\nResearch conducted: Scrum/Agile/XP (epics, progressive
  elaboration, story maps), SAFe/LeSS/Nexus (PI planning, planning horizons),
  Shape Up (appetite, circuit breaker), Lean/TOC (pull planning,
  drum-buffer-rope), military planning (commander's intent, nested
  understanding), Six Sigma (DMAIC tollgates), OKRs."
