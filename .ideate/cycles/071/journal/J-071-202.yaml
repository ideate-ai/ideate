  ## [autopilot] 2026-04-03 — PH-025 Production Validation Complete


  Ran equivalence suite against live Docker stack (Neo4j + ideate-server).


  ### Key Finding

  Fundamental data model mismatch: the migration tool stores YAML fields as
  individual Neo4j node properties, but the RemoteAdapter expects a serialized
  JSON `content` field (which is how putNode stores data). All migrated nodes
  return `content: null` from the GraphQL API, causing `properties: {}` in the
  RemoteAdapter.


  ### Result

  - Setup tests: 8/8 pass (metadata agrees)

  - CRUD/query/traverse/batch/null tests: ~80% fail due to content field gap

  - Parity: NOT YET ACHIEVED


  ### Parity report written to docs/platform/parity-report.md


  ### Next Steps

  Fix the content field gap (server-side: store content blob during migration,
  or resolve at query time). Then re-run equivalence suite.
