  ## [execute] 2026-04-03 — Work item 580: Categorize migration edge errors

  Status: complete

  Ran diagnostic script against migration pipeline. 714 errors categorized into
  5 buckets: nullable field validation (598, 84%), YAML indentation in findings
  (62, 9%), other YAML parse (22, 3%), unregistered types (6, <1%), non-artifact
  files (7, 1%). Edge failures are a symptom of missing nodes, not a separate
  issue. Single Zod schema fix recovers 84% of errors. Report written to
  docs/platform/migration-diagnostic-report.md.
