content: >-
  ## Cycle 21 Refinement — Audit Corrections: Schema & Write Integrity


  **Trigger**: Full audit (cycle 20) surfaced one critical finding, two
  significant findings, and three minor items in the MCP artifact server.
  Refinement addresses all of them.


  **Mode**: Post-review correction.


  **New phase**: PH-040 — Audit Corrections: Schema & Write Integrity.


  ### Decisions made


  **CONFIG_SCHEMA_VERSION** (critical): Comprehensive fix. WI-747 bumps the
  constant from 4 to 5, makes the v4→v5 migration idempotent (PRAGMA table_info
  guards before each ALTER TABLE), and adds a new migrations.test.ts with full
  runPendingMigrations coverage including an equality assertion test
  (CONFIG_SCHEMA_VERSION === CURRENT_SCHEMA_VERSION) to prevent future
  divergence.


  **putNodeForJournal / P-44** (significant): Fix the code, no exception to
  P-44. WI-748 restructures the function into three phases: exclusive tx1 to
  allocate sequence number via placeholder insert (preventing race), YAML write
  outside any transaction (P-44 Phase 1), exclusive tx2 to finalize SQLite (P-44
  Phase 2). Rollback paths updated for both failure modes.


  **domain_index** (Q-145): Investigate. WI-749 is a spike to locate all
  references across the codebase and determine if this is a
  planned-but-unimplemented node type or dead code.


  **Minor cleanup** (minor): WI-750 removes stale version numbers from
  schema.test.ts descriptions and adds appendJournalEntry to the writer.ts
  module header.


  **Agent budgets**: code-reviewer 80→160, gap-analyst 100→200. Applied
  immediately. Both agents exhausted budgets during the full audit, leaving
  coverage gaps.


  ### Work items

  | ID | Title | Type | Complexity |

  |---|---|---|---|

  | WI-747 | Bump CONFIG_SCHEMA_VERSION + migration tests | bug | medium |

  | WI-748 | Restructure putNodeForJournal for P-44 compliance | bug | medium |

  | WI-749 | Spike: investigate domain_index | spike | low |

  | WI-750 | Stale comment + module header cleanup | chore | low |


  All four items are parallel (no file scope overlap, no dependencies).
