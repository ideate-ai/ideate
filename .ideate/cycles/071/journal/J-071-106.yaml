  ## [refine] 2026-03-31 — Refinement planning completed

  Trigger: Phase transition from PH-015 (Infrastructure — Schema & Metrics) to
  PH-016 (New Skills — Project, Triage, Status)


  **Phase transition**: PH-015 marked complete (all 5 work items done, cycle 5
  review passed with 0 critical/significant). PH-016 created and activated.


  **Principles changed**:

  - GP-01: Spec sufficiency now governs execution readiness, not work item
  creation. Process must yield convergence.

  - GP-02: Replaced zero-inference rule with framework — inference permitted
  after Andon or when explicitly directed by spec.

  - GP-05: Added proportional review depth based on priority/severity. Default
  is full review; reduction requires low sev + low pri, transparency, and
  confirmation.

  - GP-10: Renamed to Full Lifecycle Ownership. Broadened to cover all work
  types (bugs, spikes, maintenance), not just idea-to-output.


  **Work items obsoleted**: WI-518, WI-519, WI-520, WI-521 (horizon placeholders
  replaced by execution-ready specs)


  **New work items**: WI-522 through WI-527

  - WI-522: MCP status views (extend workspace status with view parameter)

  - WI-523: /ideate:project skill (project + phase entity management)

  - WI-524: /ideate:triage skill (lightweight work item intake)

  - WI-525: /ideate:status skill (thin routing over MCP views)

  - WI-526: Proportional review routing in execute/review/autopilot

  - WI-527: Plugin.json registration for 3 new skills


  **Execution plan**: Batched parallel. Group 1 (parallel): WI-522, WI-523,
  WI-524, WI-526. Group 2 (after WI-522): WI-525. Group 3 (after skills):
  WI-527.


  **Research conducted**: Skill context cost investigation confirmed skills load
  full SKILL.md at invocation (~1 token per 4 chars). Recommendation: keep main
  files under 500 lines, use supporting files, use disable-model-invocation for
  user-only skills.
