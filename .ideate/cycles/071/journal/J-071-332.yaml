content: >-
  ## WI-742: Fix ALL_NODE_TYPES type annotation and import ordering


  Removed `: readonly NodeType[]` widening annotation from `ALL_NODE_TYPES` in
  `adapter.ts`. The annotation was making `typeof ALL_NODE_TYPES[number]`
  resolve to the full `NodeType` union instead of the literal tuple contents,
  rendering the exhaustiveness check in
  `always-include-types-validation.test.ts` permanently tautological.


  **Rework during incremental review**: The initial worker correctly removed the
  annotation but the exhaustiveness sentinel remained in
  `tests/adapters/always-include-types-validation.test.ts`, which is excluded
  from `tsconfig.json`'s `include` glob (`src/**/*`). The sentinel was therefore
  never evaluated by `tsc --noEmit`. Fixed by adding the sentinel directly to
  `adapter.ts` in `src/`. Verified: removing a NodeType member from
  ALL_NODE_TYPES now causes `tsc --noEmit` to emit `Type 'true' is not
  assignable to type 'false'`.


  **Import ordering** (M1 from cycle 20): `import type { EdgeType }` moved to
  appear before `export type { EdgeType }` re-export line.


  Files: `mcp/artifact-server/src/adapter.ts`. All 1168 tests pass, tsc clean.
