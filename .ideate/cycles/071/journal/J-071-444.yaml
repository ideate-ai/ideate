content: >-
  PH-048 (Metrics Rebuild) refined. Four-question interview captured in
  interview-refine-ph048. Final scope is narrower than original phase intent:


  - **Instrumentation surface**: MCP-boundary tokens (tiktoken cl100k_base
  approximation) + request/response byte lengths only. No latency/duration
  fields — user directive citing sleep/suspend corruption of wall-clock
  measurements.

  - **Pattern**: fail-soft dispatch wrapper swallows insert errors; telemetry
  never breaks tool calls. tool_usage table lives in SQLite outside node/edge
  graph per GP-14 / P-33 precedent.

  - **Removal/replacement**: paired in same phase per P-69 (WI-850 deletes 4
  legacy scripts; WI-858 adds report-tool-usage.sh replacement).


  Decomposed into 17 atomic work items: WI-843 through WI-859. Removal bucket
  (WI-843–WI-852) sequences before build bucket (WI-853–WI-859). Full DAG
  acyclic, file scope non-overlapping within parallel groups. Same-file edit
  sequences verified: tools/index.ts (845→856→857), db.ts/schema.ts/adapter.ts
  (846→853), docs (852→859).


  User override of saved feedback "keep reporting scripts" recorded in interview
  YAML — rationale: "codebase getting big, embrace YAGNI, dead code should be
  removed." Four legacy report scripts will be deleted in WI-850.


  D-211 (emit_metric soft-deprecation) and D-155 (metrics trust) both superseded
  by this phase — the emission infrastructure they govern is being fully
  removed.


  Artifacts written: PH-048 (work_items array updated), overview (change plan),
  execution-strategy, WI-843 through WI-859, interview-refine-ph048. Ready for
  /ideate:execute.
