  ## Cycle 32 refinement (autopilot cycle 4)


  Cycle 31 capstone verdict: convergence=false (condition_a=false with 4
  significant + 1 minor; condition_b=false due to parser unexpected-format
  warning).


  Refinement creates two disjoint-scope work items to close the four significant
  findings plus the minor one:


  - **WI-871** (bug, small): Remote adapter countNodes severity filtering + new
  equivalence test. Closes F-CYCLE-31-S1 (remote adapter missing addressed_by
  filter on severity-count path) and F-CYCLE-31-S4 (no equivalence test covering
  the gap).

  - **WI-872** (maintenance, small): Doc/JSDoc unification across
  adapter-contract.md, adapter.ts, adapter-interface.md, tools/index.ts,
  reader.ts:926 comment, plus WI-860 notes amendment. Closes F-CYCLE-31-S2
  (countNodes contract+JSDoc), F-CYCLE-31-S3 (adapter-interface.md wording
  drift), F-CYCLE-31-MI1 (tool description lost "principle verdict"), plus
  CQ-M1/M2/M3 and SA-M2/M3 minor documentation items.


  Scopes are disjoint: WI-871 is the only item touching remote/index.ts and
  equivalence-query.test.ts; WI-872 is the only item touching docs/*.md,
  adapter.ts JSDoc, tools/index.ts, reader.ts comment, and WI-860 notes. Workers
  can run in parallel.


  Rationale for the split: behavior change is isolated in WI-871, so it can be
  reviewed and reverted independently of the docs sweep. Docs lag behind code by
  a cycle (standard pattern) but the signatures stabilize in this cycle so the
  unification is safe to do now.


  No further scope expansion planned for cycle 32. Convergence expectations:
  S-class findings should close to zero; MI1 and minor doc items fold into
  WI-872. If cycle 32 review finds new drift, cycle 33 opens.
