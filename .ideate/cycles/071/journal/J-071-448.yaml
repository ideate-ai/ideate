title: andon-decision
content: >-
  Andon triggered during WI-846 review. Reviewer (Fail verdict, 2 Critical + 3
  Significant findings) identified that WI-846/847/848/849 decomposition creates
  internally inconsistent intermediate states: removing the metrics_events table
  DDL without also cleaning reader JOINs, indexer cases, adapter interfaces, and
  remote stubs atomically leaves the codebase in a broken state between work
  items. Violates P-44 (atomic writes) and P-69 (remove-and-replace pairing).


  User decision: (a) Merge WI-846, WI-847, WI-848, WI-849 into a single atomic
  metrics-table removal. No parallelism was lost (already sequential);
  decomposition was artifact of over-granular planning. Rework expands WI-846
  scope to include all four WIs' files.


  Files to add to WI-846 rework scope:

  - mcp/artifact-server/src/adapter.ts: remove MetricsEventProperties interface,
  MetricsEventRow interface, getMetricsEvents from StorageAdapter interface,
  NodeFilter.agent_type comment (WI-848 scope)

  - mcp/artifact-server/src/adapters/local/reader.ts: remove getMetricsEvents
  method, TYPE_EXTENSION_INFO metrics_event entry (WI-848 scope)

  - mcp/artifact-server/src/adapters/local/writer.ts: remove metrics_event case
  from resolveArtifactPath (WI-848 scope)

  - mcp/artifact-server/src/adapters/remote/index.ts: remove entire
  getMetricsEvents stub (replaces `as any` suppression with full removal —
  WI-849 scope)

  - mcp/artifact-server/src/indexer.ts: remove metrics_events case from
  buildExtensionRow, remove stale handleEmitMetric comment (WI-847 scope)

  - mcp/artifact-server/src/adapters/validating.ts: check for and remove
  getMetricsEvents wrapper if present (WI-848 scope)

  - mcp/artifact-server/src/schema.ts: bump CURRENT_SCHEMA_VERSION 5→6 (forces
  rebuild; reviewer M2)


  WI-847, WI-848, WI-849 to be marked done-by-absorption after WI-846 rework
  completes successfully.
