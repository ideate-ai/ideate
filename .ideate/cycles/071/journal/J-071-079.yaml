title: domain-question-resolution
content: >-
  Batch resolution of all 18 open domain questions in artifact-structure domain.


  ## Resolved by code changes (9 questions)

  - **Q-99**: handleUpdateWorkItems now uses error codes, not raw messages

  - **Q-100**: handleAppendJournal now has exclusive transaction wrapping

  - **Q-101**: handleArchiveCycle Phase 3b updates/deletes SQLite entries after
  file moves

  - **Q-102**: Archive handler now parses YAML work_item field instead of
  numeric prefix extraction

  - **Q-103**: handleGetReviewManifest queries SQLite, not
  archive/incremental/*.md

  - **Q-104**: handleGetProjectStatus removed; replaced by
  handleGetConvergenceStatus + handleGetReviewManifest

  - **Q-105**: handleWriteArtifact now has extension table branches for
  guiding_principle and constraint

  - **Q-108**: assertRequiredFields now applied to all 14 extension table types

  - **Q-115**: handleGetMetrics uses json_extract exact match, not LIKE


  ## Decisions made (9 questions)

  - **Q-111/Q-119**: Amend P-44 to allow single-transaction variant when
  serialization is required (e.g., journal sequence numbers). Two-phase remains
  default.

  - **Q-106**: Extend assertRequiredFields to check null in addition to
  undefined. Low priority.

  - **Q-107**: Normalize indexer hash computation to exclude metadata fields
  (content_hash, token_count, file_path), matching write handler pattern. Low
  priority.

  - **Q-109**: Add P-33 compliance test iterating all tool handlers. Low
  priority.

  - **Q-110**: Defer db-helpers.ts unit tests; integration tests provide
  adequate coverage. Add opportunistically.

  - **Q-112**: Add dispatch branches in handleWriteArtifact for metrics_event
  and interview_question. Low priority completeness fix.

  - **Q-117**: Add write-to-convergence roundtrip test. Moderate priority
  (convergence is core autopilot signal).

  - **Q-120**: Normalize document_artifacts.content to raw string in
  handleWriteArtifact (match indexer behavior). Moderate priority (affects
  convergence reliability).
