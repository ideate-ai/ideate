  ## WI-743: Test polish — null-status getDomainState test + remove redundant
  NodeType casts


  Removed three redundant `as NodeType` casts from `putNode` calls in the
  getDomainState deprecated/superseded filter test (`adapter-contract.test.ts`).
  `'domain_policy'` is already a member of the NodeType union; casts were
  inconsistent with the pattern used elsewhere in the test file.


  Added new test: *'includes policies with null/absent status in getDomainState
  results'*. Creates a policy node with no `status` field, calls
  `getDomainState`, asserts the policy appears in results. Guards the `n.status
  IS NULL` clause in `reader.ts` getDomainState SQL — if changed to `n.status =
  'active'`, this test would fail and expose the regression.


  Files: `mcp/artifact-server/src/__tests__/adapter-contract.test.ts`. All tests
  pass.
