content: >-
  ## [autopilot] 2026-04-04 — Session pause — context limit approaching


  ### Diagnostic findings for remaining 35 failures:


  **Edge parity (WI-599)**: LocalAdapter edge extraction is CORRECT —
  EDGE_TYPE_REGISTRY already includes domain_decision/domain_question for
  belongs_to_domain. The issue is server-side: the edge DataLoader's Cypher
  query targets nodes by artifact_id, but BELONGS_TO_DOMAIN edges target domain
  name strings (e.g., "artifact-structure") that don't have artifact_id set. The
  edge loader silently drops these edges because target.artifact_id is null.
  Fix: update the edge loader Cypher to use artifact_uid OR artifact_id for
  target identification, or have the migration create domain-name nodes with
  artifact_id set.


  **Query filters (WI-600)**: Server's artifactQuery already has domain/phase
  WHERE clauses. The issue is that the Cypher n.domain = $domain clause returns
  ALL nodes when domain happens to match, but doesn't filter out nodes that
  shouldn't be in query results (need n.domain IS NOT NULL or label-based
  filtering).


  **BFS/PPR (WI-601)**: Containment edge filtering in type-resolvers.ts is
  working (GP-01 incoming passes now). Remaining BFS failures are from edge
  loader returning incomplete edges (same root cause as edge parity). PPR needs
  edge parity fixed first.


  **Write path (WI-602)**: Server putNode mutation needs to store content =
  JSON.stringify(properties). RemoteAdapter mapGqlNodeToNode needs to handle
  round-trip properties for nodes written via putNode (not just
  migration-imported nodes).


  ### Status: 135/170 pass (79%). 4 work items created (WI-599 through WI-602).
  All require server-side fixes in ideate-server repo, primarily in the edge
  DataLoader and mutation resolvers.
