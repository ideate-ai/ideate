  ## WI-747: Fix CONFIG_SCHEMA_VERSION constant and add migration test coverage


  **Root cause**: `CONFIG_SCHEMA_VERSION` was hardcoded to `4` while
  `CURRENT_SCHEMA_VERSION` (the SQLite user_version target) was `5`. The v4â†’v5
  migration was permanently excluded from `runPendingMigrations` because its
  `toVersion` (5) exceeded `CONFIG_SCHEMA_VERSION` (4).


  **Changes**:

  - `src/config.ts`: Bumped `CONFIG_SCHEMA_VERSION` from `4` to `5`

  - `src/__tests__/config.test.ts`: Added invariant test asserting
  `CONFIG_SCHEMA_VERSION === CURRENT_SCHEMA_VERSION`

  - `src/__tests__/migrations.test.ts`: New file â€” tests no-op case (already at
  v5), v4â†’v5 migration run, and idempotency on createSchema-initialized DB

  - `src/__tests__/tools.test.ts`: Fixed hardcoded literal `4` to import
  `CONFIG_SCHEMA_VERSION`


  P-74 (two-constants invariant) is now enforced by test.
