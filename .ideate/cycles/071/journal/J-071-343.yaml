content: >-
  ## WI-748: Fix putNodeForJournal to enforce P-44 two-phase write pattern


  **Problem**: `putNodeForJournal` in `writer.ts` performed its SQLite upserts
  inside a single exclusive transaction that also wrapped the YAML write,
  violating P-44's requirement that YAML writes occur outside any transaction.


  **Solution**: Restructured to a three-phase P-44-compliant pattern:

  - Phase 1: Exclusive transaction — allocate seq# via `SELECT MAX(seq)`, INSERT
  placeholder node row to reserve position

  - Phase 2: `fs.writeFileSync` outside any transaction; on failure, DELETE
  placeholder in cleanup transaction

  - Phase 3: Exclusive transaction — UPDATE placeholder with final data +
  `upsertJournalEntry()`; on failure: `fs.unlinkSync` + DELETE placeholder +
  throw `ValidationError("TRANSACTION_FAILED")`


  Module header updated to document three-phase pattern and list
  `appendJournalEntry` as exported method.


  P-44 "Variant: Single-transaction pattern" was removed from policy per user
  decision (cycle 21) — two-phase is the only pattern. The user chose to fix the
  code rather than legitimize the deviation.
