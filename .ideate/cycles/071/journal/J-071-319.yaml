content: >-
  ## WI-733: ValidationError constructor — remove heuristic, require explicit
  code


  **Verdict**: Pass (incremental review, no findings)


  The `ValidationError` constructor in `src/adapter.ts` was simplified from a
  heuristic-driven overload to an explicit three-parameter signature: `(message:
  string, code: string, details?: Record<string, unknown>)`. The old `isCode`
  check (`endsWith("_ERROR") || startsWith("INVALID_") || ===
  "TRANSACTION_FAILED"`) that silently fell back to `'VALIDATION_ERROR'` was
  removed entirely.


  **Scope**: `adapter.ts` only. 102 call sites audited across `writer.ts`,
  `reader.ts`, `context.ts`, `remote/index.ts`, and `ppr.ts` — all already
  passed explicit SCREAMING_SNAKE_CASE codes; no call sites required
  modification.


  **Motivation**: Poka-yoke — make misuse a deterministic TypeScript error
  rather than a silent runtime degradation where `.code` becomes
  `'VALIDATION_ERROR'` without warning.


  **Test result**: 1163 passed, 0 failed. P-49: no YAML backfill needed —
  ValidationError is runtime-only.


  **Worktree**: `/private/tmp/ideate-wi-733`, branch
  `ideate/733-validation-error-constructor`
