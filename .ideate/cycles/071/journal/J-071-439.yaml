  ## [refine] 2026-04-15 — WI-842 marked obsolete


  WI-842 (convergence-checker legacy artifact collision) was triaged as a bug
  but investigation during refinement revealed the fix is already in place:


  - **WI-824** (PH-045 cycle 8): canonical-only file selection in
  `reader.ts:1083-1098` — only `spec-adherence.yaml` and `summary.yaml` are
  considered; legacy ID-named files (SA-NNN, CQ-NNN, GA-NNN) are invisible.

  - **Regression tests**: WI-824 (2 tests), WI-831, WI-836 cover all edge cases
  including the exact reproducer described in WI-842.

  - **Root cause of original observation**: The false convergence behavior
  during the 2026-04-14 autopilot run was caused by capstone review results
  being written as cycle_summary artifacts only (not individual finding
  artifacts), which zeroed the findings count. This was a different issue, fixed
  during that same autopilot session.
