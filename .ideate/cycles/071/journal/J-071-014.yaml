  ## [refine] 2026-03-30 — Cycle 4 refinement: convergence query bug + gap
  analysis items


  Cycle 4 did not converge. condition_a: true, condition_b: false
  (principle_verdict: unknown).


  **Root cause investigated**: handleGetConvergenceStatus uses INNER JOIN
  between nodes and document_artifacts filtered by document_artifacts.cycle = N.
  Multiple cycle_summary artifacts (spec-adherence-004, code-quality-004,
  gap-analysis-004, etc.) are in nodes but NOT in document_artifacts. The INNER
  JOIN yields empty rows for cycle 4, causing condition_b to return 'unknown'.


  **Why they are missing**: These artifacts were written when the MCP server was
  running compiled code that predated the document_artifacts write path in
  write.ts. The file dist/tools/write.js was compiled at 02:12;
  spec-adherence-004.yaml was written at 02:24 by a server process started
  before the recompile. 26 cycle_summary artifacts across cycles 2-7 have the
  same problem.


  **Verified independently**: spec-adherence-004.yaml contains '**Principle
  Violation Verdict**: Pass'. Condition_b WOULD be true if the convergence query
  could find and read the artifact. Cycle 4 would converge if the query were
  fixed.


  **New work items for cycle 5**:

  - WI-424: Fix handleGetConvergenceStatus — LEFT JOIN + file_path fallback for
  missing document_artifacts rows

  - WI-425: Backfill cycle: 3 into CS-003, CQ-003, GA-003 (gap analysis Gap 1)

  - WI-426: Add write→convergence roundtrip integration test (gap analysis Gap
  2)


  Trigger: condition_b false due to structural bug in convergence query + 2
  significant gaps from cycle 4 review.

  Principles changed: none

  New work items: WI-424 through WI-426
