  ## [refine] 2026-04-01 — Refinement planning completed

  Trigger: Requirement evolution — platform pivot from plugin to SaaS product

  Principles changed: none (all confirmed to still hold)

  New work items: WI-543 through WI-550 (8 items)


  PR-001 evolved from "Ideate" (plugin development) to "Ideate Platform
  Strategy" (cross-cutting strategic planning for the platform pivot). PH-017
  (Documentation & Cleanup) marked complete. PH-018 (Foundation & Architecture)
  created as a design phase.


  Key decisions made in this refinement:

  - Taxonomy: Organization → Codebase + Project → Phase → Cycle → Work Item.
  Workspace eliminated. Team is access control only.

  - Architecture: StorageAdapter pattern below MCP tools. Local adapter
  (YAML+SQLite) and Remote adapter (GraphQL→Neo4j).

  - Technology: Neo4j, GraphQL (federation-ready), Auth0 (deferred), Shopify
  billing, TypeScript throughout.

  - Repo structure: ideate (public), ideate-server, ideate-portal,
  ideate-corporate, ideate-infra (all private).

  - Project structure: Platform Strategy + per-repo implementation projects.
  Strategy project produces specs and bootstrap guides; implementation happens
  in each repo's own project.

  - PPR: server-side for remote, in-process for local adapter.

  - Local .ideate/ preserved per-repo for freemium. Cross-repo is paid value
  prop.

  - Knowledge flow: raw artifacts project-scoped, distilled knowledge promotable
  to org level via edges.


