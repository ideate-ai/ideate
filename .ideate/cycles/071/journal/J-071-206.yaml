  ### Fixes applied this session:

  - PPR alignment: undirected graph, specificity dampening, default edge weights
  (+9 tests)

  - Domain nodes in migration + BELONGS_TO_DOMAIN edges (+1 test)

  - relates_to for metrics/journal in EDGE_TYPE_REGISTRY (+1 test)

  - Cross-type domain/phase filters in LocalAdapter (+2 tests)

  - countNodes domain grouping UNION (+1 test)

  - getDomainState Cypher syntax (+1 test)

  - DataLoader containment edge filtering

  - Domain exclusion from BFS/PPR ranked output


  ### Remaining 20 failures analysis:

  - queryGraph BFS (4): LocalAdapter BFS returns different node counts at 2-hop
  — undirected traversal produces more reachable nodes than directed. Needs BFS
  alignment.

  - Traverse token_budget (3): Token counting differs between adapters

  - Traverse always_include (2): Type inclusion count differs (local misses
  GP-02)

  - Write ops (3): putNode/patchNode — properties differ after round-trip

  - Batch/lifecycle (7): Server API format differences

  - convergenceData (1): Content format (YAML string vs JSON blob)

  - T-13 (1): Indexer null coercion


  ### Key architectural insight:

  The PPR algorithms are now aligned (undirected, dampened, weighted). The
  remaining queryGraph BFS divergence is because the server's BFS traverses
  directed edges while LocalAdapter's BFS implicitly traverses undirected
  (SQLite edges have no direction). This requires either aligning the BFS to be
  undirected on the server, or aligning the LocalAdapter to be directed.
