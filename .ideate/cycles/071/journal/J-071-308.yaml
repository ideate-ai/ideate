content: >
  ## PH-038 Complete — WI-715, WI-716, WI-717 Done


  All three graph curation analysis spikes completed. Research artifacts written
  to `.ideate/steering/research/` (directly by workers; MCP unavailable in
  worker execution context — reindex required to surface in artifact queries).


  ### WI-715 — Graph edge coverage audit → research-graph-edge-coverage


  **Critical findings:**

  - `addressed_by` covers 0.4% of findings (1/266). Root cause: agents never
  populate the `addressed_by` field on findings. A derivation rule (verdict ≈
  pass + non-null work_item → create edge) would recover ~165 edges (62.4%
  coverage) with a single change to `extractEdges()`.

  - 636 journal entries have zero edges (fully disconnected island). Two
  extraction rules would reconnect them: (1) title regex matching "Work item
  NNN:" and "WI-NNN" patterns → `relates_to` edges (~200-300 new edges); (2)
  cycle derivation from J-{cycle}-{seq} filename → `belongs_to_cycle` edges (636
  new edges).

  - `supersedes`, `amended_by`, `governed_by`, `informed_by` are structurally
  zero — fields never authored; requires agent prompt changes, not indexer
  changes.


  **Top extraction rule additions (ranked by PPR impact):**

  1. addressed_by derivation from verdict+work_item

  2. journal_entry title regex → relates_to to work items

  3. interview_question loop fix (missing `extractEdges` call)

  4. journal_entry → belongs_to_cycle from filename

  5. work_item → governed_by/informed_by via domain cross-reference


  ### WI-716 — Invalid/obsolete node inventory → research-node-inventory


  **Critical findings:**

  - 22 non-canonical type nodes: `research_finding` (18) is the largest chunk —
  legacy type alongside 25 canonical `research` nodes; complexity 2 (requires
  content review to avoid duplicates). `constraints` and `guiding_principles`
  are plural legacy aggregate files with complexity 3 (code routing in
  writer.ts, schema.ts, db.ts, query.ts must also change).

  - 1,056 of 2,408 nodes (43.9%) are orphans — 719 are by-design (636
  journal_entry + 83 cycle_summary). Genuinely anomalous: 93 early work items,
  13 phases, ~13 domain knowledge nodes.

  - 0 stale file paths across the full 2,408-node population.

  - 8 work items (WI-653–WI-660) have `status: completed` in YAML files
  (non-canonical; canonical is `done`).

  - 11 cycle directories have `summary.yaml` files on disk but no corresponding
  index entry (cycles 028, 029, 034, 058-066).


  ### WI-717 — Multi-.ideate merge design → research-merge-design


  **Critical findings:**

  - 4 reference fields are outside EDGE_TYPE_REGISTRY entirely:
  `project.current_phase_id`, `project.horizon.*` (all 4 variants including
  `horizon.current`), `phase.work_items`, `metrics_event.context_artifact_ids`.
  Any merge rewriter that relies solely on the registry will silently miss
  these.

  - `triggered_by` IS registered but extractor is broken for `{type, id}`
  object-in-array shape (only handles string arrays). Needs registry loop
  extension, not a new special case.

  - `domain_policy.derived_from` comma-string format is a pre-existing indexer
  defect (wrong edges today), independent of merge work.

  - Phase↔Project circular dependency resolved by writing phases before
  projects.

  - Free-text prose ID references are irresolvable — permanent information loss
  for Dir B history after merge.

  - Strategy C (new-destination copy) recommended: non-destructive, single ID
  offset pass, P-26/P-27/P-31 compliant.


  **Open questions requiring human decision before implementation:**
  backup/rollback strategy, domain namespace collision policy, config.json merge
  policy, prose ID staleness tolerance, guiding principle deduplication, 9 total
  enumerated in the artifact.


  ### Note

  All three research artifacts exist on disk at the correct paths but were
  written directly (not via MCP) due to unavailability of MCP tools in worker
  execution context. A server reindex will be needed to surface them in artifact
  queries (`ideate_artifact_query({type: "research"})`).
