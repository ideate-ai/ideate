  # Cycle 30 Capstone — PH-049


  ## Shipped in execute


  - WI-860: Convergence checker filters resolved findings. Added `AND
  addressed_by IS NULL` to LocalAdapter getConvergenceData SQL (reader.ts:930);
  added equivalent client-side filter in RemoteAdapter (index.ts:1291-1299);
  added 2 regression tests (adapter-contract.test.ts:1341,1376). Full suite:
  1477/1477 pass.

  - WI-867: Added Section 8 "Operational Telemetry Surface" (~60 lines) to
  docs/platform/architecture-overview.md. Cites P-33 and D-211 (spec cited D-210
  in error; worker correctly substituted).


  ## Capstone verdicts


  - **code-quality: Pass** — 1 significant (S1: empty-string `addressed_by`
  parity gap between adapters), 3 minor.

  - **spec-adherence: Fail** — 2 critical + 3 significant, all spec-quality
  (implementation is correct).

  - **gap-analysis: Fail** — 4 significant, 3 minor. Key: `countNodes` severity
  path doesn't filter resolved findings; equivalence fixture assertion inverted
  by WI-860.


  ## Principal gaps driving refinement


  Seven significant findings across reviewers:


  | ID | Reviewer | Finding | Action |

  |----|----------|---------|--------|

  | CQ-S1 | code | Empty-string `addressed_by` parity gap in both adapters | Fix
  — normalize at writer or expand filter |

  | GA-EC1 | gap | `countNodes` severity path includes resolved findings;
  contradicts getConvergenceData | Fix — direct extension of WI-860 |

  | GA-II1 | gap | Equivalence fixture assertion inverted post-WI-860 | Fix —
  update to `toBe(0)` |

  | GA-II2 | gap | Adapter contract docs missing filtering guarantee | Fix — add
  clause to both docs |

  | GA-IR2 | gap | No test for countNodes + resolved finding scenario | Fix —
  add alongside EC1 |

  | SA-C2 | spec | WI-860 spec describes wrong root cause (legacy YAML already
  fixed by WI-824) | Spec rewrite |

  | SA-S1 | spec | WI-860 AC says condition_b but fix targets condition_a | Spec
  correction |


  ## Cross-cutting observations


  **CR1: Resolved-findings filter completeness.** WI-860 fixed the primary
  convergence query path but left two adjacent paths unguarded: (a) `countNodes`
  for workspace status (EC1), (b) empty-string `addressed_by` not caught by `IS
  NULL` (CQ-S1). Gap IR2 notes no test coverage for the countNodes path. All
  three should be addressed together — they describe one family of defects.


  **CR2: Spec/implementation mismatch.** The WI-860 spec described one bug
  (legacy YAML files in cycle slot) that was already fixed by WI-824; a
  different real bug (addressed_by findings inflating condition_a) was fixed.
  The tests reflect the real fix. Equivalence fixture reflects the real post-fix
  state. The spec document remains a misleading record — an artifact-quality
  issue with no runtime consequence but real future-reviewer friction.


  ## Convergence status


  Will not converge. 7 significant findings across 3 reviewers. Refinement will
  plan 2-3 fix-up work items:

  1. Resolved-findings filter completeness (CQ-S1 + GA-EC1 + GA-IR2 combined)

  2. Documentation completeness (GA-II1 test fixture + GA-II2 adapter contract
  docs)

  3. Spec artifact corrections (SA-C1, C2, S1, S2, S3 — WI-860/WI-867 rewrites)
