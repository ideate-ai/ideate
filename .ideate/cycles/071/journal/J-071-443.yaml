content: >-
  Phase transition: none → PH-048 (Quality metrics rebuild).


  Promoted from PR-002's horizon.later placeholder PH-047-candidate. Created
  PH-048 with phase_type=design and the candidate's scope language as the
  intent. Removed the PH-047-candidate placeholder from horizon.later. PR-002
  current_phase_id and horizon.current now point to PH-048.


  Phase scope (from intent): design and implement replacement telemetry for the
  metrics infrastructure soft-deprecated in PH-044. Targets: token use, agent
  latency, review-cycle efficiency, rework rate. Removal work:
  ideate_emit_metric, ideate_get_metrics, metrics_events table, .ideate/metrics
  YAML files, emission call sites in all skills.


  Prior system's failure modes (for design input): brittle aggregation logic
  (JSON extracts, heuristic de-duplication, multiple token-counting paths)
  producing untrustworthy data.


  Next step: /ideate:refine to decompose the phase into work items (design
  subphase first — aggregation model and data-source decisions — before
  implementation).
