content: >-
  ## Cycle 21 Capstone Review — Gap Analysis Fail


  Code quality: Pass (minor only). Spec adherence: Pass. Gap analysis: Fail — 6
  significant gaps.


  **SG1**: deleteNode missing INVALID_NODE_ID in adapter-contract.md method
  section. Both adapters throw it; WI-677 did not add it.

  **SG2**: removeEdges missing Validation and Error Codes sections in
  adapter-contract.md. Both adapters throw INVALID_NODE_ID and
  INVALID_EDGE_TYPE; WI-677 did not add these sections.

  **SG3**: ppr.ts passes bare numeric values as third arg to ValidationError
  (e.g. `alpha`) instead of `{ value: alpha }`. WI-678 fixed code strings but
  not the details structure.

  **SG4**: ppr.test.ts validates error message text only, not `.code`. WI-678
  fixes are unverifiable — reverting codes would still pass all tests.

  **SG5**: Equivalence tests cover only 1 of 4 putEdge error codes
  (MISSING_EDGE_SOURCE). MISSING_EDGE_TARGET, MISSING_EDGE_TYPE,
  INVALID_EDGE_TYPE have no cross-adapter equivalence assertion.

  **SG6**: removeEdges equivalence covers INVALID_NODE_ID only.
  INVALID_EDGE_TYPE path has no equivalence pair.


  **Gap pattern**: When validation is added to both adapters and tested
  per-adapter, the equivalence suite must cover ALL error codes for each method
  — not just the first one.


  **Next cycle must address:**

  1. adapter-contract.md: add INVALID_NODE_ID and Validation block to
  deleteNode; add full Validation + Error Codes to removeEdges

  2. ppr.ts: fix four third arguments from bare scalar to `{ value: scalar }`

  3. ppr.test.ts: add `.code` assertions for INVALID_ALPHA,
  INVALID_MAX_ITERATIONS, INVALID_CONVERGENCE_THRESHOLD, INVALID_MAX_NODES

  4. adapter-equivalence.test.ts: add 3 more putEdge pairs (MISSING_EDGE_TARGET,
  MISSING_EDGE_TYPE, INVALID_EDGE_TYPE) and 1 removeEdges pair
  (INVALID_EDGE_TYPE)
