content: >
  ## WI-719 — Add journal entry title extraction for relates_to edges to work
  items

  Status: complete with rework

  Rework: 2 significant findings fixed from incremental review.

  - S1: deriveJournalEntryEdges() deleted all relates_to edges then only
  re-derived title-based ones — fixed by also re-inserting the yaml_field edge
  (from work_item field) after the delete pass. Also added dedup guard to avoid
  double-emitting when work_item field and title both reference the same WI.

  - S2: indexFiles() (watcher path) never called deriveJournalEntryEdges — fixed
  by calling it after upsertPhase() when any updated file path matches
  /cycles/\d+/journal/.

  - M2: Module-level stateful regex replaced with per-iteration `new
  RegExp(...)` to eliminate fragile lastIndex state.

  Added 7 new tests (5 original + 2 rework: yaml_field preservation,
  double-reference dedup). 1144 tests pass.
