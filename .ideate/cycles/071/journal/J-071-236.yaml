  ## WI-643 Complete: Fix token_budget=0 handling in RemoteAdapter


  **Status**: complete


  **Changes made**:

  - Changed condition from `options.token_budget > 0` to `options.token_budget
  >= 0`

  - This ensures token_budget=0 is treated as "zero budget" (only seeds and
  always_include_types) instead of "unlimited"

  - Updated comment to clarify token_budget=0 behavior


  **Files modified**:

  - `/Users/dan/code/ideate/mcp/artifact-server/src/adapters/remote/index.ts`
  (line 765)


  **Fix details**:

  The condition `if (options.token_budget !== undefined && options.token_budget
  > 0)` was changed to `if (options.token_budget !== undefined &&
  options.token_budget >= 0)` to ensure that when token_budget is explicitly set
  to 0, the budget enforcement code runs and includes only seeds (which are
  always included) plus any always_include_types.
