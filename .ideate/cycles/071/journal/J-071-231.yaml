content: >-
  Completed WI-636: Fixed EdgeType enum representation in ideate-server loaders.


  **Problem**: GraphQL queries for edges were failing with "Enum EdgeType cannot
  represent value" errors because the Cypher queries in `/src/loaders/index.ts`
  were using `toLower(type(r))` to convert relationship types to lowercase, but
  the GraphQL EdgeType enum expects UPPER_SNAKE_CASE values.


  **Fix**: Removed `toLower()` calls from Cypher queries on lines 168 and 208,
  and removed redundant `.toLowerCase()` calls when constructing LoadedEdge
  objects on lines 184 and 225.


  **Result**: 

  - Fixed 16 test failures related to EdgeType enum

  - getEdges tests now pass for outgoing, incoming, and both directions

  - batchMutate and nextId tests unblocked (now skipped rather than failing)


  **Remaining work**: 10 test failures remain:

  - WI-639: PPR traversal token budget (3 failures)

  - WI-640: countNodes status grouping (1 failure)  

  - queryNodes/queryGraph filter issues (6 failures)
