  ## WI-746 — Add getDomainState null-status boundary tests for domain_decisions
  and domain_questions


  Status: complete with rework


  Rework: 1 significant finding fixed from incremental review.

  - S1: Question null-status test was tautological — null-status question
  excluded by SQL filter meant domain never entered domainSet, so
  result.get(...) always returned undefined and the else branch trivially
  passed. Fixed by anchoring the domain with a decision node before asserting
  questions exclusion.


  Contract/SQL alignment verified: decisions have no status filter (null-status
  included); questions require status='open' (null excluded). Both behaviors
  confirmed correct against adapter-contract.md.


  Changes:

  - `src/__tests__/adapter-contract.test.ts`: added two getDomainState boundary
  tests after existing null-status policy test.


  79/79 tests pass, tsc clean.
