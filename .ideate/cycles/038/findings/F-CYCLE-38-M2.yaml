title: ${GRACE}s in restart.sh comment reads as literal string
description: "restart.sh:12 reads 'escalates to SIGKILL after ${GRACE}s' — shell variables in # comments are never expanded by any tool reading the file header. GRACE=5 is set at line 55, after the header anyway. Readers see literal '${GRACE}s' text."
suggestion: Hardcode '5s' in line 12 comment, or use plain English 'a 5-second grace period'.
