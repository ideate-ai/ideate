content: |
  # Cycle 005 Decision Log
  
  Cycle 005 was a targeted correction cycle. All three work items (WI-095, WI-096, WI-097) were direct responses to cycle 004 review findings. No new design decisions were made; this log records the specific implementation choices made during execution.
  
  ---
  
  ## Phase: Refinement (Cycle 004 → Cycle 005)
  
  ### D1: Fix report.sh severity key path to read nested `findings.by_severity`
  
  - **When**: Refinement — brrr cycle 1, WI-095 planning (2026-03-20)
  - **Decision**: Update `scripts/report.sh` lines 207-209 and 376-378 to read `(qe.get('findings') or {}).get('by_severity') or {}` instead of accessing severity keys at the top level of the quality event object.
  - **Rationale**: Cycle 004 findings C1 and C2 identified that the Per-Cycle Breakdown and Quality Trends sections silently produced zero counts for all severity levels because `report.sh` was reading flat top-level keys while WI-093 had defined a nested schema with severity counts under `findings.by_severity`.
  - **Implications**: Restores accurate per-cycle severity breakdowns and trend data. Eliminates silent-zero behavior that produced misleading reports without any error.
  
  ### D2: Fix report.sh auto-discovery to accept `artifactDir` key name
  
  - **When**: Refinement — brrr cycle 1, WI-095 planning (2026-03-20)
  - **Decision**: Update `scripts/report.sh:83` to use `config.get('artifactDir') or config.get('artifact_dir')`, accepting both camelCase and snake_case spellings.
  - **Rationale**: Cycle 004 finding S1 identified that auto-discovery was broken because `report.sh` read `artifact_dir` while the manifest schema defined `artifactDir`. The dual-read approach handles both conventions without breaking any current caller.
  - **Implications**: Auto-discovery now functions for all real projects. HELP string updated to document `artifactDir` as the canonical key name (resolving G-M1).
  
  ### D3: Fix `fmt_ms(0)` to return `"-"` instead of `"0s"`
  
  - **When**: Execution — WI-095 (2026-03-20)
  - **Decision**: Change `scripts/report.sh:58` so that `if not ms` guards the zero case, causing `fmt_ms(0)` to return `"-"` rather than `"0s"`.
  - **Rationale**: Zero milliseconds is a sentinel indicating no timing data was recorded, not a measured duration of zero. Displaying `"0s"` was misleading.
  - **Implications**: Timing cells in report output now use `"-"` for unrecorded durations, consistent with the display convention for other absent metrics.
  
  ### D4: Document `metrics.jsonl` in `specs/artifact-conventions.md`
  
  - **When**: Refinement — brrr cycle 1, WI-096 planning (2026-03-20)
  - **Decision**: Add `metrics.jsonl` to the directory tree in `specs/artifact-conventions.md` and add a full schema section covering both agent-spawn and quality_summary event types.
  - **Rationale**: Cycle 004 gap G-S1 identified that the `metrics.jsonl` schema was defined only in `skills/review/SKILL.md`, not in the conventions reference document.
  - **Implications**: `specs/artifact-conventions.md` is now the durable reference for `metrics.jsonl` schema. Satisfies Principle 1 for telemetry format questions.
  
  ### D5: Fix stale `reviews/final/` paths in `skills/refine/SKILL.md`
  
  - **When**: Refinement — brrr cycle 1, WI-097 planning (2026-03-20)
  - **Decision**: Update all references to `reviews/final/` in `skills/refine/SKILL.md` (Phase 3.2, Phase 4, Phase 5) to `archive/cycles/{NNN}/`.
  - **Rationale**: Cycle 004 minor finding M1 identified that refine's SKILL.md still referenced the pre-migration path.
  - **Implications**: `skills/refine/SKILL.md` now references correct paths. Three agent definition files with the same stale `reviews/incremental/` pattern were not in scope and remain unaddressed (see OQ2).
  
  ---
  
  ## Phase: Review (Cycle 005 Capstone)
  
  ### D6: Cycle 005 verdict — Pass
  
  - **When**: Review — cycle 005 capstone (2026-03-20)
  - **Decision**: All three reviewers (code-quality, spec-adherence, gap-analyst) returned Pass. No principle violations.
  - **Rationale**: All seven cycle 004 findings targeted by WI-095, WI-096, and WI-097 are confirmed resolved. The three remaining minor findings (OQ1, OQ2, OQ3 below) do not meet the threshold for blocking convergence.
  - **Implications**: Brrr cycle 2 concludes. Remaining minor findings are candidates for the next cycle's work items.
  
  ---
  
  ## Open Questions
  
  ### OQ1: `metrics.jsonl` section uses `####` heading instead of `###` in `artifact-conventions.md`
  
  - **Source**: spec-adherence M1; code-quality M1
  - **Impact**: Document hierarchy is inconsistent. The `metrics.jsonl` section appears one level deeper than adjacent sections such as `journal.md`, which may confuse readers navigating the document by heading structure.
  - **Fix**: Change `specs/artifact-conventions.md:710` from `#### \`metrics.jsonl\`` to `### \`metrics.jsonl\``.
  
  ### OQ2: Three agent definitions reference stale `reviews/incremental/` path
  
  - **Source**: gap-analysis MG1; code-quality M2
  - **Components**: `agents/spec-reviewer.md:26`, `agents/gap-analyst.md:24`, `agents/journal-keeper.md:20`
  - **Impact**: Agents reading these definitions look in the wrong directory for incremental review context. Functional impact is currently mitigated by spawning prompts supplying the correct path directly.
  - **Fix**: Update to `archive/incremental/` with legacy fallback noted, matching the pattern in `skills/review/SKILL.md:74`.
  
  ### OQ3: `metrics.jsonl` agent-spawn example uses literal `null` and `0` instead of placeholders
  
  - **Source**: gap-analysis MG2; code-quality M1
  - **Components**: `specs/artifact-conventions.md:720,724`
  - **Impact**: Readers may infer `cycle` is always null and `wall_clock_ms` is always 0 for agent-spawn entries.
  - **Fix**: Change to `"cycle": "<N or null>"` and `"wall_clock_ms": <N>` to match the parameterized convention.
  
  ---
  
  ## Cross-References
  
  ### CR1: metrics.jsonl documentation inconsistencies
  
  - **Code review**: M1 — literal null/0 in schema example; M2 — stale path in two agent definitions
  - **Spec review**: M1 — wrong heading level
  - **Gap analysis**: MG1 — stale path in three agent definitions (adds journal-keeper); MG2 — literal values in schema example
  - **Connection**: WI-096 correctly added the `metrics.jsonl` section but introduced two consistency gaps: heading level and placeholder convention. These are documentation-quality issues only. The stale agent path issue (OQ2) is independent of WI-096 — it is a leftover from the cycle 002/003 migration that WI-097 did not fully sweep.
