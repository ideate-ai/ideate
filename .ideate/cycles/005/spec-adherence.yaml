content: |-
  ## Verdict: Fail

  **Principle Violation Verdict**: Fail

  One principle violation and one architecture deviation.

  ## Principle Violations

  ### P1: Policy P-37 — All .ideate/ artifact modifications must use MCP tools
  - **Violated by**: WI-425 backfill of cycle: 3 into CS-003.yaml, CQ-003.yaml, GA-003.yaml
  - **How**: Direct Edit tool calls bypassed MCP server because running server had stale compiled code (build-version 0.1.0 vs package.json 3.3.0). WI-425 implementation notes explicitly forbid direct writes.
  - **Impact**: SQLite document_artifacts rows not updated via normal write path at time of edit. Three-branch WHERE clause in WI-424 handles these rows at query time, so convergence check works, but the P-37 violation is real.
  - **Evidence**: `.ideate/work-items/WI-425.yaml:26` (notes say to use MCP); `.ideate/policies/P-37.yaml`

  ## Architecture Deviations

  ### D1: WI-424 acceptance criterion specifies two-branch WHERE; implementation has three
  - WI-424 criterion: `da.cycle = N OR (da.id IS NULL AND n.file_path LIKE '%/cycles/NNN/%')`
  - Implementation adds third branch: `OR (da.id IS NOT NULL AND da.cycle IS NULL AND n.file_path LIKE ?)`
  - Additive and well-motivated (covers real edge case, covered by test). Not a violation of spirit. Deviation from written criterion.

  ## Principle Adherence Evidence

  - GP-01 (Spec Sufficiency): WI-421 through WI-426 all have explicit acceptance criteria. Satisfied.
  - GP-02 (Minimal Inference): WI-424 specifies exact SQL query structure leaving no design decisions to implementer. Satisfied.
  - GP-04 (Parallel-First Design): WI-424/WI-426 parallel; WI-425 has explicit depends. Satisfied.
  - GP-08 (Durable Knowledge Capture): YAML remains source of truth. All write handlers write YAML before SQLite exclusive transaction. Satisfied.
  - GP-14 (MCP Abstraction Boundary): All 22 tool descriptions reference designations not file paths; no YAML/SQLite/index.db references in tool descriptions. Satisfied.
  - P-33 (No storage details in tool descriptions): agent_type filter description at tools/index.ts:469 updated to reference payload field name. Satisfied.
  - P-37: **Violated** (see P1 above). Direct YAML edits for WI-425.
  - P-41 (Cycle field injection): Injected via write.ts:777-779 for cycle-scoped types. Satisfied.
  - P-44 (Two-phase write): All five write handlers implement YAML-first then exclusive transaction. Satisfied.

  ## Undocumented Additions

  ### U1: Third branch in WHERE clause not in WI-424 spec (additive, covered by test at tools.test.ts:581-602)
  ### U2: `db-helpers.ts` not listed in Architecture Section 10 (pre-existing documentation gap)
