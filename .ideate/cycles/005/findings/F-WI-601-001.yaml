id: F-WI-601-001
type: finding
description: The BFS traversal in graph.ts allows the same node to be discovered multiple times within the same depth level if reached via different paths. The edgeInfoForNode Map is scoped per-depth-iteration and only prevents duplicates within the same path, not across different paths at the same depth. This causes 2-hop queryGraph tests to fail (15 nodes vs 8 expected, 29 vs 9 expected).
impact: Divergence between LocalAdapter and RemoteAdapter for graph traversals with depth > 1. Node deduplication only works across depth levels, not within the same level.
location: /Users/dan/code/ideate-server/src/resolvers/queries/graph.ts:216-220
severity: significant
status: open
suggested_fix: Move visited check to prevent duplicate discovery within same depth level. However, this changes BFS semantics and may require test expectation updates.
title: Unmet acceptance criteria - queryGraph 2-hop tests fail due to duplicate nodes
