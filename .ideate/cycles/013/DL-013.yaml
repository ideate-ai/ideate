  # Decision Log — Cycle 013
  
  ## Decisions
  
  ### D-46: Custom model configuration belongs in Claude Code env vars, not ideate
  - **Context**: User investigated adding custom model (Ollama) support via `.ideate.json` model tier mapping. Technical analysis (researcher + technical-analyst agents) examined Claude Code's model handling.
  - **Decision**: Do not build a model configuration layer in ideate. Claude Code's existing `ANTHROPIC_DEFAULT_*_MODEL` env vars and `ANTHROPIC_BASE_URL` already provide the necessary capability. Building an ideate-specific config would duplicate existing functionality while depending on undocumented model string passthrough behavior.
  - **Rationale**: (1) Feature depends on undocumented behavior — model string passthrough to custom endpoints is community-confirmed but not officially documented by Anthropic. (2) Session-global endpoint lock-in means per-agent model routing is impossible without a proxy. (3) Existing env vars already solve the problem with zero code changes. (4) High implementation cost (touching every skill file) for low value.
  - **Source**: refine-013 interview, `specs/steering/research/claude-code-custom-models.md`
  
  ### D-47: Hardcoded `claude-opus-4-6` replaced with tier alias `opus`
  - **Context**: Skills hardcoded `claude-opus-4-6` (a specific Anthropic model ID) at spawn time for architect, decomposer, domain-curator (conflict path), and proxy-human. This bypassed `ANTHROPIC_DEFAULT_OPUS_MODEL` env var.
  - **Decision**: Replace all occurrences with the tier alias `opus`. This aligns with Policy P-11 and makes the env var mechanism work correctly for version pinning and custom model routing.
  - **Source**: WI-130, refine-013 interview
  
  ### D-48: Document custom model configuration in README
  - **Context**: No user-facing documentation existed for model configuration, version pinning, or custom endpoint setup.
  - **Decision**: Add a "Custom Models" section to README.md covering model tiers, version pinning env vars, Ollama endpoint configuration, minimum model requirements, and known limitations.
  - **Source**: WI-131, refine-013 interview
  
  ## Open Questions
  
  ### OQ-10: README model tier table does not distinguish frontmatter default from spawn-time override
  - **Source**: code-quality M1
  - **Question**: Should the table clarify which agents are `opus` by default (domain-curator) vs `opus` at spawn time only (architect, decomposer, proxy-human)?
  - **Impact**: Documentation accuracy. Users reading the table may incorrectly assume all four agents always use opus.
  
  ### OQ-11: autopilot/phases/review.md unconditionally uses opus for domain-curator
  - **Source**: code-quality M2, cross-references Q-20 (autopilot vs standalone review divergence)
  - **Question**: Should autopilot/phases/review.md adopt the conditional model selection logic from review/SKILL.md, or is unconditional opus intentional for autonomous operation?
  - **Impact**: Behavioral divergence between autopilot and standalone review for domain-curator model selection.
  
  ### OQ-12: README omits `CLAUDE_CODE_SUBAGENT_MODEL` env var
  - **Source**: gap-analysis MG1
  - **Question**: Should the Custom Models section mention `CLAUDE_CODE_SUBAGENT_MODEL` for users who want a single model for all agents?
  - **Impact**: Users miss the simplest possible Ollama configuration path.
