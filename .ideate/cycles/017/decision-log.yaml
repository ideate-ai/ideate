  # Decision Log — Cycle 017 (Adapter Equivalence Alignment)

  ## Decisions

  ### D-001: PPR algorithm specificity dampening applied unconditionally
  - **Decision**: PPR applies `Math.log(totalNodes / Math.max(1, deg))` unconditionally, zeroing scores when totalNodes=1.
  - **Implications**: Isolated seed nodes receive score 0 in single-node graphs.

  ### D-002: Test expectations not updated after prefix change
  - **Decision**: ideate-server tests retain stale prefix expectations (DP-, DD-, DQ-).
  - **Implications**: Test suite reports failures despite correct implementation.

  ### D-003: EdgeType union type does not include belongs_to_domain
  - **Decision**: EdgeType union omits "belongs_to_domain" despite registry inclusion.
  - **Implications**: TypeScript rejects valid edges; type safety hole.

  ### D-004: ideate-server repository not present
  - **Decision**: WI-600, WI-607 executed assuming ideate-server paths exist.
  - **Implications**: Server-side alignment cannot be verified.

  ### D-005: Incremental reviews issued Pass verdicts with 0 findings
  - **Decision**: All 6 work items passed incremental review.
  - **Implications**: Capstone review found critical issues not caught incrementally.

  ## Open Questions

  - OQ-1: Should PPR dampening be skipped for totalNodes <= 1?
  - OQ-2: Should test expectations be updated for new prefixes?
  - OQ-3: Should EdgeType union include belongs_to_domain?
  - OQ-4: How to verify server alignment without repository?
  - OQ-5: Should max_nodes be tested via equivalence test?
  - OQ-6: Should domain_question be removed from addressed_by?
  - OQ-7: Should empty seed array behavior be tested?

  ## Cross-References

  - CR1: PPR correctness — zeroed scores for isolated nodes
  - CR2: Edge type registry / type union inconsistency
  - CR3: ideate-server alignment gaps
