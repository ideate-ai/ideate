  # Decision Log — Cycle 008
  
  ## D-34: Startup-failure exception rule — unconditional exception over executor judgment
  
  **Date**: 2026-03-22
  **Work Item**: WI-120
  **Related policy**: P-22 (workflow domain)
  **Source findings**: Cycle 007 gap analysis II1 (Significant)
  
  ### Decision
  
  Startup failure Critical findings are unconditionally routed to the Andon cord. The executor does not evaluate whether a startup failure appears fixable. The exception is expressed as a named rule ("Exception — Startup failure") that evaluates before the general fixable-within-scope / scope-changing routing logic.
  
  ### Rationale
  
  The general Critical finding routing in execute Phase 8 asks whether the finding is "scope-changing." A trivially-apparent startup failure (e.g., missing import, syntax error introduced by the current WI) could be judged as fixable within scope and silently corrected, bypassing the Andon escalation. This violates the quality floor established by the Cycle 010 convention: never leave the app unable to start. The exception removes the judgment call entirely.
  
  ### Implementation
  
  Two files enforced:
  
  1. `skills/execute/SKILL.md:400` — exception paragraph inserted before the "fixable within scope" paragraph in Phase 8 Critical Findings section
  2. `skills/autopilot/phases/execute.md:158` — exception bullet added as first Critical finding bullet in the finding-handling block
  
  The code-reviewer agent (`agents/code-reviewer.md`) titles these findings "Startup failure after [work item name]" — the exact pattern both exception rules key on. The generation-to-handling round-trip is complete.
  
  All three capstone reviewers (code-quality, spec-adherence, gap-analysis) confirmed Pass with no Critical or Significant findings.
  
  ### Open observations
  
  - **Minor phrasing inconsistency** (code-quality M1): `skills/execute/SKILL.md` uses "regardless of whether the fix appears simple or contained"; `skills/autopilot/phases/execute.md` uses "regardless of apparent fixability." Semantically equivalent. Could be standardized in a future housekeeping cycle.
  - **EC1 deferred**: smoke test blocking scenario in autopilot (what happens when the smoke test itself is blocked by Andon). Not addressed; deferred.
  - **EC2 deferred**: library projects with no startup command — the exception is inapplicable. Not addressed; deferred.
  - **AC5 false positive pattern**: Three consecutive incremental reviews in this session (WI-118, WI-119, WI-120) flagged AC5 due to pre-existing uncommitted changes from earlier work items in the autopilot run. Root cause: the entire session's working tree is uncommitted. Resolves on commit.
