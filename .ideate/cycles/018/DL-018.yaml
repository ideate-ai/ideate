content: |
  # Decision Log — Cycles 018 + 019
  
  > Synthesized from: journal.md, review-manifest.md, code-quality.md, spec-adherence.md, gap-analysis.md, incremental reviews, and the refine-017 interview transcript.
  > This log covers the two execution cycles (018 and 019) that are jointly reviewed by the cycle 018 capstone.
  
  ---
  
  ## Planning Decisions
  
  ### P1: v3 Architecture — YAML as canonical source of truth; SQLite as derived cache
  - **When**: Planning — refine-017 interview (2026-03-23), codified in D-58/D-60 (cycle 016 post-review)
  - **Decision**: All artifact data is stored in YAML files. SQLite is a disposable runtime index rebuilt on startup. No code path writes from SQLite back to YAML.
  - **Rationale**: YAML is compact, parseable, and merge-conflict-safe. SQLite provides fast cross-artifact queries. Treating SQLite as disposable removes upgrade risk — schema changes require only a delete-and-rebuild.
  - **Alternatives considered**: Markdown bodies with YAML front matter (rejected — less compact, harder to parse); database-as-source-of-truth (rejected — creates circular dependency between index and source).
  - **Implications**: Every migration script produces YAML output only. The watcher that triggers rebuildIndex must watch YAML files, not database events. Schema version mismatches resolved by deleting the database, not by migration SQL.
  
  ### P2: Hard cutover — no coexistence with old markdown format
  - **When**: Planning — refine-017 interview Q4 (2026-03-23)
  - **Decision**: Migration converts once; new YAML format is source of truth. Skills break until Phase 4. No parallel-read compatibility layer.
  - **Rationale**: Coexistence adds indefinite maintenance cost. A clean cutover forces the migration script to be correct and complete before shipping.
  - **Implications**: The migration script must cover all artifact types before Phase 4 can proceed. Any artifact type not handled by the migration is silently discarded by the indexer.
  
  ### P3: Artifact format — YAML everywhere, no markdown bodies
  - **When**: Planning — refine-017 interview Q5 (2026-03-23)
  - **Decision**: All artifacts use pure YAML. Markdown is human-readable only; YAML is the write target.
  - **Rationale**: YAML is more compact and machine-parseable. Markdown bodies inside YAML create mixed-format parsing complexity.
  - **Alternatives considered**: YAML with embedded markdown body fields (rejected — inconsistent parsing model).
  - **Implications**: The `interview_response` type, designed for structured per-domain interview data, was conceived as pure YAML. The migration currently handles interview files as holistic document blobs (see open question OQ1).
  
  ### P4: Archive structure — keep archive/cycles/{NNN}/ for cycle-scoped review artifacts
  - **When**: Planning — refine-017 interview Q6 (2026-03-23)
  - **Decision**: Review artifacts remain cycle-scoped at archive/cycles/{NNN}/ rather than type-organized. Cross-cycle queries are handled by the SQLite index.
  - **Rationale**: Type-organized directories would create massive flat directories. Cycle scoping provides natural grouping without requiring the index for human navigation.
  - **Implications**: The migration script must traverse archive/cycles/{NNN}/ to extract decision logs, summaries, review manifests, and findings. Ten document types from this directory needed separate registration in the indexer (see execution decision E4).
  
  ### P5: Drizzle ORM adoption for type-safe queries
  - **When**: Planning — cycle 016 post-review user decision D-63 (2026-03-24)
  - **Decision**: Replace raw SQL upsert strings with Drizzle ORM for type-safe query construction. Raw SQL `db.exec()` retained only for DDL (createSchema).
  - **Rationale**: The cycle 016 code review identified `upsertRow` as a SQL injection risk due to interpolated table names. Drizzle eliminates this class of risk while providing compile-time table/column safety.
  - **Alternatives considered**: Parameterized raw SQL with allow-listed table names (rejected in favor of Drizzle for broader type safety).
  - **Implications**: Drizzle table definitions in db.ts must mirror the raw-SQL DDL in schema.ts. Any divergence between them causes silent behavioral gaps (see finding S3 in code-quality.md).
  
  ### P6: Reversed-direction scalar graph fields (addressed_by, amended_by)
  - **When**: Planning — cycle 016 post-review user decision D-59, superseding D-56 (2026-03-24)
  - **Decision**: Graph relationships between artifacts use reversed-direction scalar fields on the target artifact (e.g., `addressed_by` on a domain question, `amended_by` on a policy) rather than forward-direction fields on the source artifact.
  - **Rationale**: Reversed-direction fields allow the artifact that holds the relationship to be self-describing without requiring a join. Supersedes D-56 which had used null yaml_field placeholders.
  - **Implications**: Edge type registry entries must specify the reversed direction. WI-153 updated the registry from `addresses`→`addressed_by` and `amends`→`amended_by`. The `domainQuestions` table needed an explicit `addressed_by TEXT` column (WI-167).
  
  ### P7: One file per artifact, cycle-scoped directories
  - **When**: Planning — cycle 016 post-review user decisions D-61, D-60 (2026-03-24)
  - **Decision**: Each artifact lives in its own file. Artifacts are organized in cycle-scoped directories under .ideate/cycles/{NNN}/.
  - **Rationale**: One-file-per-artifact prevents merge conflicts when multiple agents write artifacts concurrently. Cycle scoping provides locality without requiring the index for navigation.
  - **Implications**: The journal layout decision (one file per entry, not a flat YAML file) was confirmed by user decision in cycle 017 post-review. Migration script must produce one YAML file per artifact.
  
  ### P8: Remove existing MCP tools rather than rewrite against new index
  - **When**: Planning — refine-017 interview Q2 (2026-03-23)
  - **Decision**: The 7 existing MCP read tools (built against the markdown backend) are deleted entirely. They will be recreated intentionally as needed in later phases.
  - **Rationale**: Rewriting against the new index before the new index is stable adds rework risk. Tools that are not needed for Phase 1 should not exist.
  - **Implications**: tools.ts is currently a stub (TOOLS = [], handleTool throws unconditionally). The MCP server starts and accepts connections but advertises zero tools. This is the documented Phase 1 state (see finding M4 in code-quality.md and IR1 in gap-analysis.md).
  
  ---
  
  ## Execution Decisions
  
  ### E1: idx_edges_composite omitted — UNIQUE constraint's implicit B-tree used instead
  - **When**: Execution — WI-144 (2026-03-24)
  - **Decision**: The `idx_edges_composite` index specified in notes/144.md was not created. The `UNIQUE(source_id, target_id, edge_type)` constraint on the edges table creates an equivalent implicit B-tree.
  - **Rationale**: SQLite creates a B-tree index to enforce UNIQUE constraints, making a separate explicit index redundant. Documented inline at schema.ts:584.
  - **Implications**: The notes/144.md spec was not updated to reflect this (spec-adherence finding D3). The Drizzle table definition for edges also omits the UNIQUE constraint declaration (code-quality finding S3), creating a divergence between raw-SQL DDL and Drizzle metadata.
  
  ### E2: Execution paused twice before Phase A — dependency conflicts in work items
  - **When**: Execution — WI-160 through WI-167, before first worker (2026-03-24)
  - **Decision**: First pause: WI-161 depended on WI-160 (both modify indexer.ts); WI-163/164/165 formed a sequential chain through migrate-to-v3.ts. Execution halted and /ideate:refine was called to add missing dependency edges formally. Second pause: WI-167 scope entry omitted indexer.ts despite its buildRow criterion requiring it. /ideate:refine called again to add indexer.ts to WI-167 scope and set WI-167 depends on [160, 161].
  - **Rationale**: Constraint 6 (no overlapping file scope in parallel execution) was violated. User chose formal refine to keep the dependency graph accurate.
  - **Implications**: Execution strategy was revised to a four-phase ordering: Phase A (WI-160/162/166 parallel), Phase B (WI-161/163 parallel), Phase C (WI-164/WI-167 parallel), Phase D (WI-165).
  
  ### E3: WI-165 Andon cord — decision_log/cycle_summary/review_manifest types unknown to indexer
  - **When**: Execution — WI-165 incremental review, routed to Andon (2026-03-24)
  - **Decision**: The C1 finding (three archive document types not registered in TYPE_TO_TABLE) was routed to the Andon cord rather than fixed within WI-165 scope. User decision: formally define all unregistered types as first-class schema types via a follow-up work item.
  - **Rationale**: The fix required changes to indexer.ts, schema.ts, and db.ts — all outside WI-165 scope. Silent in-scope fixes would have violated work item boundaries.
  - **Implications**: Produced WI-168 (document_artifacts table) and triggered the cycle 019 execution cycle. Ten total unregistered types were discovered in the codebase survey that preceded WI-168.
  
  ### E4: document_artifacts table — single table covering 10 formerly-unregistered types
  - **When**: Execution — refine before WI-168 (2026-03-24); WI-168 execution
  - **Decision**: Rather than create individual tables for each of the 10 unregistered document types, a single `document_artifacts` table was created covering all of them. Schema: 8 common columns plus title, cycle, and content.
  - **Rationale**: These types share the same holistic structure (title + full content blob). Individual tables would duplicate DDL and Drizzle definitions without adding query capability.
  - **Alternatives considered**: Individual typed tables (rejected — schema explosion for types that have no unique structural fields); generic key-value store (rejected — too unstructured for type-safe queries).
  - **Implications**: `interview_response` remains a separate table (it was already registered). The `interview` type maps to document_artifacts, while `interview_response` (structured per-domain data) maps to its own table — but no migration producer for `interview_response` exists (gap MR1 in gap-analysis.md).
  
  ### E5: migrate-to-v3.js dual-maintenance left undocumented across three consecutive work items
  - **When**: Execution — WI-162 (M2), WI-163 (M1), WI-169 (flagged in gap analysis)
  - **Decision**: The test file imports from migrate-to-v3.js, not the TypeScript source. This dual-maintenance requirement was flagged in incremental reviews for WI-162, WI-163, and by the gap analyst, but no comment or pretest script was added in any of the three work items.
  - **Implications**: Future contributors who add functions to migrate-to-v3.ts without updating migrate-to-v3.js will produce unexplained test failures. This remains an open question (OQ3).
  
  ### E6: CONFIG_SCHEMA_VERSION rename — source code index not updated
  - **When**: Execution — WI-166 (2026-03-24)
  - **Decision**: WI-166 renamed the constant from `CURRENT_SCHEMA_VERSION` to `CONFIG_SCHEMA_VERSION` in config.ts. The architecture-level source code index was not updated.
  - **Rationale**: The rename correctly differentiates the config file schema version constant from the SQLite schema version constant (CURRENT_SCHEMA_VERSION in schema.ts).
  - **Implications**: The source code index misleads agents that read it (spec-adherence finding D1). The naming inconsistency between CONFIG_SCHEMA_VERSION and CURRENT_SCHEMA_VERSION within the same module boundary is noted as N1.
  
  ---
  
  ## Review Decisions
  
  ### R1: All significant findings in code-quality.md are performance or maintenance concerns — no correctness bugs
  - **When**: Review — cycle 018 capstone code review
  - **Decision**: Verdict is Pass. All four significant findings (S1–S4) affect future scalability and maintenance rather than current correctness. No critical findings.
  - **Implications**: The watcher debounce gap (S1), unindexed file_path columns (S2), Drizzle/DDL divergence (S3), and O(n²) BFS (S4) are all deferred as open questions for the next cycle.
  
  ### R2: Spec-adherence verdict is Pass — three architecture deviations noted, none blocking
  - **When**: Review — cycle 018 capstone spec review
  - **Decision**: All three deviations (D1 stale source code index, D2 missing exports in source code index, D3 idx_edges_composite omission) are accepted as non-blocking. D3 is justified by implementation-level equivalence; D1/D2 are stale documentation gaps.
  - **Implications**: The source code index is materially inaccurate for both config.ts and migrate-to-v3.ts (12 exports missing or wrong). Agents consuming the index for context assembly will have an incomplete picture of both modules.
  
  ### R3: Gap analysis defers II1/MI1 (dual-maintenance documentation) as Significant but actionable
  - **When**: Review — cycle 018 capstone gap analysis
  - **Decision**: The gap analyst classified the migrate-to-v3.js dual-maintenance issue as Significant (actionable) rather than Minor. The minimum fix was identified but not applied during this cycle.
  - **Implications**: This is the highest-priority item for the next refinement cycle.
  
  ---
  
  ## Open Questions
  
  ### OQ1: `interview_response` type has no migration producer
  - **Question**: No code path in migrate-to-v3.ts or migrate-to-v3.js produces a record with `type: "interview_response"`. The `interview_responses` table exists in the schema with domain_tag and cycle fields, but will never be populated by the current migration. Is the `interview_response` type a Phase 2 capability, or should it replace the `interview`-to-document_artifacts mapping?
  - **Source**: gap-analysis.md MR1
  - **Impact**: The `interview_responses` table is permanently empty. Structured per-domain interview indexing cannot be queried via MCP tools.
  - **Who answers**: User decision
  - **Consequence of inaction**: The `interview_responses` table accumulates as dead schema.
  
  ### OQ2: Watcher debounce absent — burst writes trigger N full rebuilds
  - **Question**: When multiple YAML files are written in rapid succession, each write triggers a separate full rebuildIndex call. Should a debounce be added to the watcher callback?
  - **Source**: code-quality.md S1
  - **Impact**: Quadratic wall-clock time during batch writes. Execution skill and migration script both write many files in bursts.
  - **Who answers**: Technical investigation
  - **Consequence of inaction**: As artifact directory grows beyond 100 files, batch-write operations will become increasingly slow.
  
  ### OQ3: migrate-to-v3.js dual-maintenance undocumented
  - **Question**: The test suite imports from migrate-to-v3.js. There is no comment, prebuild script, or CI enforcement requiring it to stay in sync with the .ts source. This was flagged across three consecutive work items without resolution.
  - **Source**: gap-analysis.md II1, MI1; incremental reviews for WI-162 and WI-163
  - **Impact**: Any contributor adding a function to migrate-to-v3.ts without updating migrate-to-v3.js will produce unexplained test failures.
  - **Who answers**: Technical investigation — minimum fix is a comment; complete fix is a pretest script
  - **Consequence of inaction**: This has been flagged three times without resolution. The next work item on the migration script will encounter the same gap.
  
  ### OQ4: Drizzle table definitions diverge from raw-SQL DDL
  - **Question**: The raw-SQL schema defines `node_file_refs` with a composite PRIMARY KEY and `edges` with a UNIQUE constraint. The Drizzle table definitions omit both. Should Drizzle definitions be updated to declare these constraints, or should all `onConflict*` calls be given explicit `target` parameters?
  - **Source**: code-quality.md S3
  - **Impact**: Current behavior is correct; risk is in future Drizzle version upgrades that rely on constraint metadata.
  - **Who answers**: Technical investigation
  - **Consequence of inaction**: Latent — could silently break upserts after a Drizzle version upgrade.
  
  ### OQ5: Source code index is materially stale for config.ts and migrate-to-v3.ts
  - **Question**: The source code index omits 3 exports from config.ts (U1) and 9 functions from migrate-to-v3.ts (U2), and lists a non-existent constant for config.ts (D1). Should the source code index be regenerated or deprecated in favor of a different context assembly mechanism?
  - **Source**: spec-adherence.md D1, D2, U1, U2
  - **Impact**: Agents consuming the source code index will not see 12 exported symbols and may re-implement equivalent logic.
  - **Who answers**: Design review
  - **Consequence of inaction**: Every future agent planning work against config.ts or migrate-to-v3.ts will start with an incorrect interface map.
  
  ### OQ6: `tools.ts` is a stub — MCP server advertises zero tools with no explanation
  - **Question**: tools.ts exports `TOOLS = []` and `handleTool` throws unconditionally. There is no README, description field, or `instructions` capability text explaining the Phase 2 roadmap to a connecting client.
  - **Source**: code-quality.md M4; gap-analysis.md IR1
  - **Impact**: A user registering ideate-artifact-server sees an empty tool list indistinguishable from a broken server.
  - **Who answers**: User decision — when does Phase 2 tool implementation begin?
  - **Consequence of inaction**: Users will have no way to know whether the server is functioning or broken.
  
  ### OQ7: `detectCycles` BFS uses Array.shift() — O(n²) for large graphs
  - **Question**: Both the Kahn's topological sort and the cycle-component BFS use `queue.shift()` which is O(n) per call. Should the queue be replaced with an index-pointer pattern?
  - **Source**: code-quality.md S4
  - **Impact**: Performance degrades quadratically for large dependency graphs. Fix is a single-line change per BFS loop.
  - **Who answers**: Technical investigation
  - **Consequence of inaction**: If artifact counts grow to thousands, cycle detection becomes a rebuildIndex bottleneck.
  
  ### OQ8: `file_path: null` in migration output contradicts `NOT NULL` schema constraint
  - **Question**: Both capstone and incremental finding builders in migrate-to-v3.ts emit `file_path: null`. The `findings` table declares `file_path TEXT NOT NULL`. The indexer works around this via a fallback in `buildCommonFields`. Is the correct fix to set `file_path` to the relative output path in the migration builder?
  - **Source**: code-quality.md M9
  - **Impact**: YAML artifact files are inconsistent with the schema contract. Direct YAML consumers will see null where a path is expected.
  - **Who answers**: Technical investigation — fix is straightforward
  - **Consequence of inaction**: Inconsistency persists; future direct YAML consumers will receive null file_path.
  
  ---
  
  ## Cross-References
  
  ### CR1: Drizzle/DDL divergence and implicit conflict resolution
  - **Code review**: S3 — Drizzle table definitions for `node_file_refs` and `edges` omit PRIMARY KEY and UNIQUE constraints
  - **Spec review**: D3 — `idx_edges_composite` omitted from schema.ts without updating notes/144.md; UNIQUE constraint provides equivalent index
  - **Connection**: Both S3 and D3 trace to the same root cause: schema decisions made during WI-144 rework were not fully propagated. The UNIQUE constraint is the load-bearing element for both gaps. If it were ever removed, both would activate simultaneously.
  
  ### CR2: Source code index staleness and undocumented exports
  - **Spec review**: D1 (CURRENT_SCHEMA_VERSION stale), D2 (three config.ts exports missing), U1 (same exports undocumented at architecture level), U2 (nine migrate-to-v3.ts exports missing)
  - **Connection**: D1, D2, U1, and U2 all describe the same structural problem: the source code index was written before Cycles 017-018 were executed and was never updated. Both primary modules added to the codebase in this cycle have materially inaccurate index entries.
  
  ### CR3: Dual-maintenance of migrate-to-v3.js
  - **Gap analysis**: II1 (Significant) and MI1 (Significant) — same root cause described twice
  - **Connection**: The gap analyst is the only capstone reviewer to flag this. The incremental reviews for WI-162 and WI-163 both flagged it at the minor level. The combined picture is that this gap has been identified four times across two cycles without resolution — the most chronically deferred actionable finding in this cycle.
  
  ### CR4: tools.ts stub and MCP server completeness
  - **Code review**: M4 — tools.ts exports TOOLS = [] with no explanation for connecting clients
  - **Gap analysis**: IR1 (Minor, deferred) — no README, description, or instructions capability text
  - **Connection**: The code reviewer and gap analyst both identify the same symptom from different angles. Together they confirm that the server is currently undiscoverable — not just incomplete but with no indication of its Phase 2 roadmap to connecting clients.
