type: cycle_summary
content: |-
  ## Gap Analysis — Cycle 18

  **Reviewer**: gap-analyst
  **Cycle**: 18
  **Date**: 2026-04-06

  ## Verdict: Critical/Significant/Minor Gaps Found

  ## Summary

  | Category | Critical | Significant | Minor |
  |----------|----------|-------------|-------|
  | Missing Requirements | 0 | 1 | 0 |
  | Unhandled Edge Cases | 0 | 2 | 2 |
  | Incomplete Integrations | 1 | 3 | 0 |
  | Missing Infrastructure | 0 | 3 | 2 |
  | Implicit Requirements | 0 | 1 | 2 |
  | **Total** | **1** | **10** | **6** |

  ## Critical Gaps

  ### II2: Server-side alignment for queryGraph BFS and PPR
  - **Interface**: StorageAdapter.queryGraph and traverse methods
  - **Gap**: Server-side alignment for queryGraph BFS and PPR remains pending. Without these, full adapter equivalence cannot be achieved.
  - **Recommendation**: Address now — ideate-server GraphQL resolvers need modification to match LocalAdapter behavior.

  ## Significant Gaps

  ### MR1: Missing `/ideate:plan` skill implementation
  - **Gap**: Architecture references `/ideate:plan` but it was merged into `/ideate:init`. Skills directory has no `plan/SKILL.md`.
  - **Recommendation**: Address now — Update architecture or restore `/ideate:plan`.

  ### EC2: Negative PPR parameter validation
  - **Component**: `src/adapters/local/context.ts:163-177`
  - **Gap**: No validation rejects negative values for token_budget, alpha, max_iterations, etc.
  - **Recommendation**: Address now — Add validation with ValidationError throws.

  ### II1: Adapter equivalence test file location mismatch
  - **Gap**: WI-619 specified `tests/adapters/` but file exists at `src/__tests__/`.
  - **Recommendation**: Address now — Move file or update specification.

  ### II4: Server-side PPR always_include_types implementation
  - **Gap**: Server-side implementation may not be complete for always_include_types.
  - **Recommendation**: Address now — Verify server-side matches LocalAdapter.

  ### MI1: Watcher debounce implementation
  - **Gap**: Each file in burst write triggers separate rebuildIndex call.
  - **Recommendation**: Address now — Add 500ms trailing debounce.

  ### MI2: Database index performance for rebuildIndex
  - **Gap**: Hash-check loop performs up to 13 unindexed table scans per file.
  - **Recommendation**: Address now — Add indexes and pre-create prepared statements.

  ### IR1: Meaningful error messages for negative PPR parameters
  - **Gap**: No validation exists for negative PPR parameters.
  - **Recommendation**: Address now — Add ValidationError with specific parameter names.

  ## Minor Gaps

  ### EC3: Null/undefined in always_include_types arrays
  - **Gap**: No defensive test cases for malformed arrays.
  - **Recommendation**: Defer — Add when modifying traverse implementation.

  ### EC4: Traversal limit guards test coverage
  - **Gap**: No stress tests for concurrent PPR, high alpha values.
  - **Recommendation**: Defer — Add when performance becomes concern.

  ### MI3: migrate-to-v3.js dual-maintenance documentation
  - **Gap**: No documentation requires .js to stay in sync with .ts.
  - **Recommendation**: Defer — Add comment or pretest script.

  ### MI5: Documentation for deferred domain questions
  - **Gap**: No single view of deferred questions with reexamination triggers.
  - **Recommendation**: Defer — Create tracker when deferred items grow.

  ### IR2: MCP server tool documentation
  - **Gap**: No human-readable documentation for 22 MCP tools.
  - **Recommendation**: Defer — Add when MCP server reaches Phase 2.

  ### IR3: Consistent naming for schema version constants
  - **Gap**: `CONFIG_SCHEMA_VERSION` vs `CURRENT_SCHEMA_VERSION` inconsistent.
  - **Recommendation**: Defer — Rename when next touching files.
