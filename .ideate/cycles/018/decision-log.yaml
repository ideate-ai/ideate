  # Decision Log and Open Questions — Cycle 018 Capstone Review

  ## Decision Log

  ### Planning Decisions (from refine-017 interview, 2026-03-23)

  #### P1: YAML as canonical source of truth; SQLite as derived cache
  - **When**: Planning — refine-017 interview (2026-03-23)
  - **Decision**: All artifact data stored in YAML. SQLite is disposable runtime index rebuilt on startup.
  - **Rationale**: YAML is compact, parseable, merge-conflict-safe. SQLite provides fast queries.

  #### P2: Hard cutover — no coexistence with old markdown format
  - **When**: Planning — refine-017 interview Q4 (2026-03-23)
  - **Decision**: Migration converts once; new YAML format is source of truth. Skills break until Phase 4.

  #### P3: Artifact format — YAML everywhere, no markdown bodies
  - **When**: Planning — refine-017 interview Q5 (2026-03-23)
  - **Decision**: All artifacts use pure YAML. Markdown is human-readable only.

  #### P4: Archive structure — keep archive/cycles/{NNN}/ for cycle-scoped review artifacts
  - **When**: Planning — refine-017 interview Q6 (2026-03-23)
  - **Decision**: Review artifacts remain cycle-scoped rather than type-organized.

  #### P5: Drizzle ORM adoption for type-safe queries
  - **When**: Planning — cycle 016 post-review user decision D-63 (2026-03-24)
  - **Decision**: Replace raw SQL upsert strings with Drizzle ORM for type-safe query construction.

  #### P6: Reversed-direction scalar graph fields
  - **When**: Planning — cycle 016 post-review user decision D-59 (2026-03-24)
  - **Decision**: Graph relationships use reversed-direction scalar fields on target artifact.

  #### P7: One file per artifact, cycle-scoped directories
  - **When**: Planning — cycle 016 post-review user decisions D-61, D-60 (2026-03-24)
  - **Decision**: Each artifact lives in its own file in cycle-scoped directories.

  #### P8: Remove existing MCP tools rather than rewrite
  - **When**: Planning — refine-017 interview Q2 (2026-03-23)
  - **Decision**: 7 existing MCP read tools deleted; will be recreated as needed in later phases.

  ### Execution Decisions

  #### E1: idx_edges_composite omitted — UNIQUE constraint's implicit B-tree used instead
  - **When**: Execution — WI-144 (2026-03-24)

  #### E2: Execution paused twice before Phase A
  - **When**: Execution — WI-160 through WI-167 (2026-03-24)

  #### E3: WI-165 Andon cord
  - **When**: Execution — WI-165 incremental review (2026-03-24)

  #### E4: document_artifacts table
  - **When**: Execution — refine before WI-168 (2026-03-24)

  ### Review Decisions (Cycle 018)

  #### R1: Code-quality verdict Pass
  - **When**: Review — cycle 018 capstone
  - **Decision**: Only minor findings (logging, token approximation)

  #### R2: Spec-adherence verdict Fail
  - **When**: Review — cycle 018 capstone
  - **Decision**: GP-14 violation — skills/agents directories empty

  #### R3: Gap analysis — 1 critical, 10 significant, 6 minor gaps
  - **When**: Review — cycle 018 capstone
  - **Decision**: Critical: server-side alignment for queryGraph/PPR

  ## Open Questions

  ### OQ1: interview_response type has no migration producer
  - **Question**: No code path produces interview_response records. Is this Phase 2?
  - **Source**: gap-analysis.md
  - **Impact**: interview_responses table permanently empty

  ### OQ2: Skills and agents implementation
  - **Question**: When does Phase 2 begin? Skills directories contain only .gitkeep files.
  - **Source**: spec-adherence.md
  - **Impact**: No user-invocable workflows

  ### OQ3: Server-side alignment for queryGraph/PPR
  - **Question**: Timeline for modifying ideate-server GraphQL resolvers?
  - **Source**: gap-analysis.md II2 (Critical)
  - **Impact**: Full adapter equivalence cannot be achieved

  ### OQ4: Watcher debounce
  - **Question**: Should debounce be added to watcher callback?
  - **Source**: gap-analysis.md MI1

  ### OQ5: Database index performance
