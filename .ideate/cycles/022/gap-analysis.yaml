  ### MG2: Equivalence tests for putNode INVALID_NODE_TYPE and MISSING_NODE_PROPERTIES absent
  - **Gap**: adapter-equivalence.test.ts covers putNode INVALID_NODE_ID but not INVALID_NODE_TYPE or MISSING_NODE_PROPERTIES. Both codes are tested in adapter-specific validation test files.
  - **Recommendation**: Defer.

  ### MG3: No .code assertion for EMPTY_SEED_IDS equivalence
  - **Gap**: seed-ids-validation.test.ts covers EMPTY_SEED_IDS for LocalAdapter; no RemoteAdapter equivalence pair.
  - **Recommendation**: Defer.

  ### MG4: queryGraph INVALID_LIMIT / INVALID_OFFSET has no equivalence pair
  - **Gap**: queryNodes equivalence covers INVALID_LIMIT; queryGraph does not. Both adapters validate identically.
  - **Recommendation**: Defer.

  ## Summary
  Cycles 21–22 completed their stated objectives. adapter-contract.md now has Validation + Error Codes for all validated methods. ppr.test.ts verifies .code for all four codes. Equivalence tests cover all WI-682 scope codes. Remaining gaps are all narrow, deferred, with single-adapter coverage in place.
