  # Decision Log — Cycle 012
  
  ## Decisions
  
  ### D-48: Close Q-33 and Q-34 by updating inline prompts and autopilot label qualifier
  **Source**: WI-129; Cycle 011 review S1/OQ-8, M2/OQ-9
  **Rationale**: WI-126 (Cycle 011) generalized `agents/code-reviewer.md` to use "smoke test fails" but explicitly excluded the inline prompt fragments (AC-7). WI-129 closes that gap by updating the two inline prompts and adding the exclusion qualifier to the autopilot label, completing the smoke test generalization across all locations.
  **Impact**: The smoke test generalization is now complete. All three locations — `agents/code-reviewer.md:94`, `skills/execute/SKILL.md:325`, and `skills/autopilot/phases/execute.md:113` — use identical language. The autopilot finding-handling label at line 160 is now consistent with the equivalent label in `skills/execute/SKILL.md:410`.
  **Status**: settled
  
  ## Open Questions
  
  No new open questions in Cycle 012.
  
  ### Q-33 — RESOLVED
  **Resolution**: `skills/execute/SKILL.md:325` and `skills/autopilot/phases/execute.md:113` now read "If the smoke test fails, report a Critical finding titled 'Startup failure after [work item name]'." — consistent with `agents/code-reviewer.md:94`.
  **Resolved in**: Cycle 012 / WI-129
  
  ### Q-34 — RESOLVED
  **Resolution**: `skills/autopilot/phases/execute.md:160` now reads "**Critical findings fixable within scope (non-startup-failure, non-infrastructure-failure)**:" — consistent with the qualifier in `skills/execute/SKILL.md:410`.
  **Resolved in**: Cycle 012 / WI-129
  
  ## Cross-Reviewer Notes
  
  All three reviewers returned Pass with no Critical or Significant findings. The two minor observations:
  
  1. **[code-quality]** Pre-existing label name divergence: `skills/execute/SKILL.md:410` labels the equivalent bullet "General critical findings..." while `skills/autopilot/phases/execute.md:160` labels it "Critical findings fixable within scope...". This divergence predates WI-129 and was not introduced by it. The qualifier text "(non-startup-failure, non-infrastructure-failure)" is now identical across both files.
  
  2. **[gap-analysis]** `specs/domains/workflow/questions.md` Q-33 and Q-34 still show `Status: open`. Expected state — the domain curator will mark them resolved during post-review curation.
