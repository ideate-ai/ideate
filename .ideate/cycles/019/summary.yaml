  # Review Summary — Cycle 19

  ## Overview

  Cycle 19 added input validation to five adapter methods (traverse(), queryNodes(), queryGraph(), batchMutate()), documented the adapter interface contract, and concluded a PPR alignment research spike with a 'no fixes required' verdict. Two of three capstone reviewers returned Fail. A systematic defect in ValidationError constructor call patterns causes all new validation code to emit .code = 'VALIDATION_ERROR' instead of the specific codes documented in the contract. The test suite has two integrity failures: a Vitest hoisting regression and a tautological placeholder test.

  ## Phase Convergence

  Phase: PH-017
  Cycles completed in this phase: unknown (work item phase metadata not populated)
  Convergence status: Not assessed (phase metadata unavailable)

  Trend: Two reviewers Fail; one reviewer truncated before verdict. The systematic ValidationError constructor issue and the incomplete putNode/patchNode validation layer indicate the validation work is not yet production-ready.

  ## Project Progress

  | Success Criterion | Status |
  |---|---|
  | StorageAdapter interface hardened with input validation | partial |
  | LocalAdapter and RemoteAdapter validation parity | partial |
  | Adapter interface contract documented | partial (P-53 violation) |
  | Test coverage for validation layer | partial (RemoteAdapter tests missing, placeholder test) |
  | Server-side PPR alignment assessed | pass |

  ## Critical Findings

  None.

  ## Significant Findings

  - [code-reviewer] S1: WI-656 vi.mock at module level breaks pre-existing initialize() test via Vitest hoisting. File: mcp/artifact-server/src/__tests__/remote-adapter.test.ts:22 — relates to: WI-656 → carry-forward to current phase
  - [code-reviewer] S2: ValidationError.code is 'VALIDATION_ERROR' not 'INVALID_SEED_IDS' across all WI-653 call sites. Constructor receives field name 'seed_ids' not code string. Affects ~15 call sites across seed_ids, always_include_types, PPR parameters, cycle validation in both adapters. WI-653 AC unmet. — relates to: WI-653, WI-654, WI-655, cross-cutting
  - [code-reviewer] S3: WI-660 research output at wrong path (docs/ppr-alignment-research.md vs. specified research/ppr-alignment.md). — relates to: WI-660
  - [spec-reviewer] P-53 violation: adapter-contract.md lines 11, 18, 628–637 reference concrete storage formats (SQLite, YAML, two-phase write) in a storage-agnostic interface spec. — relates to: WI-659
  - [gap-analyst] SG1: putNode and patchNode lack upfront input validation despite batchMutate gaining it and adapter-contract.md documenting validation for all write methods. — relates to: WI-655, WI-659, cross-cutting
  - [gap-analyst] SG2: No remote-adapter-validation.test.ts. WI-658 AC 'Coverage matches RemoteAdapter' unmet. — relates to: WI-658
  - [gap-analyst] SG3: adapter-equivalence.test.ts has no validation equivalence cases. Validation parity (WI-653–655 major deliverable) has no equivalence test surface. — relates to: WI-653, WI-654, WI-655, cross-cutting

  ## Minor Findings

  - [code-reviewer] M1: TRANSACTION_FAILED test is string literal comparison — always passes, tests nothing → carry-forward
  - [code-reviewer] M2: INVALID_CYCLE and INVALID_ALWAYS_INCLUDE_TYPE documented in adapter-contract.md but won't surface as .code → carry-forward
  - [code-reviewer] M3: Non-array always_include_types iterates characters, produces misleading error → carry-forward
  - [code-reviewer] M4: mapGqlNodeToNode throws ValidationError(PARSE_ERROR); fetchCurrentCycle throws StorageAdapterError for same failure class. Inconsistency. → carry-forward
  - [gap-analyst] MG1: WI-660 wrong path — traceability only → carry-forward
  - [gap-analyst] MG2: Q-120 marked open despite GA-001–007 addressed; keep open until SG3 resolved → carry-forward
  - [gap-analyst] MG3: WI-660 optional enhancements not captured as work items or domain questions → carry-forward
  - [gap-analyst] MG4: Placeholder transaction test in local-adapter-validation.test.ts → carry-forward
  - [gap-analyst] MG5: putNode/patchNode contract violation (same root as SG1) → carry-forward

  ## Findings Requiring User Input

  1. **Spec-adherence review incomplete** — The spec-reviewer hit its turn budget (108 tool calls) before completing. GP-14, GP-08, P-58, P-59 adherence for WI-653–658 not assessed. Options: accept partial result and proceed to refinement, or re-run spec-adherence review. Impact: unknown principle violations may exist.

  2. **WI-660 file path resolution** — Research output at docs/ppr-alignment-research.md vs. specified research/ppr-alignment.md. Move file, update WI-660 scope, or accept docs/ as canonical location. Low urgency but affects traceability.

  3. **WI-660 optional enhancements** — Research report identifies two enhancements (server-side PPR validation for defense-in-depth; edge weight customization not exposed in RemoteAdapter docs). Capture as work items now or defer. Medium priority per report.

  ## Proposed Refinement Plan

  7 significant findings require a refinement cycle. Recommended scope:

  1. **Fix ValidationError constructor call sites** (S2, systemic) — ~15 call sites in adapter.ts, local/context.ts, local/reader.ts, local/writer.ts, remote/index.ts. Replace field name args with code strings.
  2. **Fix vi.mock hoisting regression** (S1) — mcp/artifact-server/src/__tests__/remote-adapter.test.ts. Scope to or extract WI-656 describe block.
  3. **Add putNode/patchNode validation** (SG1) — local/writer.ts and remote/index.ts. Extend batchMutate pattern.
  4. **Create remote-adapter-validation.test.ts** (SG2) — tests/adapters/ with same paths as local version.
  5. **Add validation equivalence cases to adapter-equivalence.test.ts** (SG3) — covers limit/offset and batchMutate validation parity.
  6. **Remove P-53 violations from adapter-contract.md** (spec-reviewer) — lines 11, 18, 628–637.
  7. **Fix WI-660 file path** (S3/MG1) — move or update scope.

  Minor items (M1–M4, MG2–MG5) can be addressed in the same cycle.
