  # Review Summary — PH-039 Full Audit (Cycle 19)

  ## Overview
  PH-039 (Graph Curation Improvements) implemented 6 indexer edge-derivation fixes and 1 data hygiene item across WI-718 through WI-724. The `rebuildIndex()` path is functionally correct and all 1152 tests pass. Two recurring findings emerged independently from multiple reviewers: (1) the `belongs_to_cycle` edge type introduced in WI-720 was not registered in the schema contract, and (2) the incremental watcher path (`indexFiles`) does not trigger derivation passes for all relevant triggering events, partially undermining PH-039's PPR quality improvement intent.

  ## Phase Convergence
  Phase: PH-017
  Cycles completed in this phase: not assessed (full audit)
  Convergence status: Not assessed (ad-hoc review)
  Trend: N/A — full audit scope

  ## Project Progress

  | Success Criterion | Status |
  |---|---|
  | addressed_by edge coverage for findings with passing verdict | pass |
  | relates_to edges from journal entry titles | pass (rebuildIndex); partial (indexFiles) |
  | belongs_to_cycle edges from journal entries to cycle_summary | pass (rebuildIndex); partial (indexFiles) |
  | interview_question belongs_to_domain edges extracted | pass |
  | triggered_by object-array items produce edges | pass |
  | derived_from comma-string normalization | pass |
  | belongs_to_cycle registered in EDGE_TYPES and adapter contract | not-started |
  | All test suite passing | pass (1152 tests) |

  ## Significant Findings

  - [code-reviewer + spec-reviewer] `belongs_to_cycle` edge type written by `deriveJournalEntryCycleEdges()` (indexer.ts:553) is absent from `EDGE_TYPES` array (schema.ts:15-31), absent from `EDGE_TYPE_REGISTRY`, and absent from the `EdgeType` union in `docs/adapter-contract.md`. `putEdge()` in writer.ts validates against `EDGE_TYPES` and would throw `INVALID_EDGE_TYPE` if any caller attempted to use this type via the adapter API. The edge exists in the SQLite database but is invisible to the schema contract. — relates to: P-26 (partial violation), cross-cutting

  - [code-reviewer] `deriveJournalEntryCycleEdges` (Phase 4) has no stale-edge deletion before re-derivation, unlike Phase 3 which deletes before re-inserting. Stale `belongs_to_cycle` edges would accumulate if a journal entry's cycle association changed. Also causes `edgesCreated` stat to be inflated on repeated `rebuildIndex` calls (onConflictDoNothing means insertions don't actually write, but counter always increments). — relates to: WI-720

  - [gap-analyst] `indexFiles()` watcher does not trigger `deriveJournalEntryCycleEdges` when a `cycle_summary` is added. The `hasJournalUpdate` guard checks only for `/\/cycles\/\d+\/journal\/` paths. A cycle_summary file path does not match, so journal entries for that cycle gain no `belongs_to_cycle` edges until next `rebuildIndex`. This is exactly the PPR quality gap PH-039 was designed to close, left open in the incremental path. — relates to: WI-720, cross-cutting

  - [gap-analyst] `indexFiles()` watcher does not trigger `deriveJournalEntryEdges` when a new work item is added. Journal entries whose titles reference a not-yet-existing work item never get `relates_to` edges in the incremental path throughout active development. — relates to: WI-719, cross-cutting

  - [gap-analyst + code-reviewer] No incremental test for `relates_to` derivation via `indexFiles`. The `hasJournalUpdate` condition at `indexer.ts:841` gating `deriveJournalEntryEdges` in the watcher path is untested. If broken, all `rebuildIndex` tests still pass — the regression would be invisible. — relates to: WI-719

  ## Minor Findings

  - [code-reviewer] Comma-splitting guard at `indexer.ts:374-385` applies to all single-value string yaml_fields, not only `derived_from`. A malformed value like `'workflow, artifact-structure'` in a `domain` field would silently split into two `belongs_to_domain` edges. Should be restricted to `derived_from` only. → carry-forward

  - [spec-reviewer] `resolution: null` on done work items WI-721, WI-722, WI-723. Convention is that done items have resolution populated (WI-718/719/720/724 all have it). Data consistency gap in artifact corpus. → carry-forward

  - [gap-analyst] No tests for `governed_by` and `informed_by` edge extraction (covered indirectly by registry loop tests for other types). → carry-forward

  - [gap-analyst] No test for `domain_question.addressed_by` edge extraction. → carry-forward

  ## Findings Requiring User Input
  None — all findings can be resolved from existing context.

  ## Proposed Refinement Plan
  The review identified 5 significant findings requiring a focused refinement cycle:

  1. **Register `belongs_to_cycle` in schema** (schema.ts EDGE_TYPES, EDGE_TYPE_REGISTRY, adapter-contract.md) — 1 work item, small
  2. **Add stale-edge deletion to `deriveJournalEntryCycleEdges`** (indexer.ts) — 1 work item, small
  3. **Extend `indexFiles` derivation triggers** — add `hasCycleSummaryUpdate` and `hasWorkItemUpdate` conditions to call both derivation passes (indexer.ts) — 1 work item, small
  4. **Add incremental test for `relates_to` via `indexFiles`** (indexer.test.ts) — included in item 3
  5. **Restrict comma-split guard to `derived_from` only** (indexer.ts) — 1 work item, small

  Estimated scope: 3-4 small work items. All changes confined to `src/indexer.ts`, `src/schema.ts`, `src/__tests__/indexer.test.ts`, and `docs/adapter-contract.md`.
