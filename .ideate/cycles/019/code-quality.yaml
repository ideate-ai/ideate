content: |-
  ## Verdict: Fail

  PH-039 indexer changes introduce working edge derivation but WI-720's belongs_to_cycle edge type was not registered in EDGE_TYPES or EDGE_TYPE_REGISTRY, creating a split-brain: the indexer writes edges the adapter API cannot reference, query, or remove.

  ## Significant Findings

  ### S1: belongs_to_cycle not registered in EDGE_TYPES or EDGE_TYPE_REGISTRY
  - File: src/schema.ts:15-31 and src/indexer.ts:553
  - belongs_to_cycle written by deriveJournalEntryCycleEdges() but absent from EDGE_TYPES array. putEdge() in writer.ts validates against EDGE_TYPES and throws INVALID_EDGE_TYPE. TypeScript callers cannot use belongs_to_cycle as an EdgeType value.
  - Fix: Add to EDGE_TYPES array, add EDGE_TYPE_REGISTRY entry (yaml_field: null, source_types: [journal_entry], target_types: [cycle_summary]), add schema.test.ts coverage.

  ### S2: deriveJournalEntryCycleEdges has no stale-edge deletion before re-derivation
  - File: src/indexer.ts:521-561
  - Phase 3 (deriveJournalEntryEdges) deletes relates_to before re-inserting. Phase 4 (deriveJournalEntryCycleEdges) has no delete step. Stale belongs_to_cycle edges accumulate if journal entry cycle numbers change.
  - Fix: Add delete inside entries loop before insertEdge.

  ### S3: edges_created stat inflated by Phase 4 on repeated rebuildIndex calls
  - File: src/indexer.ts:529-557
  - edgesCreated incremented before insertEdge which uses onConflictDoNothing. After first build, every subsequent rebuild reports non-zero edges_created even when no new edges written.
  - Fix: Delete-before-rederive (S2 fix) also resolves S3.

  ## Minor Findings

  ### M1: No incremental test for relates_to derivation via indexFiles
  - WI-720 has incremental test; WI-719 does not. The hasJournalUpdate condition at indexer.ts:841 gating deriveJournalEntryEdges is untested for the indexFiles path.

  ### M2: Comma-splitting guard applies to all single-value string fields, not just derived_from
  - src/indexer.ts:374-385. Guard applies to domain, work_item, supersedes, module etc. Malformed domain like 'workflow, artifact-structure' would silently split into two edges.
  - Fix: Restrict to derived_from only.

  ## Test Run
  1152 tests pass, 310 skipped — no failures.
