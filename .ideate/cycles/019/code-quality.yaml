content: |-
  # Code Quality Review — Cycle 19

  ## Verdict: Fail

  One test failure introduced by WI-656, documentation-implementation mismatches in error codes across multiple work items, a missing output file at the specified path for WI-660, and a tautological acceptance criterion in WI-658.

  ## Critical Findings

  None.

  ## Significant Findings

  ### S1: WI-656 test addition breaks pre-existing `initialize()` test
  - **File**: mcp/artifact-server/src/__tests__/remote-adapter.test.ts:22
  - The module-level `vi.mock("../adapters/remote/client.js", ...)` added by WI-656 is hoisted by Vitest, replacing the real GraphQLClient for all tests in the file. The pre-existing test at line 153 (`initialize() throws ConnectionError for unreachable endpoint`) now fails: `client.query` returns `undefined` instead of throwing, so the promise resolves instead of rejecting.
  - **Fix**: Move vi.mock inside the describe block using `vi.doMock`, or extract WI-656 tests into their own file.

  ### S2: WI-653 AC not met — ValidationError.code is 'VALIDATION_ERROR' not 'INVALID_SEED_IDS'
  - **File**: mcp/artifact-server/src/adapters/local/context.ts:178, mcp/artifact-server/src/adapters/remote/index.ts:735
  - Both adapters call `new ValidationError("seed_ids must be an array", "seed_ids", { code: "INVALID_SEED_IDS" ... })`. Because `"seed_ids"` is a field name, not a recognized code prefix, the thrown error's `.code` is `"VALIDATION_ERROR"`. The sub-code appears only in `details.code`. Tests only assert `instanceof ValidationError`, missing this.
  - **Fix**: Change second argument from field name to error code: `new ValidationError("seed_ids must be an array", "INVALID_SEED_IDS", { value: seedNodeIds })`

  ### S3: WI-660 output file at wrong location
  - **Actual**: mcp/artifact-server/docs/ppr-alignment-research.md
  - **Specified**: mcp/artifact-server/research/ppr-alignment.md (directory does not exist)
  - The review manifest and WI-660 scope both point to the wrong path. Tooling looking for the file will not find it.
  - **Fix**: Move to specified path or update WI-660 scope via MCP tools.

  ## Minor Findings

  ### M1: WI-658 TRANSACTION_FAILED test is tautological
  - **File**: mcp/artifact-server/tests/adapters/local-adapter-validation.test.ts:117
  - The AC-1 test is `expect("TRANSACTION_FAILED").toBe("TRANSACTION_FAILED")` — a literal comparison that always passes and tests nothing about the actual code path.

  ### M2: INVALID_CYCLE and INVALID_ALWAYS_INCLUDE_TYPE documented as codes but won't appear as `.code`
  - **File**: mcp/artifact-server/docs/adapter-contract.md:518-519
  - The "Summary: ValidationError codes coverage" test only checks `expectedCodes.length === 15`, never calls any adapter method.

  ### M3: Non-array always_include_types produces misleading error
  - **File**: mcp/artifact-server/src/adapters/local/context.ts:172
  - Passing a string iterates characters, producing `"Invalid NodeType: g"` rather than `"always_include_types must be an array"`.

  ### M4: mapGqlNodeToNode throws ValidationError(PARSE_ERROR) but should throw StorageAdapterError
  - **File**: mcp/artifact-server/docs/adapter-contract.md:508
  - `mapGqlNodeToNode` at line 291 throws `ValidationError` for parse failure while `fetchCurrentCycle` throws `StorageAdapterError` for the same class. Inconsistency for callers.

  ## Unmet Acceptance Criteria

  - WI-653: 'ValidationError thrown with code INVALID_SEED_IDS' — thrown `.code` is `VALIDATION_ERROR` because constructor receives field name not code string.
