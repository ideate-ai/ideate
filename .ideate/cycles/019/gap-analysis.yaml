content: |-
  # Gap Analysis — Cycle 19

  ## Verdict: Fail

  Three significant gaps: putNode/patchNode lack validation despite batchMutate gaining it, no RemoteAdapter validation test file, and adapter-equivalence.test.ts has no validation equivalence cases.

  ## Critical Findings

  None.

  ## Significant Findings

  ### SG1: putNode and patchNode lack upfront input validation
  - **Files**: mcp/artifact-server/src/adapters/local/writer.ts, mcp/artifact-server/src/adapters/remote/index.ts
  - WI-655 added validation to `batchMutate` only. Direct calls to `putNode` or `patchNode` with invalid `id` (empty string), null `type`, or missing `properties` proceed to persistence without rejection. LocalAdapter will attempt to write to a garbage path; RemoteAdapter will submit a malformed mutation. adapter-contract.md documents that these methods require validated inputs.
  - **Fix**: Extend the validation pattern from batchMutate to putNode and patchNode in both adapters.

  ### SG2: No remote-adapter-validation.test.ts
  - **File**: mcp/artifact-server/tests/adapters/ (missing)
  - WI-658 created `local-adapter-validation.test.ts` covering limit/offset and batchMutate for LocalAdapter only. No equivalent test file exists for RemoteAdapter. The pattern established by `seed-ids-validation.test.ts` and `always-include-types-validation.test.ts` tests both adapters. WI-658's acceptance criterion "Coverage matches RemoteAdapter" is unmet.
  - **Fix**: Create `remote-adapter-validation.test.ts` with the same validation paths, using `it.skipIf(!remoteAvailable)` for server-required cases.

  ### SG3: adapter-equivalence.test.ts has no validation equivalence cases
  - **File**: mcp/artifact-server/tests/adapters/adapter-equivalence.test.ts
  - Q-123 is resolved (file now exists). However, the file covers shape equivalence (`nextId`, `getNode`, `queryNodes`) but contains zero `ValidationError` imports and zero tests for validation parity between adapters. Validation parity was a major deliverable of WI-653–655 but the equivalence surface for it is absent.
  - **Fix**: Add validation equivalence cases (e.g., both adapters throw INVALID_LIMIT for negative limit).

  ## Minor Findings

  ### MG1: WI-660 output at wrong path
  - Actual: mcp/artifact-server/docs/ppr-alignment-research.md
  - Specified: mcp/artifact-server/research/ppr-alignment.md
  - Traceability gap only; content is correct.

  ### MG2: Q-120 still marked open despite all 7 underlying gaps addressed
  - .ideate/questions/Q-120.yaml has status: open. All GA-001 through GA-007 testing gaps were addressed in prior cycles. Stale artifact inflates open questions count.

  ### MG3: No follow-up work items for WI-660 optional enhancements
  - Research report section 4.2 identifies two enhancements: (1) server-side PPR parameter validation for defense-in-depth, (2) edge weight customization not exposed in RemoteAdapter.traverse() docs. Neither captured as work item or domain question.

  ### MG4: WI-658 transaction failure test is placeholder
  - local-adapter-validation.test.ts AC-1 test is a string literal comparison that always passes. Actual coverage exists in write-transaction.test.ts but the placeholder is misleading.

  ### MG5: putNode/patchNode validation gap also implicit contract violation
  - adapter-contract.md (WI-659) specifies validation requirements for putNode/patchNode. Code does not enforce them. Documentation and implementation disagree.
