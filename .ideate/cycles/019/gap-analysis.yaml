content: |-
  ## Verdict: Significant gaps in incremental watcher path

  rebuildIndex() path is comprehensive. indexFiles() watcher path has two significant gaps where derivation passes are not triggered, leaving the graph stale between artifact writes and the next full rebuild.

  ## Significant Findings

  ### EC1: indexFiles does not re-derive belongs_to_cycle when a cycle_summary is added
  - Scenario: New cycle_summary written, watcher fires. hasJournalUpdate checks /\/cycles\/\d+\/journal\// — cycle_summary is not under journal/, guard is false. deriveJournalEntryCycleEdges never called.
  - Impact: Journal entries for that cycle don't gain belongs_to_cycle edges until next rebuildIndex. Exactly the PPR gap PH-039 was meant to close, left open in the incremental path.
  - Fix: Add const hasCycleSummaryUpdate = yamlPaths.some(p => /\/cycles\/\d+\//.test(p)); call deriveJournalEntryCycleEdges when either condition true.

  ### EC2: indexFiles does not re-derive relates_to edges when a new work item is added
  - Scenario: Journal entry title references WI-800 but WI-800 doesn't exist. WI-800 later added via watcher. hasJournalUpdate is false for work-items path. deriveJournalEntryEdges never called.
  - Impact: Journal entries referencing future work items never get relates_to edges in the incremental path throughout the active development period.
  - Fix: Also call deriveJournalEntryEdges when any work-item path is updated.

  ### IR1: No incremental test for relates_to derivation via indexFiles
  - The hasJournalUpdate guard at indexer.ts:841 is untested. If broken, all rebuildIndex tests still pass. Incremental watcher is the hot production path.
  - Fix: Add test: seed WI via rebuildIndex, add journal entry via indexFiles with WI in title, assert relates_to edge exists.

  ## Minor Findings

  ### IR2: No tests for governed_by and informed_by edge extraction (defer)
  ### IR3: No test for domain_question.addressed_by extraction (defer)

  ## Backfill Completeness
  No other artifact types with comma-string legacy values identified. Normalization guard in extractEdges() covers future occurrences.
