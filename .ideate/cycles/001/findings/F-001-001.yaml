title: `execute/SKILL.md` Phase 4.5 context digest missing interface contracts cap exemption
description: |
  - **File**: `skills/execute/SKILL.md:148-153`
  - **Issue**: WI-105 restructured `autopilot/phases/execute.md` to exempt the `## Interface Contracts` section from the 150-line cap (always included uncapped). The standalone execute skill's Phase 4.5 still uses a flat "~100-150 line" cap with no interface contracts exemption. The two skills now have inconsistent behavior for the same context digest function.
  - **Impact**: When a user runs `/ideate:execute` on a project with large interface contracts sections, contracts can be silently truncated. Workers receive incomplete interface information. This is the exact bug WI-105 fixed in autopilot, now present in standalone execute.
  - **Suggested fix**: Apply the same restructuring as WI-105 to `execute/SKILL.md` Phase 4.5: explicitly exempt `## Interface Contracts` from the cap; cap non-contracts content at 150 lines.
