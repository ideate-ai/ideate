cycle: 1
reviewer: gap-analyst
title: Gap Analysis — Cycle 1
content: |-
  ## Verdict: Fail

  Two significant gaps remain.

  ### Gap 1: Stale tool description on ideate_emit_metric
  **Severity**: Minor
  **Description**: The `payload` field description in the `ideate_emit_metric` tool definition (`tools/index.ts` lines 558–560) still reads “Will be stringified and appended as one line.” — describing the old JSONL behavior. The implementation now writes YAML + SQLite.
  **Impact**: Agents reading this description will form a false mental model, affecting how they handle retries or interpret `ideate_artifact_query(type="metrics_event")` results.
  **Suggested fix**: Update description to: “Written as a YAML file in metrics/ and indexed in SQLite. Queryable via ideate_artifact_query(type='metrics_event') or ideate_get_metrics.”

  ### Gap 2: createIdeateDir test does not assert "metrics" subdirectory is created
  **Severity**: Significant
  **Description**: `IDEATE_SUBDIRS` was extended with `"metrics"` (MI1). The `createIdeateDir` test in `config.test.ts` (lines 194–205) has a hardcoded `expectedDirs` array that omits `"metrics"`. Test passes but does not verify the new subdir is actually created.
  **Impact**: If `"metrics"` were accidentally dropped from `IDEATE_SUBDIRS`, the test suite would not catch it. `handleEmitMetric` has its own `mkdirSync` fallback so no immediate runtime failure, but the bootstrap structural invariant would be silently broken.
  **Suggested fix**: Add `"metrics"` to `expectedDirs` in the `createIdeateDir` test. Optionally iterate `IDEATE_SUBDIRS` directly to make the test self-maintaining.

  ### Gap 3: handleEmitMetric uses default transaction instead of exclusive
  **Severity**: Significant
  **Description**: `metrics.ts` uses `ctx.db.transaction(() => { ... })()` (deferred). `handleAppendJournal` in `write.ts` uses `.exclusive()` explicitly to prevent concurrent callers from interleaving their YAML+SQLite phases. The YAML write happens outside the transaction (Phase 1 at line 68), so concurrent metrics emissions can interleave: both write YAML, then both enter the SQLite phase. Under concurrent autopilot usage this is unlikely to cause failures (UUIDs prevent ID collision), but the P-44 consistency guarantee is not fully upheld.
  **Suggested fix**: Change `ctx.db.transaction(() => { ... })()` to `ctx.db.transaction(() => { ... }).exclusive()` in `handleEmitMetric`.

  ### Gap 4: Report scripts still target metrics.jsonl
  **Severity**: Minor
  **Description**: `scripts/report-executive.sh` and `scripts/report-cycle.sh` both read a `metrics.jsonl` file. This file is no longer written after the metrics unification. Scripts will get empty output on post-migration projects.
  **Impact**: Broken scripts for users of the reporting tools.
  **Suggested fix**: Defer to a separate work item or document scripts as deprecated pending rewrite against `ideate_get_metrics`. Add deprecation note in scripts or ARCHITECTURE.md.
