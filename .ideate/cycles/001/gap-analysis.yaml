content: |-
  ## Gap Analysis — Cycle 1 (2026-04-07)

  **Verdict**: Fail

  ## Critical Gaps
  None.

  ## Significant Gaps

  ### SG1: deleteNode YAML Rollback — Missing and No Follow-On Work Item Tracked
  - **Component**: `src/adapters/local/writer.ts` lines 899-924
  - **Scenario**: When Phase 1 succeeds (YAML removed at line 902) but Phase 2 fails (SQLite DELETE at lines 913-917), the YAML file is permanently gone and not restored. The SQLite index and filesystem are left inconsistent: node row still in SQLite but YAML file no longer exists.
  - **Current state**: deleteNode throws TRANSACTION_FAILED on SQLite failure but performs no filesystem restore. Incremental review F-695-1 flagged this as 'tracked as follow-on' but no follow-on work item (WI-702 or similar) was created.
  - **Impact**: SQLite failure during deleteNode leaves the artifact store in unrecoverable split-brain state: YAML file gone but SQLite row still present. Subsequent getNode calls return stale data from index while readNodeContent returns empty string.
  - **Recommendation**: Address now — this is a P-44 data-integrity gap. Fix: save file content before fs.unlinkSync, restore it in the SQLite catch block.

  ## Minor Gaps

  ### MN1: No Cross-Adapter Equivalence Test for getNode Empty-ID Rejection
  - `tests/adapters/adapter-equivalence.test.ts` — both adapters now reject getNode('') with INVALID_NODE_ID but no equivalence test asserts this. Per-adapter isolation tests exist in local-adapter-validation.test.ts:797 and remote-adapter-validation.test.ts:906-909.
  - Defer — covered in isolation in both adapter-specific test files.

  ### MN2: fetchCurrentCycle Plain-Error Behavior Undocumented in adapter-contract.md
  - Any RemoteAdapter method calling fetchCurrentCycle internally can throw plain Error (not StorageAdapterError) for GraphQL/network failures. adapter-contract.md Error Types section implies StorageAdapterError subclasses are the complete set.
  - The JSDoc for fetchCurrentCycle in remote/index.ts:419 was updated by WI-698. Test file remote-adapter-fetchcycle.test.ts verifies it. Contract doc not updated.
  - Defer — documented in source JSDoc and tested.

  ### MN3: _countNodesWithoutStatus Graceful-Degradation Rationale Undocumented
  - `src/adapters/remote/index.ts:1440-1442` — catches all errors, logs, returns 0. Design decision (preserve outer countNodes call) is not explained in code or docs.
  - Defer — console.error was the substantive fix.

  ### MN4: fireEvent Path Lacks Test for Non-Allowlisted Command Rejection
  - `src/__tests__/hooks.test.ts` — WI-699 tests dispatchHook directly. fireEvent wraps dispatchHook in try/catch; no test verifying fireEvent with non-allowlisted command (a) does not execute command and (b) logs+swallows rather than propagates.
  - Defer — allowlist enforcement in dispatchHook is unit-tested directly. fireEvent catch-and-log behavior tested for other error scenarios.
