  # Decision Log — Cycle 010
  
  **Cycle**: 010
  **Date**: 2026-03-22
  **Work items**: WI-122, WI-123, WI-124
  **Review verdict**: Pass (all three capstone reviewers)
  
  ---
  
  ## Summary
  
  Cycle 010 completed the startup-failure protocol consistency work begun in Cycle 009. Three parallel work items closed OQ-1/SG1 (code-reviewer agent describing unconditional Andon), OQ-2 (P-22 missing smoke-test re-run documentation), and OQ-5 (no journal instruction on the unfixable Andon path). All three reviewers returned Pass with no Critical or Significant findings. One rework was required during execution (WI-124 S1 — paragraph boundary ambiguity). Three minor follow-up items were identified, none blocking.
  
  ---
  
  ## Decisions Made This Cycle
  
  ### D-39: Add "General critical findings" label to delineate startup-failure block from general Critical findings
  
  - **Context**: WI-124 execution incremental review flagged S1 — in `skills/execute/SKILL.md` Phase 8, the numbered startup-failure block and the general Critical findings paragraph were adjacent with no typographic boundary. An executor reading sequentially could treat the general paragraph as a continuation of the numbered block, applying the startup-failure routing logic to all Critical findings.
  - **Decision**: Added the label `**General critical findings (non-startup-failure)**:` immediately before the general Critical findings paragraph in `skills/execute/SKILL.md`. The label is absent from `skills/brrr/phases/execute.md` because the brrr file uses a different structural convention (bullets, not a single paragraph) and the boundary is visually unambiguous there.
  - **Rationale**: The incremental reviewer classified this as Significant (S1), requiring resolution before delivery. Adding an explicit section label is the minimal change that closes the ambiguity without restructuring Phase 8.
  - **Impact**: `skills/execute/SKILL.md` Phase 8 structure; future executors reading this file will see a clear boundary between the startup-failure exception block and the general routing logic.
  
  ### D-40: Close OQ-1 by updating code-reviewer agent to describe diagnose-and-fix protocol
  
  - **Context**: OQ-1 (Cycle 009) — `agents/code-reviewer.md` line 91 still read "treat it as scope-changing — this is an Andon-level issue," which was accurate under the pre-WI-121 unconditional-Andon rule but contradicted the current diagnose-and-fix protocol. This was Cycle 009's SG1 finding and the primary driver for Cycle 010.
  - **Decision**: WI-122 replaced the stale phrase with language describing the diagnose-and-fix protocol: "The executor will diagnose the root cause and attempt a surgical fix before routing to Andon if the cause is unfixable." Finding title convention ("Startup failure after [work item name]") was preserved.
  - **Rationale**: DL-2 (Cycle 009) had explicitly deferred this file from WI-121's scope as a secondary concern. The resulting inconsistency was rated Significant because the code-reviewer agent is used in every execution cycle.
  - **Impact**: `agents/code-reviewer.md` line 91; closes OQ-1. Any code-reviewer spawned after this cycle will describe the correct expected executor response to a startup failure.
  
  ### D-41: Close OQ-2 by back-propagating the smoke-test re-run requirement and indeterminate classification to P-22
  
  - **Context**: OQ-2 (Cycle 009) — During WI-121 execution, both skill files were extended to add a smoke-test re-run step and a second-failure indeterminate classification, but this precision was never back-propagated to P-22. P-22 was the authoritative policy for startup-failure handling and was less specific than the skill files it governed.
  - **Decision**: WI-123 appended to P-22's body: "After applying the fix, the smoke test must be re-run to confirm the app starts. If it still fails, the root cause is classified as indeterminate and the Andon cord must be pulled."
  - **Rationale**: D-37 (Cycle 009) recorded that the re-failure fallback was added as an execution-time fix and explicitly noted the back-propagation to P-22 was missing. P-22 is the canonical policy definition; future work items modifying the startup-failure path would consult P-22 and be missing the re-run requirement.
  - **Impact**: `specs/domains/workflow/policies.md` P-22; closes OQ-2. P-22 now fully describes the five-step startup-failure protocol.
  
  ### D-42: Close OQ-5 by adding a quoted journal template to the unfixable Andon path
  
  - **Context**: OQ-5 (Cycle 009) — The fixable startup-failure path said "note in the journal as significant rework," but the unfixable path had no journal instruction. Diagnostic findings were not written to the journal before Andon escalation.
  - **Decision**: WI-124 added an exact quoted template to the unfixable path in both skill files: `` `Diagnosis: {root cause finding}. Routing to Andon — cause not fixable within work item scope.` ``
  - **Rationale**: The asymmetry meant diagnostic context was silently lost when the executor routed to Andon. The fixable-path template style provided the precedent for the format.
  - **Impact**: `skills/execute/SKILL.md` Phase 8 and `skills/brrr/phases/execute.md` finding-handling block; closes OQ-5.
  
  ---
  
  ## Open Questions
  
  ### OQ-6: Fixable-path journal note is prose, not a quoted template
  
  - **Context**: Code-quality M1 and gap-analysis MG2/MG3 independently identified this after WI-124 delivery. The unfixable path now has an exact quoted template. The fixable path still says "Note in the journal as significant rework" — a prose instruction with no template string.
  - **Status**: open
  - **Source**: Code-quality M1; gap-analysis MG2 (`skills/execute/SKILL.md:402`), MG3 (`skills/brrr/phases/execute.md:158`)
  - **Impact if unresolved**: Executors following the fixable path produce inconsistently formatted journal entries. If journal parsing is ever automated, the fixable-path entries will not parse reliably.
  - **Suggested resolution**: Replace prose note with `` `Rework: Startup failure root cause diagnosed and fixed. {brief description of fix}.` `` in both files.
  
  ### OQ-7: P-22 `Amended` metadata does not record cycle 010
  
  - **Context**: WI-123 modified P-22's body but the `Amended` field still reads `cycle 009` only.
  - **Status**: open
  - **Source**: Gap-analysis MG1 (`specs/domains/workflow/policies.md:55`)
  - **Impact if unresolved**: P-22 amendment trail is incomplete; stated provenance disagrees with change history.
  - **Suggested resolution**: Change line 55 to `- **Amended**: cycle 009, cycle 010`.
  
  ### OQ-3 (carried forward, Cycle 007): Smoke-test blocking — smoke test cannot execute
  
  - **Status**: open (deferred)
  - **Impact if unresolved**: Executor has no instruction for the case where the smoke test cannot run (port conflict, missing test runner). Neither skill files nor P-22 address this path.
  
  ### OQ-4 (carried forward, Cycle 007): Library projects with no startup command
  
  - **Status**: open (deferred)
  - **Impact if unresolved**: The startup-failure safety net is silently inapplicable to library projects. Whether this is correct by design is undocumented.
  
  ---
  
  ## Cross-References
  
  ### CR1: Fixable-path journal template asymmetry — code quality and gap analysis
  
  - **Code quality**: M1 — `skills/execute/SKILL.md:402` fixable-path note is prose; asymmetric with unfixable-path template added in WI-124.
  - **Gap analysis**: MG2 — same finding for `skills/execute/SKILL.md:402`; MG3 — same finding for `skills/brrr/phases/execute.md:158`.
  - **Spec adherence**: No related finding (WI-124 acceptance criteria did not specify a template for the fixable path).
  - **Connection**: WI-124 fixed the unfixable-path asymmetry and exposed the mirror problem on the fixable path. MG3 notes both files must be updated together (brrr/execute mirror policy). OQ-6 captures this as the next concrete work item.
  
  ### CR2: P-22 amendment metadata omission
  
  - **Gap analysis**: MG1 — P-22 `Amended` field does not record cycle 010.
  - **Code quality**: No related finding.
  - **Spec adherence**: No related finding (body content correct; metadata provenance was not in WI-123's acceptance criteria).
  - **Connection**: Documentation hygiene issue, independent of CR1. OQ-7 captures it as a one-line fix for cycle 011.
