id: D-191
type: domain_decision
domain: artifact-structure
title: P-44 single-transaction variant removed — fix code, not policy
decision: "Remove the 'Variant: Single-transaction pattern' clause from P-44 that the domain curator had added during cycle 20 as a provisional accommodation for the putNodeForJournal implementation. The remediation was to fix the code (three-phase pattern in WI-748), not to legitimize the deviation in the policy."
rationale: Policy variants introduced to accommodate defective code paths hide the defect and create false audit trails. Policies should describe the intended steady state; exceptions belong in code review findings until corrected. When code diverges from a policy's target state due to a bug, the remediation is to fix the code.
