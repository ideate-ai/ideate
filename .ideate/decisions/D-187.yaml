id: D-187
type: domain_decision
domain: artifact-structure
title: Exhaustiveness sentinel for ALL_NODE_TYPES moved from tests/ to src/ — tsconfig coverage required
decision: The _ExhaustiveNodeTypeCheck sentinel initially placed in tests/adapters/always-include-types-validation.test.ts was not evaluated by `tsc --noEmit` because the tests/ directory is excluded from the tsconfig include glob (src/**/*). The sentinel was moved inline to adapter.ts:77-84. A redundant copy remains in the test file, evaluated only during test compilation.
rationale: A compile-time exhaustiveness sentinel only functions as a policy enforcement mechanism if it is covered by the tsconfig that CI invokes via `tsc --noEmit`. Files outside the include glob are compiled only by the test runner. Only the adapter.ts placement is operative on every `tsc --noEmit` run.
status: settled
