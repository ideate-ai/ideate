rationale: PPR algorithm currently has no maximum node limit, creating potential for resource exhaustion on large project graphs. This is a reliability and safety concern for production use.
text: The PPR (Personalized PageRank) context assembly algorithm must implement a configurable maximum node limit to prevent unbounded memory usage on large graphs. When the limit is exceeded, the algorithm should either truncate or return an error rather than consuming unbounded resources.
