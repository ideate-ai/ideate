id: D-189
type: domain_decision
domain: artifact-structure
title: putNodeForJournal writes YAML inside SQLite transaction (P-44 deviation)
decision: putNodeForJournal in mcp/artifact-server/src/adapters/local/writer.ts:1583-1607 writes YAML inside the SQLite transaction body, not before it. This inverts the two-phase write pattern mandated by P-44, where Phase 1 writes YAML to disk and Phase 2 wraps SQLite upserts in a transaction. The module header at line 8 incorrectly claims the two-phase pattern is preserved. Cleanup on transaction failure (lines 1636-1651) is best-effort, not atomic.
rationale: Rationale not recorded. No in-code comment, commit message, or design note explains the deviation. It is unclear whether this is a bug, a deliberate performance trade-off for journal sequence atomicity, or a pattern that should be generalized. Marked provisional pending user resolution.
source: Full audit 2026-04-10, significant finding S2
