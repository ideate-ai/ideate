id: D-178
type: domain_decision
title: code-reviewer budget (80 turns) insufficient for deep validation-layer reviews
domain: agent-system
status: provisional
body: "Cycle 020 code-reviewer exhausted its 80-turn budget (reached 122 tool uses) before completing the validation layer review. The dynamic testing pillar (npm test run) was not executed and no complete findings were produced. For cycles with deep validation work spanning both adapters plus the contract document, 80 turns is insufficient. Recommendation: increase config.agent_budgets.code-reviewer to 120 for validation-heavy cycles, or split such reviews into scoped sub-passes."
source: cycle 020 process observation
