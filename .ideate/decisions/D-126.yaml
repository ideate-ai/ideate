id: D-126
type: domain_decision
content: |-
  The `/ideate:plan` skill referenced in architecture was merged into `/ideate:init` during refinement. The skills/plan/ directory contains only a .gitkeep file, and plan functionality is handled by the init skill's planning phase.

  **Rationale**: The architecture document is outdated and documents a `/ideate:plan` skill that no longer exists as a separate entity. This creates confusion for implementers who expect to find a standalone plan skill. Either the architecture should be updated to remove `/ideate:plan` or the skill should be restored as a separate entry point.

  **Source**: gap-analysis MR1, decision-log OQ2
