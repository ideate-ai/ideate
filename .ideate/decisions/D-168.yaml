rationale: Phantom nodes in schema diagrams mislead implementors about the actual data model. A referenced node type without definition creates uncertainty about whether it should exist in the graph.
text: The Cycle node shown in neo4j-schema.md Section 2.1 diagram must either have a complete node definition (properties, labels, relationships) added to the schema, or be removed from the diagram if it represents a conceptual rather than concrete node type.
