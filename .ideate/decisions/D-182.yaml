id: D-182
type: domain_decision
domain: artifact-structure
title: Bare derivation calls left in rebuildIndex by WI-727 rework must be removed
decision: The bare calls to deriveJournalEntryEdges and deriveJournalEntryCycleEdges at src/indexer.ts:1013-1015 are merge artifacts from WI-727's rework pass and must be removed. The transactional Phase 3/4 blocks at lines 1024-1036 are the intended implementation. With both sets in place, every rebuildIndex runs both derivation functions twice, inflating stats.edges_created and degrading rebuild performance. P-67 preserves data correctness but does not mask the stat inflation or the wasted work.
rationale: All three cycle 20 reviewers identified this independently. Root cause was a rework that resolved a duplicate function definition by keeping the richer stash version but inadvertently retained pre-transaction bare calls alongside the transactional blocks. Codifies the underlying rework hygiene rule as P-69.
status: settled
source: cycle 20 code-quality S1, spec-adherence S2, gap-analysis SF1
