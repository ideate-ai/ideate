title: adapter-contract.md and putNode/patchNode implementation must be reconciled
decision: "WI-659 produced adapter-contract.md documenting validation requirements for putNode and patchNode. WI-655 added validation only to batchMutate. The contract and code are contradictory. Either: (1) add putNode/patchNode validation to bring implementation up to the contract, or (2) amend the contract to document the intentional gap with rationale. A contract that silently diverges from implementation creates false guarantees."
