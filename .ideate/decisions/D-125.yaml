id: D-125
type: domain_decision
content: |-
  WI-619 specified adapter equivalence tests at `tests/adapters/` but the test file was created at `src/__tests__/equivalence-traverse.test.ts`. This was a specification drift during implementation.

  **Rationale**: The test location at `src/__tests__/` aligns with the actual project structure where test files are colocated with source. The specification should be updated to reflect this rather than moving the file, as the current location follows established TypeScript conventions in the codebase.

  **Source**: gap-analysis II1, decision-log OQ9
