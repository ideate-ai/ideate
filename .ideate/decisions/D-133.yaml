title: assertRequiredFields as runtime guard before type casts
decision: Use assertRequiredFields to fail loudly on missing required fields rather than silently inserting corrupt rows via type casts.
rationale: Incremental review S2 flagged original type cast as runtime safety bypass. Guard restores safety guarantee. Currently covers 3 of 14 extension table types; coverage expansion tracked in Q-108.
assumes: Guard currently checks undefined but not null (Q-106).
