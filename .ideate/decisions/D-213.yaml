id: D-213
type: domain_decision
domain: artifact-structure
title: "addressed_by: null is the canonical unresolved state for findings"
description: The unresolved state for a finding is addressed_by == null. Non-null values (including empty string) must be rejected at the writer boundary or normalized to null before persistence. Readers across all adapter implementations must treat null and empty string identically as 'unresolved' to preserve query semantics during migration; new writes should only ever produce null.
rationale: WI-860 exposed a filter-parity gap where local SQL checked only NULL while the remote adapter checked NULL/empty/undefined. Establishing null as canonical eliminates the ambiguity; normalizing at write-time is cheaper than defending every read site. P-29 defines addressed_by as a nullable scalar but does not specify canonical value semantics.
