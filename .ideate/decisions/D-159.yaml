title: BELONGS_TO_DOMAIN contradiction — Section 9 vs Sections 4.2/8.2 of neo4j-schema.md
description: neo4j-schema.md contains an internal contradiction. Section 4.2 lists BELONGS_TO_DOMAIN as an active relationship type with weight 0.6. Section 8.2 migration mapping includes it. Section 9 reverses course, stating domain is a property, not a relationship. The migration tool spec correctly follows Section 9. Three downstream specs include BELONGS_TO_DOMAIN as active. All three capstone reviewers flagged this.
rationale: Section 9 represents the evolved design intent. Sections 4.2/8.2 are stale. User confirmation required.
