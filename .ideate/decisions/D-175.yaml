title: Research spike outputs must be delivered to the path declared in the work item scope
decision: WI-660 declared mcp/artifact-server/research/ppr-alignment.md as its output file. The file was delivered to mcp/artifact-server/docs/ppr-alignment-research.md because the research/ directory did not exist. Future research spikes must verify the target directory exists before execution and either create it or update the WI scope via MCP tools before delivery. Silent path drift between spec and execution breaks artifact traceability.
