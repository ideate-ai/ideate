id: D-134
type: domain_decision
cycle_created: 18
description: RemoteAdapter.queryNodes lacks the status exclusion filter that D-131 established for LocalAdapter. The buildFilterInput function in RemoteAdapter passes filters directly to the server without adding implicit status exclusion for work_item queries. This creates divergent behavior where RemoteAdapter returns done/obsolete items while LocalAdapter excludes them.
domain: adapter-equivalence
rationale: Code-quality review S1 identified the gap. Status exclusion was implemented only in LocalAdapter (D-131), leaving RemoteAdapter with inconsistent behavior. The decision is to require explicit status exclusion in both adapters to maintain equivalence.
references:
  - D-131
  - S1-cycle-18-code-quality
