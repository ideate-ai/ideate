id: D-177
type: domain_decision
title: "Equivalence test gating: LocalAdapter cases unconditional, RemoteAdapter cases use it.skipIf"
domain: adapter-equivalence
status: settled
body: LocalAdapter equivalence test cases run unconditionally; RemoteAdapter cases are gated with `it.skipIf(!remoteAvailable)`. LocalAdapter has no external dependencies and must always run. RemoteAdapter requires Neo4j and should skip gracefully when not provisioned, rather than fail CI. Established by WI-672 validation equivalence cases. This pattern must be applied to all future equivalence tests.
