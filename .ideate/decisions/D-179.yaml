id: D-179
type: domain_decision
domain: artifact-structure
title: belongs_to_cycle must be backfilled into EDGE_TYPES, EDGE_TYPE_REGISTRY, and adapter-contract.md
decision: "The belongs_to_cycle edge type, currently emitted by the indexer's journal-entry-to-cycle derivation via insertEdge(), must be registered in EDGE_TYPES, EDGE_TYPE_REGISTRY (source=journal_entry, target=cycle_summary), and adapter-contract.md. The fix is mechanical: add the string to the const array, add a registry entry with yaml_field: null, and update the adapter contract EdgeType union."
rationale: putEdge() in writer.ts validates edge_type against EDGE_TYPES. insertEdge() in db-helpers.ts accepted the plain string without validation, shipping the edge without registration. The gap defeats the contract that EDGE_TYPES/EDGE_TYPE_REGISTRY are the authoritative source of truth for graph shape.
status: settled
source: adhoc PH-039 audit, cycle 19
