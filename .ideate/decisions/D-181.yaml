id: D-181
type: domain_decision
domain: artifact-structure
title: indexFiles watcher must trigger derivation on cycle_summary and work_item changes
decision: "The hasJournalUpdate guard in indexFiles() must be widened to cover all upstream artifact types that derivation phases consume. At minimum: journal_entry (existing), cycle_summary (triggers deriveJournalEntryCycleEdges), and work_item (triggers deriveJournalEntryEdges for forward-referencing journal titles)."
rationale: The current guard reflects an older pipeline where only journal entries drove derivation. Phases added in PH-039 consume cycle_summary and work_item too, but the guard was not updated. Changes to those files leave the incremental graph divergent from a full rebuild, undermining PH-039's PPR quality improvement goal.
status: settled
source: adhoc PH-039 audit, cycle 19
