title: chmod 444 workaround for ESM vi.spyOn limitation on fs module
description: When ESM module isolation prevents vi.spyOn from intercepting Node built-in modules (e.g., fs.writeFileSync), use chmod 444 on the target file or directory to force a real filesystem error rather than mocking the module.
rationale: Vitest ESM mode does not support vi.spyOn on built-in modules because ESM imports are live bindings that cannot be replaced after module evaluation. WI-752 needed to test Phase 2 rollback on write failure. chmod 444 on the target directory triggers a genuine EACCES error without requiring module-level mocking. The approach is POSIX-only and will not work on Windows or when running as root — this platform dependency must be documented in the test.
