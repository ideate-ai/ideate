id: D-131
type: domain_decision
cycle_created: 17
description: queryNodes in LocalAdapter was returning work_items with status 'done' and 'obsolete' when callers expected only active items. The decision is to exclude these terminal statuses by default, matching expected behavior. Status exclusion logic must be explicit in query implementations.
domain: adapter-equivalence
rationale: CR-004 identified that inactive work items were appearing in results when they should be filtered. The exclusion of terminal statuses (done, obsolete) is the intended behavior for most queries.
