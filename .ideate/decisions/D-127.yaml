description: "Beneficial scope expansion during review may be accepted when: (a) the expanded scope produces net-positive outcomes, (b) no new policy violations are introduced, and (c) the expanded work is self-contained and testable. WI-378 expanded from 3 to 22 tool descriptions; all became P-34 compliant with no new P-33 violations."
domain: workflow
rationale: "The worker fixed all 22 descriptions rather than the 3 in scope. Review accepted because descriptions became shorter, clearer, and fully compliant with P-33/P-34. Precedent: scope expansion that improves outcomes without violating policy can be accepted during review rather than requiring a new work item."
