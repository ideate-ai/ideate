rationale: GraphQL schema defines archiveCycle mutation and architecture overview references it, but StorageAdapter interface lacks the method. This creates an interface gap that prevents adapter implementations from supporting full cycle lifecycle operations. See existing D-162 which noted this gap provisionally.
text: The StorageAdapter interface must include the archiveCycle method to match the GraphQL schema mutation and support the archive workflow. The method signature should align with the existing archive cycle implementation requirements.
