title: Defer no-registry-entry migration path test due to ESM module-level constant limitation
description: Testing the no-registry-entry early-return path in runPendingMigrations (migrations.ts:170-175) was deferred in WI-753 because the path depends on CONFIG_SCHEMA_VERSION — a module-level constant that ESM isolation makes read-only and non-interceptable via vi.spyOn. WI-753 instead tested the already-at-target early-return path (a distinct, testable branch). The gap is documented in a comment at migrations.test.ts:302-308.
rationale: Unlike the fs.writeFileSync case (D-194), there is no filesystem-level workaround for overriding an exported module-level constant under ESM. The production code would need a dependency-injection seam or an explicit test-only override mechanism. Deferral is lower risk than refactoring production code solely for testability, given that runPendingMigrations returns a result object rather than throwing (limiting blast radius). If the migration registry grows in complexity, revisit.
