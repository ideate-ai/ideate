id: D-130
type: domain_decision
cycle: 1
description: The safeParseYaml function in indexer.ts should log warnings with file path and error details when YAML parsing fails, rather than silently returning null. Silent failures make debugging malformed artifacts difficult.
rationale: Parse errors in YAML files need visibility for developers to fix them. The files_failed array in indexSingleFile should include both file path and specific error location.
