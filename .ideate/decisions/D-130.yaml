id: D-130
type: domain_decision
cycle_created: 17
description: Edge extraction for cross-type domain relationships (interview_questions, constraints) was incomplete in LocalAdapter. The hasColumn-based domain filter was missing interview_question type, causing edges to be excluded from graph traversals. The fix adds interview_question to domain extraction alongside existing types.
domain: adapter-equivalence
rationale: CR-003 identified the gap. Cross-type relationships must be traversable regardless of which adapter is active. The domain filter in edge extraction must include all node types that can participate in cross-domain relationships.
references:
  - CR-003
  - CR-006
