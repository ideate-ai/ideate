id: D-215
type: domain_decision
title: Capstone cross-corroboration is higher-confidence than single-reviewer findings
domain: workflow
decision: When a capstone review runs multiple reviewers (code-reviewer, spec-reviewer, gap-analyst), findings that independently appear in two or more reviewers' outputs are treated as higher-confidence than findings raised by a single reviewer. Capstone summaries should explicitly mark cross-reviewer corroboration and use it to prioritize follow-up work.
rationale: "Individual reviewers have blind spots and false positives. Cross-reviewer agreement is cheap evidence of real impact. Cycle 28 used this: the parser step-2 defect was flagged as both Code-S1 and Gap-EC1 via different evidence paths (code reading vs. real-artifact sampling), driving the FAIL verdict with high confidence."
