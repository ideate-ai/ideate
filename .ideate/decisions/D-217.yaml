id: D-217
type: domain_decision
domain: artifact-structure
title: "Q-160 option (c): autopilot resolves cycle_number = max(domain.current_cycle, cycles_completed) + 1"
description: "Autopilot's internal cycle counter formerly started at 1 for each new session, causing collisions with workspace cycle-directory slots 001/, 002/, 003/ that already contain legacy archived findings (cycles/001/findings/F-695-1.yaml through F-707-1.yaml — 11 findings with cycle:1 and no addressed_by). When cycle_number=1 was used, getConvergenceData(1) inflated condition_a by counting those legacy findings as open. Q-160 enumerated three fix options: (a) session-id provenance on findings rows, (b) ideate_archive_cycle purges stale findings on slot reuse, (c) autopilot always uses max(current_cycle, cycles_completed)+1 as its cycle number. Option (c) is chosen and implemented as a skill-level fix in skills/autopilot/SKILL.md under the 'Resolve Cycle Number' section inside Phase 6 Loop. Option (a) was rejected as schema-invasive; option (b) was rejected as archive-destructive. The fix requires no reader.ts or analysis.ts changes — the collision is prevented upstream by never selecting a colliding cycle_number. Regression tests in mcp/artifact-server/src/__tests__/q160-regression.test.ts document the pre-fix collision (legacy cycle:1 findings count as open) and verify the resolution algorithm yields collision-free slots."
rationale: Single-site upstream fix eliminates the collision class entirely with no schema migration, no archive mutation, and no downstream filter complexity. The WI-824 resolution of Q-160 for the cycle_summary_content path (canonical-filename-only selector) already handles convergence-checker's review artifact reads; this decision handles the complementary findings-table path by ensuring autopilot never picks a pre-populated slot in the first place.
