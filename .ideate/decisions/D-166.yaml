rationale: LocalAdapter currently lacks archiveCycle implementation, creating a functional gap. When running in local mode, cycle archival is not possible, breaking the workflow abstraction that should work regardless of storage backend.
text: LocalAdapter must implement the archiveCycle method to support local-only storage scenarios. Implementation should handle the SQLite cleanup operations currently in handleArchiveCycle, with proper transaction boundaries to ensure atomicity.
