id: D-170
type: domain_decision
amends: null
domain: project-boundaries
established: 2026-04-04
rationale: Current RemoteAdapter has no retry logic, making it vulnerable to transient network failures. In production environments, brief network interruptions should not cause operation failures.
text: RemoteAdapter must implement configurable retry logic with exponential backoff for transient network failures. Retry policy should be configurable (max retries, base delay, max delay) and apply to all network-dependent operations.
