title: Typed Drizzle ORM helpers centralized in db-helpers.ts
decision: Consolidate all 14 extension-table upsert functions into a single db-helpers.ts module.
rationale: Codebase had 30+ @typescript-eslint/no-explicit-any suppressions scattered across tool files. Centralizing eliminates the pattern at source and makes all DB operations type-safe through one auditable call chain.
