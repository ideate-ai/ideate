id: D-135
type: domain_decision
domain: artifact-structure
title: YAML-first two-phase write pattern with atomic SQLite transaction
decision: "Phase 1 writes YAML files. Phase 2 wraps all SQLite upserts in a single transaction. On Phase 2 failure, Phase 1 is rolled back: new files deleted, modified files restored from captured originals."
rationale: GP-08 — YAML is source of truth, SQLite is derived cache. On failure, YAML must remain consistent.
assumes: Pattern applied to handleWriteWorkItems, handleWriteArtifact, handleUpdateWorkItems. handleAppendJournal and handleArchiveCycle not yet covered (Q-100, Q-101).
