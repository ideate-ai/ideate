id: D-176
type: domain_decision
title: "vi.mock isolation: tests requiring different mock configurations must use separate files"
domain: adapter-equivalence
status: settled
body: Tests requiring different vi.mock configurations for the same module must live in separate files. Sharing a file with mismatched vi.mock setups causes hoisting collisions and silent test contamination. Vitest hoists vi.mock calls to the top of a file scope; the only reliable isolation is file-level separation. Confirmed by WI-670 (fetchCurrentCycle tests extracted to remote-adapter-fetchcycle.test.ts) and WI-671 (remote-adapter-validation.test.ts as new file). Confirms and validates P-65.
source: cycle 020 review, WI-670/WI-671
