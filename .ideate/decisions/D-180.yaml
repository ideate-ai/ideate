id: D-180
type: domain_decision
domain: artifact-structure
title: deriveJournalEntryCycleEdges must delete stale edges before re-inserting
decision: Phase 4 of the derivation pipeline must add an explicit delete step that removes prior belongs_to_cycle edges for each journal entry before inserting the newly computed edges, matching the Phase 3 (deriveJournalEntryEdges) pattern.
rationale: Phase 3 uses delete-then-insert to prevent stale edges when upstream references change. Phase 4 omitted this step, so old edges persist alongside new ones if a journal entry's cycle membership changes. The fix also resolves the inflated edges_created counter (onConflictDoNothing means inserts that hit existing rows are no-ops, but the counter increments anyway).
status: settled
source: adhoc PH-039 audit, cycle 19
