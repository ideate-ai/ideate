id: D-214
type: domain_decision
title: PH-050 scope bounded to parser resilience + deployment hygiene
domain: project-boundaries
decision: PH-050 is scoped to (a) convergence-checker parser hardening and (b) deployment hygiene for MCP server updates. The MCP cycle-slot collision that manifested during the 2026-04-14 incident was triaged as a separate bug (Q-160) and routed out of PH-050 scope rather than absorbed into it.
rationale: Expanding PH-050 mid-cycle to cover MCP cycle-slot collision would conflate two distinct failure modes (parser logic vs. concurrent cycle-write safety) and delay the parser fix. Separating the concerns keeps the capstone auditable and preserves scope discipline.
