id: D-188
type: domain_decision
domain: artifact-structure
title: index.db init failure traced to CONFIG_SCHEMA_VERSION not being bumped
decision: "The MCP server initialization failure ('table findings has no column named title') is caused by CONFIG_SCHEMA_VERSION in mcp/artifact-server/src/config.ts remaining at 4 while the v4->v5 migration was added to migrations.ts:58-93 and CURRENT_SCHEMA_VERSION was bumped to 5. The migration gate returns early when currentVersion >= targetVersion (CONFIG_SCHEMA_VERSION=4), so the migration never runs, but CREATE TABLE IF NOT EXISTS does not add the new title column to the existing findings table. rebuildIndex then inserts via the Drizzle schema that includes title and throws SqliteError. Fix: bump CONFIG_SCHEMA_VERSION to 5. Workaround while unbumped: delete index.db to force fresh table creation."
rationale: "Diagnostic evidence: equivalence test fixture at tests/adapters/fixtures/equivalence/.ideate/config.json:2 already has schema_version:5, confirming the bump was intended but omitted from config.ts. Stale comments at schema.test.ts:606,608 still reference CURRENT_SCHEMA_VERSION=3, confirming the constant has been repeatedly bumped without corresponding updates elsewhere."
source: Full audit 2026-04-10
policy: P-74
