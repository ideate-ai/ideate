id: D-190
type: domain_decision
domain: artifact-structure
title: "Spike WI-749: domain_index is a fully implemented node type — not dead code and not planned-but-missing"
decision: >-
  domain_index is a fully implemented, actively used node type. It appears in:
  (1) NodeType union in adapter.ts line 41 and ALL_NODE_TYPES array in adapter.ts line 71;
  (2) local adapter writer.ts with a dedicated case routing writes to domains/index.yaml;
  (3) local adapter reader.ts routing reads to the document_artifacts table;
  (4) remote adapter index.ts field mapping table and fetchCurrentCycle() method;
  (5) db.ts TABLE_FOR_NODE_TYPE mapping;
  (6) schema.ts DocumentArtifact type union;
  (7) skill instructions: skills/review/SKILL.md, skills/autopilot/phases/review.md,
  skills/init/SKILL.md;
  (8) agents/domain-curator.md schema example;
  (9) tools.test.ts, remote-adapter-fetchcycle.test.ts, remote-json-parse.test.ts tests;
  (10) the live artifact .ideate/domains/index.yaml.
  The code-reviewer's partial observation during cycle 20 that domain_index was absent
  from ALL_NODE_TYPES was incorrect (or reflected a transient pre-fix state). No removal
  of any domain_index reference is warranted. No follow-on work item is needed for
  implementation. Q-145 is resolved as a non-issue with respect to the "missing type"
  concern; the separate singleton-ID-validation question Q-145 raised is noted as a
  future design question but has no blocking impact and is closed without action.
rationale: >-
  Exhaustive grep of the entire codebase (skills/, agents/, mcp/artifact-server/src/,
  tests, docs, .ideate/) found domain_index in all layers of the implementation stack
  with consistent, correct behavior. The spike verdict is: non-issue. No code changes
  required.
status: settled
source: spike WI-749, cycle 21
