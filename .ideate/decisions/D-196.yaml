id: D-196
type: domain_decision
domain: workflow
title: P-76 violation on WI-754 — sqlite_* filter added without AC update
decision: WI-754 added a sqlite_* table exclusion filter to the schema coverage test implementation but did not update the work item's acceptance criteria to reflect this change. The AC text still described exclusion of 3 tables (nodes, edges, node_file_refs) while the implementation excludes 4 categories (adding sqlite_* prefix). This is a P-76 violation. A follow-up fix to the ACs is planned for the next refinement cycle. The sqlite_* exclusion pattern itself is technically correct and has been documented in P-75 as a standing sub-rule.
rationale: The sqlite_* filter is necessary because SQLite auto-creates sqlite_sequence for any table using AUTOINCREMENT. Without the filter, the table-count assertion would fail non-deterministically as the application schema grows to include more AUTOINCREMENT columns. The implementation decision was sound; the AC documentation omission was the defect.
