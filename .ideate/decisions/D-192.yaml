id: D-192
type: domain_decision
domain: artifact-structure
title: P-74 invariant (CONFIG_SCHEMA_VERSION == CURRENT_SCHEMA_VERSION) now enforced by test
decision: CONFIG_SCHEMA_VERSION bumped 4→5 in cycle 21 (WI-747). A test in config.test.ts now asserts CONFIG_SCHEMA_VERSION === CURRENT_SCHEMA_VERSION. The P-74 invariant was previously convention-only; it is now mechanically enforced.
rationale: Mechanical enforcement of invariants via tests prevents silent regressions when future migrations or schema edits fail to preserve the invariant. The root cause of the original bug (v4→v5 migration permanently excluded) was that CONFIG_SCHEMA_VERSION had drifted to 4 while CURRENT_SCHEMA_VERSION remained 5, with no test to catch the divergence.
