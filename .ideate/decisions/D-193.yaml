id: D-193
type: domain_decision
domain: agent-system
title: "Agent budgets doubled: code-reviewer 80→160, gap-analyst 100→200"
decision: Double the default turn budgets for code-reviewer (80→160) and gap-analyst (100→200). Applied unconditionally across all review modes, not only on --full flag. Other agents unchanged.
rationale: Prior budgets insufficient for adequate review depth on larger cycles. Both agents were exhausted during the cycle 20 full audit, which the user attributed to budget truncation rather than scope excess. Doubling provides headroom without unbounded expansion.
