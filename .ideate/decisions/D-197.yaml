id: D-197
type: domain_decision
title: MCP stdout corruption fix via structured logger
domain: agent-system
decision: Replace all console.log, console.warn, and console.error calls in the MCP artifact-server with a structured logger (src/logger.ts) that writes to stderr and a log file. Direct stdout writes corrupt the MCP JSON-RPC transport, causing parse failures in the client.
rationale: The MCP protocol uses stdout as its JSON-RPC transport channel. Any non-JSON output on stdout (from console.log or console.warn) interleaves with protocol messages and causes client-side parse errors. This was observed as intermittent MCP tool failures during execution cycles.
source: cycle-022/summary, cycle-022/code-quality (M2 finding)
