id: D-185
type: domain_decision
domain: artifact-structure
title: WI-739 compile-time exhaustiveness check is tautological due to widening type annotation
decision: "The compile-time exhaustiveness check added by WI-739 in always-include-types-validation.test.ts does not function. ALL_NODE_TYPES in adapter.ts:44 is declared as `readonly NodeType[]`, which widens `typeof ALL_NODE_TYPES[number]` to the full NodeType union. `Exclude<NodeType, NodeType>` is always `never`, so `_ExhaustiveCheck` is always `true` regardless of array contents. Fix requires removing the `: readonly NodeType[]` annotation and relying solely on `as const` for type inference."
rationale: Code-reviewer (S1) and gap-analyst (S1) independently identified the widened type annotation as the root cause. The spec-reviewer passed P-59 but did not verify the type annotation's effect on the check. Two Fail verdicts take precedence. P-59 amended to include TypeScript-specific guidance preventing this class of error.
status: settled
source: cycle 20 code-quality S1, gap-analysis S1
policy: P-59
