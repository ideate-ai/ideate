id: D-183
type: domain_decision
domain: artifact-structure
title: hasJournalUpdate guard in indexFiles must be removed in favor of hasDerivedEdgeUpdate
decision: The hasJournalUpdate block at src/indexer.ts:798-803 must be deleted. WI-727 introduced hasDerivedEdgeUpdate as the replacement guard (its first regex clause already covers journal files), but the implementation kept the old guard in place. Journal file changes therefore trigger four derivation calls (two functions x two guards) instead of two. WI-727's resolution field explicitly stated 'hasDerivedEdgeUpdate replaces hasJournalUpdate' — the intent was replacement.
rationale: Same root cause as D-182 — rework added the new construct without removing the superseded one. P-67 preserves correctness but performance is doubled on incremental journal updates. Q-117's burst-write concern is slightly worsened by this double-trigger but the underlying debounce question is unchanged.
status: settled
source: cycle 20 code-quality S2, spec-adherence S1, gap-analysis SF2
