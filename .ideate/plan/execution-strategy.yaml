    - WI-591
  WI-596:
    - WI-591
notes: Phase 3 of PR-003. The test suites are independent test files that all import from the shared equivalence-helpers.ts harness. WI-592-596 can run in parallel batches of 2. The Docker environment (WI-589) must be running for all tests. Consider running vitest with --pool=forks to isolate test files.
