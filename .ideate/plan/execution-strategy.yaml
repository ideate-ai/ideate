id: execution-strategy
type: execution_strategy
mode: batched_parallel
max_parallelism: 2
review_cadence: per_item
groups:
  - name: Infrastructure (parallel)
    items:
      - WI-589
      - WI-590
    notes: Docker Compose and test fixture have no dependencies and can be built simultaneously.
  - name: Harness
    items:
      - WI-591
    notes: Depends on both WI-589 and WI-590. Builds the dual-adapter setup and comparison utilities.
  - name: Test suites (parallel, max 2)
    items:
      - WI-592
      - WI-593
      - WI-594
      - WI-595
      - WI-596
    notes: All depend on WI-591. Each creates its own test file so no scope collisions. Run up to 2 in parallel.
