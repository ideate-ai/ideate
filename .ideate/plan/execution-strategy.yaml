id: execution-strategy
type: execution_strategy
title: Execution Strategy — WI-451 through WI-468 (Audit Triage)
mode: batched_parallel
parallelism:
  max_concurrent: 4
  worktree_isolation: true
review_cadence: per_item
groups:
  - name: "Group 1: Independent quick wins"
    items:
      - WI-451
      - WI-452
      - WI-462
      - WI-463
      - WI-464
      - WI-468
    parallel: true
    rationale: No file overlaps, no dependencies. All can run concurrently.
  - name: "Group 2: MCP server source (chain A)"
    items:
      - WI-453
      - WI-459
    parallel: false
    rationale: WI-459 depends on WI-453 (shared db-helpers.ts scope).
  - name: "Group 3: MCP server source (chain B)"
    items:
      - WI-455
      - WI-457
      - WI-460
    parallel: false
    rationale: WI-457 depends on WI-455 (query.ts), WI-460 depends on WI-457 (query.ts, analysis.ts).
  - name: "Group 4: MCP server source (chain C)"
    items:
      - WI-456
      - WI-458
      - WI-461
    parallel: false
    rationale: WI-458 depends on WI-456 (write.ts), WI-461 depends on WI-458 (context.ts).
  - name: "Group 5: Server core (independent)"
    items:
      - WI-454
    parallel: true
    rationale: Touches server.ts and index.ts only. No overlap with other source items.
  - name: "Group 6: Tests (after source)"
    items:
      - WI-465
      - WI-466
    parallel: false
    rationale: WI-465 depends on WI-456/457/458/460. WI-466 depends on WI-454/465. Sequential to avoid test file collisions.
  - name: "Group 7: Documentation (after scripts)"
    items:
      - WI-467
    parallel: false
    rationale: Depends on WI-452 for script deletion references.
