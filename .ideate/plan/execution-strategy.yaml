content: |
  # Execution Strategy — PH-053 Integrity

  ## Mode

  Batched parallel. All four work items have non-overlapping file scopes and no inter-dependencies, so they can run concurrently.

  ## Parallelism

  - Max concurrent workers: 4
  - Worktree isolation: not required (no shared file scope)

  ## Review cadence

  - Incremental review per work item (standard ideate:code-reviewer on completion)
  - Capstone review at phase end (code-reviewer + spec-reviewer + gap-analyst in parallel)

  ## Work item groups

  ### Group 1: Critical integrity fixes (parallel)
  - WI-890 — fs.unlinkSync out of SQLite transaction
  - WI-891 — adapter.shutdown() on SIGINT/SIGTERM
  - WI-892 — migration stubs for 5→6 and 6→7
  - WI-893 — CONTAINMENT_EDGE_TYPES consolidation

  ## Dependency graph

  No dependencies between items. Parallel-safe.

  ## Agent configuration

  - Worker model: sonnet (default)
  - Reviewer model: sonnet (default)
  - Standard agent budgets per config.json

  ## Convergence target

  - Condition A: zero Critical/Significant findings in capstone
  - Condition B: Principle Adherence Verdict: Pass
  - Full vitest suite green
