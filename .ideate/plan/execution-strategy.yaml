content: |-
  # Execution Strategy — PH-051

  ## Mode

  Sequential. The 3 work items have a strict chain: WI-886 (diagnosis) → WI-887 (fix) → WI-885 (findings-table hardening, sequenced after WI-887 to avoid reader.ts file-scope collision).

  ## Parallelism

  Not applicable — sequential mode. Max parallelism: 1.

  ## Worktrees

  Disabled. Single-agent sequential execution; worktree overhead is unjustified for 3 items.

  ## Review cadence

  Incremental review after each work item. Capstone review at end of cycle. Autopilot-driven loop is appropriate: the scope is well-bounded and the convergence signal will exercise itself (WI-887's fix is what makes the autopilot loop itself reliable, so regression tests are the primary evidence, not autopilot output).

  ## Ordering

  1. **WI-886** — spike; produces a diagnosis research artifact. Gate on this before writing any code.
  2. **WI-887** — bug fix based on WI-886; includes the Q-164 regression test and integration test.
  3. **WI-885** — extends Q-160 hardening to findings table; adds cycle-slot-collision regression test.

  ## Dependency graph

  ```
  WI-886 ──► WI-887 ──► WI-885
  ```

  ## Agent configuration

  - Worker: standard ideate:worker (sonnet)
  - Reviewers: code-reviewer, spec-reviewer, gap-analyst (sonnet)
  - Spike worker (WI-886) may escalate to opus if better-sqlite3 internals need careful reasoning about WAL/checkpoint/snapshot semantics
phase: PH-046
