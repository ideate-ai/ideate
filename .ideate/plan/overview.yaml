id: overview
type: overview
title: "Refinement: Generalize context retrieval and enforce GP-14"
body: |-
  ## What is changing

  1. **ideate_get_work_item_context → ideate_get_artifact_context**: The work-item-specific context tool is generalized to accept any artifact ID. It queries the nodes table for type, then dispatches to type-specific context assembly (work item details, phase + linked work items, or generic YAML + edges).

  2. **ideate_assemble_context description**: Tool description and parameter examples updated to make clear that any artifact ID (phases, policies, principles) works as a PPR seed, not just work items.

  3. **GP-14 guardrail in skills**: All skill files that use MCP tools gain an explicit guardrail: MCP tool failures must be reported and halt execution — never trigger fallback to direct .ideate/ file access.

  4. **Domain policy P-52**: Formalizes the GP-14 enforcement rule as a reviewable domain policy.

  ## What is NOT changing
  - PPR algorithm (ppr.ts) — already type-agnostic
  - ideate_assemble_context function logic — already works for any node ID
  - ideate_get_context_package — unchanged
  - Schema, indexer, watcher — unchanged

  ## Trigger
  Attempted ideate_assemble_context with artifact_id parameter (wrong name) for PH-013. Tool failed. Fallback was direct .ideate/ file reads, violating GP-14.
