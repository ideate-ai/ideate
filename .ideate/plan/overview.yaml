title: "Implementation: Infrastructure for PM Evolution"
body: |-
  ## What is changing

  ### Phase A (PH-015 — current): Infrastructure
  1. Schema v4: name + description on projects and phases (WI-513)
  2. Metrics pipeline fix: payload storage bug, agent_type aggregation (WI-514)
  3. Skill docs: remove broken token extraction instructions (WI-515)
  4. Status display: COALESCE name fallbacks in query/analysis tools (WI-516)
  5. Work item type field: feature|bug|spike|maintenance|chore taxonomy (WI-517)

  ### Phase B (horizon): New Skills
  6. /ideate:project skill — project + phase CRUD and lifecycle (WI-518)
  7. /ideate:triage skill — lightweight work item intake (WI-519)
  8. /ideate:status skill — stakeholder views (WI-520)
  9. Type routing in execute/review skills (WI-521)

  ## What is NOT changing
  - Core SDLC loop (plan→execute→review→refine)
  - PPR context assembly, watcher, hooks
  - Existing guiding principles and constraints

  ## Trigger
  Research phase PH-014 produced 4 design documents. This phase implements the infrastructure changes. Phase B implements new skills after infrastructure ships.
