description: |-
  Post-review correction cycle addressing cycle 22 capstone review findings. Two significant and four minor issues prevent PH-041 (Input Validation Layer) from being declared complete.

  ## What Is Changing

  1. **Remove context.ts traverse inline validation** — WI-771 removed validation from writer.ts but missed context.ts. All traverse input validation (seed_ids, alpha, token_budget, max_iterations, always_include_types, convergence_threshold, max_nodes) is removed from context.ts. ValidatingAdapter is now the sole validation gate for traverse().

  2. **Reconcile alpha=0 boundary** — ValidatingAdapter accepted alpha=0 but ppr.ts rejects it (alpha=0 means zero seed influence, semantically useless for context assembly). ValidatingAdapter tightened to (0, 1] matching ppr.ts.

  3. **Update test files** — seed-ids-validation.test.ts and always-include-types-validation.test.ts wrap LocalAdapter in ValidatingAdapter. Error code assertions updated (INVALID_ALWAYS_INCLUDE_TYPE → INVALID_NODE_TYPE).

  4. **Add missing test coverage** — batchMutate MISSING_NODE_ID/MISSING_NODE_TYPE and traverse INVALID_SEED_IDS paths get tests.

  5. **Fix P-75 violation** — Remove fixture array length assertion from local-adapter-validation.test.ts.

  ## What Is NOT Changing

  - reader.ts and index.ts inline validation (carry-forward, not blocking PH-041 completion)
  - ppr.ts algorithm-level guards (defense-in-depth, intentionally retained)
  - ValidatingAdapter core structure
  - RemoteAdapter (already clean from WI-772)

  ## Scope Boundary

  This cycle resolves only the findings that block PH-041's phase goal. reader.ts/index.ts cleanup is a carry-forward item for a future phase.
content: |-
  # PH-051: Convergence-detection cleanup

  ## What's changing

  Two narrowly-scoped reliability bugs in autopilot convergence detection surfaced during PH-050:

  1. **Q-164 — MCP stale SQLite reads**: `ideate_get_convergence_status(29)` returned a Significant-findings count of 5 while a direct `sqlite3 index.db` query against the same file with the same WHERE clause returned 0. Both sides of the autopilot/DB boundary were reading the same file on disk; the tool and the DB disagreed. Autopilot had to manually override convergence to close PH-050.
  2. **Q-160 — findings-table cycle-slot collision (residual)**: WI-824 already implemented option (c) (canonical-filename-only reads) for the `cycle_summary_content` half of the convergence check. The findings-table half remains exposed: legacy finding rows indexed with `cycle: N` from a prior workspace era would count against a re-used cycle N's `condition_a`.

  ## Why

  Autopilot's convergence signal has to be trustworthy. When the MCP tool output contradicts DB ground truth, the loop either falsely reports success or false-fails into unnecessary refinement cycles. PH-050 closed by manual override — that is not a sustainable position.

  ## Scope boundary

  - In scope: `mcp/artifact-server/src/adapters/local/reader.ts`, `mcp/artifact-server/src/adapters/local/writer.ts`, `mcp/artifact-server/src/tools/analysis.ts`, and a new regression test file for Q-164.
  - Out of scope: autopilot skill-level changes (already uses workspace cycle numbers), RemoteAdapter parity (only LocalAdapter surfaces these bugs in practice), parser verdict logic (fully stabilized in PH-050).

  ## Expected impact

  - Convergence-check results become deterministic post-write — no need to restart the MCP server mid-cycle to see updated finding counts.
  - Autopilot no longer forced to manual-override convergence.
  - Q-160 and Q-164 are closed with explicit decisions recorded in the domain layer.

  ## Work items

  - **WI-886** (spike) — Reproduce Q-164, identify root cause, produce diagnosis artifact
  - **WI-887** (bug) — Fix Q-164 based on WI-886 diagnosis; regression test covers PH-050 cycle 2 scenario
  - **WI-885** (bug, re-scoped) — Extend Q-160 hardening to findings-table branch; decision recorded on session-id provenance vs. archive-purge vs. slot-mapping

  ## References

  - Q-160 (open) — cycle-slot collision
  - Q-164 (open) — stale SQLite reads
  - WI-824 (complete) — Q-160 option (c) already applied to cycle_summary_content path in reader.ts:969-974
  - PH-050 (complete 2026-04-17) — convergence-checker parser hardening
