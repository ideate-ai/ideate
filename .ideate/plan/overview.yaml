  # Change Plan — Cycle 032

  **Trigger**: Remaining direct Write tool calls to .ideate/ files in review skill and brrr review phase. GP-8 requires all artifact writes go through MCP tools.

  **What is changing**:

  1. **Review skill MCP writes** (WI-249) — Reviewer agents return findings in their response instead of writing directly. Skill captures output and writes via ideate_write_artifact. Summary, review-manifest, and domain curator output all written via MCP.

  2. **Brrr review phase MCP writes** (WI-250) — Same pattern for the brrr autonomous loop's review phase.

  **What is NOT changing**: MCP server code, agent definitions, guiding principles, constraints, other skills.

  **Scope boundary**: 2 work items (WI-249–250). Touches review/SKILL.md and brrr/phases/review.md only.
