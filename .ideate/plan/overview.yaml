change_plan: |-
  Address three minor carry-forward findings from cycle 20 review. No architecture changes, no new technology.

  **Trigger**: Cycle 20 capstone review minor findings M1 (dead sentinel), M3 (loose length assertion), and Q-142 (getDomainState null-status gaps for decisions/questions).

  **What is changing**:
  - `tests/adapters/always-include-types-validation.test.ts`: remove dead exhaustiveness sentinel (superseded by adapter.ts:77-84); tighten runtime length assertion from `toBeGreaterThan(0)` to `toBe(27)`.
  - `src/__tests__/adapter-contract.test.ts`: add getDomainState null-status boundary tests for `domain_decision` (null-status decisions should appear — no status filter in SQL) and `domain_question` (verify adapter-contract.md intent, add test matching the contract).

  **What is NOT changing**: adapter.ts, reader.ts, any production code, adapter-contract.md (unless null-status question behavior is found to be incorrectly documented).

  **New work items**: WI-745, WI-746.
