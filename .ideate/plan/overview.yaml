description: |-
  Post-review correction cycle addressing cycle 22 capstone review findings. Two significant and four minor issues prevent PH-041 (Input Validation Layer) from being declared complete.

  ## What Is Changing

  1. **Remove context.ts traverse inline validation** — WI-771 removed validation from writer.ts but missed context.ts. All traverse input validation (seed_ids, alpha, token_budget, max_iterations, always_include_types, convergence_threshold, max_nodes) is removed from context.ts. ValidatingAdapter is now the sole validation gate for traverse().

  2. **Reconcile alpha=0 boundary** — ValidatingAdapter accepted alpha=0 but ppr.ts rejects it (alpha=0 means zero seed influence, semantically useless for context assembly). ValidatingAdapter tightened to (0, 1] matching ppr.ts.

  3. **Update test files** — seed-ids-validation.test.ts and always-include-types-validation.test.ts wrap LocalAdapter in ValidatingAdapter. Error code assertions updated (INVALID_ALWAYS_INCLUDE_TYPE → INVALID_NODE_TYPE).

  4. **Add missing test coverage** — batchMutate MISSING_NODE_ID/MISSING_NODE_TYPE and traverse INVALID_SEED_IDS paths get tests.

  5. **Fix P-75 violation** — Remove fixture array length assertion from local-adapter-validation.test.ts.

  ## What Is NOT Changing

  - reader.ts and index.ts inline validation (carry-forward, not blocking PH-041 completion)
  - ppr.ts algorithm-level guards (defense-in-depth, intentionally retained)
  - ValidatingAdapter core structure
  - RemoteAdapter (already clean from WI-772)

  ## Scope Boundary

  This cycle resolves only the findings that block PH-041's phase goal. reader.ts/index.ts cleanup is a carry-forward item for a future phase.
content: |
  # Change Plan: Cycle 28 follow-ups + convergence-checker fix

  ## Trigger

  Cycle 28 capstone review closed with verdict 'Pass with Follow-ups' and produced:
  - 6 Minor code-reviewer findings (M1-M6) against the tool_usage telemetry surface
  - 1 Significant spec-adherence finding (S1) flagging WI-852's scope referenced a nonexistent doc path
  - 2 gap-analyst findings (SG1 telemetry surface undocumented in architecture-overview; SG2 cross-refs S1)

  During cycle 28, spec-reviewer and gap-analyst both hit turn-budget exhaustion mid-investigation.

  Separately, a new bug was triaged on 2026-04-16 as WI-860: ideate_get_convergence_status returns condition_b:false when a workspace cycle slot contains unrelated legacy archive artifacts, blocking autopilot convergence detection.

  ## Scope

  ### In
  - Wire tool_usage writer to populate session_id/cycle/phase columns (WI-861)
  - Fix scripts/report-tool-usage.sh backend selection (WI-862) and --limit 0 handling (WI-866)
  - Add getToolUsage adapter-contract coverage (WI-863)
  - Document both-view truncation semantics (WI-864)
  - Refresh stale tools.test.ts header (WI-865)
  - Add operational telemetry surface documentation to architecture-overview.md (WI-867)
  - Fix convergence-checker false negatives from legacy cycle-slot artifacts (WI-860)
  - Housekeeping: close WI-850 and WI-852 as done (functionally complete from prior execution), bump reviewer budgets (spec-reviewer 100→180, gap-analyst 200→250)

  ### Out
  - Resurrecting the removed metrics system — P-33 and D-211 stand
  - Broad architecture changes
  - New guiding principles or constraints

  ## Impact

  PH-048 completes the tool_usage telemetry surface (writer correctness, script correctness, contract coverage, documentation, test hygiene) so reporting data is trustworthy and maintainable.

  PH-049 closes the last cycle-28 gap (SG1) and unblocks autopilot convergence from spurious false negatives driven by stale cycle-slot artifacts.

  Config update (reviewer budgets) reduces the probability of cycle-N+1 reviewers exhausting turns before reaching verdict.

  ## Phase structure

  - **PH-048 Tool-usage corrections** (6 items: WI-861..WI-866)
    - Batched parallel, parallelism 3, worktrees
    - Two waves due to file-scope overlap: wave 1 (WI-861, WI-862, WI-865); wave 2 (WI-863, WI-864, WI-866)
  - **PH-049 Doc surface + convergence fix** (2 items: WI-867, WI-860)
    - Full parallel, disjoint scopes, runs after PH-048

  ## References
  - Cycle 28 summary, code-quality, spec-adherence, gap-analysis, decision-log (already archived)
  - Work items: WI-860, WI-861, WI-862, WI-863, WI-864, WI-865, WI-866, WI-867
  - Domain policies: P-33 (operational telemetry outside graph), D-210 (tool_usage standalone), D-211 (remove agent-side emit_metric)
