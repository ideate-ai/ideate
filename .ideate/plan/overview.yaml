title: Cycle Change Plan — Frictionless Updates, Spawn Config, Response Optimization, Phase Chunking, Reporting
body: |-
  ## What Is Changing

  Five initiatives spanning infrastructure, developer experience, and new capabilities:
  1. GP-16 (Frictionless Install): automatic migration on MCP server startup when data model changes
  2. Spawn mode configuration: choose subagent vs teammate mode for all agent spawns
  3. MCP response optimization: trim excessive payloads to reduce token waste
  4. Intelligent phase chunking: auto-group work items into thin-slice phases by shared context
  5. Reporting skill: /ideate:report generating markdown/PDF reports with mermaid diagrams

  ## Scope Boundary

  In scope: migration infrastructure, config schema, all skills spawn logic, MCP tool handlers, refine/init phase chunking, new report skill.
  Not in scope: existing guiding principles (unchanged except GP-16 addition), architecture document, existing test infrastructure.

  ## Work Items

  WI-469 through WI-477 (9 items across 4 phases)
