body: |-
  ## What Is Changing

  Structural quality improvements: DRY refactors, duplication elimination, agent definition accuracy.

  ## Scope

  **In scope**: Generic upsert for db-helpers.ts (~500 LOC reduction), server core helper extraction (pragma, watcher, bootstrap, shutdown), agent definition fixes (5 agents), worker agent creation.

  **Not in scope**: Performance (PH-005), test quality (PH-006). Principles and architecture unchanged.

  ## Work Items

  WI-453, WI-454, WI-463, WI-464
