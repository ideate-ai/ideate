title: "Change Plan — PH-017: Documentation & Cleanup"
body: |-
  ## What Is Changing

  1. Fix 3 deferred minor items from cycle 6-7 reviews (sed fallback, journal enum, status model)
  2. Update ARCHITECTURE.md to reflect the 3 new skills added in PH-016
  3. Create GUIDE.md — comprehensive user guide covering all 10 skills, project/phase management, work item types, and the SDLC loop

  ## Why

  PH-016 delivered functional skills but left documentation and minor fixes incomplete. The user guide fills a gap — ideate has README (overview + installation) and QUICKSTART (5-minute walkthrough) but no comprehensive reference for users managing real projects.

  ## Scope Boundary

  **In scope**: 3 deferred fixes, ARCHITECTURE.md update, GUIDE.md creation
  **Not in scope**: New features, MCP server changes, skill behavior changes
