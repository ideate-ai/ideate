  # Change Plan — Cycle 029

  **Trigger**: Post-review correction from cycle 028 plus requirement evolution (artifact_dir removal, specs/ audit).

  **What is changing**:

  1. **Fix ID auto-assignment** (WI-234) — Strip `WI-` prefix before CAST in write.ts to correctly compute max existing ID.

  2. **ARCHITECTURE.md tool count** (WI-235) — Update Section 5 from "11 tools in 5 categories" to 13 tools. Update source files table to include new files.

  3. **CLAUDE.md v3 structure** (WI-236) — Replace old `specs/` artifact structure diagram with `.ideate/` v3 structure.

  4. **Remove artifact_dir from MCP tools** (WI-237) — Remove `artifact_dir` parameter from all 13 MCP tool input schemas. Handlers use `ctx.ideateDir` exclusively. Tests updated.

  5. **Comprehensive skills/agents audit** (WI-238) — All 6 skills, 4 brrr phase files, and 9 agents audited. Remove `specs/` path references, remove `artifact_dir` from MCP tool call examples, remove markdown artifact creation patterns, ensure v3 `.ideate/` paths throughout.

  **What is NOT changing**: Core SDLC workflow, guiding principles, constraints, MCP server architecture (additive tool changes only), agent responsibility boundaries.

  **Scope boundary**: 5 work items (WI-234–238). Touches mcp/artifact-server/src/tools/, ARCHITECTURE.md, CLAUDE.md, all skills/*.md, all agents/*.md.
