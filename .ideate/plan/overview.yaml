title: Cycle 21 Change Plan — Dead-code removal and test coverage for indexer derivation
change_summary: Remove two dead-code blocks in indexer.ts left over from WI-727's merge resolution, add a stats.edges_created accuracy regression test, and add a P-49 no-backfill assessment to WI-725 resolution notes.
trigger: Cycle 20 capstone review (code-quality, gap-analysis, and spec-adherence all returned Fail or Significant findings). All three reviewers independently identified the same two dead-code issues as significant.
findings_addressed:
  - "S1/SF1 (code-quality + gap-analysis): Orphaned bare calls to deriveJournalEntryCycleEdges and deriveJournalEntryEdges at rebuildIndex lines 1011-1015 — double execution, inflated stats.edges_created"
  - "S2/SF2 (code-quality + gap-analysis + spec-adherence): Stale hasJournalUpdate block at indexFiles lines 798-803 — journal file changes trigger derivation twice"
  - "M1/M2 (code-quality + spec-adherence): Duplicate 'Phase 3' comment label at lines 1011 and 1021 — resolved as a side-effect of S1 fix"
  - "MF1 (gap-analysis): No test asserts stats.edges_created accuracy with derived edges present — Q-138"
  - "MF2 (gap-analysis): WI-725 missing explicit P-49 no-backfill assessment"
scope_boundary: Changes are confined to mcp/artifact-server/src/indexer.ts, mcp/artifact-server/src/__tests__/indexer.test.ts, and the WI-725 artifact notes. No architecture changes, no new edge types, no schema changes.
expected_impact: "After these changes: stats.edges_created will reflect each derived edge exactly once; journal file changes will trigger derivation exactly once; the accuracy regression test will catch any future double-count regression; WI-725 will be P-49 compliant."
