title: Cycle Change Plan — Comprehensive Code Quality Audit Triage
body: |-
  ## What Is Changing

  All 88 findings from a full-codebase quality audit are being triaged into 18 work items covering: git hygiene, dead script cleanup, DRY refactors, server core structure, schema/type correctness, write handler correctness, query/analysis correctness, context assembly performance, error handling, dead code removal, skill/agent fixes, test quality improvements, documentation updates, and autopilot coherence.

  ## Trigger

  User-requested comprehensive code review after many recent changes. Goal: take stock of the full codebase state.

  ## Scope Boundary

  **In scope**: All findings from the 5-agent audit (MCP server core, tool handlers, tests, skills/agents, scripts/config).
  **Not in scope**: Guiding principles unchanged. No architectural changes. No new features. This is purely corrective/quality work.

  ## Expected Impact

  - ~500 LOC reduction from db-helpers.ts generic upsert refactor
  - Multiple correctness fixes (archived WI file_path, DAG transactions, domain decisions in getDomainState)
  - Performance improvements in context assembly (bounded queries, caching, dedup reads)
  - 1 critical test gap fixed (fireEvent behavioral verification)
  - 7 dead/obsolete scripts removed
  - dist/ and metrics.jsonl untracked from git
  - 5 agent definitions updated for accuracy
  - Review skill tool references corrected

  ## New Work Items

  WI-451 through WI-468 (18 items)
