  # Change Plan — Cycle 033

  **Trigger**: Full audit found remaining markdown artifact production and a path routing gap in ideate_write_artifact for cycle-scoped files.

  **What is changing**:

  1. **Cycle-scoped path routing** (WI-251) — ideate_write_artifact gets optional cycle parameter. Cycle-scoped types (finding, cycle_summary, review_manifest, decision_log) route to cycles/{NNN}/ when cycle is provided.

  2. **brrr-state and proxy-human-log to YAML** (WI-252) — Convert brrr-state.md to brrr-state.yaml and proxy-human-log.md to proxy-human-log.yaml. All writes via ideate_write_artifact. Proxy-human agent gets MCP tool access.

  3. **Review output files .md to .yaml** (WI-253) — Review skill references updated: code-quality.yaml, spec-adherence.yaml, etc. All ideate_write_artifact calls include cycle parameter.

  4. **Brrr review phase .md to .yaml** (WI-254) — Same for brrr review phase + convergence check references.

  5. **Research suffix fix** (WI-255) — Refine skill research example changed from .md to .yaml.

  **What is NOT changing**: MCP server core logic (except resolveArtifactPath), guiding principles, constraints.

  **After this cycle**: Zero markdown artifacts produced by any ideate skill or agent. All .ideate/ writes go through MCP tools. YAML only.
