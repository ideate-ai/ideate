id: overview
type: overview
title: "PH-024: Equivalence Test Infrastructure"
description: Build a test infrastructure that proves LocalAdapter (YAML+SQLite) and RemoteAdapter (Neo4j+GraphQL) produce identical results for all 21 StorageAdapter methods. This is Phase 3 of PR-003 (Migration Tool Refinement).
what_is_changing: Adding a Docker Compose test environment, a synthetic .ideate/ fixture with known values, a dual-adapter test harness, and 5 equivalence test suites covering all StorageAdapter methods.
why: Phase 2 (Defect Remediation) achieved zero migration errors and fixed SQLite schema defects. Phase 3 proves that both backends behave identically from the perspective of the MCP tool handlers — the critical acceptance criterion for the platform pivot. Without these tests, backend parity is assumed but unverified.
scope_boundary: This phase creates test infrastructure only. No changes to adapter implementations, MCP tool handlers, or the migration pipeline. If tests reveal divergences, they are documented as findings for a future fix cycle — not fixed inline.
expected_impact: "New files only: docker-compose.test.yml, fixture YAML artifacts, 6 test files, 1 helper module, 1 shell script. No modifications to existing source code. Package.json gets a new test:equivalence script."
work_items:
  - "WI-589: Docker Compose test environment"
  - "WI-590: Synthetic test fixture (~20 artifacts covering all types)"
  - "WI-591: Dual-adapter harness + comparison utilities"
  - "WI-592: Node CRUD and edge operation equivalence tests"
  - "WI-593: Query and aggregation equivalence tests"
  - "WI-594: PPR traverse with deterministic sort controls"
  - "WI-595: Batch, lifecycle, and sequence operation equivalence tests"
  - "WI-596: Null handling and edge-case consistency tests"
