id: overview
type: overview
title: Cycle 22 — Open Question Resolution
change_plan:
  what_is_changing: "Three targeted improvements driven by open domain questions: (1) remove the heuristic from the ValidationError constructor to make incorrect usage a deterministic compile-time concern rather than a silent runtime surprise; (2) add the two remaining genuine testing gaps from Q-120 (nextId unsupported-type error and deprecated/superseded policy exclusion); (3) close 11 stale open questions whose underlying issues were resolved in prior cycles."
  triggering_context: "Review of all open domain questions revealed that the bulk of Q-117 through Q-138 were silently resolved in cycles 17–21 but never closed. Three items remain genuinely unresolved: Q-130 (ValidationError heuristic), the two live gaps in Q-120, and the stale-question backlog itself."
  scope_boundary:
    in_scope:
      - src/adapter.ts — ValidationError constructor simplification
      - Call-site audit across src/adapters/ and src/ppr.ts to verify all sites pass explicit codes
      - src/__tests__/nextid-cycle-validation.test.ts — unsupported-type test
      - src/__tests__/tools.test.ts or new test file — deprecated policy exclusion test
      - MCP artifact updates to close stale questions Q-117, Q-118, Q-120, Q-124, Q-131, Q-132, Q-133, Q-134, Q-135, Q-136, Q-137, Q-138
    out_of_scope:
      - Q-122 / Q-128 server-side BFS/PPR alignment (ideate-server, external project)
      - Q-125 skills .gitkeep (ideate plugin, not mcp/artifact-server)
      - Q-129 targeted spec compliance review (separate review task)
      - StorageAdapter migration of remaining 7 direct-DB tool handlers
      - Any indexer or watcher changes
  expected_impact: ValidationError misuse becomes a deterministic failure (wrong code string no longer silently degrades to VALIDATION_ERROR). Two test regressions that were undetectable by the suite become detectable. Domain question list shrinks from 19 open to 8 genuinely open.
  work_items:
    - WI-733
    - WI-734
    - WI-735
