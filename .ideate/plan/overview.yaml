change_summary: "Close the four Significant findings left outstanding after cycle 9 of PH-045 converged, plus four Minors bundled for efficiency. Scope is intentionally narrow: this is a cleanup phase, not an architecture phase."
triggering_context: |-
  PH-045 autopilot cycle 9 reached convergence (per ideate_get_convergence_status(9) returning converged:true, condition_b:true), but the three capstone reviewers surfaced findings the convergence tool did not count — a discrepancy separately tracked in J-071 and flagged as a follow-up for the tool's finding parser. Per the spec, autopilot exits the loop on converged:true; refine picks up the residue.

  Findings carried forward into this phase:
  - S1 (code-reviewer, Significant): P-87 (worker GP-14 re-sync policy) verification criterion is unmet — execute.md worker prompt lacks the explicit .ideate/ write prohibition bullet. → WI-835.
  - EC1 (gap-analyst, Significant): convergence-checker canonical-only regression test only covers asymmetric case (legacy Fail masking canonical Pass). Symmetric case (legacy Pass masking canonical Fail) untested. → WI-836.
  - EC2 (gap-analyst, Significant): src/adapters/remote/client.ts:278 tokenProvider throw path not wrapped — escapes retry loop as raw TypeError. → WI-837.
  - II1 (gap-analyst, Significant): AUTH_FAILURE error code added in WI-833 but undocumented in adapter-contract.md error table and docs/platform/adapter-interface.md Section 7. → WI-838.
  - M1-M4 (code-reviewer, Minor): bundled into WI-836 (M2 assertion tightening, M3 fixture id normalization), WI-837 (M4 executeOnceWithAuth fetch error wrapping), WI-838 (M1 dead adapter-interface.md ref).
impact: Low. All four WIs are documentation + small-scope code edits. No architectural changes. No interface changes. Unit-test coverage increases in one file.
