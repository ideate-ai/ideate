entries:
  - question: What changes do you want to make?
    answer: "Three areas: (1) QUICKSTART.md Agile/Scrum mapping table has forced analogies for guiding principles and domain policies — remove those rows, add a DDD blurb. (2) Triage all concrete work from domain question resolutions — include all items. (3) README must document all config.json options (appetite, circuit_breaker_threshold, spawn_mode, model_overrides are missing)."
    domain: null
  - question: For the QUICKSTART fix — should all Scrum analogies be removed?
    answer: No. The hierarchy mappings (Project->Epic, Phase->Sprint, etc.) are great. But guiding principles and domain policies are not Scrum concepts. Remove those rows. Add a short blurb about borrowing DDD concepts and using guiding principles to enforce alignment to high-level requirements.
    domain: workflow
  - question: Triage of domain question work — include, defer, or dismiss each?
    answer: "Include all: Q-120 (content normalization), Q-117 (roundtrip test), Q-111/Q-119 (P-44 amendment), Q-106 (null check), Q-107 (hash normalization), Q-112 (dispatch branches), Q-109 (P-33 test)."
    domain: artifact-structure
  - question: Do guiding principles still hold?
    answer: They hold.
    domain: null
  - question: Any architecture changes needed?
    answer: No. Documentation fixes + MCP server correctness fixes + policy amendment. No architecture changes, no new features.
    domain: null
