id: interview-refine-006
type: interview
title: "Refinement Interview — Cycle 006: New Skills Phase"
entries:
  - question: "Phase transition: PH-015 complete, proceed to next horizon phase?"
    answer: Yes, transition to New Skills phase.
    domain: null
  - question: Evaluate guiding principles and policies against the expanded scope (project management, triage, status, work item types).
    answer: "Four principles need amendment: GP-01 (spec sufficiency applies to completed specs, not creation), GP-02 (minimize inference with framework for when it's permitted), GP-05 (proportional review based on priority/severity), GP-10 (full lifecycle ownership, not just idea-to-output)."
    domain: workflow
  - question: Are WI-518 through WI-521 still the right scope?
    answer: Yes, but restructure for parallel execution. Remove artificial dependency chain — only shared resource is plugin.json.
    domain: workflow
  - question: WI-518 is large with 14 subcommands. Keep as single item or decompose?
    answer: "Single skill file. Research whether user-invocable-only skills use less context. Should use disable-model-invocation: true."
    domain: workflow
  - question: Skill context cost research findings.
    answer: Full SKILL.md injected at invocation. Before invocation, only 250-char description in context. disable-model-invocation removes even that. Documentation recommends <500 lines. Supporting files are lazy-loaded. Autopilot already uses this pattern.
    domain: agent-system
  - question: "Triage interaction model: one-shot, multi-turn, or auto-detect?"
    answer: Auto-detect. Inference is okay if the description is obvious; follow-up questions if ambiguous (reproduction steps, symptoms, etc.).
    domain: workflow
  - question: "Status skill: LLM formatting or MCP-side formatting?"
    answer: "MCP does the formatting. Extend ideate_get_workspace_status with view parameter. Views: workspace, project, phase. Skill is a thin routing layer. Add MCP server work to this phase."
    domain: artifact-structure
  - question: "Status view naming: IC/portfolio/project/phase or workspace/project/phase?"
    answer: workspace/project/phase. No need for cycle stats. Iterate later if needed.
    domain: artifact-structure
  - question: "Type routing: hardcoded type-to-reviewer mapping or proportional framework?"
    answer: Default to detailed/full review. Reduce only when both severity and priority are low. Must be transparent with decision and confirm before cutting corners.
    domain: workflow
