topic: Design for merging two .ideate/ artifact directories into one
content: |
  # Multi-.ideate Merge Design

  **Date**: 2026-04-08
  **Type**: Design spike — no implementation code produced
  **Guiding principles**: P-26 (index.db rebuilt deterministically from YAML), P-27 (one file per artifact), P-31 (ID prefixes identify artifact kind)

  ---

  ## 1. ID Prefix Inventory

  Every prefix observed in `.ideate/` artifact files and in the indexer/schema source code:

  | Prefix | Sequence Format | Artifact Type(s) | Example IDs | Directory |
  |--------|----------------|-----------------|-------------|-----------|
  | `WI-` | `WI-NNN` (3-digit, zero-padded) | `work_item` | WI-001, WI-717 | `work-items/` |
  | `F-` | `F-NNN-NNN` (cycle-seq, each 3-digit) | `finding` (capstone) | F-019-071, F-695-1 | `cycles/{NNN}/findings/` |
  | `FI-` | `FI-NNN-NNN` (cycle-seq, each 3-digit) | `finding` (incremental) | FI-006-001, FI-019-001 | `cycles/{NNN}/findings/` |
  | `F-WI-` | `F-WI-NNN-NNN` (legacy variant) | `finding` (old format) | F-WI-590-001 | `cycles/{NNN}/findings/` |
  | `P-` | `P-NN` (2-digit) or `P-NNN` (3-digit, older files) | `domain_policy` | P-01, P-65, P-001 | `policies/` |
  | `D-` | `D-NN` (2-digit) | `domain_decision` | D-01, D-92 | `decisions/` |
  | `Q-` | `Q-NN` (2-digit) or `Q-NNN` (3-digit, older) | `domain_question` | Q-01, Q-001 | `questions/` |
  | `GP-` | `GP-NN` (2-digit) | `guiding_principle` | GP-01, GP-16 | `principles/` |
  | `C-` | `C-NN` (2-digit) | `constraint` | C-01, C-05 | `constraints/` |
  | `J-` | `J-NNN-NNN` (cycle-seq, each 3-digit) | `journal_entry` | J-001-001, J-071-028 | `cycles/{NNN}/journal/` |
  | `PH-` | `PH-NNN` (3-digit, zero-padded) | `phase` | PH-001, PH-038 | `phases/` |
  | `PR-` | `PR-NNN` (3-digit, zero-padded) | `project` | PR-001, PR-003 | `projects/` |
  | `RF-` | `RF-{slug}` (free-text slug, no sequence number) | `research_finding` | RF-agent-teams-and-plugins | `research/` |
  | `ME-` | `ME-{hex8}` (8-char hex, content-derived) | `metrics_event` | ME-0349D771 | `metrics/` |
  | `CS-` | `CS-NNN` (cycle number) | `cycle_summary` | CS-001, CS-019 | `cycles/{NNN}/` |
  | `DL-` | `DL-NNN` (cycle number) | `decision_log` | DL-001, DL-019 | `cycles/{NNN}/` |
  | `RM-` | `RM-NNN` (cycle number) | `review_manifest` | RM-001, RM-019 | `cycles/{NNN}/` |
  | `GA-` | `GA-NNN` (cycle number) | `cycle_summary` (gap-analysis subtype) | GA-019 | `cycles/{NNN}/` |
  | `SA-` | `SA-NNN` (cycle number) | `cycle_summary` (spec-adherence subtype) | SA-019 | `cycles/{NNN}/` |
  | `interview-` | `interview-{type}-{NNN}` (free-text slug) | `interview` | interview-refine-002 | `interviews/` |
  | `IQ-` | synthetic, assigned by indexer from parent interview entries | `interview_question` | (inline, no standalone file) | `interviews/` (same file as parent) |
  | *(no prefix)* | `architecture`, `overview`, `summary`, `index` | document artifacts, `domain_index` | architecture, index | `plan/`, `domains/`, `cycles/{NNN}/` |

  **Format variation notes:**
  - `P-` has two live formats: old `P-NNN` (3-digit) and current `P-NN` (2-digit). Both exist in the same `policies/` directory.
  - `F-` also appears as `FI-` (incremental reviews) and legacy `F-WI-NNN-NNN`; all share `type: finding`.
  - `RF-` and `interview-` use free-text slugs with no numeric sequence; merge collision probability is lower but not zero.
  - `ME-` uses an 8-char hex suffix derived from content; collision probability is low but theoretically possible.
  - `nextId()` in `writer.ts` only generates IDs automatically for `work_item`, `finding`, and `journal_entry`; all other types receive caller-supplied IDs.

  ---

  ## 2. Reference Field Map

  For every artifact type: all YAML fields containing an ID reference (structured field, not free-text prose).
  Fields backed by the EDGE_TYPE_REGISTRY are noted with the edge type.

  ### work_item
  | Field | Value Format | Edge Type |
  |-------|-------------|-----------|
  | `depends` | `[WI-NNN, ...]` array | `depends_on` |
  | `blocks` | `[WI-NNN, ...]` array | `blocks` |
  | `module` | `{module-id}` string or null | `belongs_to_module` |
  | `domain` | `{domain-name}` string or null | `belongs_to_domain` (domain name, not node ID) |
  | `phase` | `PH-NNN` string or null | `belongs_to_phase` |
  | `governed_by` | `[GP-NN, P-NN, ...]` array | `governed_by` |
  | `informed_by` | `[D-NN, RF-slug, Q-NN]` array | `informed_by` |

  ### finding
  | Field | Value Format | Edge Type |
  |-------|-------------|-----------|
  | `work_item` | `WI-NNN` string | `relates_to` |
  | `addressed_by` | `WI-NNN` string or null | `addressed_by` |

  ### domain_policy
  | Field | Value Format | Edge Type | Notes |
  |-------|-------------|-----------|-------|
  | `domain` | `{domain-name}` string | `belongs_to_domain` | domain name not node ID |
  | `derived_from` | `[GP-NN, ...]` array **or** `"D-NNN, GP-NN"` comma-string | `derived_from` | **Mixed format anomaly**: some YAMLs store as comma-separated string (e.g., P-53: `derived_from: D-161, GP-14`). The edge registry expects array; comma-string forms a single edge to the literal string "D-161, GP-14" which is wrong. **Pre-existing defect**: This anomaly predates any merge — edges to comma-concatenated `derived_from` targets are wrong today. A standalone indexer fix (`buildEdgesFor()` should normalize comma-separated strings to arrays) or YAML normalization pass is warranted independently of the merge work. |
  | `amended_by` | `P-NN` string or null | `amended_by` |  |

  ### domain_decision
  | Field | Value Format | Edge Type |
  |-------|-------------|-----------|
  | `domain` | `{domain-name}` string | `belongs_to_domain` |
  | `supersedes` | `D-NN` string or null | `supersedes` |

  ### domain_question
  | Field | Value Format | Edge Type |
  |-------|-------------|-----------|
  | `domain` | `{domain-name}` string | `belongs_to_domain` |
  | `addressed_by` | `WI-NNN` string or null | `addressed_by` |

  ### guiding_principle
  No structured ID reference fields. Referenced by other artifacts; references nothing.

  ### constraint
  | Field | Value Format | Edge Type |
  |-------|-------------|-----------|
  | `governed_by` | `[C-NN, ...]` array | `governed_by` |

  ### module_spec
  | Field | Value Format | Edge Type |
  |-------|-------------|-----------|
  | `governed_by` | `[GP-NN, P-NN, ...]` array | `governed_by` |
  | `informed_by` | `[D-NN, RF-slug, ...]` array | `informed_by` |

  ### research_finding
  No structured ID reference fields.

  ### journal_entry
  | Field | Value Format | Edge Type |
  |-------|-------------|-----------|
  | `work_item` | `WI-NNN` string or null | `relates_to` |

  ### metrics_event
  | Field | Value Format | Edge Type | Notes |
  |-------|-------------|-----------|-------|
  | `work_item` | `WI-NNN` string | `relates_to` |  |
  | `context_artifact_ids` | comma-separated ID string | **none** | **Outside edge registry**. Not rewritten by registry-based tooling. |

  ### interview_question
  | Field | Value Format | Edge Type |
  |-------|-------------|-----------|
  | `interview_id` | `interview-{type}-{NNN}` string | `references` (IQ→interview) |
  | `domain` | `{domain-name}` string or null | `belongs_to_domain` |

  ### proxy_human_decision
  | Field | Value Format | Edge Type | Notes |
  |-------|-------------|-----------|-------|
  | `triggered_by` | `[{type: finding, id: F-NNN-NNN}, ...]` array of objects | `triggered_by` | `triggered_by` IS registered in EDGE_TYPE_REGISTRY (`yaml_field: 'triggered_by'`), but the extractor in `indexer.ts` only handles string items in arrays. Since `triggered_by` items are `{type, id}` objects, edges are silently skipped. The merge rewriter must extract `.id` from each object element. A companion indexer fix is also needed. |

  ### project
  | Field | Value Format | Edge Type | Notes |
  |-------|-------------|-----------|-------|
  | `current_phase_id` | `PH-NNN` string or null | **none** | **Outside edge registry**. Not rewritten by registry-based tooling. |
  | `horizon.completed` | `[PH-NNN, ...]` array under nested key | **none** | Nested YAML object; not rewritten by flat-field registry logic. |
  | `horizon.current` | `PH-NNN` string or null | **none** | Nested field. Non-null value must be rewritten during merge. |
  | `horizon.next` | `[PH-NNN, ...]` | **none** | Nested. |
  | `horizon.later` | `[PH-NNN, ...]` | **none** | Nested. |

  ### phase
  | Field | Value Format | Edge Type | Notes |
  |-------|-------------|-----------|-------|
  | `project` | `PR-NNN` string | `belongs_to_project` |  |
  | `work_items` | `[WI-NNN, ...]` array | **none** | **Outside edge registry**. Not rewritten by registry-based tooling. |

  ### Document artifacts (cycle_summary, decision_log, review_manifest, etc.)
  | Field | Value Format | Notes |
  |-------|-------------|-------|
  | `cycle` | integer | Not an artifact ID reference; is the cycle number. |
  | `content` | free text | May embed WI-NNN, F-NNN, etc. in prose. Not rewritable by static field lookup. |

  ### Summary: fields outside the edge registry requiring special handling
  1. `project.current_phase_id` — string field not in EDGE_TYPE_REGISTRY
  2. `project.horizon.{completed|current|next|later}` — nested fields under JSON blob (current_phase_id and all horizon subfields must be rewritten during merge)
  3. `phase.work_items` — array not in EDGE_TYPE_REGISTRY
  4. `metrics_event.context_artifact_ids` — comma-separated string not in registry
  5. `proxy_human_decision.triggered_by[].id` — registered in EDGE_TYPE_REGISTRY but silently skipped by the extractor because items are `{type, id}` objects, not strings; the merge rewriter must extract `.id` from each element
  6. `domain_policy.derived_from` — sometimes stored as comma-separated string instead of array
  7. Free-text `content`, `description`, `notes`, `rationale` fields — may contain ID tokens not safely rewritable

  **Answer to design question 1**: No, not every ID reference can be found via static field name lookup. Four reference fields are outside the edge registry altogether (items 1–4 above). Two additional fields (items 5–6) are nominally registered but require special handling due to object-in-array structure or mixed string format. Free-text fields (item 7) require deep-walk traversal or regex-based scanning.

  ---

  ## 3. Reindexing Strategy Comparison

  ### Strategy A: Prefix-offset remapping

  **Description**: Assign each source directory a numeric offset for each prefix. All IDs from Dir B are renumbered by adding the max ID of the same prefix from Dir A. The offset is computed once per prefix before any files are rewritten.

  **Algorithm steps:**
  1. Scan Dir A: build max sequence number per prefix (`{WI: 717, P: 65, D: 92, GP: 16, ...}`).
  2. Scan Dir B: build complete `old_id → new_id` map for all numeric-prefix artifacts by adding the offset.
     - For cycle-scoped IDs (`F-`, `J-`): also remap cycle numbers (cycle_B → cycle_B + max_cycle_A). Apply seq offset within each renumbered cycle.
  3. For slug-based IDs (`RF-`, `interview-`): detect collisions by exact slug match. If collision, append `-b` suffix or a numeric disambiguator.
  4. For hash-based IDs (`ME-`): retain as-is; collision probability is negligible.
  5. Rewrite all Dir B YAML files: replace every old ID with new ID across all structured reference fields plus the extra-registry fields (items 1–6 above).
  6. Rename cycle directories for Dir B: `cycles/001/` → `cycles/{max_cycle_A+001}/`.
  7. Copy rewritten Dir B files into the Dir A destination tree.
  8. Rebuild SQLite index from scratch: `rebuildIndex()` over the merged YAML tree.

  **Failure modes:**
  - Mixed-format sequences (`P-01` and `P-001` coexist): offset computation must normalize to the highest numeric value across all format variants, not just the digit count.
  - `domain_policy.derived_from` comma-string: substring replacement may corrupt compound values (replacing `D-1` inside `D-161, GP-14` incorrectly matches).
  - `proxy_human_decision.triggered_by[].id`: a naive flat-field YAML rewriter misses IDs nested inside objects in arrays; must handle deep traversal.
  - Free-text embedded IDs (notes, content, description): not rewritten. Prose from Dir B referring to old IDs becomes permanently stale.
  - `project.horizon` nested structure: flat-field rewriter does not descend into nested YAML objects.

  **Implementation complexity**: Medium. Two passes (scan + rewrite), careful regex anchoring to avoid partial matches (`WI-1` inside `WI-10`), cycle directory renaming, and special handling for the five extra-registry fields. Estimated effort: 3–5 days.

  ---

  ### Strategy B: UUID-stable intermediate representation

  **Description**: Assign every artifact in both sources a UUID at merge time. Use UUIDs as canonical identity during the merge. After merging, reassign human-readable sequential IDs from scratch.

  **Algorithm steps:**
  1. Parse all YAML from both dirs. For each artifact generate a UUID keyed on `(source, original_id)`.
  2. Build bidirectional map: `original_id → UUID` and `UUID → new_sequential_id`.
  3. Rewrite all structured reference fields using UUID map, then immediately replace UUIDs with new sequential IDs (two passes, or combined single pass).
  4. Deduplicate domain knowledge artifacts by content hash: identical content → single artifact with the lower new sequential ID.
  5. Copy all files into merged destination. Rebuild SQLite from scratch.

  **Failure modes:**
  - Reassigning all IDs from scratch means every reference in archived prose (cycle summaries, decision logs, journal entries) becomes stale — worse than Strategy A for historical prose.
  - Content-hash deduplication produces false negatives for near-duplicate policies (same concept, different wording); these require human curation.
  - `cycle_created`/`cycle_modified` integers in all artifacts are cycle-number references; renumbering cycles changes the semantic meaning of these timestamps.
  - Two full rewrite passes doubles file I/O and complexity surface.

  **Implementation complexity**: High. UUID generation, two rewrite passes, content-hash deduplication logic, and human-review workflow for near-duplicates each add significant surface area. Estimated effort: 7–10 days.

  ---

  ### Strategy C: New-destination copy with ID reservation (recommended)

  **Description**: Create a fresh `.ideate/` as the merge destination. Copy Dir A files unchanged (they keep all IDs). Rewrite Dir B files with offset-remapped IDs into the destination. Neither source is modified.

  **Key difference from A**: Dir A is never mutated. Dir A files are copied verbatim. Dir B files are rewritten into the destination with new IDs. Both sources remain intact as rollback targets.

  **Advantage over A**: Source directories are never at risk. If the merge fails, both originals are untouched and no restoration procedure is needed.
  **Advantage over B**: No UUID intermediate; single offset pass; simpler implementation.
  **Disadvantage**: Requires ~2× disk space during the operation.

  **Implementation complexity**: Medium-low. Uses the same offset algorithm as Strategy A but with non-destructive source semantics. Estimated effort: 3–4 days.

  **Answer to design question 4**: The merge should produce a new third directory, not mutate either source. This is the safest approach given the information loss risks identified in Section 6.

  ---

  ## 4. Merge Conflict Taxonomy

  ### 4.1 Auto-resolvable conflicts

  | Conflict Type | Resolution | Example |
  |--------------|-----------|---------|
  | Numeric ID collision (WI-001 from both) | Offset remapping: Dir B artifact gets next available ID | WI-001 (A) stays WI-001; WI-001 (B) becomes WI-718 |
  | Cycle number collision (both have cycles/001/) | Offset Dir B cycle numbers by max cycle count of Dir A | Dir A cycle 1 stays 1; Dir B cycle 1 becomes 20 if Dir A has 19 cycles |
  | Slug collision with different content | Append `-b` suffix to Dir B slug | RF-context-assembly-strategies-b |
  | Hash-based ME- ID collision | Near-zero probability; if collision append 2-digit suffix | ME-0349D771-01 |

  ### 4.2 Conflicts requiring human decision before merge

  | Conflict Type | Why Human Required | Example |
  |--------------|-------------------|---------|
  | Domain policy semantic duplicates | Two policies cover the same concept with different wording. Content hash differs so no auto-dedup. Human must decide: keep both, supersede one, or merge content. | Dir A P-12 ("no partial validation") vs Dir B P-07 ("validation must be complete") |
  | Guiding principle amendment histories | Both dirs have GP-01 with divergent amendment_history arrays. Merging requires knowing chronological order; only cycle numbers are stored, not wall-clock dates. | GP-01 in Dir A has [cycle 6: change A]; Dir B has [cycle 3: change B] |
  | Cross-directory supersedes chains | Dir B D-15 supersedes D-12. After remapping to D-107 and D-104, the chain is preserved internally. But if D-15 (B) semantically supersedes D-08 (A), this cross-source relationship is invisible. | Decision chains that span both sources |
  | Domain namespace collisions | Both dirs use domain `workflow` but the concept differs between projects. Merging places incompatible policies under one domain name. | Two unrelated projects both having a `workflow` domain |
  | config.json conflicts | Both dirs have `config.json` with different `agent_budgets`, `ppr` settings, `project_name`, `default_appetite`. These are scalars, not artifacts; the merge must produce a single config. | Dir A: default_appetite=6; Dir B: default_appetite=8 |
  | Project/Phase horizon arrays | `project.horizon.completed/next/later` are nested JSON blobs containing PH-NNN IDs. After offset remapping, these arrays must be updated but are outside the flat-field edge registry. If not handled, the horizon arrays point to stale IDs. | PR-001.horizon.completed still contains old PH-NNN values after merge |

  ### 4.3 Irresolvable without semantic understanding

  - **Free-text ID references in prose**: Journal entries, cycle summaries, decision logs, and notes fields contain embedded ID tokens (e.g., "WI-042 was accepted"). After offset remapping, these prose references become permanently stale. No automated rewriter can safely replace all of them without risking false positives (e.g., replacing `D-1` inside `D-161`).
  - **Cross-directory informational dependencies**: If a practitioner noted "this work builds on project B's approach" in a natural-language field without creating a formal `depends` edge, that relationship is invisible to the merger.

  ---

  ## 5. Required Processing Order

  To maintain referential integrity, the merge must execute in this dependency order:

  **Phase 0: Pre-flight validation**
  - Run `rebuildIndex()` on each source independently; verify zero parse errors.
  - Record max IDs per prefix for Dir A.
  - Record max cycle number for Dir A.
  - Compute and record the full `old_id → new_id` offset map for Dir B.
  - Produce dry-run report of all ID changes for human review before writing begins.

  **Phase 1: Leaf artifacts (no outgoing ID references to other relocatable artifacts)**
  - `guiding_principle` (GP-) — referenced by others, references nothing
  - `research_finding` (RF-) — referenced by others, references nothing
  - `constraint` (C-) — unless using `governed_by` which references other constraints

  **Phase 2: Mid-tier domain knowledge**
  - `domain_policy` (P-) — references `guiding_principle` via `derived_from`, `domain_policy` via `amended_by`
  - `domain_decision` (D-) — references `domain_decision` via `supersedes`
  - `domain_question` (Q-) — references `work_item` via `addressed_by` (write Q after WI, or tolerate dangling reference until Phase 4)
  - `module_spec` — references `guiding_principle` and `domain_policy` via `governed_by`/`informed_by`

  **Phase 3: Projects and Phases (circular dependency resolution)**
  - `phase` (PH-) first: references `project` via `phase.project` field. Write phases before projects because project files reference phase IDs that must be known.
  - `project` (PR-) second: update `current_phase_id`, `horizon.current` (non-null PH-NNN string), and `horizon.{completed|next|later}` arrays with remapped PH-NNN values. `horizon.current` is a live scalar field that must be rewritten alongside the arrays.
  - Note: this is a soft circular dependency. Writing phases first with a placeholder project ID, then writing projects, avoids the cycle.

  **Phase 4: Work items** (WI-)
  - References: `depends`, `blocks` (WI→WI), `module`, `phase`, `governed_by`, `informed_by`
  - Must be written after guiding_principles, policies, modules, and phases are finalized.
  - Update `domain_question.addressed_by` references now that WI IDs are known.

  **Phase 5: Cycle-scoped artifacts (within each renumbered cycle)**
  - `finding` (F-, FI-) — references `work_item` via `work_item` and `addressed_by`
  - `journal_entry` (J-) — references `work_item` via `work_item`
  - `proxy_human_decision` — references `finding` and `work_item` via `triggered_by`
  - `cycle_summary`, `decision_log`, `review_manifest` — no structured references (prose only); write last
  - Cycle directories must be created with renumbered cycle numbers before artifacts are written.

  **Phase 6: Interview artifacts**
  - Write `interview` files first (free-text slugs)
  - Write `interview_question` entries after parent interviews (references parent via `interview_id`)

  **Phase 7: Metrics events** (ME-)
  - References `work_item` via `work_item` field
  - Write after work items are finalized

  **Phase 7b: Non-artifact files**
  Two files in `.ideate/` are not YAML artifact files and require special handling outside the standard offset-rewrite pipeline:

  - `autopilot-state.yaml` — This file tracks autopilot execution state, not an indexed artifact. Merge policy: take `max(cycles_completed)` from both sources so the merged state reflects the higher cycle count. For other scalar fields (`convergence_achieved`, `last_cycle`, `current_phase`): prefer the value from whichever source has the higher `cycles_completed`; if equal, prefer Dir A. Document the chosen values in the dry-run report for human confirmation before writing. The merged `current_phase` should be updated to match the remapped phase ID if it contains a PH-NNN reference from Dir B.
  - `metrics.jsonl` — A newline-delimited JSON log of metrics events, ordered chronologically by event timestamp. Merge policy: concatenate both files and sort all lines by their `timestamp` field in ascending order. If either source lacks a timestamp field on some lines, those lines should be appended after timestamped lines, preserving their original relative order. The merged file replaces both sources in the destination.

  **Phase 8: SQLite rebuild**
  - Run `rebuildIndex()` from scratch on the merged YAML tree.
  - Do NOT use UPDATE statements on an old index — rebuild only (per P-26).
  - Verify zero parse errors, zero DAG cycles after rebuild.

  **Phase 9: Post-merge validation**
  - Query for dangling references: edges where target_id does not exist in nodes table.
  - Enumerate `project.current_phase_id` and `project.horizon.*` values; verify all PH-NNN exist.
  - Enumerate `phase.work_items`; verify all WI-NNN exist.
  - Report unresolvable dangling references for human review.

  ---

  ## 6. Information Loss Analysis

  ### 6.1 Permanently lost

  - **Free-text prose ID references**: After offset remapping, all ID tokens embedded in `content`, `description`, `notes`, `rationale`, `resolution`, and free-text fields of archived artifacts become stale. Old IDs no longer resolve. This affects all cycle summaries, decision logs, review manifests, journal entries, and work item notes from Dir B. There is no automated recovery path.
  - **config.json provenance**: One `config.json` survives the merge. Settings from the non-winning config (agent_budgets, PPR weights, model overrides, circuit_breaker_threshold) are discarded. No merge mechanism exists for these scalar values.
  - **Inter-project relationships not encoded as YAML edges**: Informally referenced relationships in natural-language fields (e.g., "this work builds on the approach in the other project") are invisible to the merger.

  ### 6.2 Permanently ambiguous

  - **Amendment history cycle numbers**: `guiding_principle.amendment_history[].cycle` records which cycle an amendment happened in. After cycle renumbering, Dir B's amendment at cycle 3 becomes cycle 23. The wall-clock date of the amendment is not stored; only the cycle number is. After merging, there is no way to distinguish a Dir A cycle-3 event from a Dir B (now renumbered to something else) event in historical timeline analysis.
  - **Domain knowledge provenance**: After merging `policies/`, `decisions/`, `questions/` from both dirs under unified domain namespaces, there is no field recording which source directory each artifact originated from. If domain policies from two unrelated projects are merged into a single `workflow` domain, the merged domain becomes semantically incoherent without per-artifact source annotation.
  - **Finding cycle references**: `finding.cycle` is an integer referring to a cycle number. After renumbering, the integer is updated in the YAML, but the original cycle boundary (what was built during cycle 1 of Dir B vs cycle 1 of Dir A) is collapsed into a flat sequential namespace with no separation marker.
  - **Review manifest archive paths**: Review manifests contain prose referencing `archive/cycles/{NNN}/work-items/{NNN}.md` paths. These paths embed the old cycle number. After renumbering, the prose paths become stale but the actual archive files may or may not have been renumbered to match.

  ### 6.3 Recoverable with extra work

  - **Slug-based RF- and interview- ID collisions resolved with `-b` suffix**: Any external reference (CLAUDE.md, agent prompt) using the original slug will not resolve. Recoverable by manually updating external references.
  - **ME- hash collisions** (extremely rare): Recoverable only if both source directories are preserved.
  - **domain_policy.derived_from comma-string anomaly**: The incorrect format (`"D-161, GP-14"` as a string) causes the indexer to create a single edge to the literal string instead of two separate edges. Recoverable by normalizing these fields to arrays before merging.

  ---

  ## 7. Recommended Approach

  **Use Strategy C (new-destination copy with ID reservation).**

  Rationale:
  1. **Non-destructive**: Both source directories remain intact throughout the merge. If the merge produces incorrect output, both sources serve as rollback targets with no restoration procedure.
  2. **Simpler than Strategy B**: UUID intermediate representation adds two full rewrite passes with no automated advantages that justify its complexity (deduplication step still requires human review).
  3. **Deterministic and auditable**: The offset map computed in Phase 0 is a plain-text file reviewable before any files are written. The merger can produce a dry-run report listing every ID change before committing.
  4. **Compatible with P-26**: Writes YAML files first, then calls `rebuildIndex()` once. No SQLite UPDATE statements needed. The index is rebuilt deterministically from YAML.
  5. **Compatible with P-27**: Each artifact is written to exactly one file in the destination.
  6. **Compatible with P-31**: All new IDs preserve the original prefix. WI-NNN stays WI-NNN with a higher number.

  **Answer to design question 2**: Rewriting YAML files + SQLite rebuild is sufficient. Direct SQLite UPDATE statements are not needed and would violate P-26.

  **Answer to design question 3**: Minimal metadata needed from each source to perform a deterministic merge:
  - Complete `old_id → new_id` map computed from max-ID scan of Dir A
  - Complete `old_cycle → new_cycle` map computed from max-cycle scan of Dir A
  - List of slug-based IDs (RF-, interview-) from both sources for collision detection
  - List of ME- IDs from both sources for collision detection

  **Answer to design question 5**: Journal entry sequence numbers (`J-001-001`) should be renumbered under their new cycle number. `J-001-001` from Dir B becomes `J-{newCycle}-001` in the destination. The seq component resets for each cycle; it does not need a global offset.

  **Answer to design question 6**: Domain policies from both sources should be merged into the destination with a `source_workspace` annotation added to each artifact (e.g., `source_workspace: A` or `source_workspace: B`). This preserves provenance for post-merge domain curation. Auto-deduplication should be attempted only for exact content-hash matches; near-duplicate policies require human review.

  **Implementation prerequisites before coding:**
  1. Define the config.json merge policy (which fields from which source win, or prompt user).
  2. Decide semantic duplicate detection policy (content-hash dedup only, or human review for all domain artifacts).
  3. Define a source-provenance annotation convention (`source_workspace` field on domain knowledge artifacts).
  4. Create a backup of both source directories before any operation begins.
  5. Write and test a pre-merge validation script that enumerates all unregistered reference fields and confirms they will be handled by the rewriter.
  6. Normalize any `domain_policy.derived_from` comma-string fields to arrays before the merge begins.

  ---

  ## 8. Open Questions Requiring Human Decision

  1. **Backup strategy**: What is the backup mechanism? Filesystem copy, git branch, tar archive? Who is responsible for creating and verifying the backup? The merge must not begin without a verified backup.

  2. **Rollback plan**: If the merged index contains dangling references or parse errors after rebuild, what is the rollback procedure? (Recommended: delete the destination directory and restart from unmodified sources. Both sources must be preserved.)

  3. **Domain namespace collision policy**: When both sources have a `workflow` domain, should all their policies/decisions/questions be merged into one `workflow` domain, or namespaced by source (e.g., `workflow-a`, `workflow-b`)? Namespacing preserves isolation but invalidates all `domain:` field values in the YAML and all `belongs_to_domain` edges.

  4. **config.json merge policy**: Which source's agent_budgets, PPR weights, and model overrides win? Or should a new config be written from scratch with manually chosen values?

  5. **Prose ID staleness tolerance**: Is it acceptable for historical prose (journal entries, cycle summaries, decision logs) to contain stale ID references after the merge? Or is a best-effort regex replacement required even knowing it may produce false positives?

  6. **Guiding principle deduplication**: If both dirs have a GP-01 titled "Spec Sufficiency" with identical or near-identical content, should they be merged into a single artifact (content-hash dedup) or kept as separate GP-01 and GP-17 to preserve distinct amendment histories?

  7. **Interview artifact handling**: Interview files use free-text slugs (`interview-refine-002`). If both sources have `interview-refine-002`, are these the same interview or a coincidental name collision? The merger cannot know without human context.

  8. **Cycle boundary annotation**: Should the merge insert a synthetic journal entry or cycle summary explaining where each cycle number range originated? (e.g., "Cycles 1–20 from workspace A; cycles 21–40 from workspace B") This would support future cycle queries without per-artifact provenance annotation.

  9. **Project horizon array handling**: The `project.horizon.{completed|next|later}` arrays are nested YAML objects outside the flat-field edge registry. The rewriter must perform deep-walk YAML traversal to handle these. Is a general-purpose deep-walk rewriter acceptable, or should these be special-cased?

  10. **SQLite content_hash and token_count**: After renaming IDs, the `content_hash` and `token_count` fields in YAML files may be stale. `rebuildIndex()` recomputes both fields and overwrites them. This is correct behavior per P-26 — confirm this is expected before implementation begins.
