content: |
  # Node Inventory Spike — Data Quality Audit of SQLite Index

  **Date**: 2026-04-08
  **Audited index**: `/Users/dan/code/ideate/.ideate/index.db`
  **Total nodes**: 2408
  **Total edges**: 1751
  **Scope**: Non-canonical types, orphans, file path validity, work item status, cycle reference validity

  ---

  ## 1. Non-Canonical Type Inventory

  All types below appear in `adapter.ts` `ALL_NODE_TYPES` (the code considers them valid) but are identified here as **legacy or secondary types** — either plural forms that duplicate singular canonical types, or types that represent older artifact structures alongside newer canonical forms. The "canonical" column indicates the preferred current type.

  | Type | Count | Sample IDs | Preferred Canonical | Origin Hypothesis | Remediation Complexity |
  |------|-------|------------|--------------------|--------------------|----------------------|
  | `constraints` | 1 | `constraints` | `constraint` | Pre-refactor plural aggregate: `.ideate/steering/constraints.yaml` indexed as a single `constraints` node. Predates migration to individual per-constraint YAML files. | 1 — safe automated retype if downstream queries migrate; YAML file itself is still in use |
  | `guiding_principles` | 1 | `guiding-principles` | `guiding_principle` | Pre-refactor plural aggregate: `.ideate/steering/guiding-principles.yaml` indexed as a single `guiding_principles` node. Same pattern as `constraints`. | 1 — safe automated retype if downstream queries migrate |
  | `research_finding` | 18 | RF-agent-teams-and-plugins, RF-artifact-graph-schema, RF-claude-cli-flags, RF-context-assembly-strategies, RF-gastown (…13 more) | `research` | Legacy research directory: `.ideate/research/RF-*.yaml` (RF- prefix, cycle_created=1). A newer parallel structure exists at `.ideate/steering/research/` with type `research` (no cycle_created). 18 of the `research_finding` topics have corresponding `research` duplicates in the new location. These are *different files* at *different paths* with *different IDs* — no single file has two index entries, but the same research content exists in both old and new formats. | 2 — requires content review to verify new-format files are complete before deleting old; old files still exist on disk |
  | `domain_index` | 1 | `index` | N/A (utility node) | `.ideate/domains/index.yaml` — a metadata/manifest file for the domains directory, not a true artifact node. Indexed because the indexer crawls all YAML files. | 1 — safe to exclude from indexing via path filter; does not participate in any edges |
  | `review_output` | 1 | `code-reviewer` | N/A (ephemeral artifact) | `.ideate/cycles/005/code-reviewer.yaml` — a one-off code reviewer output artifact from an early cycle. Not a repeating artifact pattern. Currently in `ALL_NODE_TYPES` but represents an ad-hoc artifact. | 1 — low impact; no downstream usage found; can be excluded or left |

  **Note on `review_output`**: The work item spec stated this type is "not in ALL_NODE_TYPES in adapter.ts" — however, as of the current codebase, `review_output` IS present in `ALL_NODE_TYPES` (line 63 of `adapter.ts`). The type has been added since the spec was written.

  ---

  ## 2. Orphan Analysis

  **Definition**: An orphan is a node with zero edges in AND zero edges out.

  **Total orphan count**: 1,056 of 2,408 nodes (43.9%)

  | Type | Total Nodes | Orphan Count | Orphan % | Classification | Justification |
  |------|-------------|--------------|----------|----------------|---------------|
  | `journal_entry` | 636 | 636 | 100% | **Expected** | Journal entries are narrative records, not graph participants. No edge semantics are defined for this type. All 636 are orphaned by design. |
  | `work_item` | 595 | 93 | 15.6% | **Mixed** | 93 orphaned work items (73 `done`, 20 `obsolete`). Older work items (WI-015 through ~WI-080) were created before the edge-writing infrastructure existed. These are anomalous in that newer work items are connected but early work items have no `depends_on`/`blocks`/`belongs_to_phase` edges. |
  | `cycle_summary` | 83 | 83 | 100% | **Expected** | Cycle summaries are standalone review outputs. No edge semantics are defined for this type in current schema. All orphaned by design. |
  | `metrics_event` | 160 | 62 | 38.8% | **Partially Expected** | 98 metrics_events have edges, 62 do not. The connected ones likely have `references` edges; the orphaned ones may be events that pre-date edge infrastructure or reference nodes no longer in the index. |
  | `research` | 25 | 26 | 100%* | **Expected** | Research nodes in `steering/research/` are not currently wired into the graph. (*Count discrepancy: query returned 26 orphans against 25 total — this is an artifact of the query running while index may have had a write; confirmed total is 25.) |
  | `review_manifest` | 24 | 24 | 100% | **Expected** | Review manifests are standalone cycle artifacts. No edge semantics defined. |
  | `decision_log` | 22 | 22 | 100% | **Expected** | Decision logs are standalone cycle artifacts. No edge semantics defined. |
  | `interview` | 41 | 21 | 51.2% | **Partially Expected** | 20 interviews are connected (via `interview_question` edges), 21 are not. The unconnected ones may be from cycles before interview→question edge semantics were implemented. |
  | `research_finding` | 18 | 18 | 100% | **Expected (legacy)** | These are the old-format research nodes from `.ideate/research/`. They were never wired into edges. |
  | `constraint` | 16 | 16 | 100% | **Expected** | Individual constraint nodes are not yet edge-connected. No `constraint` edges defined. |
  | `guiding_principle` | 16 | 14 | 87.5% | **Mostly Expected** | 2 guiding_principle nodes have edges (likely `references` from findings); 14 do not. |
  | `phase` | 34 | 13 | 38.2% | **Anomalous** | 21 phases are connected via `belongs_to_project` and `belongs_to_phase` edges. 13 phases are orphaned — these are likely early phases created before the project/phase edge schema existed. |
  | `finding` | 266 | 5 | 1.9% | **Anomalous** | Nearly all findings are connected. 5 orphaned findings warrant investigation — may be findings with malformed IDs or indexing gaps. |
  | `domain_decision` | 163 | 4 | 2.5% | **Anomalous** | Nearly all domain decisions are connected via `belongs_to_domain`. 4 orphans are anomalous. |
  | `domain_policy` | 67 | 4 | 6.0% | **Anomalous** | Similar to domain_decision. 4 orphaned policies should have `belongs_to_domain` edges. |
  | `domain_question` | 132 | 4 | 3.0% | **Anomalous** | Similar pattern. 4 orphaned questions. |
  | `execution_strategy` | 4 | 4 | 100% | **Expected** | Execution strategy documents are standalone plan artifacts. |
  | `overview` | 3 | 3 | 100% | **Expected** | Overview documents are standalone. |
  | `architecture` | 1 | 1 | 100% | **Expected** | Architecture document is standalone. |
  | `constraints` (plural) | 1 | 1 | 100% | **Expected** | Legacy aggregate, no edges by design. |
  | `domain_index` | 1 | 1 | 100% | **Expected** | Utility metadata file, no edges. |
  | `guiding_principles` (plural) | 1 | 1 | 100% | **Expected** | Legacy aggregate, no edges by design. |
  | `review_output` | 1 | 1 | 100% | **Expected** | One-off ephemeral artifact. |

  **Summary**: The large orphan count (1,056) is primarily driven by `journal_entry` (636) and `cycle_summary` (83), both of which are expected orphan types by design. The genuinely anomalous orphans are: 93 work items (old ones lacking edges), 13 phases, and ~13 domain knowledge nodes (decisions/policies/questions).

  ---

  ## 3. File Path Validity

  **Method**: Checked all 2,408 nodes for file existence using `test -f` on each `file_path`.

  | Metric | Value |
  |--------|-------|
  | Total nodes checked | 2,408 |
  | Stale file paths (file missing) | **0** |
  | Valid file paths | 2,408 (100%) |

  **Result**: Zero stale file paths. Every node in the index has a corresponding YAML file on disk. The index is current and not accumulating stale entries from deleted files.

  **Note**: This confirms P-26 (index.db is rebuilt from YAML). The index accurately reflects the YAML files present on disk.

  ---

  ## 4. Work Item Status Audit

  **Canonical status values**: `pending`, `in_progress`, `done`, `obsolete`, `blocked`

  | Status | Count | Canonical? |
  |--------|-------|------------|
  | `done` | 530 | Yes |
  | `obsolete` | 50 | Yes |
  | `completed` | **8** | **No — non-canonical** |
  | `pending` | 7 | Yes |

  **Non-canonical status**: `completed` — found on 8 work items: WI-653, WI-654, WI-655, WI-656, WI-657, WI-658, WI-659, WI-660.

  These are a contiguous block of work items from a single cycle, suggesting a batch completion event used the non-canonical `completed` value instead of `done`. Inspection of WI-653 confirms the YAML file has `status: completed` — this is a YAML-level value, not just an index artifact. The non-canonical status will persist across index rebuilds until the YAML files are updated.

  **Missing canonical statuses**: `in_progress` (0 nodes) and `blocked` (0 nodes) — no work items currently have these statuses, which is consistent with a project that is between cycles.

  ---

  ## 5. Cycle Reference Validity

  **Method**: Extracted cycle directory references from `cycle_summary` node `file_path` values and compared against directories in `.ideate/cycles/`.

  ### cycle_summary nodes with invalid cycle directory references
  **Count: 0**

  All 83 `cycle_summary` nodes in the index have `file_path` values pointing to cycle directories that exist on disk. No cycle_summary node references a non-existent cycle directory.

  ### Inverse finding: cycle directories with no cycle_summary node
  This is the more notable finding. Of 71 cycle directories in `.ideate/cycles/`, only 28 have `cycle_summary` nodes indexed.

  **43 cycle directories have no cycle_summary node**, including:
  - Cycles 024-029: Have review files (code-quality.yaml, gap-analysis.yaml, etc.) but these are indexed as their specific types, not as cycle_summary
  - Cycles 028-029, 034, 058-066: Have `summary.yaml` files with `type: cycle_summary` that are **not indexed** — these files exist on disk but are absent from the index
  - Cycles 030-063 (many): Have only journal entries or no indexed files at all
  - Cycle 071: Has 308 journal entries but no cycle_summary node

  The most significant gap: cycles 028, 029, 034, 058, 059, 060, 061, 062, 063, 065, 066 each have a `summary.yaml` with `type: cycle_summary` that exists on disk but is not reflected in the index. This suggests an indexer gap for these cycles — the files were created but the indexer did not pick them up, or they were created after the last index rebuild.

  ---

  ## 6. Prioritized Remediation List

  ### Tier 1 — Safe Automated Cleanup

  1. **Retype `completed` work items to `done`**: 8 work items (WI-653 through WI-660) have `status: completed` in their YAML files. Safe to find-replace `status: completed` → `status: done`. All these files exist and the mapping is unambiguous.

  2. **Re-index missing cycle_summary nodes**: 11 cycle directories (028, 029, 034, 058-063, 065, 066) have `summary.yaml` files with `type: cycle_summary` that are not in the index. Safe to trigger a full index rebuild to pick these up, or targeted upsert of these 11 files.

  3. **Exclude `domain_index` from indexing**: The single `domain_index` node (`index` at `.ideate/domains/index.yaml`) is a manifest file not an artifact. Safe to add a path exclusion rule in the indexer for `domains/index.yaml`.

  ### Tier 2 — Requires Content Review

  4. **Migrate `research_finding` nodes to `research`**: 18 nodes in `.ideate/research/RF-*.yaml` represent older-format research. The same topics exist in newer format at `.ideate/steering/research/`. Before deleting old files: verify new-format files have complete content (same or expanded), then delete old files and allow index rebuild to remove `research_finding` nodes. The 25 `research` nodes suggest 7 topics were added only in the new format; 18 overlap.

  5. **Evaluate `constraints` and `guiding_principles` aggregate nodes**: The plural-typed nodes (`.ideate/steering/constraints.yaml` and `.ideate/steering/guiding-principles.yaml`) are aggregate documents. Determine whether these are still the source-of-truth for their content or whether they are now superceded by individual per-artifact YAML files. If superceded, deprecate these files. If still authoritative, retain but consider retyping to a document type.

  6. **Review orphaned `work_item` nodes**: 93 orphaned work items (73 `done`, 20 `obsolete`). These are functionally complete but lack graph edges (no `depends_on`, `belongs_to_phase`, `blocks` edges). Older work items will never have edges added retroactively, but they are not harmful. Decision: accept as expected-orphan for historical work items with no current phase assignment.

  ### Tier 3 — Requires Human Decision

  7. **Fate of `review_output` type**: One node (`code-reviewer` in cycle 005). The type is in `ALL_NODE_TYPES` but represents a one-off artifact pattern. Decision needed: should `review_output` be a supported artifact type going forward, or should it be removed from `ALL_NODE_TYPES` and the file left as unindexed?

  8. **Cycle coverage gaps (cycles 030-071 mostly unindexed)**: Many cycles (030-063, 065, 066, 069, 071) have content not fully indexed — only journal entries or nothing. Cycles may have legitimate review outputs that were written to non-standard paths or file names. Investigation needed: walk each cycle directory and confirm whether indexable content is present but missed, or whether these cycles genuinely produced no summary artifacts.

  9. **`research_finding` vs `research` long-term**: Related to item 4. The broader question is whether `.ideate/research/` directory should be deprecated entirely in favor of `.ideate/steering/research/`. Human decision on directory structure and migration scope.

