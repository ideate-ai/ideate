title: "Root Cause Analysis: Q-164 MCP stale SQLite read bug (ideate_get_convergence_status vs. sqlite3 CLI divergence)"
content: |
  # Root Cause Analysis: Q-164 MCP Stale SQLite Read Bug

  **Date**: 2026-04-17
  **Scope**: ideate_get_convergence_status returning stale finding counts that diverge from a direct sqlite3 CLI query
  **Observed during**: PH-050 cycle 2 autopilot, 2026-04-17
  **Addresses**: Q-164, WI-886

  ---

  ## Summary

  The incident where `ideate_get_convergence_status(cycle=29)` returned 5 Significant open findings while a direct sqlite3 CLI query returned 0 is most plausibly explained by a **SQLite extension-table staleness window**: either a two-write sequence race (finding created without `addressed_by`, then updated later) or a propagation lag between YAML ground truth and the `findings` extension table. Code inspection confirms the upsert path DOES include `addressed_by` when present in content, so hypothesis (v) narrow-column-omission is rejected. The correct defensive fix is for `getConvergenceData` to verify `addressed_by=NULL` rows against YAML ground truth before counting them as open findings.

  ---

  ## Evidence

  ### Current SQLite state is consistent with YAML (post-incident)

  ```sql
  sqlite3 .ideate/index.db "SELECT id, severity, addressed_by FROM findings WHERE cycle=29 AND severity='significant'"
  -- All 5 rows show addressed_by populated (PH-046 or rework refs)
  ```

  Content hashes on the `nodes` rows match YAML file content. The DB is currently consistent.

  ### Upsert path propagates addressed_by (hypothesis v REJECTED)

  **writer.ts `upsertExtensionTableRow` for type 'finding'** builds a FindingRow including `addressed_by: (content.addressed_by as string | null) ?? null` and calls `upsertFinding` which uses Drizzle INSERT ON CONFLICT DO UPDATE SET with the full row.

  **schema.ts findings table** includes `addressed_by TEXT` (nullable).

  **indexer.ts `case 'findings'`** extension-row builder also includes `addressed_by: toStrOrNull(doc.addressed_by)`.

  Both write paths (direct putNode and re-index via watcher) correctly propagate `addressed_by` WHEN the content object contains it.

  ### Prepared-statement cache (hypothesis i REJECTED)

  `better-sqlite3` caches the compiled query plan, not result data. Every `.all(cycle)` execution is fresh.

  ### WAL / cross-process snapshot (hypotheses ii, iii UNLIKELY as primary cause)

  MCP server and sqlite3 CLI use different connections but WAL mode commits are immediately visible to same-connection reads. No held-open read transaction exists in the synchronous better-sqlite3 model. Pinned snapshot would require code we don't have.

  ### Remaining plausible mechanisms

  **(A) Two-write sequence race**: Finding F-X created with no `addressed_by`; convergence checked; finding re-written with `addressed_by`. CLI run after both writes sees 0; MCP call between writes saw 1.

  **(B) Index debounce / watcher lag**: YAML file modified on disk with `addressed_by`, but watcher-driven re-index had not yet upserted the new row into `findings` extension table when the convergence check ran. Later re-index caught up.

  **(C) Historical write-path bug**: An earlier version of the writer wrote `addressed_by` only to nodes.content JSON, not to the `findings` extension column. A later write triggered re-upsert with the current code, which did propagate it. This cannot be confirmed without access to the DB state at the time of the incident.

  All three converge on the same defensive fix.

  ---

  ## Rejected Hypotheses

  | Hypothesis | Verdict | Reason |
  |---|---|---|
  | (i) Prepared statement serving pre-write snapshot | Rejected | better-sqlite3 caches plans not results |
  | (ii) WAL checkpoint lag (primary cause) | Unlikely | Same-connection synchronous model |
  | (iii) Cross-process snapshot | Inapplicable | MCP writes + convergence read share one connection |
  | (iv) Index-rebuild / watcher race | Plausible contributor | Watcher debounce window can create SQLite-vs-YAML skew |
  | (v) Upsert narrow-column omission (addressed_by missing) | Rejected | Code confirms addressed_by IS included in write paths |

  ---

  ## Fix Approach Recommendation for WI-887

  ### Defensive fix: YAML-ground-truth verification on zero-addressed-by rows

  **Recommended (Option A)**: In `getConvergenceData`, after the SQLite query, for each finding the query counts as open (i.e. `addressed_by IS NULL` in the extension table), load the YAML file via `nodes.file_path` and check if `addressed_by` is actually populated there. If YAML has it, treat the finding as addressed AND trigger a synchronous re-index of that file so SQLite catches up. Emit a warning log when a mismatch is detected (so we can track whether the bug recurs post-fix).

  This is defensive against all three remaining mechanisms (A, B, C) without requiring us to pin down which one caused the specific incident.

  **Supporting change**: Consider adding a synchronous re-index call at the end of `putNode` for findings whose content includes `addressed_by`, so the SQLite extension table is guaranteed consistent before control returns to the caller.

  ### Files to change for WI-887

  1. `mcp/artifact-server/src/adapters/local/reader.ts` — `getConvergenceData` (lines 917-1010): add YAML-verification pass for rows with `addressed_by IS NULL`; log mismatches; trigger re-index on mismatch.
  2. `mcp/artifact-server/src/adapters/local/writer.ts` — `putNode` for type 'finding' (if needed): ensure synchronous consistency after commit.
  3. `mcp/artifact-server/src/__tests__/q164-regression.test.ts` — NEW FILE (regression test).

  ---

  ## Regression Test Outline

  File: `mcp/artifact-server/src/__tests__/q164-regression.test.ts`

  **Test 1 — two-write sequence**: Write finding without `addressed_by`; check convergence sees it open (significant: 1, condition_a: false); write same finding with `addressed_by` populated; check convergence sees 0 significant open. This exercises mechanism (A).

  **Test 2 — YAML-DB skew recovery**: Write finding with `addressed_by` via direct YAML write (simulating watcher-not-yet-fired state); immediately call `getConvergenceData` — it should read YAML for NULL-addressed_by rows and return 0 significant open, then re-index so the next call is fast. This exercises mechanism (B) recovery.

  **Test 3 — MCP/CLI agreement invariant**: Post-fix, after any finding write sequence, a direct SQLite SELECT on the findings table and the MCP `getConvergenceData` output must agree on addressed_by counts. This is the incident-level invariant from Q-164.

  ---

  ## Notes on Analysis Uncertainty

  The incident cannot be reproduced against the current live database because SQLite is now consistent with YAML. Any of mechanisms (A), (B), or (C) could have caused it. The recommended fix is intentionally defensive against all three. If WI-887 lands and Q-164 does not recur across several cycles, the fix is validated regardless of which mechanism was operative on 2026-04-17.
