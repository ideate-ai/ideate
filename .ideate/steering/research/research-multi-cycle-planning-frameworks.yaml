id: research-multi-cycle-planning-frameworks
type: research
title: "Multi-Cycle Planning: Organizational Framework Survey"
questions:
  - How do established frameworks handle work spanning multiple iterations?
  - What structural concepts maintain strategic direction without loading all tactical details?
  - What are the failure modes and risks of each approach?
findings:
  - source: Scrum/Agile/XP
    key_concepts:
      - Epic > Feature > Story hierarchy with progressive elaboration
      - "Product Backlog as iceberg: top 10% detailed, middle rough, bottom vague"
      - "XP Planning Game: two explicit horizons (release planning vs iteration planning)"
      - "Story mapping: 2D grid of user journey x priority, horizontal slices become releases"
      - "Rolling wave planning: detail decreases with time horizon"
      - 10% of sprint effort goes to backlog refinement for future sprints
  - source: SAFe/LeSS/Nexus
    key_concepts:
      - "Program Increment (PI): groups 4-6 sprints into cohesive planning unit"
      - PI Planning decides features and cross-team deps; defers story detail to sprints
      - "3-PI Roadmap: committed / forecast / forecast (decreasing detail)"
      - "Portfolio Kanban: Funnel > Analyzing > Backlog > Implementing > Done"
      - "LeSS counter-argument: maybe you don't need formal multi-sprint structure, just better refinement"
      - "5 agile planning layers: Vision > Roadmap > Release/PI > Sprint > Daily"
  - source: Shape Up
    key_concepts:
      - "Appetite replaces estimation: fixed time, variable scope"
      - "Circuit breaker: work not shipped in one cycle is cancelled by default"
      - "Scope hammering: aggressively cut to fit the timebox"
      - "No backlog: unpicked pitches are discarded"
      - Explicitly does NOT accommodate work larger than one cycle — reshape instead
  - source: Military Planning
    key_concepts:
      - "Commander's intent: what to achieve and why, not how"
      - "Nested intent: understand two levels up for decentralized decisions"
      - "Mission-type orders: tell effect to achieve, subordinates decide how"
  - source: Lean/TOC
    key_concepts:
      - "Pull planning: work starts only when next stage has capacity"
      - "Last Planner System: master schedule > phase schedule > look-ahead > weekly plan"
      - "Tasks Made Ready: clear constraints before promoting to execution"
      - "Theory of Constraints: pace everything to the bottleneck"
      - "Drum-Buffer-Rope: constraint sets pace, buffers protect it, rope limits WIP"
  - source: Six Sigma/OKR/Kanban
    key_concepts:
      - "DMAIC tollgate reviews: phase gates with explicit sign-off before proceeding"
      - "OKRs: three levels (strategic/tactical/operational) with measurable key results"
      - "Kanban WIP limits: mechanically enforce focus"
      - "Cone of uncertainty: estimates narrow from 4x to 1.1x as decisions remove variability"
synthesis: "The universal pattern across all frameworks is progressive elaboration with planning horizons. Detail level inversely correlates with time horizon. Every framework that handles multi-iteration work uses some form of lightweight strategic container (epic, PI, bet, mission) that carries intent across iterations without carrying implementation detail. The key design tension is how much structure to add: SAFe adds a lot (and is criticized for it), LeSS adds almost none (and relies on discipline), Shape Up takes a radical stance (no work spans cycles, period)."
