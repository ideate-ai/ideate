title: Graph Edge Coverage Audit
status: active
content: |
  # Graph Edge Coverage Audit

  **Scope**: 2,408 nodes (2,408 nodes at time of audit; count reflects state before this artifact and research-node-inventory were indexed), 1,751 edges across 15 registered edge types
  **Purpose**: Identify where PPR context quality is weak and what extraction rule changes would most improve it.

  ---

  ## 1. Edge Coverage Matrix

  | Edge Type | Edge Count | Applicable Sources | Linked Sources | Coverage % | Source→Target |
  |-----------|-----------|-------------------|----------------|------------|---------------|
  | belongs_to_domain | 736 | 1,052 | 736 | 70.0% | work_item/policy/decision/question/interview_question → domain |
  | relates_to | 359 | 1,062 | 359 | 33.8% | finding/metrics_event/journal_entry → work_item |
  | depends_on | 293 | 595 | 203 | 34.1% | work_item → work_item |
  | references | 96 | 95 | 95 | 100% | interview_question → interview |
  | blocks | 95 | 595 | 63 | 10.6% | work_item → work_item |
  | belongs_to_phase | 79 | 595 | 79 | 13.3% | work_item → phase |
  | derived_from | 69 | 67 | 51 | 76.1% | domain_policy → guiding_principle/decision/policy |
  | belongs_to_project | 18 | 34 | 18 | 52.9% | phase → project |
  | addressed_by | 6 | 398 | 4 | 1.0% | finding/domain_question → work_item |
  | amended_by | 0 | 67 | 0 | 0% | domain_policy → domain_policy |
  | supersedes | 0 | 163 | 0 | 0% | domain_decision → domain_decision |
  | belongs_to_module | 0 | 595 | 0 | 0% | work_item → module_spec |
  | governed_by | 0 | 611 | 0 | 0% | work_item/module_spec/constraint → guiding_principle/policy/constraint |
  | informed_by | 0 | 611 | 0 | 0% | work_item/module_spec/guiding_principle → research_finding/decision/question |
  | triggered_by | 0 | 0 | 0 | N/A | proxy_human_decision → finding/work_item |

  Note: references count (96) slightly exceeds source count (95) because interview entry indexing creates
  one references edge per entry, and some entries may share files. All 95 interview_question nodes have edges.

  ### Coverage notes
  - belongs_to_domain: 30% gap — 209 work_items lack a domain field (historical WIs pre-date domain tagging)
    and 91/95 interview_questions have no domain on their entry objects
  - relates_to: 636 journal entries (60% of applicable sources) have zero relates_to edges
  - belongs_to_phase: 516/595 work items have no phase field (pre-phase-system WIs)
  - belongs_to_project: 16/34 phases missing project edge

  ---

  ## 2. Top 5 Uncovered Type-Pair Gaps

  ### Gap 1: work_item governed_by domain_policy — 0 edges / 595 applicable
  Semantic relationship: Every work item that implements or violates a policy should carry a governed_by edge.
  This is the highest-value missing link for PPR: when assembling context for a work item, the relevant policies
  should be pulled in via graph traversal rather than domain-scoped recall.

  Concrete example: WI-673 (adapter-contract.md cleanup) explicitly addresses P-53 violations and references
  P-37, but has zero governed_by edges. PPR context assembly must do domain-scoped recall instead of direct
  graph traversal to find governing policies.

  Root cause: The governed_by yaml_field exists in the registry but no work item YAML has this field populated.
  The field was added to the schema spec but never adopted in agent prompts.

  ### Gap 2: work_item informed_by domain_decision — 0 edges / 595 applicable
  Semantic relationship: Work items derived from or implementing domain decisions should carry informed_by edges,
  enabling PPR to surface the rationale behind a WI's design choices.

  Concrete example: WI-160 (deleteStaleRows Drizzle conversion) was triggered by cycle-017 catching a design
  issue documented in decisions D-75 and D-66. No graph path connects WI-160 to those decisions. A reviewer
  assembling PPR context via graph traversal cannot find the rationale.

  Root cause: No work item YAML has an informed_by field populated. The registry has the spec but production
  never adopted it.

  ### Gap 3: domain_decision supersedes domain_decision — 0 edges / 163 applicable
  Semantic relationship: When a decision replaces an earlier one, a supersedes edge creates a clear amendment
  chain. Without it, PPR may surface stale decisions alongside current ones with no ordering signal.

  Concrete example: All 163 domain_decision records have supersedes: null in the database. Sample inspection
  of D-01 through D-05 confirms the field is absent from authored YAML files. Domain decisions were never
  written with a supersedes field in this corpus.

  Root cause: The supersedes yaml_field is registered and extraction code would handle it, but the
  domain_decision YAML format as actually authored omits this field entirely.

  ### Gap 4: domain_policy amended_by domain_policy — 0 edges / 67 applicable
  Semantic relationship: When a policy is superseded by a newer version, amended_by links old to new. Without
  it, PPR sees all policy versions as equal-weight siblings with no temporal ordering.

  Concrete example: P-46 references P-42 and P-45 via derived_from, but the amended_by chain that would
  signal P-46 supersedes them is absent. Sample file P-001.yaml has no amended_by field at all.

  Root cause: Same structural issue as supersedes — field registered in schema but never authored into YAMLs.

  ### Gap 5: journal_entry relates_to work_item — 0 edges / 636 applicable
  Semantic relationship: Journal entries are execution/planning logs; linking them to the work item they
  narrate would let PPR surface relevant execution history when assembling context for a work item.

  Concrete example: J-020-002 title is "Work item 117: Dynamic testing guidance in code-reviewer agent" —
  it documents execution of WI-117, but its work_item field is null. J-020-003 documents WI-118 — also null.
  No journal entry in the entire 636-node corpus has a non-null work_item field.

  Root cause: The journal_entry type has work_item defined in the TypeScript interface and extension table,
  but agents writing journal entries never populate this field. The relates_to extraction rule is correct;
  the input data is the problem.

  ---

  ## 3. addressed_by Gap Root Cause Analysis

  Coverage: 1 of 266 finding nodes (0.4%) have an addressed_by edge.
  Coverage: 3 of 132 domain_question nodes (2.3%) have addressed_by edges.
  Total: 4 of 398 applicable source nodes (1.0%).

  ### Findings (266 nodes, 1 edge — F-020-001 only)
  The single finding with an addressed_by edge is F-020-001 (addressed_by: WI-630). The extraction rule is
  correct — it fires on any finding with a populated addressed_by field.

  Why 265 findings lack the edge:
  - The findings table shows addressed_by: null for 265/266. Findings are produced by the code-reviewer agent
    and the agent prompt never includes addressed_by as a field to populate at review time.
  - addressed_by is a retrospective field needing to be set after a remediation WI is created. No automated
    backfill mechanism exists.
  - 5 findings (FI-016-001 through FI-016-005) also have no work_item field, indicating a legacy partial
    format without the relates_to target either.

  Verdict breakdown of findings without addressed_by edge:
  - ~165 passing findings (Pass/pass/rework variants) — recoverable via derivation from work_item field
  - 68 Fail findings — genuinely unaddressed (findings not yet fixed)
  - 33 findings with blank/null verdict

  The 68 Fail findings are genuinely unaddressed. The ~165 passing findings represent the largest recoverable
  gap: they were addressed by the work_item they reference, but that derivation is not performed at index time.

  ### Domain Questions (132 nodes, 3 edges)
  - 5 questions have addressed_by fields; 3 produce valid edges (Q-07 to WI-346, Q-84 to WI-361, Q-95 to WI-383)
  - Q-90: addressed_by "P-17 amendment" — not a WI ID; P-17 is a domain_policy; edge not created
  - Q-91: addressed_by "WI next cycle — fix handleUpdateConfig..." — free-text note; edge not created
  - 127 questions have addressed_by: null (open or resolved without a tracked WI)

  Root cause classification:
  - Missing yaml_field at write time (findings): 265/266 (99.6%) — systematic agent behavior gap
  - Non-ID free text in field (domain questions): 2 of 5 populated fields produce invalid targets (40%)
  - Genuinely unaddressed: majority of null domain questions and all 68 Fail findings

  ---

  ## 4. Journal Entry Edge Analysis

  Total journal_entry nodes: 636
  With any outgoing OR incoming edge: 0 (zero — 0.0%)

  All 636 journal entries are fully disconnected nodes in the graph. They have no outgoing edges (work_item
  is null for all) and no incoming edges from any other node type. Journal entries are the single largest
  disconnected island in the artifact graph.

  Why they are disconnected:
  1. work_item field: Defined as string | null in the TypeScript interface. Every journal entry has null.
     Agents write journal entries as narrative logs without referencing a specific WI ID.
  2. phase field: All 636 have a phase value, but it contains skill names ("execute", "refine", "review"),
     not phase IDs. The belongs_to_phase edge routes work_item to PH-NNN IDs. Journal entries are not
     registered as a belongs_to_phase source type.
  3. cycle context: Journal entries have cycle_created but no belongs_to_cycle edge type is registered.
  4. No incoming edges: No other artifact type has a yaml_field pointing to a journal entry ID.

  PPR impact: Journal entries contribute zero graph traversal value. They are reachable only by direct
  type-query, not via any graph path from work items, findings, or decisions.

  ---

  ## 5. Ranked Extraction Rule Recommendations

  ### Rank 1: Derive addressed_by from Pass verdict + work_item field (HIGH IMPACT)
  yaml_field: findings.work_item (already indexed as relates_to; add parallel addressed_by derivation)
  logic: For findings with verdict matching /^pass/i and a non-null work_item field, create an addressed_by
    edge at index time (source=finding, target=work_item). Derivation rule — no new yaml_field needed.
  source_types: finding
  target_types: work_item
  implementation: In extractEdges() for findings table case, check doc.verdict and doc.work_item.
  estimated_ppr_impact: ~165 new addressed_by edges immediately, raising finding coverage from 0.4% to ~62.4%.

  ### Rank 2: Extract work_item ID from journal_entry title pattern (MEDIUM-HIGH IMPACT)
  yaml_field: journal_entries.title (derive via regex, not direct field read)
  logic: Parse title using a combined pattern that handles both common formats:
    - "WI-NNN: ..." style: /WI-(\d+)/i
    - "Work item NNN: ..." style: /[Ww]ork\s+item\s+(\d+)/
    Combined pattern: /(?:WI-(\d+)|[Ww]ork\s+item\s+(\d+))/
    Match group 1 or group 2 gives the numeric part; zero-pad to 3 digits to form the WI-NNN key.
    If the resolved target node exists, create a relates_to edge.
    Example: J-020-002 title "Work item 117: ..." matches group 2 → WI-117.
    Execute-phase entries routinely title as "Work item NNN: ..." (163 such entries) or "WI-NNN: ...".
  source_types: journal_entry
  target_types: work_item
  implementation: In extractEdges() for journal_entry, apply the combined regex to doc.title and
    insertEdge if the target node is found.
  estimated_ppr_impact: ~200-300 new relates_to edges for execute-phase entries, connecting the 636-node
    disconnected island to work items. Transforms journal entries from dead weight into traversable nodes.
    The "Work item NNN:" pattern alone covers ~163 entries that the previous /WI-?\d+/i pattern would miss.

  ### Rank 3: interview_question entry-level domain extraction (LOW-MEDIUM IMPACT)
  yaml_field: interview_question entries have a domain field in the YAML entry object
  issue: extractEdges() is called with the parent interview doc, not the entry doc. The entry domain field
    is stored in the extension table but never processed for edge extraction.
  fix: In the interview entry loop in indexSingleFile() (~line 596), add:
    edgesCreated += extractEdges(drizzleDb, entryDoc, entryId, "interview_question");
  source_types: interview_question
  target_types: domain (string)
  estimated_ppr_impact: 4 edges immediately (4/95 IQs have domain set); fixes structural gap for future IQs.
    One-line fix in indexer.ts.

  ### Rank 4: Derive belongs_to_cycle for journal_entry (MEDIUM IMPACT)
  yaml_field: None — derive from journal_entry cycle_created (in nodes base table)
  logic: Register new edge type belongs_to_cycle. For each journal_entry, create edge to CS-{NNN}
    cycle_summary node if it exists, where NNN is zero-padded cycle_created value.
  schema_change: Add belongs_to_cycle to EDGE_TYPES and EDGE_TYPE_REGISTRY in schema.ts.
  implementation: Post-processing pass in rebuildIndex() after all nodes are indexed.
  estimated_ppr_impact: Up to 636 new edges linking journal entries to cycle summaries. Enables graph
    traversal: cycle_summary → journal_entries for the same cycle, restoring cycle narrative reachability.

  ### Rank 5: Adopt supersedes and amended_by in domain authoring templates (LOW IMPACT)
  yaml_field: domain_decision.supersedes, domain_policy.amended_by (extraction rules already correct)
  issue: Not an extraction gap — the code is correct. The YAML is never authored with these fields.
    All 163 domain_decisions have supersedes: null; all 67 domain_policies have amended_by: null.
  fix: Update domain-curator agent prompt to populate supersedes when a decision replaces an earlier one,
    and amended_by when a policy amendment chain exists. No code changes required.
  estimated_ppr_impact: Enables temporal ordering of decisions and policies in graph traversal. Without it,
    PPR cannot distinguish current from superseded decisions, risking surfacing stale context.

  ---

  ## Key Findings Summary

  1. addressed_by is structurally broken for findings (0.4% coverage): The field is never written by
     the code-reviewer agent. A derivation rule using Pass verdict plus work_item field would recover ~62.4%
     coverage without any YAML schema changes.

  2. Journal entries are a 636-node disconnected island (0% edge coverage): The work_item field is never
     populated by agents. Title-pattern extraction would recover 200-300 edges; cycle-linkage derivation
     would add up to 636 more.

  3. supersedes and amended_by are structurally zero (0/163 and 0/67): Not extraction failures — the
     yaml_field simply does not appear in any authored document. Fixing requires agent prompt changes,
     not indexer changes.

  4. governed_by and informed_by are aspirational (0/595 each): No work item has these fields. Requires
     either agent-side field adoption or a cross-artifact domain-based derivation pass.

  5. belongs_to_phase is historically limited (13.3%): The 516-WI gap reflects the phase system being
     added mid-corpus. Older WIs cannot be backfilled without knowing their phase assignment.
