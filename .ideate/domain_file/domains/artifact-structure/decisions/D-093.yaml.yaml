rationale: D-028-1 (prior cycle) established `{project_root}` as the canonical placeholder, but implementation was incomplete. Cycle 029 found six locations in the domain-curator agent still using the deprecated `{artifact-dir}` placeholder. Standardization reduces cognitive load and prevents path resolution errors.
