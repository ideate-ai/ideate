  1. Uses `{artifact-dir}` instead of `{project_root}` (violates P-33)
  2. References `policies.md`, `decisions.md`, `questions.md` (violates P-25)
  3. Instructs direct Write tool usage instead of MCP (violates P-06)

  Given that this is the agent responsible for maintaining domain policies, how should these violations be prioritized and fixed? Should the agent be rewritten to use MCP, or should it be deprecated in favor of a different approach?
