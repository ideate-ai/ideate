# Docker Compose for ideate-server end-to-end testing
#
# This compose file sets up the full ideate-server stack for equivalence testing:
# - Neo4j database
# - ideate-server (GraphQL API)
#
# Usage:
#   docker compose -f docker-compose.ideate-server.yml up -d
#   npm run test:equivalence
#   docker compose -f docker-compose.ideate-server.yml down

services:
  neo4j:
    image: neo4j:5-community
    container_name: ideate-neo4j-e2e
    ports:
      - "127.0.0.1:7474:7474"   # Neo4j Browser
      - "127.0.0.1:7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-testpassword}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_pagecache_size: 512M
      NEO4J_dbms_memory_heap_initial__size: 512M
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - neo4j_e2e_data:/data
      - neo4j_e2e_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-testpassword}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ideate-server:
    build:
      context: ${IDEATE_SERVER_PATH:-../../ideate-server}
      dockerfile: Dockerfile
    container_name: ideate-server-e2e
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-testpassword}
      - PORT=4000
      - NODE_ENV=test
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  neo4j_e2e_data:
  neo4j_e2e_logs:
